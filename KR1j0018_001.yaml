或從幽聲小徐本無聲文二十六重六粗行超遠也從三鹿凡粗之屬皆從粗倉胡切塵塵鹿行揚土也從粗從土直珍切粗塵籒文文二重一㲋㲋獸也似兔青色而大象形頭與兔同足與鹿同凡㲋之屬皆從㲋丑略切㲋篆文毚狡兔也兔之駿者從㲋兔士咸切𣬕獸名從㲋吾聲讀若寫司夜切小徐本牲牲作狌狌從㲋夬聲古穴切文四重一兔獸名象踞後其尾形兔頭與㲋頭同凡兔之屬皆從兔湯故切逸失也從辵兔兔謾訑善逃也夷質切冤屈也從兔從冖小徐本作從冖兔兔在冖下不得走益屈折也小徐本無也於袁切婏兔子也婏疾也從女兔芳萬切𣬚疾也從三兔闕小徐本無闕芳遇切文五狡兔也從兔夋聲七旬切文一新附小徐本無此新附字萈山羊細角者從兔足𥄕聲凡萈之屬皆從萈讀若丸寬字從此臣鉉等曰𥄕徒結切非聲疑象形胡官切文一犬狗之有縣蹄者也象形孔子曰視犬之字如畫狗也凡犬之屬皆從犬苦泫切狗孔子曰狗叩也叩氣吠以守從犬句聲古厚切獀獀南小徐本趙作越從犬叟聲所鳩切尨犬之多毛者從犬從彡小徐本彡上無從詩曰無使尨也吠小徐本下有或曰尨狗也莫江切狡少狗也從犬交聲胸奴地有狡犬巨口而黑身古巧切獪狡獪也從犬會聲古外切小徐本此字次於犯犯字之後㺜犬惡毛也從犬農聲奴刀切猲短喙犬也從犬曷聲詩曰載獫猲獢爾雅曰短喙犬謂之猲獢小徐本引爾雅無獢許謁切獢猲獢也從犬喬聲許驕切小徐本此字次於獫字之後獫長喙犬一曰黑犬黃頭從犬僉聲虛檢切黃犬黑頭從犬主聲讀若注之戍切猈短脛狗從犬卑聲薄蟹切猗犗犬也從犬奇聲於離切狊犬視貌從犬目小徐本目下有聲古闃切竇中犬聲從犬從音音亦聲乙咸切默犬暫逐人也從犬黑聲讀若墨莫北切猝犬從草暴出逐人也從犬卒聲粗沒切猩猩猩犬吠聲從犬星聲桑經切犬吠不止也從犬兼聲讀若檻一曰兩犬爭也胡黯切小犬吠從犬敢聲南陽新亭有鄉荒檻切猥犬吠聲從犬畏聲烏賄切獿獶獿也從犬夒小徐本夒下有聲女交切犬獿獿咳吠也從犬翏聲火包切小徐本此字次於類字之後犬容頭進也從犬參聲一曰賊疾也山檻切獎獎獎嗾犬厲之也從犬將省聲即兩切齧也從犬戔聲初版切惡健犬也從犬刪省聲所晏切小徐本鬭作鬥從犬𥃩聲五還切犬鬭聲小徐本鬬作鬥從犬番聲附袁切狋犬怒貌從犬示聲一曰犬難得代郡有狋氏縣讀又若銀小徐本無又語其切犬吠聲從犬斤聲語斤切獡犬獡獡不附人也從犬舄聲南楚謂相驚曰獡讀若訴小徐本無讀若訴三字式略切獷獷犬獷獷不可附也從犬古猛切狀犬形也從犬爿聲盈鉏亮切𤞛妄強犬也小徐本強作強從犬壯壯亦聲小徐本作從犬壯聲徂朗切獒犬如人心可使者從犬敖聲春秋傳曰公嗾夫獒五牢切獳怒犬貌從犬需聲讀若槈奴豆切又乃矦切犬食也從犬從舌讀若比目魚鰈之鰈他合切狎犬可習也從犬甲聲胡甲切狃犬性驕也小徐本驕作忕從犬丑聲女久切犯犯侵也從犬𢎘聲防險切猜恨賊也從犬青聲倉才切莫杏切犺健犬也從犬亢聲苦浪切多畏也從犬去聲去劫切怯杜林説從心獜獜健也從犬粦聲詩曰盧獜獜力珍切古縣切倏走也從犬攸聲讀若叔式竹切狟狟犬行也從犬亘聲周書曰尚狟狟胡官切犻犻過弗取也從犬巿𣎵蒲沒切𤟍犬張耳貌小徐本張上有開從犬易聲陟革切猌犬張齗怒也從犬來聲讀又若銀魚僅切犮蒲撥切戾曲也從犬出戶下戾者身曲戾也郎計切獨犬相得而鬭也小徐本鬬作鬥從犬蜀聲羊為羣犬為獨也一曰北嚻山有獨𤞞獸如虎白身豕鬣尾如馬徒谷切𤞞獨𤞞獸也從犬谷聲余蜀切獮𤣔獮秋田也從犬璽聲息淺切獮或從豕小徐本豕下有作宗廟之田也故從豕示獵放獵逐禽也小徐本作畋獵也逐禽也從犬巤聲良涉切獠獠獵也從犬尞聲力照切狩犬田也從犬守聲易曰明夷于南狩書究切臭禽走臭而知其迹者犬也從犬從自小徐本從犬上有故臣鉉等曰自古鼻字犬走以鼻知臭故從自尺救切獲獵所獲也從犬蒦聲胡伯切斃頓仆也從犬敝聲春秋傳曰與犬犬斃毗祭切斃斃或從死小徐本無斃獻宗廟犬名羹獻犬肥者以獻之從犬鬳聲許建切五甸切獟犬也從犬堯聲五弔切狾狂犬也從犬折聲春秋傳曰狾犬入華臣氏之門征例切巨王切類種類相似唯犬為甚從犬頪聲力遂切狄赤狄本犬種狄之為言淫辟也從犬亦省聲徒歷切素官切玃母猴也從犬矍聲爾雅云玃父善顧攫持人也俱縛切猶猷玃屬從犬酋聲一曰隴西謂犬子為猷以周切狙玃屬從犬且聲一曰狙犬也暫齧人者一曰犬不齧人也親去切猴夒也從犬矦聲乎溝切犬屬腰巳上黃腰巳下黑食母猴從犬聲讀若構或曰似牂羊出蜀北嚻山中犬首而馬尾火屋切狼似犬鋭頭白頰高前廣後從犬良聲魯當切狛如狼善驅羊從犬白聲讀若蘗寧嚴讀之若淺泊匹各切獌狼屬從犬曼聲爾雅曰貙獌似貍舞販切狐獸也小徐本祅作妖鬼所乘之有三德其色中和小前大後死則丘首從犬瓜聲戶吳切獺如小狗也水居食魚小徐本無如從犬賴聲他達切猵獺屬從犬扁聲布茲玄切獱或從賓猋犬走貌從三犬甫遙切文八十三重五狘獸走貌從犬戉聲許月切𤟤獸名從犬軍聲許韋切狷褊急也從犬肙聲古縣切猰猰獸名從犬契聲烏黠切文四新附小徐本無諸新附字㹜犾兩犬相齧也從二犬凡犾之屬皆從犾語斤切司空也從犾頤聲復説獄司空息茲切獄確也從犾從言二犬所以守也小徐本作從犾言聲魚欲切文三鼠穴蟲之總名也象形凡鼠之屬皆從鼠書呂切𪖇鼠也從鼠番聲讀若樊或曰鼠婦附袁切鼠出胡地皮可作裘從鼠各聲下各切蚡地行鼠伯勞所作也小徐本作作化一曰偃鼠從鼠分聲房吻切蚡或從蟲分䶄䶄令鼠從
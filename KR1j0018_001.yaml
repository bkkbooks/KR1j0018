body:
  text: 説文解字標目説文解字弟一一於悉切丄時掌切示神至切三穌甘切王雨方切玉魚欲切玨𤤴珏古嶽切氣氣去既切士鉏里切丨古本切屮丑列切草倉老切蓐而蜀切茻舉模朗切説文解字弟二小私兆切八博拔切釆蒲萈切半博幔切牛語求切犛莫交切告古奧切口苦后切凵口犯切吅況袁切哭苦屋切走𣥚走子苟切止諸市切撥癶癶北末切步𣥂薄故切此雌氏切正之盛切是是承旨切辵辵丑略切彳丑亦切廴余忍切㢟丑連切行戶庚切齒昌里切牙五加切足即玉切匹所菹切品丕飲切籥以灼切册册册册楚革切説文解字弟三㗊阻立切舌食列切干古寒切𧮫其虐切只諸氏切訥女滑切句古矦切丩𠃚居虯切古公戶切十是執切卅卅蘇沓切言語軒切競渠慶切音於今切䇂去虔切丵士角切菐蒲沃切廾廾居竦切普班切共渠用切異異羊吏切舁舁以諸切臼居玉切䢅食鄰切爨七亂切革古核切鬲郎激切鬲鬲郎激切爪側狡切𠃨丮几劇切鬥都豆切又于救切臧可切史疏士切支章移切帇帇尼輒切聿余律切畫畫胡麥切隸徒耐切臤苦間切臣植鄰切殳市朱切𠘧市朱切寸倉困切皮符羈切㼱而兖切攴攴普木切教教古孝切卜博木切用𠂦用余訟切爻胡茅切㸚力几切説文解字弟四𡕥𥄎火劣切目莫六切瞿九遇切眉睂武悲切盾食閏切自疾二切白疾二切鼻父二切皕彼力切習似入切羽王矩切隹職追切奎息遺切雈胡官切𦫳𠁥工瓦切𥄕徒結切羊𦍋與章切羶式連切瞿九遇切雔市流切雥徂合切鳥都了切烏哀都切𠦒式北潘切冓古候切么於堯切𢆶於虯切叀職緣切玄胡涓切豫余呂切放甫妄切𠬪平小切𣦻𣦻昨千切歹歹五割切死𣦸死息姊切冎古瓦切古忽切肉如六切筋居銀切刀都牢切刃而振切㓞格八切丯古拜切耒耒盧對切角角古嶽切説文解字弟五竹陟玉切箕居之切丌居之切左則箇切工古紅切㠭知衍切巫武扶切甘甘古三切曰王伐切乃乃𢎗奴亥切丂苦浩切可肯我切兮胡雞切號胡到切亏亐于羽俱切旨職稚切喜虛里切壴中句切鼓工戶切豈虛喜切豆徒候切豐豐盧啓切豐敷戎切䖒許羈切虍荒烏切虎呼古切虤五間切皿武永切𠙴去魚切去去厺丘據切血呼決切丶知瘐切丹都寒切青倉徑切井井子郢切皀皮及切鬯丑諒切食食乘力切集秦入切會古外切倉七岡切入人汁切缶方九切矢式視切高古牢切坰古熒切𩫖郭古博切京京舉卿切享許兩切𣆪厚厚胡口切畗芳逼切廩力甚切嗇嗇所力切來洛哀切麥莫獲切夊楚危切舛昌兖切舜舜舒閏切韋宇非切弟時特計切夂陟侈切久舉友切桀渠列切説文解字弟六木莫卜切東得紅切林力尋切才昨哉切叒而灼切之之之止而切匝周答切出尺律切𣎵𣎳朩普活切生所庚切乇陟格切垂是為切華況于切𦾓華戶瓜切𥝌古兮切𥠻𥡞稽古兮切鉏交切漆親吉切束書玉切㯻胡本切囗羽非切員王權切貝博蓋切邑於汲切𨛜巷胡絳切説文解字弟七日人質切旦得案切倝古案切偃於幰切冥莫經切晶子盈切月魚厥切有云九切明武兵切囧俱永切夕祥易切多得何切毌古丸切𢎘乎感切𣎺胡感切𠧪徒遼切齊徂兮切朿七賜切片匹見切鼎都挺切克克克苦得切録彔彔盧谷切禾戶戈切秝郎擊切黍舒呂切香𥞌香許良切米莫禮切毇許委切臼齒其九切凶許容切𣎳匹刃切𣏟匹卦切麻莫遐切叔式竹切專多官切韭舉友切瓜古華切瓠胡切宀武延切宮宫居戎切呂吕力舉切穴胡決切夢莫鳳切疒女厄切冖莫狄切𠔼莫保切冃莫報切兩良奬切网文紡切襾呼訝切巾居銀切巿分勿切帛旁陌切白旁陌切㡀毗祭切黹陟几切説文解字弟八人如鄰切匕卑履切從疾容切比毗至切北傅墨切丠丘去鳩切㐺乑魚音切壬他鼎切重重柱用切臥吾貨切身失人切㐆𠂣於機切衣於稀切裘裘巨鳩切老盧皓切毛莫袍切毳充芮切尸式脂切尺昌石切尾㞑無斐切履履良止切舟職流切方府良切兒如鄰切兄許榮切兂側岑切貌莫教切𠑹𠒂公戶切先穌前切禿他谷切見古甸切覞曳欠切欠去劒切飲於錦切涎敘連切旡旡旡居未切説文解字弟九頁胡結切𦣻書九切面面彌箭切丏彌兖切首首書九切𥄉縣古堯切須相俞切彡所銜切彣無分切文無分切髟必銜切后胡口切司息兹切卮𠨗巵章移切卪卩子結切印於刃切色所力切卯𠨍去京切辟父益切包布交切包布交切茍己力切鬼居偉切甶敷勿切某息夷切嵬五灰切山所間切屾所臻切屵五葛切廣魚儉切廠呼旱切丸胡官切危魚為切石常隻切長直良切勿文勿切冉冉而琰切而如之切豕式視切㣇羊至切彑居例切豚𢄉徒魂切豸池爾切兕徐姊切易羊益切象徐兩切説文解字弟十馬莫下切豸豸宅買切鹿盧谷切粗倉胡切㲋㲋丑略切兔湯故切萈胡官切犬苦泫切㹜犾語斤切鼠書呂切能奴登切熊熋羽宮切火呼果切炎于簾切黑黑呼北切囪囱匆楚江切焱以冉切炙之石切赤赤昌石切大徒蓋切亦亦𡗜羊益切夨阻力切夭於兆切交古爻切尢尢烏光切壺𡔲壷滬吳切一一一於悉切㚔幸尼輒切奢式車切亢古郎切夲夲土刀切夰古老切大亣他達切夫甫無切立力入切並𠀤並蒲迥切囟息進切思恖思息茲切心息林切惢纍二切説文解字弟十一水式軌切沝𣲙之壘切頻𩕨頻瀕符真切𡿨姑泫切巜古外切川川昌緣切泉疾緣切灥𤿁詳遵切永于憬切派匹卦切谷𠔌古祿切仌筆陵切雨王矩切雲王分切魚魚語居切𩺰語居切燕於甸切龍力鍾切飛甫微切非甫微切卂息晉切説文解字弟十二鳦烏轄切不不方久切至脂利切西西先稽切鹵郎古切鹽余廉切戶户矦古切門莫奔切耳而止切頤頤與之切手書九切𠦬古懷切女尼呂切毋武扶切民彌鄰切丿房密切余制切乁弋支切氏承旨切氐丁禮切戈古禾切戉王伐切我五可切亅衢月切珡琴琴巨今切乙於謹切亡亡亡武方切匸胡禮切匚府良切曲丘玉切災災側詞切瓦五寡切弓居戎切弜其兩切弦弦胡田切系胡計切説文解字弟十三糸莫狄切素素桑故切絲息滋切率所律切蟲許偉切䖵古魂切蟲直弓切風方戎切它託何切龜居追切黽黽莫杏切卵盧管切二而至切土它魯切垚吾聊切堇堇堇巨斤切里良止切田待年切畕居良切黃黃乎光切男那含切力林直切劦胡頰切説文解字弟十四金金居音切幵开古賢切勺之若切几居履切且千也切斤舉欣切斗當口切矛莫浮切車尺遮切堆都回切阜阜房九切𨺅房九切厽力軌切四息利切寧直呂切叕陟劣切亞衣駕切五五疑古切六力竹切七親吉切九舉有切厹禸禸人九切嘼許救切甲古狎切乙於筆切丙兵永切丁當經切戊莫候切己居擬切巴伯加切庚古行切辛息鮮切辡方免切壬如林切癸癸居誄切子即里切了盧鳥切孨旨兖切𠫓他骨切丑敕九切寅寅弋真切卯卯莫飽切辰植鄰切巳已詳里切午疑古切未無沸切申申申失人切酉與九切酋字秋切戌辛聿切亥古改切説文解字部首弟一弟二弟三弟四弟五弟六弟七弟八弟九弟十弟十一弟十二弟十三弟十四説文解字弟一十四部六百七十二文重八十一凡萬六百三十九字文三十一新附一惟初太始道立於一造分天地化成萬物小徐本太始作太極凡一之屬皆從一於悉切一古文一元始也從一兀徐鍇曰元者善之長也故從一小徐本校勘記按鍇説兀下舊有聲字有之是也愚袁切天顚也至高無上從一大他前切丕大也從一不聲敷悲切叓吏治人者也從一從史史亦聲徐鍇曰吏之治人心主於一故從一力置切文五重一丄高也此古文上指事也凡丄之屬皆從丄時掌切上篆文丄蚜帝諦也王天下之號也從丄朿聲小徐本無也字都計切帝古文帝古文諸丄字皆從一篆文皆從二二古文上字䇂示辰龍童音章皆從古文丄旁旁溥也從二闕方聲小徐本作從二方聲闕步光切旁古文旁旁亦古文旁雱籒文丅底也指事小徐本作底也從反丄為丅胡雅切下篆文丅文四重七示天垂象見吉凶所以示人也從二二古文上字三垂日月星也小徐本三垂作三垂觀乎天文以察時變示神事也凡示之屬皆從示神至切示𡭕古文示祜上諱臣鉉等曰此漢安帝名也福也當從示古聲候古切禮履也所以事神致福也從示從豐豐亦聲靈啓切禮禮古文禮禧禮吉也從示喜聲許其切小徐本此字次於禛字之後禛以真受福也從示真聲側鄰切祿祿福也從示録聲盧谷切禠福也從示虒聲息移切禎祥也從示貞聲陟盈切祥福也從示羊聲一云善小徐本無一云善三字似羊切祉福也從示止聲敕里切福祐也小徐本作備也從示畐聲方六切祐助也從示右聲于救切祺吉也從示其聲渠之切禥籒文從基祗敬也從示氐聲旨移切禔安福也從示是聲易曰禔既平市支切神神小徐本篆文作𥚞神天神引出萬物者也從示申聲食鄰切祇地祇提出萬物者也從示氏聲巨支切祕神也從示必聲兵媚切齋齋戒潔也從示齊省聲小徐本無省側皆切𥜷𪗓籒文齋從禱省禱音禱禋禋潔祀也一曰精意以享為禋從示垔聲於真切禋禋小徐本籒文作禋籒文從宀祭祭祀也從示以手持肉子例切祀祭無巳也從示巳聲詳里切祀祀或從異祡燒祡燓燎以祭天神小徐本祡作柴無燎從示此聲虞書曰至于岱宗祡仕皆切祡古文祡從隋省禷以事類祭天神從示類聲力遂切祪祔祪祖也從示危聲過委切祔後死者合食於先祖從示付聲符遇切祖始廟也從示且聲則古切祊門內祭先祖所以徨小徐本徨作倣徨從示彭聲詩曰祝祭于祊補盲切祊祊或從方祰告祭也從示告聲苦浩切祏宗廟主也周禮有郊宗石室一曰大夫以石為主從示從石石亦聲小徐本石上無從常隻切䃾以豚祠司命從示比聲漢律曰祠䃾司命卑履切祠春祭曰祠品物少多文詞也從示司聲仲春之月祠不用犧牲用圭璧及皮幣小徐本校勘記祠不用祠今禮作祀及皮幣及作更似兹切礿夏祭也從示勺聲以灼切禘諦祭也從示帝聲周禮曰五歲一諦特計切祫大合祭先祖親疏遠近也從示合小徐本作從示合聲周禮曰三歲一祫矦夾切祼灌祭也從示果聲古玩切䄟數祭也從示毳聲讀若舂麥為䄟之䄟小徐本上一䄟作毳臣鉉等曰舂麥為䄟今無此語且非異文所未詳也段玉裁注據廣雅㯔舂也改䄟作㯔此芮切祝祭主贊詞者從示從人口一曰從兌省易曰兌為口為巫之六切𥛽袖祝𥛽也從示留聲力救切祓除惡祭也從示犮聲敷勿切祈求福也從示斤聲渠稀切禱禱告事求福也從示壽聲都浩切禱禱禱禱或省禱籒文禱小徐本作禱籒文禱禱禱禱禱或省禜設綿蕝為營以禳風雨雪霜水旱癘疫於日月星辰山川也從示榮省聲小徐本作從示營省聲一曰禜衛使災不生小徐本災作災禮記曰雩禜祭水旱為命切禳磔禳祀除癘殃也古者燧人禜子所造從示襄聲汝羊切禬會福祭也從示從會會亦聲小徐本作從示會聲周禮曰禬之祝號古外切禪祭天也從示單聲時戰切禦祀也從示御聲魚舉切䄆䄆祀也從示𠯑聲古末切禖祭也從示某聲莫杯切糈祭具也從示胥聲私呂切祳社肉盛以蜃故謂之祳天子所以親遺同姓從示辰聲春秋傳曰石尚來歸祳小徐本校勘記今左作脤時忍切祴宗廟奏祴樂從示戒聲古哀切禡師行所止恐有慢其神下而祀之曰禡從示馬聲周禮曰禡於所征之地小徐本周禮下無曰小徐本校勘記注引周禮今見禮記王制篇蓋周制可通稱周禮也莫駕切禱禱牲馬祭也從示周聲詩曰既禡既禱小徐本無詩曰既禡既禱都皓切禱禱小徐本作禱小徐本校勘記汪本作或從馬壽省聲社地主也從示土春秋傳曰共工之子句龍
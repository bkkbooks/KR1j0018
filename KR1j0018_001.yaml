蓾蓾或從鹵𦳋草也從草㕟聲臣鉉等案説文無㕟字當是㝮字之省而聲不相近未詳苦怪切蔞草也可以亨魚小徐本享作烹從草婁聲力朱切藟草也從草畾聲詩曰莫莫葛藟一曰秬鬯也小徐本無也力軌切蒬棘蒬也從草冤聲於元切茈茈草也從草此聲將此切藐藐茈草也從草貌聲莫覺切萴烏喙也從草則聲阻力切搜茅搜茹藘人血所生可以染絳從草從鬼小徐本作從草鬼所鳩切茜茜茅搜也從草西聲倉見切蕼蕼赤蕼也從草肆聲息利切薜牡贊也從草辟聲蒲計切莣杜榮也從草忘聲武方切苞草也南陽以為粗履從草包聲布交切艾冰臺也從草乂聲五蓋切蔁草也從草章聲諸良切芹楚葵也從草斤聲巨巾切薽豕首也從草甄聲側鄰切蔦寄生也從草鳥聲詩曰蔦與女蘿都了切樢蔦或從木藝草也似目宿從草云聲淮南子説小徐本無子藝草可以死復生王分切䔴草也從草𠭥聲粗最切葎草也從草律聲呂戌切茦朿也從草朿聲楚革切𦯚䒷䒷蔞果蓏也小徐本蓏作羸從草𠯑聲古活切葑須從也小徐本須從作蕦蓯從草封聲府容切薺蒺梨也小徐本梨作藜從草齊聲詩曰牆有薺疾容切又徂禮切朿茦也從草刺聲七賜切蕫鼎蕫也小徐本鼎作薡從草童聲杜林曰藕根多動切蘻狗毒也從草繫聲古詣切䕅䕅草也從草嫂聲蘇老切芐小徐本篆文作地黃也從草下聲禮記鈃毛牛藿羊芐豕薇是矦古切蘞白蘞也從草僉聲良冉切蘞蘞或從斂菳黃菳也從草金聲具今切芩草也從草今聲詩曰食野之芩巨今切藨鹿藿也小徐本藿作藿從草麃聲讀若剽一曰𦳋屬平表切𧅖綬也從草鶪聲詩曰卭有旨𧅖是五狄切菱芰也從草淩聲楚謂之芰秦謂之薢茩小徐本秦謂之薢茩作秦曰薢茩力膺切𧅊菱司馬相如説菱從遴芰菱也從草支聲奇記切茤杜林説芰從多薢薢茩也從草解聲胡買切茩薢茩也從草后聲胡口切芡雞頭也從草欠聲巨險切菊日精也以秋華從草麴省聲小徐本作從草聲居六切菊菊或省蘥爵麥也從草籥聲以勺切藗牡茅也從草遬聲遬籒文速桑谷切𦮺茅秀也從草私聲息夷切蒹雚之未秀者從草兼聲古恬切薍菼也從草亂聲八月薍為葦也五患切菼雚之初生一曰薍一曰隼從草剡聲士土敢切菼菼或從炎薕蒹也從草廉聲力鹽切薠青薠似莎者從草煩聲附袁切䒢昌蒲也從草卬聲五剛切䓉䒢䓉也從草邪聲以遮切芀葦華也從草刀聲徒聊切𦱝茢芀也從草列聲郎辥切菡菡菡𧂄也從草函聲胡感切𧂄萏菡𧂄芙蓉華未發為菡𧂄巳發為芙蓉小徐本芙蓉作夫容從草閻聲徒感切蓮芙蕖之實也小徐本芙蕖作夫渠從草連聲洛賢切茄芙蕖莖小徐本芙蕖作夫渠從草加聲古牙切荷芙蕖葉小徐本芙蕖作夫容從草何聲徒哥切蔤芙蕖本小徐本芙蕖作夫渠從草密聲美必切蕅芙蕖根小徐本芙蕖作夫渠從草水禺聲五厚切蘢天蘥也從草龍聲盧紅切蓍蒿屬生十歲百莖小徐本作蒿葉屬生千歲三百莖易以為數天子蓍九尺諸矦七尺大夫五尺士三尺從草耆聲式脂切菣香蒿也從草臤聲去刃切菣菣或從堅莪蘿莪蒿屬小徐本屬下有也從草我聲五何切蘿莪也從草羅聲魯何切菻蒿屬小徐本屬下也從草林聲力稔切蔚蔚牡蒿也從草叞聲於胃切蕭艾蒿也從草肅聲蘇雕切萩萩蕭也從草秋聲七由切芍鳧茈也從草勺聲胡了切葥葥王彗也從草湔聲昨先切蒍草也從草為聲于鬼切莐草也從草冘聲直深切蘜治牆也小徐本牆作蘠從草鞠聲居六切蘠蘠靡虋冬也小徐本虋作釁從草牆聲賤羊切芪芪母也從草氏聲常之切菀茈菀出漢中房陵從草宛聲於阮切莔貝母也從草明省聲武庚切𦬸山薊也從草朮聲直律切蓂析蓂大薺也從草冥聲莫歷切菋荎藸也從草味聲無沸切荎荎藸草也小徐本無草從草至聲直尼切藸荎藸也小徐本作草也從草豬聲直魚切小徐本此字次於蘘字之後葛絺綌草也從草曷聲古達切蔓葛屬小徐本屬下有也從草曼聲無販切䔌䔌虆葛屬白華小徐本屬下有也從草皋聲古勞切莕菨餘也從草杏聲何梗切荇莕或從行同菨菨餘也從草妾聲子葉切菎草也從草晜聲古渾切芫魚毒也從草元聲愚袁切蘦大苦也從草霝聲郎丁切蕛蕛苵也從草稊聲大兮切苵蕛苵也從草失聲徒結切艼艼熒朐也從草丁聲天經切蔣苽蔣也從草將聲子良切又即兩切苽雕苽一名蔣從草瓜聲古胡切𦱀草也從草育聲余六切藣草也從草罷聲符羈切然草也從草難聲如延切莨草也從草良聲魯當切葽草也從草要聲詩曰四月秀葽向説此味苦苦葽也小徐本無也於消切薖草也從草過聲苦禾切菌地菌也小徐本無也從草囷聲渠殞切菌菌桑䓴從草覃聲慈衽切䓴木耳也從草耎聲一曰萮茈而兖切椹桑實也從草甚聲常衽切蒟果也從草竘聲俱羽切芘草也一曰芘茮從草比聲房脂切蕣蕣木堇蓳朝華暮落者從草舜聲詩曰顔如蕣華舒閏切萸茱萸也從草臾聲羊朱切茱茱萸也茮屬小徐本無茮屬從草朱聲市朱切茮茮莍從草叔聲子寮切莍茮榝實裏如表者小徐本裏作裹表作裘從草求聲巨鳩切荊荊楚木也從草刑聲舉卿切荊古文菭水衣從草治聲徒哀切芽萌芽也從草牙聲五加切𦹩萌草芽也小徐本無芽從草明明聲武庚切茁草初生出地貌小徐本無出從草出聲詩曰彼茁者葭鄒滑切莖枝柱也小徐本無也從草巠聲戶耕切莛莖也從草廷聲特丁切葉草木之葉也從草枼聲與涉切𦺶草之小者從草鋭聲鋭古文鋭字讀若芮居例切芣華盛從草不聲一曰芣苡縛牟切葩華也從草皅聲普巴切芛草之葟榮也從草尹聲羊捶切蘳蘳黃華小徐本作華黃從草黊聲讀若壞小徐本作讀若墮壞乎瓦切蔈蔈苕之黃華也從草𤐫聲一曰末也小徐本無也方小切英草榮而不實者一曰黃英從草央聲於京切薾
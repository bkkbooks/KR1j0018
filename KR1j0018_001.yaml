告云貴切絩綺絲之數也漢律曰綺絲數謂之絩布謂之總綬組謂之首從糸兆聲治小切綺文繒也從糸奇聲袪彼切縠細縳也從糸聲胡谷切縳白鮮色也從糸專聲持沇切縑並絲繒也從糸兼聲古甜切綈厚繒也從糸弟聲杜兮切練湅繒也從糸柬聲郎甸切縞鮮色也從糸高聲古老切粗緒也從糸璽聲臣鉉等曰今俗別作絁非是式支切紬大絲繒也從糸由聲直由切綮繒也一曰徽幟信也有齒從糸𢼄聲康禮切綾東齊謂布帛之細曰綾從糸夌聲力膺切縵繒無文也從糸曼聲漢律曰賜衣者縵表白裏莫半切繡五采備也從糸肅聲息救切絢詩云素以為絢兮從糸旬聲臣鉉等案論語注絢文貌許掾切繪會五采繡也虞書曰山龍華蟲作繪論語曰繪事後素從糸會聲黃外切緀白文貌詩曰緀兮斐兮成是貝錦從糸妻聲七稽切䋛繡文如聚細米也從糸從米米亦聲莫禮切絹繒如麥從糸肙聲吉掾切緑緑帛青黃色也從糸録聲力玉切縹縹帛青白色也從糸𤐫聲敷沼切䋭帛青經縹緯一曰育陽染也從糸育聲余六切絑純赤也虞書丹朱如此從糸朱聲章俱切纁淺絳也從糸熏聲許云切絀絳也從糸出聲丑律切絳大赤也從糸降聲古巷切綰惡也絳也從糸官聲一曰絹也讀若雞卵烏版切縉即刃切綪赤繒也以茜染故謂之綪從糸青聲倉絢切緹帛丹黃色從糸是聲他禮切只緹或從氏縓帛赤黃色一染謂之縓再染謂之赬三染謂之纁從糸原聲七絹切紫帛青赤色從糸此聲將此切紅帛赤白色從糸工聲戶公切𦇎繱帛青色從糸蔥聲倉紅切紺帛深青揚赤色從糸甘聲古暗切綥𦂖𦂢帛蒼艾色從糸渠之切綦綥或從其繅帛如紺色小徐本紺作繒或曰深繒從糸噪聲讀若噪親小切側持切才帛雀頭色一曰微黑色如紺才淺也讀若讒從糸毚聲士咸切𦃖帛騅色也從糸剡聲詩曰毳衣如𦃖臣鉉等曰今俗別作毯非是土敢切綟帛戾草染色小徐本戾作艾從糸戾聲郎計切紑白鮮衣貌從糸不聲詩曰素衣其紑匹丘切緂白鮮衣貌從糸炎聲謂衣采色鮮也充三切繻繒采色從糸需聲讀若易繻有衣臣鉉等曰漢書傳符帛也相俞切縟繁采色也從糸辱聲而蜀切纚冠織也從糸麗聲所綺切紘冠卷也從糸肱聲戶萌切紭紘或從弘紞冕冠塞耳者從糸冘聲臣鉉等曰今俗別作髧非是都感切纓冠系也從糸嬰聲於盈切紻纓卷也從糸央聲於兩切緌系冠纓也從糸委聲儒隹切緄織帶也從糸昆聲古本切紳紳大帶也從糸申聲失人切繟帶緩也從糸單聲昌善切綬韍維也從糸受聲殖酉切組綬屬其小者以為冕纓從糸且聲則古切緺綬紫青也從糸咼聲古蛙切縌綬維也從糸逆聲宜戟切纂似組而赤從糸算聲作管切紐系也一曰結而可解從糸丑聲女久切綸青絲綬也從糸侖聲古還切綎系綬也從糸廷聲他丁切絙絙緩也從糸亘聲胡官切繐細疏布也從糸惠聲私鋭切暴襮頸連也從糸暴省聲補各切襟衣系也從糸今聲居音切襟籒文從金緣衣純也從糸彖聲以絹切纀裳削幅謂之纀從糸僕聲博木切褲脛衣也從糸夸聲苦故切繑褲紐也從糸喬聲牽搖切褓小兒衣也從糸保聲臣鉉等曰今俗作褓非是博抱切子昆切紴絛屬從糸皮聲讀若被或讀若水波之波博禾切絛絛扁緒也從糸攸聲土刀切䋐采彰也一曰車馬飾從糸戉聲王伐切緃䋐屬從糸從從省聲足容切紃紃圜采也從糸川聲詳遵切緟增益也從糸重聲直容切纕援臂也從糸襄聲汝羊切纗維綱中繩從糸巂聲讀若畫或讀若維戶圭切綱綱維紘繩也從糸岡聲古郎切綱小徐本古文作古文綱縜持綱紐也從糸員聲周禮曰縜寸臣鉉等曰縜長寸也為贇切綅綅絳線也從糸侵省聲詩曰貝胄朱綅子林切縷線也從糸婁聲力主切線縷也從糸戔聲私箭切線古文線袕縷一枚也從糸穴聲乎決切縫以針紩衣也從糸逢聲符容切緁緶衣也從糸疌聲七接切緁緁或從習紩縫也從糸失聲直質切緛衣戚也從糸耎聲而沇切䋎補縫也從糸旦聲文莧切繕補也從糸善聲時戰切絬論語曰絬衣長短右袂從糸舌聲私列切纍綴得理也一曰大索也從糸畾聲力追切縭以絲介履也從糸離聲力知切緱緱刀劍緱也從糸矦聲古矦切小徐本此字次於暴襮字之後繄戟衣也從糸殹聲一曰赤黑色繒烏雞切縿旌旗之遊也從糸參聲所銜切徽邪幅也一曰三糾繩也從糸微省聲許歸切並列切紉繟繩也從糸刃聲女鄰切繩索也從糸蠅省聲食陵切小徐本未作朱一曰急弦之聲從糸爭聲讀若旌側莖切縈收韏也從糸熒省聲於營切絇纑繩絇也從糸句聲讀若鳩其俱切縋以繩有所縣也春秋傳曰夜縋納師從糸追聲持偽切絭攘臂繩也從糸𢍏聲居願切緘束篋也從糸咸聲古咸切𦪝縢緘也從糸朕聲徒登切編次簡也從糸扁聲布玄切維車蓋維也從糸隹聲以追切鞴車鞴也從糸伏聲平祕切茯鞴或從草鞴鞴鞴或從革𤰇聲䋊乘輿馬飾也從糸正聲諸盈切綊䋊綊也從糸夾聲胡頰切繁繁繁馬髦飾也從糸每聲春秋傳曰可以稱旌繁乎附袁切繁繁𥿋繁或從辨小徐本繁作繁辨籒文辨韁馬紲也從糸疆聲居良切紛馬尾韜也從糸分聲撫文切紂馬緧也從糸肘省聲除柳切緧馬紂也從糸酋聲七由切絆馬縶也從糸半聲博幔切䋶䋶絆前兩足也從糸須聲漢令蠻夷卒有䋶相主切紖牛系也從糸引聲讀若矤直引切縼以長繩繫牛也從糸旋聲辭戀切縻牛轡也從糸麻聲靡為切縻縻或從多紲系也從糸世聲春秋傳曰臣負羈紲私列切緤紲或從枼纆索也從糸黑聲莫北切緪縆大索也一曰急也從糸恆聲古恆切繘綆也從糸矞聲余聿切繘古文從絲繘籒文繘綆綆汲井綆也從糸更聲古杏切絠彈彄也從糸有聲弋宰切又古亥切繳繳生絲縷也從糸敫聲之若切繴繴謂之罿罿謂之罬罬謂之罦捕鳥覆車也從糸辟聲博厄切緍緡釣魚繳也從糸昏聲吳人解衣相被謂之緍武巾切絮敝綿也從糸如聲息據切絡絮也一曰麻未漚也從糸各聲盧各切纊纊絮也從糸廣聲春秋傳曰皆如挾苦謗切絖纊或從光紙絮一苫也從糸氏聲諸氏切䋨治敝絮也從糸咅聲芳武切袽潔縕也一曰敝絮從糸奴聲易曰需有衣袽女余切繫繫𦃇也一曰惡絮從糸毄聲古詣切𦃇繫𦃇也一曰維也從糸虒聲郎兮切緝績也從糸咠聲七入切絘績所緝也從糸次聲七四切則歷切纑布縷也從糸盧聲洛乎切紨布也一曰粗紬小徐本粗作粗從糸付聲防無切繐蜀細布也從糸彗聲祥歲切絺細葛也從糸希聲丑脂切綌粗葛也小徐本粗作粗從糸𧮫聲綺戟切綌綌或從巾皺絺之細也詩曰蒙彼皺絺一曰蹴也從糸芻聲側救切絟細布也從糸全聲此緣切紵檾屬細者為絟粗者為紵小徐本粗作粗從糸寧聲直呂切紵紵或從緒省緦緦十五升布也又兩麻一絲布小徐本又作一曰布下有也從糸思聲息茲切緦緦古文緦從糸省緆細布也從糸易聲充擊切緆緆或從麻緰緰資布也從糸俞聲度矦切縗服衣長六寸博四寸心從糸衰聲倉回切絰喪首戴也從糸至聲臣鉉等曰當從姪省乃得聲徒結切緶緶交枲也一曰緁衣也從糸便聲房連切䋀履也一曰青絲頭履也讀若阡陌之陌從糸戶聲亡百切䋽枲履也從糸封聲博蠓切緉履兩枚也一曰絞也從糸從兩兩亦聲力讓切潔麻一專也從糸㓞聲古屑切繆枲之十潔也一曰綢繆從糸翏聲武彪切綢繆也從糸周聲直由切縕緼紼也從糸昷聲於云切紼亂系也從糸弗聲分勿切北萌切紕氐人𦇧也讀若禹貢玭珠從糸比聲卑履切𦇧西胡毳布也從糸罽聲居例切縊經也從糸益聲春秋傳曰夷薑縊於賜切綏車中把也從糸從妥徐鍇曰禮升車必正立執綏所以安也當從爪從安省説文無妥字息遺切彝彞宗廟常器也從糸糸綦也廾持米器中實也彑聲此與爵相似周禮六彝雞彝鳥彝黃彝虎彝蟲彝斝彝以待祼將之禮小徐本蟲彝作蜼彝以脂切彝彝彝皆古文彝緻密也從糸致聲直利切文二百四十八重三十一緗帛淺黃色也從糸相聲息良切緋帛赤色也從糸非聲甫微切緅帛青赤色也從糸取聲子矦切繖繖蓋也從糸散聲蘇旱切綀布屬從糸束聲所菹切縡事也從糸宰聲子代切繾繾繾綣不相離也從糸遣聲去演切綣繾綣也從糸卷聲去阮切文九新附小徐本無諸新附字素素白緻繒也從糸垂取其澤也凡素之屬皆從素桑故切𢍣𢍣素屬從素廾聲居玉切䋤䋤白約縞也從素勺聲以灼切繂繂素屬從素率聲所律切小徐本緩作韗從素卓聲昌約切綽繛或省緩緩繛也從素爰聲胡玩切緩緩或省文六重二絲蠶所吐也從二糸凡絲之屬皆從絲息茲切轡馬轡也從絲從軎與連同意詩曰六轡如絲兵媚切𢇅𢇇織絹從糸貫杼也小徐本從作從從絲省草聲古還切臣鉉等曰草古磺字文三率捕鳥畢也象絲罔上下其竿柄也凡率之屬皆從率所律切文一蟲一名蝮博三寸首大如擘指象其臥形物之微細或行或毛或螺裸或介或鱗以蟲為象凡蟲之屬皆從蟲許偉切蝮小徐本篆文作蝮蝮蟲也從蟲復聲芳目切螣螣螣神蛇也從蟲朕聲徒登切蚺蚺大蛇可食從蟲冉聲人占切螼蚓也從蟲堇聲棄忍切蚓側行者從蟲寅聲余忍切蚓蚓或從引螉蟲在牛馬皮者從蟲翁聲烏紅切䗥螉䗥也從蟲從聲子紅切蠁知聲蟲也從蟲鄉聲許兩切蠁司馬相如蠁從向蛁蟲也從蟲召聲都僚切𧑎𧑎小徐本篆文作𧑎蟲也從蟲𠭥聲祖外切蛹繭蟲也從蟲甬聲余隴切螝蛹也從蟲鬼聲讀若潰胡罪切蛔腹中長蟲也從蟲有聲戶恢切蟯腹中短蟲也從蟲堯聲如招切雖似蜥蜴而大從蟲唯聲息遺切虺虺以注鳴詩曰胡為虺蜥從蟲兀聲臣鉉等曰兀非聲未詳許偉切蜥蜥易也從蟲析聲先擊切蝘在壁曰蝘蜓在草曰蜥易從蟲匽聲於殄切蝘蝘或從䖵蜓蝘蜓也從蟲廷聲一曰蚓蜓徒典切蚖榮蚖蛇醫以注鳴者從蟲元聲愚袁切蠸蟲也一曰大螫也讀若蜀都布名從蟲雚聲巨員切螟蟲食穀葉者吏冥冥犯法即生螟從蟲從冥冥亦聲莫經切蟘蟲食苖葉者吏乞貸則生蟘從蟲從貸貸亦聲詩曰去其螟蟘臣鉉等曰今俗作𧈱非是徒得切蟣蝨子也一曰齊謂蛭曰蟣從蟲幾聲居狶切蛭蟣也從蟲至聲之日切蝚蛭蝚至掌也從蟲柔聲耳由切蛣蛣䖦蝎也從蟲吉聲去吉切䖦蛣䖦也從蟲出聲區勿切蟫蟫白魚也從蟲覃聲余針切蛵丁蛵負勞也從蟲巠聲戶經切蜭毛蠹也從蟲臽聲乎感切蟜蟲也從蟲喬聲居夭切蠔毛蟲也從蟲𢦒聲千志切䖯蠆也從蟲圭聲烏蝸切蚔䖯也從蟲氏聲巨支切蠆蠆蠆毒蟲也象形丑犗切𧕧蠆蠆蠆或從䖵蝤蝤蠐也從蟲酋聲字秋切蠐蠐蠐螬也從蟲齊聲徂兮切蝎蝤蠐也從蟲曷聲胡葛切小徐本此字次於蛅字之後強強蚚也從蟲弘聲徐鍇曰弘與強聲不相近秦刻石文從口疑從籒文省巨良切強籒文強從䖵從強蚚強也從蟲斤聲巨衣切蜀葵中蠶也從蟲上目象蜀頭形中象其身蜎蜎詩曰蜎蜎者蜀市玉切蠲馬蠲也從蟲目益聲了象形小徐本了作乁明堂月令曰腐草為蠲古玄切螕齧牛蟲也從蟲毗聲邊兮切蠖尺蠖屈申蟲小徐本蟲下有也從蟲蒦聲烏郭切蝝復陶也劉歆説蝝蚍蜉子董仲舒説蝗子也從蟲彖聲與專切螻螻蛄也從蟲婁聲一曰螜天螻洛矦切蛄螻蛄也從蟲古聲古乎切蠪丁蟻也從蟲龍聲盧紅切蛾蛾羅也從蟲我聲臣鉉等案爾雅蛾羅蠶蛾也䖵部巳有蛾或作蛾此重出五何切蟻蚍蜉也從蟲豈聲魚綺切蚳蟻子也從蟲氐聲周禮有蚳醢讀若祁小徐本祁作祈直尼切蚳籒文蚳從䖵蚳古文蚳從辰土蠜阜蠜也從蟲樊聲附袁切蟀悉蟀也從蟲帥聲臣鉉等曰今俗作蟀非是所律切蝒馬蜩也從蟲面聲武延切蟷蟷蟷蠰不過也從蟲當聲都郎切蠰蟷蠰也從蟲襄聲汝羊切蜋堂蜋也從蟲良聲一名蚚父魯當切蛸蜱蛸堂蜋子從蟲肖聲相邀切蛢𧑐蟥以翼鳴者從蟲並聲薄經切𧑐𧑐蟥也從蟲矞聲余律切蟥蟥𧑐蟥也從蟲黃聲乎光切䗐蛄䗐強羋也從蟲施聲式支切蛅蛅斯墨也從蟲占聲職廉切蜆縊女也從蟲見聲胡典切蜰盧蜰也從蟲肥聲符非切蜣䖼渠蜣一曰天社從蟲卻聲其虐切蜾蜾螺蒲盧細要土也小徐本要作腰天地之性細要純雄無子詩曰螟𧕅有子蜾螺負之從蟲𩰬聲古火切蜾蜾或從果螺蜾螺也從蟲𣎆聲一曰虒蝓郎果切𧕅螟𧕅桑蟲也從蟲霝聲郎丁切蛺蛺蝶也從蟲夾聲兼叶切蝶蛺蝶也從蟲疌聲臣鉉等曰今俗作蝶非是徒叶切蚩蚩蟲也從蟲之聲赤之切螌𧏘螌蝥毒蟲也從蟲般聲布還切蝥𧎄螌蝥也從蟲敄聲臣鉉等曰今俗作蟊非是蟊即蠿蟊蜘蛛之別名也莫交切蟠鼠婦也從蟲番聲附袁切蛜蛜蛜威委黍委黍鼠婦也從蟲伊省聲於脂切蜙蜙蝑以股鳴者從蟲松聲息恭切蚣蜙或省臣鉉等曰今俗作古紅切以為蜈蚣蟲名蝑蜙蝑也從蟲胥聲相居切蟅蟲也從蟲庶聲之夜切蝗螽也從蟲皇聲乎光切蜩蟬也從蟲周聲詩曰五月鳴蜩徒聊切蜩蜩或從舟蟬以旁鳴者從蟲單聲市連切霓寒蜩也從蟲兒聲五雞切螇螇鹿蛁蟟也從蟲奚聲胡雞切蚗蛜蚗蛁蟟也從蟲夬聲於悅切蝒蛜蚗蟬屬讀若周天子赧從蟲丏聲武延切蛚蜻蛚也從蟲列聲良薛切蜻蜻蛚也從蟲青聲子盈切蛉蜻蛉也從蟲令聲一名桑根郎丁切蠓蠛蠓也從蟲蒙聲莫孔切𧎾𧎾螶𧎾也一曰蜉蝣朝生莫死者從蟲𡭴聲離灼切蚋秦晉謂之蚋楚謂之蚊從蟲芮聲而鋭切蟰蟰蛸長股者從蟲肅聲穌雕切𧍖蟲也從蟲省聲息正切蛶商何也從蟲寽聲力輟切蠟蠅䏣也周禮蠟氏掌除胔從蟲昔聲助駕切蠕動也從蟲耎聲而沇切蚑行也從蟲支聲巨支切蠉蠉蟲行也從蟲瞏聲香沇切𧈪蟲曳行也從蟲屮聲讀若騁丑善切螸螽醜螸垂腴也從蟲欲聲余足切𧎥蠅醜𧎥搖翼從蟲扇聲式戰切蛻蛻蛇蟬所解皮也從蟲挩省小徐本作從蟲稅省聲輸芮切蠚蠚螫也從蟲若省聲呼各切螫蟲行毒也從蟲赦聲施隻切蝁镻也從蟲亞聲烏各切蛘蛘也從蟲羊聲余兩切蝕蝕敗創也從蟲人食食亦聲乘力切蛟龍之屬也池魚滿三千六百蛟來為之長能率魚飛置笱水中即蛟去從蟲交聲古肴切螭若龍而黃北方謂之地螻從蟲離聲或云無角曰螭丑知切虯龍子有角者從蟲丩聲渠幽切蜦蛇屬黑色潛于神淵能興風雨從屬從蟲侖聲讀若戾草力屯切蜧蜦或從戾螊海蟲也長寸而白可食從蟲兼聲讀若嗛力鹽切蜃雉入海化為蜃從蟲辰聲時忍切蛤蛤蜃屬有三皆生於海千歲化為蛤秦謂之牡厲又云百歲燕所化魁蛤一名復纍老服翼所化從蟲合聲古沓切螷階也小徐本階作陛修為螷圜為蠇從蟲庳臣鉉等曰今俗作𩶁或作蠯非是蒲猛切蝸蝸螺也從蟲咼聲古華切蚌蚌蜃屬從蟲丰聲步項切蠇蚌屬似螊微大出海中今民食之從蟲萬聲讀若賴力制切蝓虒蝓也從蟲俞聲羊朱切蜎蜎也從蟲肙聲狂沇切蟺卯蟺也從蟲亶聲常演切蚴蚴蟉也從蟲幽聲於虯切蟉蚴蟉也從蟲翏聲力幽切蟄藏也從蟲執聲直立切蚨青蚨水蟲可還錢從蟲夫聲房無切䗇䗇鼀詹諸以脰鳴者從蟲掬聲居六切蝦蝦蟆也從蟲假聲乎加切蟆蝦蟆也從蟲莫聲莫遐切蠵大龜也以胃鳴者從蟲巂聲戶圭切蠵司馬相如説蠵從敻螹螹離也從蟲漸省聲慈染切蟹蟹有二敖八足旁行非蛇鮮之穴無所庇小徐本鮮作鱓從蟲解聲胡買切蟹蟹或從魚蛫蟹也從蟲危聲過委切蜮短狐也似鱉三足以氣射害人從蟲或聲于逼切蟈蜮又從國臣鉉等曰今俗作古獲切以為蝦蟆之別名鱷似蜥易長一丈水潛吞人即浮出日南從蟲屰聲吾各切蛧蝄蛧蜽山川之精物也淮南王説蛧蜽狀如三歲小兒赤黑色赤目長耳美髮從蟲网聲國語曰木石之怪夔蛧蜽文兩切蜽蛧蜽也從蟲兩聲臣鉉等曰俗作魍魎非是良奬切猿善援禺屬從蟲爰聲臣鉉等曰今俗別作猿非是雨元切蠗禺屬從蟲翟聲首直角切蜼如母猴卬鼻長尾從蟲隹聲余季切蚼北方肓蚼犬食人小徐本肓作有從蟲句聲古厚切蛩蛩蛩蛩獸也一曰秦謂蟬蛻曰蛩從蟲鞏聲渠容切蟨鼠也一曰西方有獸前足短與蛩蛩巨虛比其名謂之蟨從蟲厥聲居月切蝙蝙蝠也從蟲扁聲布玄切蝠蝙蝠服翼也從蟲畐聲方六切蠻南蠻蛇穜小徐本穜作種從蟲䜌聲莫還切閩東南越蛇穜小徐本穜作種從蟲門聲武巾切虹螮蝀也狀似蟲從蟲工聲明堂月令曰虹始見戶工切虹籒文虹從申申電也螮螮蝀虹也從蟲帶聲都計切蝀螮蝀也從蟲東聲多貢切蠥蠥衣服歌謠草木之怪謂之祅禽獸蟲蝗之怪謂之蠥從蟲辥聲魚列切文一百五十三重十五蛋南方夷也從蟲延聲徒旱切蟪蟪蛄蟬也從蟲惠聲乎桂切蠛蠛蠓細蟲也從蟲蔑聲亡結切蟻化飛蟲也從蟲蔑聲莫結切虴虴蜢草上蟲也從蟲乇聲陟格切蜢虴蜢也從蟲孟聲莫杏切蟋蟋也從蟲悉聲息七切螳螳蜋也從蟲堂聲徒郎切文七新附小徐本無諸新自此説文解字弟十三上下䖵蟲之總名也從二蟲凡䖵之屬皆從䖵讀若昆古魂切蠶任絲也從䖵朁聲昨含切蛾蠶化飛蟲從䖵我聲五何切蛾蛾或從蟲蚤齧人跳蟲從䖵爪聲爪古爪字子皓切蚤或從蟲蝨齧人蟲從䖵卂聲所櫛切螽螽螽蝗也從䖵終聲終古文終字職戎切螽螽或從蟲衆聲𧖉𧒝𧎰蟲也從䖵展省聲知衍切蠽蠽小蟬蜩也從䖵截聲子列切蠿蠿蟊作罔蛛蟊也從䖵絶聲絶古絶字側入切蟊蠿蟊也從䖵矛聲莫交切𧕝蟲也從䖵寧聲奴丁切螬螬蠐螬也從䖵曹聲財牢切𧕱螻蛄也從䖵舝聲胡葛切蜱蜱蛸也從䖵卑聲匹標切蜱蜱蜱或從蟲蜂飛蟲螫人者從䖵逢聲敷容切蜂蜂古文省蜜蜂甘飴也一曰螟子從䖵冪聲彌必切蜜蜜或從宓螶螶𧎾也從䖵巨聲強魚切蚊齧人飛蟲從䖵民聲無分切蚊小徐本篆文作蚊或從昏以昏時出也小徐本二昏字皆作昏蚊俗蚊從蟲從文虻齧人飛蟲從䖵亡聲武庚切蠹木中蟲從䖵橐聲當故切螙蠹或木象蟲在木中形談長説蠡蟲齧木中也從䖵彖聲盧啓切蠡古文蛷多足蟲也從䖵求聲巨鳩切蛷蛷或從蟲𧖚蜉蚍𧖚也從䖵㯱聲縛牟切蜉蜉或從蟲從孚𧕲蟲食也從䖵雋聲子兖切蠢蠢蟲動也從䖵萅聲尺尹切蠢𢧭蠢古文蠢從𢦒周書曰我有𢧭于西文二十五重十三蟲有足謂之蟲無足謂之豸從三蟲凡蟲之屬皆從蟲直弓切蟊蟊蟲食草根者從蟲象其形吏抵冒取民財則生徐鍇曰唯此一字象蟲形不從矛書者多誤莫浮切蝥蟊或從敄臣鉉等按蟲部巳有莫交切作螌蝥蟲此重出蛑古文蟊從蟲從牟蚍蚍蚍蜉大蟻也從蟲毗聲房脂切蚍蚍或從蟲比聲𧖔蚊也從蟲𨳌聲武巾切蜚臭蟲負蠜也從蟲非聲房未切蜚蜚或從蟲小徐本蜚作蜚蠱腹中蟲也春秋傳曰皿蟲為蠱晦淫之所生也臬桀死之鬼亦為蠱從蟲從皿皿物之用也公戶切文六重四風八風也東方曰明庶風東南曰清明風南方曰景風西南曰涼風西方曰閶闔風西北曰不周風北方曰廣莫風東北曰融風風動蟲生故蟲八日而化從蟲凡聲凡風之屬皆從風方戎切風古文風𩗬𩗬北風謂之𩗬從風涼省聲呂張切𩖶小風也從風朮聲翾聿切飆飇扶搖風也從風猋聲甫遙切猋飆或從包飄飄回風也從風𤐫聲撫招切颯颯翔風也小徐本翔作朔從風立聲穌合切飂飂高風也從風翏聲力求切䬍疾風也從風從忽忽亦聲呼骨切䬑䬑大風也從風胃聲王勿切䫻大風也從風日聲于筆切揚風所飛揚也從風昜聲與章切䬆風雨暴疾也小徐本暴作曓從風利聲讀若栗力質切颲颲烈風也從風列聲讀若列良列切文十三重二颸涼風也從風思聲息茲切颼颼颼飂也從風叟聲所鳩切颭風吹浪動也從風占聲隻冉切文三新附小徐本無諸新附字它蟲也從蟲而長象冤曲垂尾形小徐本垂作垂上古草居患它故相問無它乎凡它之屬皆從它託何切蛇它或從蟲臣鉉等曰今俗作食遮切文一重一龜舊也外骨內肉者也從它龜頭與它頭同天地之性廣肩無雄龜鱉之類以它為雄象足甲尾之形凡龜之屬皆從龜居追切龜龜龜古文龜䶱䶱龜名從龜終聲終古文終字徒冬切𪚮䶲龜甲邊也從龜冉聲天子巨𪚮尺有二寸諸矦尺大夫八寸士六寸汝閻切文三重一黽黽蛙黽也從它象形黽頭與它頭同徐鉉等曰象其腹也凡黽之屬皆從黽莫杏切籒文黽鱉甲蟲也從黽敝聲並列切黿大鱉也從黽元聲愚袁切蛙蝦蟇也從黽圭聲烏媧切鼀𡴆鼀詹諸也其鳴詹諸其皮鼀鼀其行𡴆𡴆從黽從𡴆𡴆亦聲七宿切鼀鼀鼀或從酋𪓿鼀𪓿詹諸也詩曰得此鼀𪓿言其行𪓿𪓿從黽爾聲式支切鼉水蟲似蜥易長大從黽單聲徒何切𪓷水蟲也薉貉之民食之從黽奚聲胡雞切䵶𪓷屬頭有兩角出遼東從黽句聲其俱切蠅營營青蠅蟲之大腹者從黽從蟲余陵切鼅鼅蛛蟊也從黽智省聲陟離切蜘𧌲蜘或從蟲蛛鼅蛛也從黽朱聲陟輸切蛛蛛或從蟲鼂匽鼂也讀若朝揚雄説匽鼂蟲名小徐本無説杜林以為朝旦非是從黽從旦臣鉉等曰今俗作朝直遙切朝篆文從皀文十三重五鼇海大鱉也從黽敖聲五牢切文一新附小徐本無此新附字卵凡物無乳者卵生象形凡卵之屬皆從卵盧管切毈卵不孚也從卵段聲徒玩切文二二地之數也從偶一凡二之屬皆從二而至切二古文小徐本作古文二亟敏疾也從人從口從又從二小徐本作從人口又二二天地也徐鍇曰承天之時因地之利口謀之手執之時不可失疾也紀力切又去吏切恆恆恆常也從心從舟在二之間小徐本舟上無從上下心以舟施恆也小徐本上下心作上下一心胡登切恆小徐本古文作古文恆從月詩曰如月之恆亘亘求亘也從二從回回古文回象亘回形上下所求物也小徐本回字不重形上回作回徐鍇曰回風回轉所以宣陰陽也須緣切竺厚也從二竹聲冬毒切凡最括也小徐本作最括而言也從二二偶也小徐本偶上有其從及及古文及小徐本及下有字浮芝切文六重二土地之吐生物者也小徐本物上有萬二象地之下地之中物出形也小徐本物上有丨凡土之屬皆從土它魯切地元氣初分輕清陽為天重濁陰為地萬物所陳列也從土也聲徒四切墬籒文地從䧘小徐本作籒文地從阜土䧘聲坤地也易之卦也從土從申土位在申小徐本申上物從苦昆切垓兼垓八極地也國語曰天子居九垓之田從土亥聲小徐本國語作春秋國語春秋國語曰云云在從土亥聲之後古哀切墺四方土可居也小徐本土作上下從土奧聲於六切墺墺古文墺小徐本墺下有如此二字堣堣夷在冀州暘谷立春日日值之而出小徐本日日作之日從土禺聲尚書曰宅堣夷噳俱切坶朝歌南七十里地小徐本地下有也周書武王與紂戰于坶野從土母聲小徐本從土母聲在周書之前周書下有曰戰下無于莫六切坡阪也從土皮聲𣶢禾切坪小徐本篆文作坪地平也從土平平亦聲小徐本作從土平聲皮命切均平遍也從土從勻勻亦聲小徐本作從土勻聲居勻切壤柔土也從土襄聲如兩切塙堅不可拔也從土高聲苦角切墽磽也從土敫聲口交切壚剛土也從土盧聲洛乎切垶赤剛土也從土觲省聲息營切埴埴黏土也從土直聲常職切坴土塊坴坴也從土𡴆聲讀若逐一曰坴梁小徐本作讀若速一曰坴梁地從土𡴆聲力竹切𡍦土也洛陽有大𡍦里從土軍聲小徐本從土軍聲在洛陽之前戶昆切墣塊也從土菐聲匹角切圤墣或從卜凷墣也從土一屈象形小徐本作從土凵凵屈象形苦對切塊凷或從鬼小徐本作俗凷從土鬼堛凷也從土畐聲芳逼切堫穜也小徐本穜作種一曰內其中
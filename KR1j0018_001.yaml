者明堂旁室也當作介暮本作莫日在茻中也捧本作奉從廾從手丰聲經典皆如此遨本作敖從出從放徘徊本作裴回寬衣也取其裴回之狀回本作回象回轉之形腰本只作要説文象形借為玄要之要後人加肉嗚本只作烏烏吁呼也以其名自呼故曰烏呼後人加口欲説文欲字注云貪欲也此後人加心揀本只作柬説文從束八八柬之也後人加手俸本只作奉古為之奉祿後人加人自暮巳下一十二字後人妄加偏旁失六書之義鞦韆案詞人高無際作鞦韆賦序云漢武帝後庭之戲也本云千秋祝壽之詞也語訛轉為秋千後人不本其意乃造此字非皮革所為非車馬之用不合從革影案影者光景之類也合通用景非毛髮藻飾之事不當從彡斌本作彬或份文質備也從文配武過為鄙淺復有從斌從貝者音頵亦於義無取悅經典只作説藝本只作藝後人加草云義無所取著本作箸説文陟慮切注云飯敧也借為住箸之箸後人從草墅經典只用野野亦音常句切蓑蓑字本作蘇禾切從衣象形借為衰朽之衰賾周易疏義云深也案此亦假借之字當通用嘖黌黌學堂也從學省黃聲説文無學部黈充耳也從貌經史所無説文無部此三字皆無部類可附麌説文噳字注云麋鹿羣口相聚也詩麀鹿麌麌當用噳字池池沼之池當用沱沱江之別流也本從二從古文及左旁不當引筆下垂蓋前作筆勢如此後代因而不改説文不從人直作左旁榛從辛從木説文不省此二字李斯刻石文如此後人因之從辛䇂象二屬之形李斯筆迹小變不言為異説文作亦李斯小變其勢李陽冰乃云從開口形亦為臆説説文從屮而垂下於相出入也從入此字從屮下垂當只作蓋相承多一畫如六切説文本作肉後人相承作與月字相類説文作止史籒筆迹小異非別體此本蕃廡之廡李斯借為有無之無後人尚其簡便故皆從之有無字本從亡李陽冰乃云不當加亡且蕃廡字從大從卌數之積也從林亦蕃多之義若不加亡何以得為有無之無或作亦止於筆迹小異説文作李斯筆迹小異銀青光祿大夫守右散騎常侍上柱國東海縣開國子食邑五百戶臣徐鉉等伏奉聖旨校定許愼説文解字一部伏以振發人文興崇古道考遺編於魯壁輯蠹簡於羽陵載穆皇風允符昌運伏惟應運統天睿文英武大聖至明郎守祕書著作郎史館臣句中正銀青光祿大夫守右散騎常侍上柱國東海縣開國子食邑五百戶臣徐鉉中書門下牒徐鉉等新校定説文解字牒奉敕許愼説文起於東漢歷代傳寫訛謬實多六書之蹤無所取法若不重加刊正漸恐失其原流爰命儒學之臣共詳篆籒之迹右散騎常侍徐鉉等深明舊史多識前言果能商榷是非補正闕漏書成上奏克副朕心宜遣雕鐫用廣流布自我朝之垂範俾永世以作程其書宜付史館仍令國子監雕為印版依九經書例許人納紙墨價錢收贖兼委徐鉉等點檢書寫雕造無令差錯致後人牒至準敕故牒雍熙三年十一月日牒給事中參知政事辛仲甫給事中參知政事呂蒙正中書侍郎兼工部尚書平章事李昉説文解字弟十五下

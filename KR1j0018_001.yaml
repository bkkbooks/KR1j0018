昷仁也從皿以食囚也官溥説烏渾切盥澡手也小徐本無手從臼水臨皿春秋傳曰奉匜沃盥古玩切蕩滌器也從皿湯聲徒朗切文二十五重三鉢鉢器盂屬從皿犮聲或從金從本北末切文一新附小徐本無此新附字𠙴𠙴盧飯器以柳為之小徐本為作作象形凡𠙴之屬皆從𠙴去魚切𥬔𠙴或從竹去聲文一重一去厺去人相違也從大𠙴聲凡去之屬皆從去丘據切朅去也從去曷聲丘竭切𡕮去也從去夌聲讀若陵小徐本作讀若棘力膺切文三血祭所薦牲血也從皿一象血形凡血之屬皆從血呼決切衁血也從血亡聲春秋傳曰士刲羊亦無衁也呼光切衃衃凝血也從血不聲芳杯切𧗁𧗁氣液也從血𦘔聲小徐本作從血𦘔𦘔亦聲將鄰切𧖧𧖧定息也從血甹省聲讀若亭特丁切衄鼻出血也從血丑聲女六切膿腫血也從血農省聲奴冬切膿俗膿從肉農聲醓𥁺血醢也小徐本無也從血醓聲禮記有醓醢以牛乾脯粱麴鹽酒也臣鉉等曰醓肉汁滓也故從醓醓亦聲他感切菹醢也從血菹聲側余切𧗘菹或從缶𧗓𧗇以血有所刏塗祭也從血幾聲渠稀切恤憂也從血卪聲一曰鮮少也徐鍇曰皿血者言憂之切至也辛聿切衋䀌傷痛也從血聿皕聲周書曰民岡不衋傷心小徐本岡作罔許力切䘓羊凝血也從血臽聲苦紺切䘓䀍䘓或從𥫔按若依䘓或從𥫔則䘓之重文當作䘓䀍若依䘓之重文作䘓則當言䘓或從𥫔省盍盍盍覆也從血大臣鉉等曰大象蓋覆之形胡臘切衊污血也從血蔑聲莫結切文十五重三丶有所絶止丶而識之也凡丶之屬皆從丶知庾切主鐙中火主也從象形從丶丶亦聲臣鉉等曰今俗別作炷非是之庾切㕻咅相與語唾而不受也從丶從否否亦聲小徐本作從否從丶否亦聲天口切㰯咅或從豆從欠小徐本欠上無從文三重一説文解字弟五上説文解字弟五丹巴越之赤石也象采丹井一象丹形凡丹之屬皆從丹都寒切丹𠮚古文丹丹亦古文丹雘善丹也從丹蒦聲周書曰惟其𡍨丹雘讀若隺小徐本作讀若隺同烏郭切彤丹飾也從丹從彡彡其畫也小徐本作從丹彡彡其畫彡亦聲徒東切文三重二青東方色也木生火從生丹丹青之信言象然小徐本象然作必然凡青之屬皆從青倉經切青古文青靜靜審也從青爭聲徐鍇曰丹青明審也疾郢切文二重一井井八家一井象構韓形𦉥之象也小徐本無之古者伯益初作井凡井之屬皆從井子郢切𤌌𤌌深池也從井瑩省聲烏迥切阱陷也從阜從井井亦聲小徐本井上無從疾正切穽阱或從穴汬古文阱從水小徐本作阱或從水㓝刑罰罪也從井從刀小徐本作從刀井易曰井法也井亦聲戶經切創造法創業也從井創聲讀若創初亮切文五重二皀穀之馨香也小徐本作馨字説文未收亦不見於後世諸字書當是馨字之誤象嘉穀在裹中之形匕所以扱之小徐本作匕所以扱之也或説皀一粒也凡皀之屬皆從皀又讀若香小徐本無又皮及切即即即食也小徐本食作餐從皀卪聲徐鍇曰即就也子力切既既小食也從皀旡聲論語曰不使勝食既居未切冟飯剛柔不調相著從皀冖聲讀若適施隻切文四鬯以秬釀鬱草芬芳攸服以降神也從凵凵器也中象米匕所以扱之易曰不喪匕鬯凡鬯之屬皆從鬯丑諒切鬱芳草也十葉為貫百廾貫築以煮之為鬱從臼冖缶鬯彡其飾也一曰鬱鬯百草之華遠方鬱人所貢芳草合釀之以降神鬱今鬱林郡也小徐本無也迂勿切爵爵禮器也象爵之形中有鬯酒又持之也所以飲器象爵者取其鳴節節足足也即略切爵古文爵象形小徐本作爵下有如此二字秬黑黍也一稃二米以釀也小徐本釀下無也從鬯矩聲其呂切秬秬或從禾𩰢列也從鬯吏聲讀若迅疏吏切文五重二食食一米也從皀集聲小徐本無聲或説集皀也凡食之屬皆從食小徐本下有讀若粒乘力切饙滫飯也從食𠦪聲臣鉉等曰𠦪音忽非聲疑奔字之誤府文切饙饙或從賁饙餴饙或從奔餾餾飯氣蒸也從食留聲力救切飪大孰也小徐本孰作熟從食壬聲如甚切飪古文飪恁亦古文飪饔饔孰食也小徐本孰作熟從食雍聲於容切飴米糱煎也從食台聲與之切𩛛籒文飴從異省餳飴和饊者也從食易聲徐盈切饊饊熬稻粻䅣也從食散聲穌旱切餅餅麵餈也從食並聲小徐本作從食從並聲必郢切餈稻餅也從食次聲疾資切餈餈或從齊粢餈或從米饘糜也從食亶聲周謂之饘宋謂之糊諸延切𩝍餱乾食也從食矦聲周書曰峙乃餱粻乎溝切餥餱也從食非聲陳楚之間相謁食麥飯曰餥小徐本謁下有而非尾切饎酒食也從食喜聲詩曰可以饙饎昌志切𩜮饎饎或從巸小徐本作饎饎或從頤糦饎或從米饌饌具食也從食算聲士戀切饌饌饌或從巺養供養也從食羊聲余兩切養養古文養飯食也從食反聲符萬切粈雜飯也從食丑聲女久切飼糧也從人食小徐本作從食人祥吏切饡饡以羹澆飯也從食贊聲則幹切𩞃晝食也從食象聲書兩切𩞃𩞃或從傷省聲小徐本作𩞃或從飧餔也從夕食思魂切餔日加申時食也從食甫聲博孤切餔籒文餔從皿浦聲餐吞也從食𣦻聲七安切餐餐或從水䭑嘰也從食兼聲讀若風溓溓一曰廉潔也力鹽切饁饁餉田也從食盍聲詩曰饁彼南畝筠輒切餉周人謂餉曰餉從食襄聲人漾切餉餉也從食向聲式亮切饋饋餉也從食貴聲求位切饗鄉人飲酒也從食從鄉小徐本作從鄉從食鄉亦聲許兩切饛盛器滿貌小徐本貌下有也從食蒙聲詩曰有饛簋飧莫紅切飵楚人相謁食麥曰飵從食乍聲在各切䬯相謁食麥也從食占聲奴兼切䭡秦人謂相謁而食麥曰䭡䭓從食㥯聲烏困切䭓䭡䭓也從食豈聲五困切糊寄食也從食胡聲戶吳切飶食之香也從食必聲詩曰有飶其香毗必切飫飫燕食也從食芺聲詩曰飲酒之飫依據切飽猒也從食包聲博巧切飽𩞛古文飽從孚小徐本孚下
國語曰竱本肇末旨兖切竦敬也从立束束自申束也小徐本下有亦聲二字息拱切竫疾郢切靖立竫也从立青聲一曰細皃疾郢切竢待也从立矣聲牀史切或从巳竘健也一曰匠也从立句聲讀若齲逸周書有竘匠丘羽切竵不正也从立聲火竈切竭負舉也从立曷聲渠列切𩓣待也从立須聲相俞切𥪥或从芻聲小徐本無聲痿也从立𦟀聲力臥切竣偓竣也从立夋聲國語曰有司巳事而竣七倫切小徐本篆文作𥪋見鬼鬽皃从立从𢑘𢑘籒文鬽字小徐本作從立彔聲籒文鬽字讀若虙羲氏之虙房六切𥪶驚皃从立昔聲七雀切短人立皃从立卑聲𢔚下切竲北地高樓無屋者从立曾聲七耕切文十九重二𠀤竝並倂也从二立小徐本二作兩凡竝之屬皆从竝蒲迥切𤾕廢一偏下也从竝白聲他計切暜或从曰或从兟从曰小徐本無从曰二字臣鉉等曰今俗作替非是文二重二囟頭會匘蓋也象形凡囟之屬皆从囟息進切𦞤或从肉宰小徐本作或從宰肉篆文重文𦞤在古文之後𠙷古文囟字巤毛巤也小徐本無也象髮在囟上及毛髮巤巤之形此與籒文子字同小徐本象下有形子作𦙄良涉切房脂切文三重二恖𢙦思容也从心囟聲凡思之屬皆从思息玆切良據切文二心人心土藏在身之中象形博士說以爲火藏凡心之屬皆从心息答切息喘也从心自自亦聲相卽切情人之陰气有欲者从心青聲疾盈切性人之陽气性善者也从心生聲息正切𢗍志意也从心㞢聲職吏切意志也从心察言而知意也从心从音小徐本作從心音聲於記切恉意也从心旨聲職雉切悳㥁惪外得於人內得於己也小徐本無也从直从心多則切𢜖古文於陵切愼慎謹也从心眞聲時刃切昚古文忠敬也从心中聲陟弓切愨謹也从心聲苦角切𢤧美也从心聲莫角切𢘦快喜也从心夬聲苦夬切愷樂也小徐本作康也从心豈聲臣鉉等曰豈部巳有此重出苦亥切快也从心匧聲苦叶切念常思也从心今聲奴店切怤思也从心付聲甫無切憲敏也从心从目害省聲小徐本目上無从許建切憕平也从心登聲直陵切戁敬也从心難聲女版切忻闓也从心斤聲司馬法曰善者忻民之善閉民之惡許斤切𢝆遟也从心重聲直隴切小徐本此字次於憬字之後惲重厚也从心軍聲於粉切𢤈惇厚也从心𦎧聲都昆切忼慨也从心亢聲一曰易忼龍有悔臣鉉等曰今俗別作慷非是苦浪切又口朗切慨忼慨壯士不得志也从心旣聲古溉切悃小徐本篆文作𢛕愊也从心困聲小徐本困作囷苦本切愊誠志也从心畐聲芳逼切愿謹也从心原聲魚怨切慧儇也从心彗聲胡桂切力小切恔憭也从心交聲下交切又古了切瘱靜也从心聲臣鉉等曰㾜非聲未詳於計切悊敬也从心折聲陟列切按口部哲字重文與此同形作悊哲或从心悰樂也从心宗聲藏宗切恬安也从心甜省聲徒兼切恢大也从心灰聲苦回切𢙄恭肅也从心共聲俱容切憼敬也从心敬敬亦聲居影切恕仁也从心如聲商署切㣽古文省小徐本無省怡和也从心台聲与之切慈小徐本篆文作愛也从心玆聲小徐本玆作茲疾之切忯愛也从心氏聲巨支切忯不憂事也从心虒聲讀若移移尔切小徐本此字次於忧字之後恮謹也从心全聲此緣切恩惠也从心因聲烏痕切慸高也一曰極也一曰困劣也小徐本劣下無也从心帶聲特計切憖問也謹敬也从心猌聲一曰說也一曰甘也春秋傳曰昊天不憖又曰兩君之士皆未憖魚覲切懬懬闊也一曰廣也大也一曰寬也从心从小徐本作從心廣廣亦聲在一曰寬也之前苦𧩂切悈飾也从心戒聲司馬法曰有虞氏悈於中國古拜切謹也从心𤔌聲於靳切慶行賀人也从心从夊吉禮以鹿皮爲贄故从鹿省小徐本夊上無从丘竟切小徐本嫺作嫻从心宣聲詩曰赫兮愃兮況晚切愻順也从心孫聲唐書曰五品不愻蘇困切𢥛𢥜先則切恂信心也从心旬聲相倫切忱誠也从心冘聲詩曰天命匪忱氏任切惟凡思也小徐本無凡从心隹聲以追切懷念思也从心褱聲戶乖切惀欲知之皃从心侖聲盧昆切想冀思也从心相聲息兩切深也从心聲徐醉切慉起也从心畜聲詩曰能不我慉許六切𢡃滿也从心𠶷聲一曰十萬曰𢡃於力切悥籒文省小徐本作籒文又省悹憂也从心官聲古玩切憀憀然也从心翏聲洛蕭切愙敬也从心客聲春秋傳曰以陳備三愙臣鉉等曰今俗作恪苦各切愯懼也从心雙省聲春秋傳曰駟氏愯息拱切懼恐也从心瞿聲其遇切愳古文怙恃也从心古聲矦古切恃賴也从心寺聲時止切𢥱慒慮也从心曹聲藏宗切悟覺也从心吾聲五故切憮愛也韓鄭曰憮一曰不動从心無聲又甫切惠也从心旡聲烏代切知也从心胥聲私呂切𢟬慰安也从心叞聲一曰恚怒也於胃切𢡈謹也从心𠭥聲讀若毳此芮切𥲅𢤉𢥰𥲅箸也从心直由切不見于說文或卽竹部𥵽籌之省怞朗也从心由聲詩曰憂心且怞直又切𢜮𢜮撫也小徐本撫作憮从心某聲讀若侮亡甫切忞彊也小徐本彊作強从心文聲周書曰在受德忞讀若旻小徐本無周書曰以下十字武巾切慔勉也从心莫聲莫故切愐勉也从心面聲彌殄切余制切懋勉也从心楙聲虞書曰時惟懋哉小徐本時惟作惟時莫候切𢘅或省𢟽慕習也从心莫聲莫故切悛止也从心夋聲此緣切肆也从心隶聲他骨切𢣟趣步也小徐本無也从心與聲余呂切慆說也从心舀聲土刀切懕安也从心厭聲詩曰懕懕夜飲於鹽切憺安也从心詹聲徒感切怕無爲也从心白聲匹白切又葩亞切恤憂也收也从心血聲辛聿切忓極也从心干聲古寒切懽喜歡也小徐本歡作款从心雚聲爾雅曰懽懽愮愮古玩切懽也琅邪朱虛有亭从心禺聲噳俱切惄飢餓也一曰憂也从心叔聲小徐本从心叔聲在一曰之前詩曰惄如朝飢奴歷切𢜭勞也从心卻聲其虐切憸憸詖也憸利於上佞人也从心僉聲息廉切
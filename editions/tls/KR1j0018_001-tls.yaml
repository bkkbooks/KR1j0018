者明堂㫄室也當作介暮本作莫日在茻中也捧本作奉从𠬞从手丰聲經典皆如此遨本作敖从出从放徘徊本作裴回寬衣也取其裴回之狀迴本作回象回轉之形腰本只作要說文象形借爲玄要之要後人加肉嗚本只作烏烏吁呼也以其名自呼故曰烏呼後人加口慾說文欲字注云贪欲也此後人加心揀本只作柬說文从束八八柬之也後人加手俸本只作奉古爲之奉禄後人加人自暮巳下一十二字後人妄加偏㫄失六書之義鞦韆案詞人高無際作鞦韆赋序云漢武帝後庭之戲也本云千秋祝壽之詞也語譌轉爲秋千後人不本其意乃造此字非皮革所爲非車馬之用不合从革影案影者光景之類也合通用景非毛髮藻飾之事不當从彡斌本作彬或份文質備也从文配武過爲鄙淺復有从斌从貝者音頵亦於義無取悅經典只作說藝本只作埶後人加艸云義無所取著本作箸說文陟慮切注云飯敧也借爲住箸之箸後人从艸墅經典只用野野亦音常句切蓑蓑字本作蘇禾切从衣象形借爲衰朽之衰賾周易疏義云深也案此亦假借之字當通用嘖黌黌學堂也从學省黃聲說文無學部黈充耳也从皃經史所無說文無部此三字皆無部類可附麌說文噳字注云麋鹿羣口相聚也詩麀鹿麌麌當用噳字池池沼之池當用沱沱江之別流也本从二从古文及左㫄不當引筆下垂蓋前作筆勢如此後代因而不改說文不从人直作左㫄𣓀从辛从木說文不省此二字李斯刻石文如此後人因之从辛䇂象二屬之形李斯筆迹小變不言爲異說文作亦李斯小變其勢李陽冰乃云从開口形亦爲臆說說文从屮而垂下於相出入也从入此字从屮下垂當只作蓋相承多一畫如六切說文本作肉後人相承作與月字相類說文作止史籒筆迹小異非別體此本蕃廡之廡李斯借爲有無之無後人尚其𥳑便故皆从之有無字本从亡李陽冰乃云不當加亡且蕃廡字从大从𠦜數之積也从林亦蕃多之義若不加亡何以得爲有無之無或作亦止於筆迹小異說文作李斯筆迹小異銀青光禄大夫守右散騎常侍上柱國東海縣開國子食邑五百戶臣徐鉉等伏奉聖旨校定許愼說文解字一部伏以振發人文興崇古道考遺編於魯壁輯蠹𥳑於羽陵載穆皇風允符昌運伏惟應運統天睿文英武大聖至明郎守祕書著作郎史館臣句中正銀青光禄大夫守右散騎常侍上柱國東海縣開國子食邑五百戶臣徐鉉中書門下牒徐鉉等新校定說文解字牒奉敕許愼說文起於東漢歷代傳寫譌謬實多六書之蹤無所取法若不重加刊正漸恐失其原流爰命儒學之臣共詳篆籒之跡右散騎常侍徐鉉等深明舊史多識前言果能商搉是非補正闕漏書成上奏克副朕心宜遣雕鐫用廣流布自我朝之垂範俾永世以作程其書宜付史館仍令國子監雕爲印版依九經書例許人納紙墨價錢收贖兼委徐鉉等點檢書寫雕造無令差錯致後人牒至準敕故牒雍熙三年十一月日牒給事中參知政事辛仲甫給事中參知政事呂蒙正中書侍郎兼工部尚書平章事李昉說文解字弟十五下

徐鍇曰號令者集而爲之卪制也力正切𠨒輔信也从卪比聲虞書曰𠨒成五服毗必切卶有大度也从卪多聲讀若侈小徐本侈作移充豉切𠨘宰之也从卪必聲兵媚切卲高也从卪召聲實照切𠂘𢀴𠂬科𠂘木節也从卪聲賈侍中說以爲𠂘裹也一曰𠂘蓋也小徐本作巵蓋也臣鉉等曰非聲未詳五果切厀脛頭也从卪桼聲臣鉉等曰今俗作膝非是息七切𠨟卷厀曲也从卪𢍏聲居轉切卻却節欲也从卪𧮫聲去約切卸舍車解馬也从卪止午小徐本作從卪止午聲讀若汝南人寫書之寫臣鉉等曰午馬也故从午司夜切𠨎𠨓𠨖二卪也巺从此闕士戀切小徐本此字次於卻却字之後𠂑𠁾㔿卪也闕則候切文三重一印執政所持信也从爪从卪凡印之屬皆从印於刃切𢑏𠨔按也从反印於棘切𢮮抑俗从手小徐本作俗從手作文二重一色顏气也从人从卪凡色之屬皆从色所力切𢒸古文艴色艴如也从色弗聲論語曰色艴如也蒲沒切普丁切文三重一卯𠨍事之制也从卪𠂑凡卯之屬皆从卯闕去京切天官冢宰地官司徒春官宗伯夏官司馬秋官司寇冬官司空从卯皀聲去京切文二辟法也从卪从辛節制其辠也从口用法者也小徐本辛上無从凡辟之屬皆从辟必益切𨐨治也从辟从井小徐本井上無从周書曰我之不𨐨必益切治也从辟乂聲虞書曰有能俾魚廢切文三勹裹也象人曲形有所包裹小徐本曲下有身凡勹之屬皆从勹布交切𠤄曲脊也从勹𥷚省聲小徐本𥷚作𥶶巨六切匍手行也小徐本作裹也手裹行也从勹甫聲薄乎切匐伏地也从勹畐聲蒲北切匊在手曰匊从勹米臣鉉等曰今俗作掬非是居六切勻匀少也从勹二羊倫切勼聚也从勹九聲讀若鳩居求切旬徧也小徐本無也十日爲旬从勹日詳遵切𠣙𠣚古文勽覆也从勹覆人薄皓切匈聲膺小徐本聲作膺从勹凶聲許容切𦙄匈或从肉小徐本作或從肉作𠣘帀徧也从勹舟聲職流切匌帀也从勹从合合亦聲小徐本作從勹合聲矦閤切𠣿飽也从勹聲小徐本無聲民祭祝曰厭𠣿小徐本祝作祀己又切又乙庶切𠤇𠣾重也从勹復聲扶富切𠣸𠣴或省彳𠣥冢高墳也从勹豖聲知隴切文十五重三包象人褢妊巳在中象子未成形也元气起於子子人所生也男左行三十女右行二十俱立於巳爲夫婦褢妊於巳巳爲子十月而生男起巳至寅女起巳至申故男年始寅女年始申也凡包之屬皆从包布交切胞兒生裹也从肉从包小徐本包上無从匹交切匏瓠也从包从夸聲包取其可包藏物也小徐本作從夸包聲取其可包藏物也薄交切文三茍自急敕也从羊省从包省从口口猶愼言也从羊羊與義善美同意凡茍之屬皆从茍己力切𦰶𦯗𠷜古文羊不省小徐本無羊敬𢿩肅也从攴茍居慶切文二重一鬼人所歸爲鬼从人象鬼頭鬼陰气賊害从厶凡鬼之屬皆从鬼居偉切𩲚𩲡古文从示𩳱𩴋神也从鬼申聲食鄰切魂䰟小徐本篆文作䰟陽气也从鬼云聲戶昆切魄𩲸陰神也从鬼白聲普白切𩲫厲鬼也从鬼失聲丑利切魖𩴛𩴥耗神也小徐本作耗鬼也从鬼虛聲朽居切魃旱鬼也从鬼犮聲周禮有赤魃氏除牆屋之物也詩曰旱魃爲虐薄撥切鬽老精物也从鬼彡彡鬼毛密祕切魅或从未聲𢑘𤲄古文𤲄𢑘籒文从彖首从尾省聲小徐本籒文下有魅又魅或从未聲無聲在籒文之後鬾鬼服也一曰小兒鬼从鬼支聲韓詩傳曰鄭交甫逢二女鬾服奇寄切𩳰鬼皃从鬼虎聲虎烏切𩴪魕鬼俗也从鬼幾聲淮南傳曰吳人鬼越人𩴪渠希切鬼鬽聲不止也从鬼需聲奴豆切𩲏𩲜鬼變也从鬼化聲呼駕切𩴴𩴓𩴗見鬼驚詞从鬼難省聲讀若詩受福不儺諾何切𩴱𩴸鬼皃从鬼賓聲符眞切醜可惡也从鬼酉聲昌九切魋神獸也从鬼隹聲杜回切文十七重四𩴭魑鬼屬从鬼从离离亦聲丑知切魔鬼也从鬼麻聲莫波切魘㝱驚也从鬼厭聲於琰切文三新附小徐本無諸新附字甶鬼頭也象形凡甶之屬皆从甶𢾭勿切𤱖畏惡也从甶虎省鬼頭而虎爪可畏也小徐本無鬼頭而虎爪可畏七字於胃切𤰲古文省禺母猴屬頭似鬼从甶从禸牛具切文三重一厶姦衺也小徐本衺作邪韓非曰蒼頡作字自營爲厶凡厶之屬皆从厶息夷切篡屰而奪取曰篡小徐本屰作逆从厶算聲初官切𦲃相訹呼也从厶从羑小徐本羑上無從字與久切誘或从言秀或如此𦮖羑古文臣鉉等案羊部有羑羑進善也此古文重出文三重三嵬高不平也从山鬼聲凡嵬之屬皆从嵬五灰切巍高也从嵬委聲牛威切臣鉉等曰今人省山从爲魏國之魏語韋切文二說文解字弟九上下山宣也宣气散生萬物有石而高象形凡山之屬皆从山所閒切嶽東岱南靃西華北恆中泰室王者之所以巡狩所至小徐本至上無所从山獄聲五角切𡶓岳古文象高形岱太山也从山代聲徒耐切㠀島海中往往有山可依止曰㠀从山鳥聲讀若詩曰蔦與女蘿小徐本作讀若搗詩曰蔦與女蘿都皓切峱山在齊地从山狃聲詩曰遭我于峱之閒兮小徐本于作乎奴刀切嶧葛嶧山在東海下邳小徐本無在从山睪聲夏書曰嶧陽孤桐羊益切嵎封嵎之山在吳楚之閒𣳫芒之國小徐本無𣳫芒之國四字从山禺聲噳俱切嶷九嶷山舜所葬在零陵營道从山疑聲語其切𡼐㟭崏岷小徐本篆文作山在蜀湔氐西徼外从山𢽹聲小徐本𢽹作𢾞武巾切㞦山也或曰弱水之所出从山几聲居履切巀嶻巀𡾦山在馮翊池陽从山𢧵聲才葛切𡾦巀𡾦山也从山辥聲五葛切崋山在弘農華陰从山華省聲胡化切𡾘崞山在鴈門从山𩫖聲古博切崵崵山在遼西从山昜聲一曰嵎鐵崵谷也與章切岵山有草木也从山古聲詩曰陟彼岵兮矦古切屺山無草木也从山己聲詩曰陟彼屺兮墟里切嶨山多大石也从山學省聲胡角切嶅山多小石也小徐本無也从山敖聲五交切岨石戴土也小徐本無也从山且聲詩曰陟彼岨矣七余
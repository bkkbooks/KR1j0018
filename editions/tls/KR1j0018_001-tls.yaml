夬夬揚於王庭言文者宣敎明化於王者朝廷君子所以施禄及下居德則忌也倉頡之初作書蓋依類象形故謂之文其後形聲相益卽謂之字文者物象之本大小徐本均無文者物象之本六字段玉裁說文解字注據左傳宣十五年正義補字者言孳乳而浸多也小徐本無言浸作寖著於竹帛謂之書小徐本著於作箸于書者如也以五帝三王之世改易殊體封于泰山者七十有二代靡有同焉周禮八歲入小學保氏敎國子先以六書一曰指事指事者視而可識察而可見上下是也二曰象形象形者畫成其物隨體詰詘日月是也三曰形聲形聲者以事爲名取譬相成江河是也四曰會意會意者比類合誼以見指撝武信是也五曰轉注轉注者建類一首同意相受考老是也六曰假借假借者本無其事依聲託事令長是也及宣王太史籒箸大篆十五篇與古文或異小徐本或異作或同或異至孔子書六經左丘明述春秋傳皆以古文厥意可得而說其後諸矦力政不統於王小徐本於作于惡禮樂之害己而皆去其典籍分爲七國田異畮車涂異軌律令異法小徐本作律灋異令衣冠異制言語異聲文字異形秦始皇帝初兼天下丞相李斯乃奏同之罷其不與秦文合者斯作倉頡篇中車府令趙高作爰歷篇大史令胡母敬作博學篇小徐本母作毋皆取史籒大篆或頗省改所謂小篆者也是時秦燒滅經書滌除舊典大發隸卒興戍役官獄職務繁初有隸書以趣約易而古文由此而絕矣自爾秦書有八體一曰大篆二曰小篆三曰刻符四曰蟲書五曰摹印六曰署書七曰殳書八曰隸書漢興有艸書尉律學僮十七以上始試諷籒書九千字乃得爲吏史漢書藝文志能諷書九千字以上乃得爲史張家山漢簡二年律令史律試史學童以十五篇能風諷書五千字以上乃得爲史有又以八體試之郡移其八體課大史大史大史誦課取最一人以爲其縣令史殿者勿以爲史三歲壹幷課取最一人以爲尚書卒史書或不正輒舉劾之今雖有尉律不課小學不修莫達其說久矣孝宣皇帝時召通倉頡讀者張敞從受之小徐本從作从涼州刺史杜業沛人爰禮講學大夫秦近亦能言之孝平皇帝時徵禮等百餘人令說文字未央廷中以禮爲小學元士黃門侍郎揚雄采以作訓纂篇凡倉頡以下十四篇凡五千三百四十字羣書所載略存之矣及亡新居攝使大司空甄豐等校文書之部自以爲應制作頗改定古文時有六書一曰古文孔子壁中書也二曰奇字卽古文而異者也三曰篆書卽小篆秦始皇帝使下杜人程邈所作也小徐本邈作𨘷四曰左書卽秦隸書五曰繆篆所以摹印也六曰鳥蟲書所以書幡信也壁中書者魯共王壞孔子宅而得禮記尚書春秋論語孝經又北平矦張蒼獻春秋左氏傳郡國亦往往於山川得鼎彝小徐本於作于其銘卽前代之古文小徐本前作歬皆自相似雖叵復見遠流小徐本流作沬其詳可得略說也而世人大共非訾以爲好奇者也故詭更正文鄕壁虛造不可知之書變亂常行以燿於世諸生競逐說字解經誼諠小徐本谊作諠云父子相傳何得改易乃猥曰小徐本注猥一本作𤟔馬頭人爲長人持十爲斗虫者屈中也廷尉說律至以字斷法苛人受錢苛之字止句也若此者甚眾皆不合孔氏古文謬於史籒鄙夫俗儒翫其所習小徐本習作集蔽所希聞不見通學未嘗睹字例之條怪舊埶而善野言以其所知爲秘妙究洞聖人之微恉又見倉頡篇中幼子承詔因曰古帝之所作也其辭有神僊之術焉其迷不諭豈不悖哉書曰予欲觀古人之象言必遵修舊文而不穿鑿孔子曰吾猶及史之闕文今亡矣夫蓋非其不知而不問人用己私是非無正巧說衺辭小徐本衺作邪使天下學者疑蓋文字者經藝之本小徐本藝作埶王政之始前人所以垂後後人所以識古故曰本立而道生知天下之至嘖而不可亂也小徐本嘖作賾今敘篆文合以古籒博采通人至于小大信而有證稽譔其說小徐本譔作撰將以理群類解謬曉學者達神恉分別部居不相雜廁也萬物咸睹靡不兼載厥誼不昭爰明以諭其偁易孟氏書孔氏詩毛氏禮周官春秋左氏論語孝經皆古文也其于所不知小徐本于作於蓋闕如也部一部二部三部四部五部六部七部八部九部十部十一部十二部十三部十四部十五部十六部十七部十八部十九部二十部二十一部二十二部二十三部二十四部二十五部二十六部二十七部二十八部二十九部三十部三十一部三十二部三十三部三十四部三十五部三十六部三十七部三十八部三十九部四十部四十一部四十二部四十三部四十四部四十五部四十六部四十七部四十八部四十九部五十部五十一部五十二部五十三部五十四部五十五部五十六部五十七部五十八部五十九部六十部六十一部六十二部六十三部六十四部六十五部六十六部六十七部六十八部六十九部七十部七十一部七十二部七十三部七十四部七十五部七十六部七十七部七十八部七十九部八十部八十一部八十二部八十三部八十四部八十五部八十六部八十七部八十八部八十九部九十部九十一部九十二部九十三部九十四部九十五部九十六部九十七部九十八部九十九部一百部一百一部一百二部一百三部一百四部一百五部一百六部一百七部一百八部一百九部一百十部一百十一部一百十二部一百十三部一百十四部一百十五部一百十六部一百十七部一百十八部一百十九部一百二十部一百二十一部一百二十二部一百二十三部一百二十四部一百二十五部一百二十六部一百二十七部一百二十八部一百二十九部一百三十部一百三十一部一百三十二部一百三十三部一百三十四部一百三十五部一百三十六部一百三十七部一百三十八部一百三十九部一
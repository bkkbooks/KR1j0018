赤从馬喬聲詩曰我馬唯驕一曰野馬舉喬切騋馬七尺爲騋八尺爲龍小徐本作馬八赤爲龍七赤爲騋从馬來聲詩曰騋牝驪牡洛哀切驩馬名从馬雚聲呼官切驗馬名从馬僉聲魚窆切𩢑𩢭馬名从馬此聲雌氏切𩢮馬名从馬休聲許尤切馼𩢌小徐本篆文作𩢌馬赤鬣縞身目若黃金名曰𩢌吉皇之乘周文王時犬戎獻之从馬从文文亦聲小徐本文上無从春秋傳曰𩢌馬百駟畫馬也西伯獻紂以全其身無分切馶馬彊也从馬支聲章移切駜馬飽也从馬必聲詩云有駜有駜小徐本無詩云有駜有駜六字毗必切駫馬盛肥也从馬光聲詩曰四牡駫駫古熒切𩤐騯馬盛也从馬㫄聲詩曰牡馬𩤐𩤐薄庚切馬怒皃从馬卬聲吾浪切驤馬之低仰也从馬襄聲息良切驀上馬也从馬莫聲莫白切騎跨馬也从馬奇聲渠羈切駕馬在軶中小徐本無馬在二字从馬加聲古訝切𤙑籒文駕小徐本無駕騑驂㫄馬从馬非聲甫微切騈駢駕二馬也从馬幷聲部田切驂駕三馬也从馬參聲倉含切駟一乘也从馬四聲息利切駙副馬也从馬付聲一曰近也一曰疾也符遇切𩤠馬和也从馬皆聲戶皆切騀馬搖頭也从馬我聲五可切駊駊騀也从馬皮聲普火切𩥅𩥓馬行皃从馬舀聲切土刀篤馬行頓遟从馬竹聲冬毒切渠追切馬行徐而疾也小徐本無也从馬學省聲於角切𩤿駸馬行疾也从馬㑴省聲詩曰載驟𩤿𩤿子林切馺馬行相及也从馬从及小徐本作從馬及聲讀若爾雅小山馺大山峘穌答切馮馬行疾也从馬仌聲臣鉉等曰本音皮冰切經典通用爲依馮之馮今別作憑非是房戎切𩣘馬步疾也从馬耴聲尼輒切騃馬行㐹㐹也从馬矣聲五駭切驟馬疾步也从馬聚聲鉏又切𩢛馬疾走也小徐本無也从馬匃聲古達切颿馬疾步也从馬風聲臣鉉等曰舟船之颿本用此字今別作帆非是符嚴切驅馬馳也从馬區聲豈俱切敺𢿛古文驅从攴小徐本無驅馳大驅也从馬也聲直離切騖亂馳也从馬敄聲小徐本作從馬務省聲亡遇切𩢾次弟馳也小徐本弟作第从馬𠛱聲力制切騁直馳也从馬甹聲丑郢切駾駾馬行疾來皃从馬兌聲詩曰昆夷駾矣他外切馬有疾足从馬失聲大結切駻馬突也从馬旱聲矦旰切駧馳馬洞去也从馬同聲徒弄切驚馬駭也从馬敬聲舉卿切駭驚也从馬亥聲矦楷切𩢯𩣐馬奔也从馬巟聲呼光切騫馬腹縶也小徐本縶作熱从馬寒省聲去虔切駐馬立也从馬主聲中句切馴馬順也从馬川聲詳遵切駗馬載重難也从馬㐱聲章人切驙駗驙也从馬亶聲易曰乘馬驙如張連切騺馬重皃从馬執聲陟利切驧馬曲脊也从馬鞠聲巨六切騬犗馬也从馬乘聲食陵切小徐本此字次於駘字之後𩡺系馬尾也小徐本無系从馬介聲古拜切穌遭切𩢏馽絆馬也从馬囗其足小徐本囗作春秋傳曰韓厥執馽前讀若輒陟立切𦅬縶馽或从糸執聲小徐本作或從執糸駘馬銜脫也从馬台聲徒哀切駔牡馬也从馬且聲一曰馬蹲駔也子朗切騶𢋁御也从馬芻聲側鳩切驛置騎也从馬睪聲羊益切馹驛傳也从馬日聲人質切𦫀騰傳也从馬朕聲一曰騰犗馬也徒登切苑名一曰馬白頟小徐本頟作額从馬隺聲下各切駉牧馬苑也从馬冋聲詩曰在駉之野古熒切駪𩣂馬眾多皃从馬先聲所臻切駮獸如馬倨牙食虎豹小徐本倨作鋸从馬交聲北角切小徐本驘作騾从馬夬聲臣鉉等曰今俗與快同用古穴切騠駃騠也从馬是聲杜兮切𩦻驘驢父馬母从馬𦟀聲小徐本作從馬羸省聲洛戈切𩧣或从羸小徐本作或不省驢似馬長耳从馬盧聲力居切𩥃𩦺驢子也从馬冡聲莫紅切驒驒騱野馬也小徐本也作屬從馬單聲一曰青驪白鱗文如鼉魚小徐本鱗作驎代何切騱驒騱馬也从馬奚聲胡雞切騊騊駼北野之良馬小徐本下有也从馬匋聲徒刀切駼騊駼也从馬余聲同都切驫眾馬也从三馬甫虬切文一百一十五重八𩣬𩢲疾也从馬吏聲疏吏切駥馬高八尺从馬戎聲如融切騣馬鬣也从馬㚇聲子紅切馱負物也从馬大聲唐佐切𩥍馬赤色也从馬觲省聲息營切文五新附小徐本無諸新附字𢊁廌解廌獸也似山牛一角古者決訟令觸不直象形从豸省凡廌之屬皆从廌宅買切𡦴𡦭𡦳𡦲解廌屬小徐本屬下有也从廌𡥉聲闕小徐本無闕古孝切薦獸之所食艸从廌从艸小徐本艸上無从古者神人以廌遺黃帝帝曰何食何處曰食薦夏處水澤冬處松柏作甸切灋𢌇𠛬也平之如水从水廌所以觸不直者去之从去方乏切㳒法今文省小徐本作今文灋字佱古文文四重二鹿獸也象頭角四足之形鳥鹿足相似从匕凡鹿之屬皆鹿盧谷切麚牡鹿从鹿叚聲以夏至解角小徐本角上有其古牙切𪋲麟大牝鹿也从鹿粦聲力珍切𪋐鹿麛也从鹿耎聲讀若偄弱之偄奴亂切𪋝鹿迹也从鹿速聲桑谷切麛鹿子也从鹿弭聲莫兮切麉鹿之絕有力者从鹿幵聲古賢切麒仁獸也麋身牛尾一角从鹿其聲渠之切麐牝麒也从鹿吝聲力珍切麋鹿屬小徐本屬下有也从鹿米聲麋冬至解其角武悲切麎牝麋也小徐本牝作牡从鹿辰聲植鄰切𪊨大麋也狗足从鹿旨聲居履切麂或从几麇麞也从鹿囷省聲居筠切麕籒文不省麞麋屬小徐本屬下有也从鹿章聲諸良切麔麋牝者从鹿咎聲其久切麠大鹿也牛尾一角从鹿畺聲舉卿切麖或從京麃麠屬从鹿𤐫省聲薄交切麈麋屬小徐本屬下有也从鹿主聲之庾切麑狻麑獸也小徐本無也从鹿兒聲五雞切麙山羊而大者細角从鹿咸聲胡毚切麢大羊而細角从鹿霝聲郎丁切𪊧鹿屬小徐本屬下有也从鹿圭聲古攜切𪋧麝如小麋臍有香从鹿䠶聲神夜切𪋮似鹿而大也从鹿與聲羊茹切麗旅行也鹿之性見食急則必旅行从鹿丽聲禮麗皮納聘蓋鹿皮也郎計切𠀙小徐本古文作丽古文𠧥篆文麗字小徐本無麗字二字麀牝鹿也从鹿从牝省小徐本作從鹿牝省聲於虯切𪋎或从幽聲小徐本無聲文二十六重六麤行超遠也从三鹿凡麤之屬皆从麤倉胡切𪋻塵鹿行揚土也从麤从土直珍切𡔘𡔚籒文文二重一㲋𣬋獸也似兔青色而大象形頭與兔同足與鹿同凡㲋之屬皆从㲋丑略切𠜌篆文毚狡兔也兔之駿者从㲋兔士咸切𣬕獸名从㲋吾聲讀若寫司夜切小徐本牲牲作狌狌从㲋夬聲古穴切文四重一兔獸名象踞後其尾形兔頭與㲋頭同凡兔之屬皆从兔湯故切逸失也从辵兔兔謾訑善逃也夷質切冤屈也从兔从冖小徐本作從冖兔兔在冖下不得走益屈折也小徐本無也於袁切婏兔子也婏疾也从女兔芳萬切𠓗疾也从三兔闕小徐本無闕芳遇切文五狡兔也从兔夋聲七旬切文一新附小徐本無此新附字萈山羊細角者从兔足𥄕聲凡萈之屬皆从萈讀若丸寬字从此臣鉉等曰𥄕徒結切非聲疑象形胡官切文一犬狗之有縣蹏者也象形孔子曰視犬之字如畫狗也凡犬之屬皆从犬苦泫切狗孔子曰狗叩也叩气吠以守从犬句聲古厚切𤟫獀南小徐本趙作越从犬叜聲所鳩切尨犬之多毛者从犬从彡小徐本彡上無从詩曰無使尨也吠小徐本下有或曰尨狗也莫江切狡少狗也从犬交聲匈奴地有狡犬巨口而黑身古巧切獪狡獪也从犬會聲古外切小徐本此字次於𤜛犯字之後𤣜犬惡毛也从犬農聲奴刀切猲短喙犬也从犬曷聲詩曰載獫猲獢爾雅曰短喙犬謂之猲獢小徐本引爾雅無獢許謁切獢猲獢也从犬喬聲許驕切小徐本此字次於獫字之後獫長喙犬一曰黑犬黃頭从犬僉聲虛檢切黃犬黑頭从犬主聲讀若注之戍切猈短脛狗从犬卑聲薄蟹切猗犗犬也从犬奇聲於离切狊犬視皃从犬目小徐本目下有聲古闃切竇中犬聲从犬从音音亦聲乙咸切默犬暫逐人也从犬黑聲讀若墨莫北切猝犬从艸暴出逐人也从犬卒聲麤沒切猩猩猩犬吠聲从犬星聲桑經切犬吠不止也从犬兼聲讀若檻一曰兩犬爭也胡黯切小犬吠从犬敢聲南陽新亭有鄕荒檻切猥犬吠聲从犬畏聲烏賄切獿獶獿也从犬夒小徐本夒下有聲女交切犬獿獿咳吠也从犬翏聲火包切小徐本此字次於類字之後犬容頭進也从犬參聲一曰賊疾也山檻切𤟌𤟒獎嗾犬厲之也从犬將省聲卽兩切齧也从犬戔聲初版切惡健犬也从犬刪省聲所晏切小徐本鬭作鬥从犬𥃩聲五還切犬鬭聲小徐本鬬作鬥从犬番聲附袁切狋犬怒皃从犬示聲一曰犬難得代郡有狋氏縣讀又若銀小徐本無又語其切犬吠聲从犬斤聲語斤切獡犬獡獡不附人也从犬舄聲南楚謂相驚曰獡讀若愬小徐本無讀若愬三字式略切獷獷犬獷獷不可附也从犬古猛切狀犬形也从犬爿聲盈鉏亮切𤞛妄彊犬也小徐本彊作強从犬壯壯亦聲小徐本作從犬壯聲徂朗切獒犬如人心可使者从犬敖聲春秋傳曰公嗾夫獒五牢切獳怒犬皃从犬需聲讀若槈奴豆切又乃矦切犬食也从犬从舌讀若比目魚鰈之鰈他合切狎犬可習也从犬甲聲胡甲切狃犬性驕也小徐本驕作忕从犬丑聲女久切𤜛犯㑴也从犬𢎘聲防險切猜恨賊也从犬青聲倉才切莫杏切犺健犬也从犬亢聲苦浪切多畏也从犬去聲去劫切怯杜林說从心𤢯獜健也从犬粦聲詩曰盧獜獜力珍切古縣切倏走也从犬攸聲讀若叔式竹切𤞸狟犬行也从犬𠄢聲周書曰尚狟狟胡官切𤝂犻過弗取也从犬巿𣎵蒲沒切𤟍犬張耳皃小徐本張上有開从犬易聲陟革切猌犬張齗怒也从犬來聲讀又若銀魚僅切犮蒲撥切戾曲也从犬出戶下戾者身曲戾也郎計切獨犬相得而鬭也小徐本鬬作鬥从犬蜀聲羊爲羣犬爲獨也一曰北嚻山有獨𤞞獸如虎白身豕鬣尾如馬徒谷切𤞞獨𤞞獸也从犬谷聲余蜀切𤣗𤣔𤣐秋田也从犬璽聲息淺切𥙮或从豕小徐本豕下有作宗廟之田也故从豕示獵放獵逐禽也小徐本作畋獵也逐禽也从犬巤聲良涉切𤢙獠獵也从犬尞聲力照切狩犬田也从犬守聲易曰明夷于南狩書究切臭禽走臭而知其迹者犬也从犬从自小徐本从犬上有故臣鉉等曰自古鼻字犬走以鼻知臭故从自尺救切獲獵所獲也从犬蒦聲胡伯切獘頓仆也从犬敝聲春秋傳曰與犬犬獘毗祭切斃獘或从死小徐本無獘獻宗廟犬名羹獻犬肥者以獻之从犬鬳聲許建切五甸切獟犬也从犬堯聲五弔切狾狂犬也从犬折聲春秋傳曰狾犬入華臣氏之門征例切巨王切類種類相似唯犬爲甚从犬頪聲力遂切狄赤狄本犬種狄之爲言淫辟也从犬亦省聲徒歷切素官切玃母猴也从犬矍聲爾雅云玃父善顧攫持人也俱縛切猶猷玃屬从犬酋聲一曰隴西謂犬子爲猷以周切狙玃屬从犬且聲一曰狙犬也暫齧人者一曰犬不齧人也親去切猴夒也从犬矦聲乎溝切犬屬𦝫巳上黃𦝫巳下黑食母猴从犬聲讀若構或曰似牂羊出蜀北嚻山中犬首而馬尾火屋切狼似犬銳頭白頰高前廣後从犬良聲魯當切狛如狼善驅羊从犬白聲讀若蘗甯嚴讀之若淺泊匹各切獌狼屬从犬曼聲爾雅曰貙獌似貍舞販切狐獸也小徐本䄏作妖鬼所乘之有三德其色中和小前大後死則丘首从犬瓜聲戶吳切獺如小狗也水居食魚小徐本無如从犬賴聲他達切猵獺屬从犬扁聲布玆玄切獱或從賓猋犬走皃从三犬甫遙切文八十三重五狘獸走皃从犬戉聲許月切𤟤獸名从犬軍聲許韋切狷褊急也从犬肙聲古縣切猰猰獸名从犬契聲烏黠切文四新附小徐本無諸新附字㹜犾兩犬相齧也从二犬凡犾之屬皆从犾語斤切司空也从犾𦣞聲復說獄司空息玆切獄确也从犾从言二犬所以守也小徐本作从犾言聲魚欲切文三鼠穴蟲之總名也象形凡鼠之屬皆从鼠書呂切𪖇鼠也从鼠番聲讀若樊或曰鼠婦附袁切鼠出胡地皮可作裘从鼠各聲下各切鼢地行鼠伯勞所作也小徐本作作化一曰偃鼠从鼠分聲房吻切蚡或从虫分䶄䶄令鼠从鼠平聲薄經切鼶鼠也从鼠虒聲息移切小徐本作從鼠丣聲力求切鼫五技鼠也能飛不能過屋能緣不能窮木能游不能渡谷能穴不能掩身能走不能先人小徐本窮作竆从鼠石聲常隻切鼨豹文鼠也从鼠冬聲職戎切𪕄籒文省小徐本作籒文從𠂂作𪕶鼠屬小徐本作鼠之屬也从鼠益聲於革切貖或从豸小徐本作或从豸作鼷小鼠也从鼠奚聲胡雞切鼩精鼩鼠也从鼠句聲其俱切鼸也从鼠兼聲丘檢切鼠屬小徐本作鼸屬从鼠今聲讀若含胡男切鼬如鼠赤黃而大食鼠者小徐本作如鼦赤黃色尾大食鼠者从鼠由聲余救切胡地風鼠从鼠勺聲之若切𪕎鼠屬从鼠宂聲而隴切𪕊鼠似雞鼠尾从鼠此聲卽移切鼲鼠出丁零胡皮可作裘小徐本丁零作先零裘作袋从鼠軍聲乎昆切𪕮斬𪕮鼠黑身白腰若帶手有長白毛似握版之狀類蝯蜼之屬小徐本斬作獑腰作𦝫从鼠胡聲戶吳切文二十重三能熊屬足似鹿从肉㠯聲能獸堅中故稱賢能而彊壯稱能傑也凡能之屬皆从能臣鉉等曰非聲疑皆象形奴登切文一熋熊獸似豕山居冬蟄从能炎省聲凡熊之屬皆从熊羽弓切𦌲羆如熊黃白文从熊罷省聲彼爲切𥀍古文从皮文二重一火燬也南方之行炎而上象形凡火之屬皆从火呼果切炟上諱小徐本作後漢章帝名也臣鉉等曰漢章帝名也唐韻曰火起也从火旦聲當割切𤈦火也从火尾聲詩曰王室如𤈦許偉切燬許偉切燹火也从火豩聲穌典切焌然火也小徐本無火从火夋聲周禮曰遂其焌焌火在前以焞焯龜小徐本䶴作炊子寸切又倉聿切𤊽尞柴祭天也小徐本柴作祡从火从眘昚小徐本二眘作昚昚上無从力照切𤉷然燒也从火肰聲臣鉉等曰今俗別作燃蓋後人增加如延切臣鉉等案艸部有䕼注云艸也此重出𤑔爇燒也从火蓺聲春秋傳曰爇僖負羈臣鉉等曰說文無蓺字當从火艸熱省聲如劣切燔爇也从火番聲附袁切燒爇也从火堯聲式昭切𤉩烮烈火猛也从火𠛱聲良辥切炪火光也从火出聲商書曰予亦炪謀讀若巧拙之拙職悅切熚熚𤒓火皃从火畢聲卑吉切𤒓𤒉熚𤒓也从火𢨋聲𢨋籒文悖字小徐本籒文作古文𢾭勿切烝火气上行也小徐本無上行二字从火丞聲煑仍切烰烝也从火孚聲詩曰烝之烰烰縛牟切小徐本此字次於齌字之後煦烝也一曰赤皃一曰溫潤也从火昫聲香句切小徐本此字次於𤑴焞字之後𤑆熯乾皃从火漢省聲小徐本作從火堇聲詩曰我孔熯矣人善切炥火皃从火弗聲普活切熮火皃从火翏聲逸周書曰味辛而不熮烙蕭切焛火皃从火𨳌省聲讀若粦良刃切火色也小徐本無也从火雁聲讀若鴈五妟切熲火光也从火頃聲古迥切爚火飛也从火龠聲一曰爇也以灼切𤒾熛火飛也从火𤐫聲讀若標小徐本作讀若瘭甫遙切熇火熱也从火高聲詩曰多將熇熇臣鉉等曰高非聲當从嗃省火屋切烄交木然也从火交聲古巧切小熱也从火干聲詩曰憂心臣鉉等曰干非聲未詳直廉切燋所以然持火也从火焦聲周禮曰以明火爇燋也卽消切炭小徐本作從火屵聲他案切𤏀𤈩小徐本無也从火𢀩省聲讀若齹楚宜切𤉧交灼木也从火敎省聲讀若狡古巧切炦火气也从火犮聲蒲撥切𤆆灰死火餘也小徐本作死灰餘燼从火又又手也火旣滅可以執持呼恢切炱灰炱煤也从火台聲徒哀切煨盆中火小徐本火下有也从火畏聲烏灰切熄畜火也从火息聲亦曰滅火小徐本無亦曰滅火四字相卽切烓行竈也从火圭聲讀若冋口迥切煁烓也从火甚聲氏任切燀炊也从火單聲春秋傳曰燀之以薪充善切炊爨也从火吹省聲昌垂切烘尞也从火共聲詩曰卭卬小徐本卭作卬呼東切齌炊餔疾也小徐本無也从火齊聲在詣切𤏴熹炙也从火喜聲許其切小徐本𤏴熹之後有此字炙炙肉也從肉在火上𤎵𤋎煎熬也从火前聲子仙切𤎅熬乾煎也从火敖聲五牢切熬或从麥小徐本作或從麥作炮毛炙肉也小徐本無也从火包聲薄交切𤇯炮肉以微火溫肉也小徐本以作也从火衣聲烏痕切𤎯𤎰熷置魚筩中炙也从火曾聲作滕切𤐧𥣇𤐸以火乾肉小徐本乾作焙从火稫聲臣鉉等案說文無稫字當从䵗省疑傳寫之誤符逼切𤓞𤓜籒文不省小徐本無此籒文𤒺爆灼也从火㬥聲蒲木切臣鉉等曰今俗音豹火裂也煬炙燥也从火昜聲余亮切𤌍灼也从火隺聲胡沃切爤爛孰也小徐本孰作熟从火蘭聲郎旰切燗或从閒爢爛也小徐本爛作爤从火靡聲靡爲切𤈫叞尉从上案下也小徐本案作按从从又持火以叞申繒也小徐本又上無从以上有所臣鉉等曰今俗別作熨非是於胃切𪚰𤒅灼龜不兆也从火龜小徐本龜下有聲春秋傳曰龜𪚰不兆讀若焦卽消切灸灼也从火久聲舉友切灼炙也从火勺聲之若切煉鑠治冶金也从火柬聲郎電切燭庭燎火燭也从火蜀聲之欲切熜然麻蒸也从火悤聲作孔切灺燭也从火也聲徐野切火餘也从火聿聲一曰薪也臣鉉等曰聿非聲疑从聿省今俗別作燼非是徐刃切焠堅刀刃也从火卒聲七內切煣屈申木也从火柔柔亦聲人久切燓焚燒田也从火棥棥亦聲附袁切熑火煣車網絕也从火兼聲周禮曰煣牙外不熑力鹽切𤐗燎放火也从火尞聲力小切𤐫票火飛也从火小徐本作與䢉䢅同意闕臣鍇曰𤐫從囟䢉從囟𦥑䢅從𦥑取其共捧以上之意此會意方昭切𤓗焦也从火曹聲作曹切𤓪𤓬火所傷也从火雥聲卽消切𤊙焦或省𤈮烖天火曰烖从火𢦒聲祖才切灾或从宀火𤆎古文从才小徐本籒文在古文之前𤏯煙火气也从火垔聲烏前切烟或从因𡨾古文𤎟籒文从宀小徐本作𤎟籒文從宀𡨾古文烟或從因焆焆焆煙皃从火肙聲因悅切熅煴鬱煙也从火𥁕聲於云切𤈥望火皃小徐本望作朢从火皀聲讀若馰顙之馰都歷切𤓠燂火熱也从火覃聲火大甘切又徐鹽切𤑴焞明也从火𦎧聲春秋傳曰焞
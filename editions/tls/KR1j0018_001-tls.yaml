告云貴切絩綺絲之數也漢律曰綺絲數謂之絩布謂之總綬組謂之首从糸兆聲治小切綺文繒也从糸奇聲袪彼切縠細縳也从糸聲胡谷切縳白鮮色也从糸專聲持沇切縑幷絲繒也从糸兼聲古甜切綈厚繒也从糸弟聲杜兮切練湅繒也从糸柬聲郎甸切縞鮮色也从糸高聲古老切粗緒也从糸璽聲臣鉉等曰今俗別作絁非是式支切紬大絲繒也从糸由聲直由切綮繒也一曰幑幟信也有齒从糸𢼄聲康礼切綾東齊謂布帛之細曰綾从糸夌聲力膺切縵繒無文也从糸曼聲漢律曰賜衣者縵表白裏莫半切繡五采備也从糸肅聲息救切絢詩云素以爲絢兮从糸旬聲臣鉉等案論語注絢文皃許掾切繪會五采繡也虞書曰山龍華蟲作繪論語曰繪事後素从糸會聲黃外切緀白文皃詩曰緀兮斐兮成是貝錦从糸妻聲七稽切䋛繡文如聚細米也从糸从米米亦聲莫禮切絹繒如麥从糸肙聲吉掾切綠緑帛青黃色也从糸录聲力玉切𦇳縹帛青白色也从糸𤐫聲𢾭沼切䋭帛青經縹緯一曰育陽染也从糸育聲余六切絑純赤也虞書丹朱如此从糸朱聲章俱切纁淺絳也从糸熏聲許云切絀絳也从糸出聲丑律切絳大赤也从糸夅聲古巷切綰惡也絳也从糸官聲一曰絹也讀若雞卵烏版切𦇢卽刃切綪赤繒也以茜染故謂之綪从糸青聲倉絢切緹帛丹黃色从糸是聲他禮切衹緹或从氏縓帛赤黃色一染謂之縓再染謂之䞓三染謂之纁从糸原聲七絹切紫帛青赤色从糸此聲將此切紅帛赤白色从糸工聲戶公切𦇎繱帛青色从糸蔥聲倉紅切紺帛深青揚赤色从糸甘聲古暗切𦁰𦂖𦂢帛蒼艾色从糸渠之切綦𦁰或从其繰帛如紺色小徐本紺作繒或曰深繒从糸喿聲讀若喿親小切側持切纔帛雀頭色一曰微黑色如紺纔淺也讀若讒从糸毚聲士咸切𦃖帛騅色也从糸剡聲詩曰毳衣如𦃖臣鉉等曰今俗別作毯非是土敢切綟帛戾艸染色小徐本戾作艾从糸戾聲郎計切紑白鮮衣皃从糸不聲詩曰素衣其紑匹丘切緂白鮮衣皃从糸炎聲謂衣采色鮮也充三切繻繒采色从糸需聲讀若易繻有衣臣鉉等曰漢書傳符帛也相俞切縟繁采色也从糸辱聲而蜀切纚冠織也从糸麗聲所綺切紘冠卷也从糸厷聲戶萌切紭紘或从弘紞冕冠塞耳者从糸冘聲臣鉉等曰今俗別作髧非是都感切纓冠系也从糸嬰聲於盈切紻纓卷也从糸央聲於兩切緌系冠纓也从糸委聲儒隹切緄織帶也从糸昆聲古本切𦁴紳大帶也从糸申聲失人切繟帶緩也从糸單聲昌善切綬韍維也从糸受聲殖酉切組綬屬其小者以爲冕纓从糸且聲則古切緺綬紫青也从糸咼聲古蛙切縌綬維也从糸逆聲宜戟切纂似組而赤从糸算聲作管切紐系也一曰結而可解从糸丑聲女久切綸青絲綬也从糸侖聲古還切綎系綬也从糸廷聲他丁切𦀞絙緩也从糸𠄢聲胡官切繐細疏布也从糸惠聲私銳切㬧𦃙頸連也从糸暴省聲補各切紟衣系也从糸今聲居音切䋮籒文从金緣衣純也从糸彖聲以絹切纀裳削幅謂之纀从糸僕聲博木切絝脛衣也从糸夸聲苦故切繑絝紐也从糸喬聲牽搖切緥小兒衣也从糸保聲臣鉉等曰今俗作褓非是博抱切子昆切紴絛屬从糸皮聲讀若被或讀若水波之波博禾切𠍞絛扁緒也从糸攸聲土刀切䋐采彰也一曰車馬飾从糸戉聲王伐切緃䋐屬从糸从從省聲足容切紃𥾖圜采也从糸川聲詳遵切緟增益也从糸重聲直容切纕援臂也从糸襄聲汝羊切纗維綱中繩从糸巂聲讀若畫或讀若維戶圭切𦂴綱維紘繩也从糸岡聲古郎切㭃小徐本古文作古文綱縜持綱紐也从糸員聲周禮曰縜寸臣鉉等曰縜長寸也爲贇切𦃌綅絳綫也从糸侵省聲詩曰貝冑朱綅子林切縷綫也从糸婁聲力主切綫縷也从糸戔聲私箭切線古文綫䋉縷一枚也从糸穴聲乎決切縫以鍼紩衣也从糸逢聲符容切緁緶衣也从糸疌聲七接切䌌緁或从習紩縫也从糸失聲直質切緛衣戚也从糸耎聲而沇切䋎補縫也从糸旦聲文莧切繕補也从糸善聲時戰切絬論語曰絬衣長短右袂从糸舌聲私列切纍綴得理也一曰大索也从糸畾聲力追切縭以絲介履也从糸离聲力知切𦂐緱刀劍緱也从糸矦聲古矦切小徐本此字次於㬧𦃙字之後繄𢧢衣也从糸殹聲一曰赤黑色繒烏雞切縿旌旗之游也从糸參聲所銜切徽衺幅也一曰三糾繩也从糸微省聲許歸切幷列切紉繟繩也从糸刃聲女鄰切繩索也从糸蠅省聲食陵切小徐本未作朱一曰急弦之聲从糸爭聲讀若旌側莖切縈收韏也从糸熒省聲於營切絇纑繩絇也从糸句聲讀若鳩其俱切縋以繩有所縣也春秋傳曰夜縋納師从糸追聲持僞切絭攘臂繩也从糸𢍏聲居願切緘束篋也从糸咸聲古咸切𦪝縢緘也从糸朕聲徒登切編次𥳑也从糸扁聲布玄切維車蓋維也从糸隹聲以追切絥車絥也从糸伏聲平祕切茯絥或从艸𩍁鞴絥或从革𤰇聲䋊乘輿馬飾也从糸正聲諸盈切綊䋊綊也从糸夾聲胡頰切䋣緐繁馬髦飾也从糸每聲春秋傳曰可以稱旌䋣乎附袁切𦅳𦃍𥿋䋣或从𢍘小徐本䋣作繁𢍘籒文弁繮馬紲也从糸畺聲居良切紛馬尾韜也从糸分聲撫文切紂馬緧也从糸肘省聲除柳切緧馬紂也从糸酋聲七由切絆馬縶也从糸半聲博幔切𦅨𦅓絆前兩足也从糸須聲漢令蠻夷卒有𦅨相主切紖牛系也从糸引聲讀若矤直引切縼以長繩繫牛也从糸旋聲辭戀切縻牛轡也从糸麻聲靡爲切𥿫縻或从多紲系也从糸世聲春秋傳曰臣負羈紲私列切緤紲或从枼𦄿索也从糸黑聲莫北切緪縆大索也一曰急也从糸恆聲古恆切繘綆也从糸矞聲余聿切𦇹古文从絲𦈇籒文繘䌄綆汲井綆也从糸更聲古杏切絠彈彄也从糸有聲弋宰切又古亥切𦅾繳生絲縷也从糸敫聲之若切繴繴謂之罿罿謂之罬罬謂之罦捕鳥覆車也从糸辟聲博戹切緍緡釣魚𦅾也从糸昏聲吳人解衣相被謂之緍武巾切絮敝緜也从糸如聲息據切絡絮也一曰麻未漚也从糸各聲盧各切纊纊絮也从糸廣聲春秋傳曰皆如挾苦謗切絖纊或从光紙絮一苫也从糸氏聲諸氏切䋨治敝絮也从糸咅聲芳武切䋈絜縕也一曰敝絮从糸奴聲易曰需有衣䋈女余切繫繫𦃇也一曰惡絮从糸毄聲古詣切𦃇繫𦃇也一曰維也从糸虒聲郎兮切緝績也从糸咠聲七入切絘績所緝也从糸次聲七四切則歷切纑布縷也从糸盧聲洛乎切紨布也一曰粗紬小徐本粗作麤从糸付聲防無切𦄑蜀細布也从糸彗聲祥歲切絺細葛也从糸希聲丑脂切綌粗葛也小徐本粗作麤从糸𧮫聲綺戟切𢂲綌或从巾縐絺之細也詩曰蒙彼縐絺一曰蹴也从糸芻聲側救切絟細布也从糸全聲此緣切紵檾屬細者爲絟粗者爲紵小徐本粗作麤从糸宁聲直呂切𦂂紵或从緒省𦃞緦十五升布也又兩麻一絲布小徐本又作一曰布下有也从糸思聲息玆切𢇆𢆿古文緦从糸省緆細布也从糸易聲充擊切𪎥緆或从麻緰緰貲布也从糸俞聲度矦切縗服衣長六寸博四寸心从糸衰聲倉回切絰喪首戴也从糸至聲臣鉉等曰當从姪省乃得聲徒結切𦄱緶交枲也一曰緁衣也从糸便聲房連切䋀履也一曰青絲頭履也讀若阡陌之陌从糸戶聲亡百切䋽枲履也从糸封聲博蠓切緉履兩枚也一曰絞也从糸从兩兩亦聲力讓切絜麻一耑也从糸㓞聲古㞕切繆枲之十絜也一曰綢繆从糸翏聲武彪切綢繆也从糸周聲直由切縕緼紼也从糸𥁕聲於云切紼亂系也从糸弗聲分勿切北萌切紕氐人𦇧也讀若禹貢玭珠从糸比聲卑履切𦇧西胡毳布也从糸罽聲居例切縊經也从糸益聲春秋傳曰夷姜縊於賜切綏車中把也从糸从妥徐鍇曰禮升車必正立執綏所以安也當从爪从安省說文無妥字息遺切彝彞宗廟常器也从糸糸綦也𠬞持米器中實也彑聲此與爵相似周禮六彝雞彝鳥彝黃彝虎彝蟲彝斝彝以待祼將之禮小徐本蟲彝作蜼彝以脂切𦇚𢇏𦆩皆古文彝緻密也从糸致聲直利切文二百四十八重三十一緗帛淺黃色也从糸相聲息良切緋帛赤色也从糸非聲甫微切緅帛青赤色也从糸取聲子矦切𦇕繖蓋也从糸散聲蘇旱切綀布屬从糸束聲所菹切縡事也从糸宰聲子代切𦇶繾繾綣不相離也从糸遣聲去演切綣繾綣也从糸卷聲去阮切文九新附小徐本無諸新附字𦃃素白緻繒也从糸𠂹取其澤也凡素之屬皆从素桑故切𦅽𢍣素屬从素𠬞聲居玉切𦆗䋤白約縞也从素勺聲以灼切𦈁𦆾素屬从素率聲所律切小徐本𦅻作𩏅从素卓聲昌約切綽繛或省𦇻𦅻繛也从素爰聲胡玩切緩𦅻或省文六重二絲蠶所吐也从二糸凡絲之屬皆从絲息玆切轡馬轡也从絲从軎與連同意詩曰六轡如絲兵媚切𢇅𢇇織絹从糸貫杼也小徐本从作從从絲省卝聲古還切臣鉉等曰卝古磺字文三率捕鳥畢也象絲罔上下其竿柄也凡率之屬皆从率所律切文一虫一名蝮博三寸首大如擘指象其臥形物之微細或行或毛或蠃𧝹或介或鱗以虫爲象凡虫之屬皆从虫許偉切蝮小徐本篆文作𧐛蝮虫也从虫复聲芳目切𧑥螣𦢅神蛇也从虫朕聲徒登切蚦蚺大蛇可食从虫冄聲人占切螼螾也从虫堇聲弃忍切螾側行者从虫寅聲余忍切蚓螾或从引螉蟲在牛馬皮者从虫翁聲烏紅切䗥螉䗥也从虫從聲子紅切蠁知聲蟲也从虫鄕聲許兩切䖮司馬相如蠁从向蛁蟲也从虫召聲都僚切𧑎𧎹小徐本篆文作𧑎蟲也从虫𠭥聲祖外切蛹繭蟲也从虫甬聲余隴切螝蛹也从虫鬼聲讀若潰胡罪切蛕腹中長蟲也从虫有聲戶恢切蟯腹中短蟲也从虫堯聲如招切雖似蜥蜴而大从虫唯聲息遺切虺虺以注鳴詩曰胡爲虺蜥从虫兀聲臣鉉等曰兀非聲未詳許偉切蜥蜥易也从虫析聲先擊切蝘在壁曰蝘蜓在艸曰蜥易从虫匽聲於殄切𧓱蝘或从䖵蜓蝘蜓也从虫廷聲一曰螾蜓徒典切蚖榮蚖蛇醫以注鳴者从虫元聲愚袁切蠸蟲也一曰大螫也讀若蜀都布名从虫雚聲巨員切螟蟲食穀葉者吏冥冥犯法卽生螟从虫从冥冥亦聲莫經切蟘蟲食苖葉者吏乞貸則生蟘从虫从貸貸亦聲詩曰去其螟蟘臣鉉等曰今俗作𧈱非是徒得切蟣蝨子也一曰齊謂蛭曰蟣从虫幾聲居狶切蛭蟣也从虫至聲之日切蝚蛭蝚至掌也从虫柔聲耳由切蛣蛣䖦蝎也从虫吉聲去吉切䖦蛣䖦也从虫出聲區勿切𧖋蟫白魚也从虫覃聲余箴切蛵丁蛵負勞也从虫巠聲戶經切蜭毛蠹也从虫臽聲乎感切蟜蟲也从虫喬聲居夭切蛓毛蟲也从虫𢦒聲千志切䖯蠆也从虫圭聲烏蝸切蚔䖯也从虫氏聲巨支切𧍣𧔱蠆毒蟲也象形丑犗切𧕧𧓵䘍蠆或从䖵蝤蝤𧓉也从虫酋聲字秋切𧓉蠐𧓉𧕐也从虫齊聲徂兮切蝎蝤蠐也从虫曷聲胡葛切小徐本此字次於蛅字之後強强蚚也从虫弘聲徐鍇曰弘與強聲不相近秦刻石文从口疑从籒文省巨良切𧖑籒文強从䖵从彊蚚強也从虫斤聲巨衣切蜀葵中蠶也从虫上目象蜀頭形中象其身蜎蜎詩曰蜎蜎者蜀市玉切蠲馬蠲也从虫目益聲了象形小徐本了作乁明堂月令曰腐艸爲蠲古玄切螕齧牛蟲也从虫𣬉聲邊兮切蠖尺蠖屈申蟲小徐本蟲下有也从虫蒦聲烏郭切蝝復陶也劉歆說蝝蚍蜉子董仲舒說蝗子也从虫彖聲與專切螻螻蛄也从虫婁聲一曰螜天螻洛矦切蛄螻蛄也从虫古聲古乎切蠪丁螘也从虫龍聲盧紅切蛾䖸羅也从虫我聲臣鉉等案爾雅蛾羅蠶蛾也䖵部巳有𧒎或作䖸此重出五何切螘蚍蜉也从虫豈聲魚綺切蚳螘子也从虫氐聲周禮有蚳醢讀若祁小徐本祁作祈直尼切𧐏籒文蚳从䖵𨑉古文蚳从辰土蠜𨸏蠜也从虫樊聲附袁切𧍓悉𧍓也从虫帥聲臣鉉等曰今俗作蟀非是所律切蝒馬蜩也从虫面聲武延切𧒾蟷𧒾蠰不過也从虫當聲都郎切蠰𧒾蠰也从虫襄聲汝羊切蜋堂蜋也从虫良聲一名蚚父魯當切蛸𧓎蛸堂蜋子从虫肖聲相邀切蛢𧑐蟥以翼鳴者从虫幷聲薄經切𧑐𧑐蟥也从虫矞聲余律切蟥蟥𧑐蟥也从虫黃聲乎光切䗐蛄䗐強羋也从虫施聲式支切蛅蛅斯墨也从虫占聲職廉切蜆縊女也从虫見聲胡典切蜰盧蜰也从虫肥聲符非切𧍕䖼渠𧍕一曰天社从虫卻聲其虐切𧒘𧒘蠃蒲盧細要土也小徐本要作𦝫天地之性細要純雄無子詩曰螟𧕅有子𧒘蠃負之从虫𩰬聲古火切蜾𧒘或从果蠃蜾蠃也从虫𦟀聲一曰虒蝓郎果切𧕅螟𧕅桑蟲也从虫霝聲郎丁切蛺蛺蜨也从虫夾聲兼叶切蜨蛺蜨也从虫疌聲臣鉉等曰今俗作蝶非是徒叶切蚩𧉌蟲也从虫㞢聲赤之切螌𧏘螌蝥毒蟲也从虫般聲布還切蝥𧎄螌蝥也从虫敄聲臣鉉等曰今俗作蟊非是蟊卽蠿蟊蜘蛛之別名也莫交切蟠鼠婦也从虫番聲附袁切𧉅蛜蛜威委黍委黍鼠婦也从虫伊省聲於脂切蜙蜙蝑以股鳴者从虫松聲息恭切蚣蜙或省臣鉉等曰今俗作古紅切以爲蜈蚣蟲名蝑蜙蝑也从虫胥聲相居切蟅蟲也从虫庶聲之夜切蝗螽也从虫皇聲乎光切蜩蟬也从虫周聲詩曰五月鳴蜩徒聊切𧊓蜩或从舟蟬以㫄鳴者从虫單聲市連切蜺寒蜩也从虫兒聲五雞切螇螇鹿蛁蟟也从虫奚聲胡雞切蚗𧉅蚗蛁蟟也从虫夬聲於悅切𧉄𧉅蚗蟬屬讀若周天子赧从虫丏聲武延切蛚蜻蛚也从虫𠛱聲良薛切蜻蜻蛚也从虫青聲子盈切蛉蜻蛉也从虫令聲一名桑根郎丁切蠓蠛蠓也从虫蒙聲莫孔切𧐑𧎾螶𧎾也一曰蜉蝣朝生莫死者从虫𡮂聲离灼切蜹秦晉謂之蜹楚謂之蚊从虫芮聲而銳切蟰蟰蛸長股者从虫肅聲穌彫切𧍖蟲也从虫省聲息正切蛶商何也从虫寽聲力輟切蜡蠅䏣也周禮蜡氏掌除骴从虫昔聲助駕切蝡動也从虫耎聲而沇切蚑行也从虫支聲巨支切𧔘蠉蟲行也从虫瞏聲香沇切𧈪蟲曳行也从虫屮聲讀若騁丑善切螸螽醜螸垂腴也从虫欲聲余足切𧎥蠅醜𧎥搖翼从虫扇聲式戰切蛻蜕蛇蟬所解皮也从虫挩省小徐本作從虫稅省聲輸芮切𧊝𧍷螫也从虫若省聲呼各切螫蟲行毒也从虫赦聲施隻切蝁镻也从虫亞聲烏各切蛘蛘也从虫羊聲余兩切𧐂蝕敗創也从虫人食食亦聲乘力切蛟龍之屬也池魚滿三千六百蛟來爲之長能率魚飛置笱水中卽蛟去从虫交聲古肴切螭若龍而黃北方謂之地螻从虫离聲或云無角曰螭丑知切虯龍子有角者从虫丩聲渠幽切蜦蛇屬黑色潛于神淵能興風雨从屬从虫侖聲讀若戾艸力屯切蜧蜦或从戾螊海蟲也長寸而白可食从虫兼聲讀若嗛力鹽切蜃雉入海化爲蜃从虫辰聲時忍切𧊧蛤蜃屬有三皆生於海千歲化爲𧊧秦謂之牡厲又云百歲燕所化魁𧊧一名復累老服翼所化从虫合聲古沓切螷階也小徐本階作陛脩爲螷圜爲蠇从虫庳臣鉉等曰今俗作𩶁或作蠯非是蒲猛切蝸蝸蠃也从虫咼聲古華切𧉳蚌蜃屬从虫丰聲步項切蠇蚌屬似螊微大出海中今民食之从虫萬聲讀若賴力制切蝓虒蝓也从虫俞聲羊朱切蜎蜎也从虫肙聲狂沇切蟺夗蟺也从虫亶聲常演切𧍘𧍘蟉也从虫幽聲於虯切蟉𧍘蟉也从虫翏聲力幽切蟄藏也从虫執聲直立切蚨青蚨水蟲可還錢从虫夫聲房無切䗇䗇鼀詹諸以脰鳴者从虫匊聲居六切蝦蝦蟆也从虫叚聲乎加切蟆蝦蟆也从虫莫聲莫遐切蠵大龜也以胃鳴者从虫巂聲戶圭切𧓬司馬相如說蠵从敻螹螹離也从虫漸省聲慈染切蠏蟹有二敖八足㫄行非蛇鮮之穴無所庇小徐本鮮作鱓从虫解聲胡買切䲒蟹或从魚蛫蟹也从虫危聲過委切蜮短狐也似鼈三足以气䠶害人从虫或聲于逼切蟈蜮又从國臣鉉等曰今俗作古獲切以爲蝦蟆之別名𧊜似蜥易長一丈水潛吞人卽浮出日南从虫屰聲吾各切蛧蝄蛧蜽山川之精物也淮南王說蛧蜽狀如三歲小兒赤黑色赤目長耳美髮从虫网聲國語曰木石之怪夔蛧蜽文兩切蜽蛧蜽也从虫兩聲臣鉉等曰俗作䰣魎非是良奬切蝯善援禺屬从虫爰聲臣鉉等曰今俗別作猨非是雨元切蠗禺屬从虫翟聲首直角切蜼如母猴卬鼻長尾从虫隹聲余季切蚼北方肓蚼犬食人小徐本肓作有从虫句聲古厚切𧋳蛩蛩蛩獸也一曰秦謂蟬蛻曰蛩从虫巩聲渠容切蟨鼠也一曰西方有獸前足短與蛩蛩巨虛比其名謂之蟨从虫厥聲居月切蝙蝙蝠也从虫扁聲布玄切蝠蝙蝠服翼也从虫畐聲方六切蠻南蠻蛇穜小徐本穜作種从虫䜌聲莫還切閩東南越蛇穜小徐本穜作種从虫門聲武巾切虹螮蝀也狀似蟲从虫工聲明堂月令曰虹始見戶工切𧌫籒文虹从申申電也螮螮蝀虹也从虫帶聲都計切蝀螮蝀也从虫東聲多貢切蠥𧕏衣服歌謠草木之怪謂之䄏禽獸蟲蝗之怪謂之蠥从虫辥聲魚列切文一百五十三重十五蜑南方夷也从虫延聲徒旱切蟪蟪蛄蟬也从虫惠聲乎桂切蠛蠛蠓细蟲也从虫蔑聲亡結切螘化飛蟲也从虫蔑聲莫結切虴虴蜢艸上蟲也从虫乇聲陟格切蜢虴蜢也从虫孟聲莫杏切蟋蟋也从虫悉聲息七切螳螳蜋也从虫堂聲徒郎切文七新附小徐本無諸新自此說文解字弟十三上下䖵蟲之總名也从二虫凡䖵之屬皆从䖵讀若昆古䰟切蠶任絲也从䖵朁聲昨含切𧒎蠶化飛蟲从䖵我聲五何切䖸蛾或从虫𧎮齧人跳蟲从䖵㕚聲㕚古爪字子皓切蚤或从虫蝨齧人蟲从䖵卂聲所櫛切𧒟𧍸螽蝗也从䖵𠂂聲𠂂古文終字職戎切𧑄𧍸或从虫眾聲𧖉𧒝𧔡蟲也从䖵展省聲知衍切蠽𧕾小蟬蜩也从䖵𢧵聲子列切蠿蠿蟊作罔蛛蟊也从䖵𢇍聲𢇍古絕字側入切蟊蠿蟊也从䖵矛聲莫交切𧕝蟲也从䖵寍聲奴丁切𧖤𧕐𧓉𧕐也从䖵曹聲財牢切𧕱螻蛄也从䖵舝聲胡葛切𧓎𧓎蛸也从䖵卑聲匹標切𧌠蜱𧓎或从虫蠭飛蟲螫人者从䖵逢聲𢾭容切𧒒蜂古文省𧖅蠭甘飴也一曰螟子从䖵鼏聲彌必切蜜𧖅或从宓螶螶𧎾也从䖵巨聲強魚切蟁齧人飛蟲从䖵民聲無分切𧓹小徐本篆文作蟁或从昬以昬時出也小徐本二昬字皆作昏蚊俗蟁从虫从文蝱齧人飛蟲从䖵亡聲武庚切蠹木中蟲从䖵橐聲當故切螙蠹或木象蟲在木中形譚長說蠡蟲齧木中也从䖵彖聲盧啓切𥯵古文𧒔多足蟲也从䖵求聲巨鳩切𧋛𧒔或从虫𧖚𧕰蚍𧖚也从䖵㯱聲縛牟切蜉𧕰或从虫从孚𧕲蟲食也从䖵雋聲子兖切𧅪蠢蟲動也从䖵萅聲尺尹切𢧸𢧭𢧨古文蠢从𢦒周書曰我有𢧭于西文二十五重十三蟲有足謂之蟲無足謂之豸从三虫凡蟲之屬皆从蟲直弓切𧔨𧕑蟲食艸根者从蟲象其形吏抵冒取民財則生徐鍇曰唯此一字象蟲形不从矛書者多誤莫浮切蝥蟊或从敄臣鉉等按虫部巳有莫交切作螌蝥蟲此重出蛑古文蟊从虫从牟𧖕𧖈蚍蜉大螘也从蟲𣬈聲房脂切蚍𧖕或从虫比聲𧖔蟁也从蟲𨳌聲武巾切𧕿臭蟲負蠜也从蟲非聲房未切蜚𧕿或从虫小徐本𧕿作蜚蠱腹中蟲也春秋傳曰皿蟲爲蠱晦淫之所生也臬桀死之鬼亦爲蠱从蟲从皿皿物之用也公戶切文六重四風八風也東方曰明庶風東南曰清明風南方曰景風西南曰涼風西方曰閶闔風西北曰不周風北方曰廣莫風東北曰融風風動蟲生故蟲八日而化从虫凡聲凡風之屬皆从風方戎切𠙊古文風𩘁𩗬北風謂之𩘁从風涼省聲呂張切𩖶小風也从風朮聲翾聿切飆飇扶搖風也从風猋聲甫遙切颮飆或从包𩙞飄回風也从風𤐫聲撫招切颯䬃翔風也小徐本翔作朔从風立聲穌合切飂𩘷高風也从風翏聲力求切䬍疾風也从風从忽忽亦聲呼骨切𩙊䬑大風也从風胃聲王勿切䫻大風也从風日聲于筆切颺風所飛揚也从風昜聲與章切䬆風雨暴疾也小徐本暴作曓从風利聲讀若栗力質切𩘃颲烈風也从風𠛱聲讀若𠛱良列切文十三重二颸涼風也从風思聲息玆切䬒颼䬒飂也从風叜聲所鳩切颭風吹浪動也从風占聲隻冄切文三新附小徐本無諸新附字它虫也从虫而長象冤曲垂尾形小徐本垂作𠂹上古艸居患它故相問無它乎凡它之屬皆从它託何切蛇它或从虫臣鉉等曰今俗作食遮切文一重一龜舊也外骨內肉者也从它龜頭與它頭同天地之性廣肩無雄龜鼈之類以它爲雄象足甲尾之形凡龜之屬皆从龜居追切𤕣𠁴𠃾古文龜䶱𪚽龜名从龜𠂂聲𠂂古文終字徒冬切𪚮䶲龜甲邊也从龜冄聲天子巨𪚮尺有二寸諸矦尺大夫八寸士六寸汝閻切文三重一𪓑黽鼃黽也从它象形黽頭與它頭同徐鉉等曰象其腹也凡黽之屬皆从黽莫杏切籒文黽鼈甲蟲也从黽敝聲幷列切黿大鼈也从黽元聲愚袁切鼃蝦蟇也从黽圭聲烏媧切鼀𡴆鼀詹諸也其鳴詹諸其皮鼀鼀其行𡴆𡴆从黽从𡴆𡴆亦聲七宿切𪓰𪓵鼀或从酋𪓿𪓰𪓿詹諸也詩曰得此𪓰𪓿言其行𪓿𪓿从黽爾聲式支切鼉水蟲似蜥易長大从黽單聲徒何切𪓷水蟲也薉貉之民食之从黽奚聲胡雞切䵶𪓷屬頭有兩角出遼東从黽句聲其俱切蠅營營青蠅蟲之大腹者从黽从虫余陵切䵹䵹鼄蟊也从黽𥏼省聲陟离切𧐉𧌲蜘或从虫鼄䵹鼄也从黽朱聲陟輸切蛛鼄或从虫鼂匽鼂也讀若朝揚雄說匽鼂蟲名小徐本無說杜林以爲朝旦非是从黽从旦臣鉉等曰今俗作晁直遙切𪓨篆文从皀文十三重五鼇海大鼈也从黽敖聲五牢切文一新附小徐本無此新附字卵凡物無乳者卵生象形凡卵之屬皆从卵盧管切毈卵不孚也从卵段聲徒玩切文二二地之數也从偶一凡二之屬皆从二而至切弍古文小徐本作古文二亟敏疾也从人从口从又从二小徐本作從人口又二二天地也徐鍇曰承天之時因地之利口謀之手執之時不可失疾也紀力切又去吏切𢛢恆恒常也从心从舟在二之閒小徐本舟上無從上下心以舟施恆也小徐本上下心作上下一心胡登切𠄨小徐本古文作古文恆从月詩曰如月之恆𠄢亘求𠄢也从二从囘囘古文回象𠄢回形上下所求物也小徐本囘字不重形上回作囘徐鍇曰回風回轉所以宣陰陽也須緣切竺厚也从二竹聲冬毒切凡最括也小徐本作最括而言也从二二偶也小徐本偶上有其从𢎜𢎜古文及小徐本及下有字浮芝切文六重二土地之吐生物者也小徐本物上有萬二象地之下地之中物出形也小徐本物上有丨凡土之屬皆从土它魯切地元气初分輕清陽爲天重濁陰爲地萬物所陳𠛱也从土也聲徒四切墬籒文地从䧘小徐本作籒文地從𨸏土䧘聲坤地也易之卦也从土从申土位在申小徐本申上物从苦昆切垓兼垓八極地也國語曰天子居九垓之田从土亥聲小徐本國語作春秋國語春秋國語曰云云在从土亥聲之後古哀切墺四方土可居也小徐本土作上下从土奧聲於六切𡌱𡋸古文墺小徐本墺下有如此二字堣堣夷在冀州暘谷立春日日値之而出小徐本日日作之日从土禺聲尚書曰宅堣夷噳俱切坶朝歌南七十里地小徐本地下有也周書武王與紂戰于坶野从土母聲小徐本从土母聲在周書之前周書下有曰戰下無于莫六切坡阪也从土皮聲𣶢禾切坪小徐本篆文作𡊞地平也从土平平亦聲小徐本作從土平聲皮命切均平徧也从土从勻勻亦聲小徐本作從土勻聲居勻切壤柔土也从土襄聲如兩切塙堅不可拔也从土高聲苦角切墽磽也从土敫聲口交切壚剛土也从土盧聲洛乎切㙚赤剛土也从土觲省聲息營切埴𡌴黏土也从土直聲常職切坴土塊坴坴也从土𡴆聲讀若逐一曰坴梁小徐本作讀若速一曰坴梁地從土𡴆聲力竹切𡍦土也洛陽有大𡍦里从土軍聲小徐本从土軍聲在洛陽之前戶昆切墣塊也从土菐聲匹角切圤墣或从卜凷墣也从土一屈象形小徐本作從土凵凵屈象形苦對切塊凷或从鬼小徐本作俗凷從土鬼堛凷也从土畐聲芳逼切堫穜也小徐本穜作種一曰內其中
body:
  text: 說文解字標目說文解字弟一一於悉切丄時掌切示神至切三穌甘切王雨方切玉魚欲切玨𤤴珏古岳切氣气去旣切士鉏里切丨古本切屮丑列切艸倉老切蓐而蜀切茻𦬠模朗切說文解字弟二小私兆切八博拔切釆蒲萈切半博幔切牛語求切犛莫交切告古奧切口苦后切凵口犯切吅況袁切哭苦屋切𧺆𣥚走子苟切止諸市切撥𣥠癶北末切步𣥗薄故切此雌氏切正之盛切是昰承旨切辵辶丑略切彳丑亦切廴余忍切㢟丑連切行戶庚切齒昌里切牙五加切足卽玉切疋所菹切品丕飲切龠以灼切𠕋冊𠕁册楚革切說文解字弟三㗊阻立切舌食列切干古寒切𧮫其虐切只諸氏切㕯女滑切句古矦切丩𠃚居虯切古公戶切十是執切𠦃卅蘇沓切言語軒切誩渠慶切音於今切䇂去虔切丵士角切菐蒲沃切廾𠬞居竦切普班切共渠用切異𠔱羊吏切舁𦥠以諸切𦥑居玉切䢅食鄰切爨七亂切革古覈切鬲郎激切𩰲䰜郎激切爪側狡切𠃨丮几劇切鬥都豆切又于救切臧可切史疏士切支章移切𦘒帇尼輒切聿余律切畫畵胡麥切隶徒耐切臤苦閑切臣植鄰切殳市朱切𠘧市朱切寸倉困切皮符羈切㼱而兖切攴攵普木切敎教古孝切卜博木切用𠂦𤰃余訟切爻胡茅切㸚力几切說文解字弟四𡕥𥄎火劣切目莫六切䀠九遇切眉睂武悲切盾食閏切自疾二切白疾二切鼻父二切皕彼力切習似入切羽王矩切隹職追切奞息遺切雈胡官切𦫳𠁥工瓦切𥄕徒結切羊𦍋與章切羴式連切瞿九遇切雔市流切雥徂合切鳥都了切烏哀都切𠦒式北潘切冓古候切幺於堯切𢆶於虯切叀職緣切玄胡涓切予余呂切放甫妄切𠬪平小切𣦼𣦻昨千切歺𣦵五割切死𣦸𣦹息姊切冎古瓦切古忽切肉如六切筋居銀切刀都牢切刃而振切㓞格八切丯古拜切耒𣐇盧對切角𧢲古岳切說文解字弟五竹陟玉切箕居之切丌居之切左則箇切工古紅切㠭知衍切巫武扶切甘𤮺古三切曰王伐切乃𠄎𢎗奴亥切丂苦浩切可肯我切兮胡雞切号胡到切亏亐于羽俱切旨職稚切喜虛里切壴中句切鼓工戶切豈虛喜切豆徒候切豊𧯽盧啓切豐𢾭戎切䖒許羈切虍荒烏切虎呼古切虤五閑切皿武永切𠙴去魚切去㚎厺丘據切血呼決切丶知瘐切丹都寒切青倉徑切井丼子郢切皀皮及切鬯丑諒切食𠊊乘力切亼秦入切會古外切倉七岡切入人汁切缶方九切矢式視切高古牢切冂古熒切𩫖𩫏古博切京𢂋舉卿切亯許兩切𣆪𣆉㫗胡口切畗芳逼切㐭力甚切𠾂嗇所力切來洛哀切麥莫獲切夊楚危切舛昌兖切䑞舜舒閏切韋宇非切弟時特計切夂陟侈切久舉友切桀渠列切說文解字弟六木莫卜切東得紅切林力尋切才昨哉切叒而灼切之𡳿㞢止而切帀周荅切出尺律切𣎵𣎳朩普活切生所庚切乇陟格切𠂹是爲切𠌶況于切𦾓華戶瓜切𥝌古兮切𥠻𥡞稽古兮切鉏交切桼親吉切束書玉切㯻胡本切囗羽非切員王權切貝博蓋切邑於汲切𨛜𨙵胡絳切說文解字弟七日人質切旦得案切倝古案切㫃於幰切冥莫經切晶子盈切月魚厥切有云九切朙武兵切囧俱永切夕祥易切多得何切毌古丸切𢎘乎感切𣐺胡感切𠧪徒遼切齊徂兮切朿七賜切片匹見切鼎都挺切克𠅏𡱀苦得切录𢑗彔盧谷切禾戶戈切秝郎擊切黍舒呂切𪏰𥞌香許良切米莫禮切毇許委切臼𦥒其九切凶許容切𣎳匹刃切𣏟匹卦切麻莫遐切尗式竹切耑多官切韭舉友切瓜古華切瓠胡切宀武延切宮宫居戎切呂吕力舉切穴胡決切㝱莫鳳切疒女戹切冖莫狄切𠔼莫保切冃莫報切㒳良奬切网文纺切襾呼訝切巾居銀切巿分勿切帛㫄陌切白㫄陌切㡀毗祭切黹陟几切說文解字弟八人如鄰切匕卑履切从疾容切比毗至切北傅墨切丠丘去鳩切㐺乑魚音切𡈼他鼎切重𡍺柱用切臥吾貨切身失人切㐆𠂣於機切衣於稀切𧚍裘巨鳩切老盧皓切毛莫袍切毳充芮切尸式脂切尺昌石切尾㞑無斐切履𡳐良止切舟職流切方府良切儿如鄰切兄許榮切兂側岑切皃莫敎切𠑹𠒂公戶切先穌前切禿他谷切見古甸切覞曳欠切欠去劒切㱃於錦切㳄敘連切㒫𠑶旡居未切說文解字弟九頁胡結切𦣻書九切面𡇢弥箭切丏弥兖切𩠐首書九切𥄉県古堯切須相俞切彡所銜切彣無分切文無分切髟必銜切后胡口切司息兹切卮𠨗巵章移切卪卩子結切印於刃切色所力切卯𠨍去京切辟父益切勹布交切包布交切茍己力切鬼居偉切甶𢾭勿切厶息夷切嵬五灰切山所閒切屾所臻切屵五葛切广魚儉切厂呼旱切丸胡官切危魚爲切石常隻切長直良切勿文勿切冄冉而琰切而如之切豕式視切㣇羊至切彑居例切豚𢄉徒䰟切豸池尔切𤉡徐姊切易羊益切象徐兩切說文解字弟十馬莫下切𢊁廌宅買切鹿盧谷切麤倉胡切㲋𣬋丑略切兔湯故切萈胡官切犬苦泫切㹜犾語斤切鼠書呂切能奴登切熊熋羽宮切火呼果切炎于簾切黑𪐗呼北切囪囱匆楚江切焱以冉切炙之石切赤𤆍昌石切大徒蓋切亦𡗕𡗜羊益切夨阻力切夭於兆切交古爻切尣尢烏光切壺𡔲壷滬吳切壹𡕍𡔹於悉切㚔幸尼輒切奢式車切亢古郎切𠦍夲土刀切夰古老切大亣他達切夫甫無切立力入切竝𠀤並蒲迥切囟息進切思恖𢙦息玆切心息林切惢累二切說文解字弟十一水式軌切沝𣲙之壘切頻𩕨𩔤瀕符眞切𡿨姑泫切巜古外切川巛昌緣切泉疾緣切灥𤿁詳遵切永于憬切𠂢匹卦切谷𠔌古禄切仌筆陵切雨王矩切雲王分切𤋳魚語居切𩺰語居切燕於甸切龍力鍾切飛甫微切非甫微切卂息晉切說文解字弟十二𠃉烏轄切不𠀚方久切至脂利切西㢴先稽切鹵郎古切鹽余廉切戶户矦古切門莫奔切耳而止切𦣝𦣞與之切手書九切𠦬古懷切女尼呂切毋武扶切民弥鄰切丿房密切余制切乁弋支切氏承旨切氐丁礼切戈古禾切戉王伐切我五可切亅衢月切珡𤦡琴巨今切𠃊於謹切亡兦亾武方切匸胡礼切匚府良切曲丘玉切甾𠙹側詞切瓦五寡切弓居戎切弜其兩切弦𢎺胡田切系胡計切說文解字弟十三糸莫狄切素𦃃桑故切絲息滋切率所律切虫許偉切䖵古䰟切蟲直弓切風方戎切它託何切龜居追切黽𪓑莫杏切卵盧管切二而至切土它魯切垚吾聊切堇𡏳𡎸巨斤切里良止切田待年切畕居良切黃黄乎光切男那含切力林直切劦胡頰切說文解字弟十四金𨤾居音切幵开古賢切勺之若切几居履切且千也切斤舉欣切斗當口切矛莫浮切車尺遮切𠂤都回切𨸏阜房九切𨺅房九切厽力軌切四息利切宁直呂切叕陟劣切亞衣駕切五𠄡疑古切六力竹切七親吉切九舉有切厹𠫗禸人九切嘼許救切甲古狎切乙於筆切丙兵永切丁當經切戊莫候切己居擬切巴伯加切庚古行切辛息鮮切辡方免切壬如林切𤼩癸居誄切子卽里切了盧鳥切孨旨兖切𠫓他骨切丑敕九切寅𡩟弋眞切卯戼莫飽切辰植鄰切巳已詳里切午疑古切未無沸切𦥔𢑚申失人切酉與九切酋字秋切戌辛聿切亥古改切说文解字部首弟一弟二弟三弟四弟五弟六弟七弟八弟九弟十弟十一弟十二弟十三弟十四說文解字弟一十四部六百七十二文重八十一凡萬六百三十九字文三十一新附一惟初太始道立於一造分天地化成萬物小徐本太始作太極凡一之屬皆从一於悉切弌古文一元始也从一兀徐鍇曰元者善之長也故从一小徐本校勘記按鍇說兀下舊有聲字有之是也愚袁切天顚也至高無上从一大他前切丕大也从一不聲𢾭悲切叓吏治人者也从一从史史亦聲徐鍇曰吏之治人心主於一故从一力置切文五重一丄高也此古文上指事也凡丄之屬皆从丄時掌切上篆文丄蚜帝諦也王天下之號也从丄朿聲小徐本無也字都计切𢂇古文帝古文諸丄字皆从一篆文皆从𠄞𠄞古文上字䇂示辰龍童音章皆从古文丄㫄旁溥也从𠄞闕方聲小徐本作从𠄞方聲闕步光切𣃟古文㫄𣃙亦古文㫄雱籒文丅底也指事小徐本作底也從反丄爲丅胡雅切下篆文丅文四重七示天垂象見吉凶所以示人也从𠄞𠄞古文上字三垂日月星也小徐本三垂作三𠂹觀乎天文以察時變示神事也凡示之屬皆从示神至切𥘅𡭕古文示祜上諱臣鉉等曰此漢安帝名也福也當从示古聲候古切禮履也所以事神致福也从示从豊豊亦聲靈啓切𠃞礼古文禮禧禮吉也从示喜聲許其切小徐本此字次於禛字之後禛以眞受福也从示眞聲側鄰切祿禄福也从示录聲盧谷切禠福也从示虒聲息移切禎祥也从示貞聲陟盈切祥福也从示羊聲一云善小徐本無一云善三字似羊切祉福也从示止聲敕里切福祐也小徐本作備也从示畐聲方六切祐助也从示右聲于救切祺吉也从示其聲渠之切禥籒文从基祗敬也从示氐聲旨移切禔安福也从示是聲易曰禔旣平市支切𥛃神小徐本篆文作𥚞神天神引出萬物者也从示申聲食鄰切祇地祇提出萬物者也从示氏聲巨支切祕神也从示必聲兵媚切𥚪齋戒潔也从示齊省聲小徐本無省側皆切𥜷𪗓籒文齋从𥜹省𥜹音禱𥛿禋潔祀也一曰精意以享爲禋从示垔聲於眞切𡫻𡫚小徐本籒文作𡫚籒文从宀祭祭祀也从示以手持肉子例切祀祭無巳也从示巳聲詳里切禩祀或从異祡燒祡燓燎以祭天神小徐本祡作柴無燎从示此聲虞書曰至于岱宗祡仕皆切𥚨古文祡从隋省禷以事類祭天神从示類聲力遂切祪祔祪祖也从示危聲過委切祔後死者合食於先祖从示付聲符遇切祖始廟也从示且聲則古切𥛱門內祭先祖所以徨小徐本徨作彷徨从示彭聲詩曰祝祭于𥛱補盲切祊𥛱或从方祰告祭也从示告聲苦浩切祏宗廟主也周禮有郊宗石室一曰大夫以石爲主从示从石石亦聲小徐本石上無从常隻切䃾以豚祠司命从示比聲漢律曰祠䃾司命卑履切祠春祭曰祠品物少多文詞也从示司聲仲春之月祠不用犧牲用圭璧及皮幣小徐本校勘記祠不用祠今禮作祀及皮幣及作更似兹切礿夏祭也从示勺聲以灼切禘諦祭也从示帝聲周禮曰五歲一諦特計切祫大合祭先祖親疏遠近也从示合小徐本作從示合聲周禮曰三歲一祫矦夾切祼灌祭也从示果聲古玩切䄟數祭也从示毳聲讀若舂麥爲䄟之䄟小徐本上一䄟作毳臣鉉等曰舂麥爲䄟今無此語且非異文所未詳也段玉裁注據廣雅㯔舂也改䄟作㯔此芮切祝祭主贊詞者从示从人口一曰从兌省易曰兌爲口爲巫之六切𥛽𥛅祝𥛽也从示畱聲力救切祓除惡祭也从示犮聲𢾭勿切祈求福也从示斤聲渠稀切𥜣禱告事求福也从示壽聲都浩切𥛇𥛈𥙸禱或省𥜹籒文禱小徐本作𥜹籒文禱𥛇𥛈𥙸禱或省禜設緜蕝爲營以禳風雨雪霜水旱癘疫於日月星辰山川也从示榮省聲小徐本作從示營省聲一曰禜衞使灾不生小徐本灾作災禮記曰雩禜祭水旱爲命切禳磔禳祀除癘殃也古者燧人禜子所造从示襄聲汝羊切禬會福祭也从示从會會亦聲小徐本作从示會聲周禮曰禬之祝號古外切禪祭天也从示單聲時戰切禦祀也从示御聲魚舉切𥙱䄆祀也从示𠯑聲古末切禖祭也从示某聲莫桮切𥚩祭具也从示胥聲私呂切祳社肉盛以蜃故謂之祳天子所以親遺同姓从示辰聲春秋傳曰石尚來歸祳小徐本校勘記今左作脤時忍切祴宗廟奏祴樂从示戒聲古哀切禡師行所止恐有慢其神下而祀之曰禡从示馬聲周禮曰禡於所征之地小徐本周禮下無曰小徐本校勘記注引周禮今見禮記王制篇蓋周制可通稱周禮也莫駕切禂禱牲馬祭也从示周聲詩曰旣禡旣禂小徐本無詩曰旣禡旣禂都皓切𩦑䮻小徐本作𩤫小徐本校勘記汪本作或从馬壽省聲社地主也从示土春秋傳曰共工之子句龍
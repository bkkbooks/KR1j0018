西王母來獻其白琯前零陵文學姓奚於伶道舜祠下得笙玉琯夫以玉作音故神人以和鳳皇來儀也从玉官聲篎小管謂之篎从竹眇聲亡沼切笛七孔筩也从竹由聲羌笛三孔徐鍇曰當从胄省乃得聲徒歷切筑以竹曲五弦之樂也从竹从巩巩持之也竹亦聲小徐本作從竹亦聲張六切箏筝鼓弦竹身樂也从竹爭聲側莖切箛吹鞭也从竹孤聲古乎切𥰂篍吹筩也从竹秌聲七肖切𥵽籌壺矢也从竹壽聲直由切簺行棊相塞謂之簺从竹从塞塞亦聲小徐本塞上無从先代切簙局戲也六箸十二棊也从竹博聲古者烏胄作簙補各切篳藩落也从竹畢聲春秋傳曰篳門圭窬卑吉切𥴨蔽不見也从竹愛聲烏代切𥸂䉷隿射所蔽者也从竹嚴聲語杴切篽禁苑也从竹御聲春秋傳曰澤之自篽魚舉切𩵎篽或从又魚聲筭長六寸計歷數者从竹从弄言常弄乃不誤也小徐本弄上無从蘇貫切算數也从竹从具小徐本具上無从讀若筭蘇管切笑此字本闕臣鉉等案孙愐唐韻引說文云喜也从竹从犬小徐本犬作夭而不述其義今俗皆从犬又案李陽冰刊定說文从竹从夭義云竹得風其體夭屈如人之笑未知其審私妙切文百四十四重十五簃閣邊小屋也从竹移聲說文通用誃弋支切筠竹皮也从竹均聲王春切笏公及士所搢也从竹勿聲案籒文作𡇉𡆷象形義云佩也古笏佩之此字後人所加呼骨切篦導也今俗謂之篦从竹𣬉聲邊兮切篙所以進船也从竹高聲古牢切文五新附小徐本無諸新附字箕簸也从竹𠀠象形下其丌也凡箕之屬皆从箕居之切𠀠古文箕省小徐本無省𠷛𠵶𠔛亦古文箕小徐本作皆古文𠔋亦古文箕小徐本作籒文箕𠔝其籒文箕小徐本作古文箕𠥩𠥊籒文箕簸揚米去糠也小徐本糠作穅从箕皮聲小徐本皮上有從布火切文二重五丌下基也薦物之丌象形凡丌之屬皆从丌讀若箕同小徐本無同居之切䢋古之遒人以木鐸記詩言从辵从丌丌亦聲徐鍇曰遒人行而求之故从辵丌薦而進之於上也居吏切𠔓典五帝之書也从冊在丌上尊閣之也莊都說典大冊也多殄切𥮏古文典从竹小徐本古文作𥮏顨巽也从丌从𩔊小徐本𩔊上無从此易顨卦爲長女爲風者臣鉉等曰𩔊之義亦選具也蘇困切畁畀相付與之約在閣上也从丌甶聲必至切巺具也从丌𠨎聲臣鉉等曰庶物皆具丌以薦之蘇困切𢁅巽古文巺巽篆文巺奠置祭也从酋酋酒也下其丌也禮有奠祭者堂練切文七重三左手相左助也小徐本作手左相佐也从工凡左之屬皆从左則箇切臣鉉等曰今俗別作佐𢀩差貳也𢀩不相値也从左从𠂹小徐本𠂹上無从徐鍇曰左於事是不當値也初牙切又楚佳切籒文𢀩从二文二重一工巧飾也象人有規榘也與巫同意凡工之屬皆从工徐鍇曰爲巧必遵規矩法度然後爲工否則目巧也巫事無形失在於詭亦當遵規榘故曰與巫同意古紅切𢒄𢀚㣉古文工从彡式法也从工弋聲賞職切巧技也小徐本作巧技也从工丂聲苦絞切巨規巨也从工象手持之小徐本之下有形其呂切榘巨或从木矢矢者其中正也𢀓㠪古文巨小徐本古文𢀓㠪在榘之前文四重三㠭極巧視之也从四工凡㠭之屬皆从㠭知衍切𡫳𡫟窒也从㠭从𠬞窒宀中㠭猶齊也穌則切文二巫祝也女能事無形以舞降神者也象人兩褎舞形與工同意古者巫咸初作巫凡巫之屬皆从巫武扶切𠮎𢍮古文巫覡能齋肅事神明也小徐本無也在男曰覡在女曰巫从巫从見小徐本見上無从徐鍇曰能見神也胡狄切文二重一𤮺甘美也从口含一一道也凡甘之屬皆从甘古三切甛美也从甘舌小徐本作從甘從舌舌知甘者徒兼切𤯌和也从甘从麻麻调也甘亦聲小徐本麻上無从麻調也三字在从甘之前讀若函古三切𤡜猒飽也从甘从肰小徐本肰上無从於鹽切𤞣猒或从㠯𠥄甚尤安樂也从甘从匹耦也小徐本作從甘甘匹耦也常枕切𠯕古文甚文五重二曰詞也从口乙聲亦象口气出也凡曰之屬皆从曰王伐切𣆩𣌧𣆑告也从曰从冊冊亦聲小徐本作從冊曰楚革切曷何也从曰匃聲胡葛切𡇉曶出气詞也从曰象气出形春秋傳曰郑太子曶呼骨切𡆷𡇆籒文曶一曰佩也象形朁曾也从曰兓聲詩曰朁不畏明臣鉉等曰今俗有昝字蓋朁之譌七感切沓語多沓沓也从水从曰遼東有沓縣臣鉉等曰語多沓沓若水之流故从水會意徒合切𣍘曹獄之兩曹也在廷東从㯥治事者从曰徐鍇曰以言詞治獄也故从曰昨牢切文七重一𠄎乃曳詞之難也象气之出難凡乃之屬皆从乃奴亥切臣鉉等曰今隷書作乃𢎧乃古文乃𠄕𢏝籒文乃𠧟𠧤驚聲也从乃省西聲小徐本作從乃卥省聲籒文𠧱不省或曰𠧱往也小徐本作或曰隨往也讀若仍臣鉉等曰西非聲未詳如乘切𠨅古文𠧱小徐本古文作𠧴𠧷气行皃从乃𠧪聲讀若攸以周切文三重三丂气欲舒出上礙於一也丂古文以爲亏字又以爲巧字凡丂之屬皆从丂苦浩切甹亟詞也从丂从由或曰甹俠也三輔謂輕財者爲甹臣鉉等曰由用也任俠用气也普丁切寧願詞也从丂寍聲奴丁切𠀀反丂也讀若呵虎何切文四可肎也从口丂丂亦聲凡可之屬皆从可肯我切奇異也一曰不耦小徐本耦作偶从大从可渠羈切哿可也从可加聲詩曰哿矣富人古我切哥聲也从二可古文以爲謌字古俄切文四叵不可也从反可普火切文一新附小徐本無此新附字兮語所稽也从丂八象气越亏也凡兮之屬皆从兮胡雞切𠣬𠣤驚辭也从兮旬聲思允切𢞛𠣬或从心羲气也从兮義聲許羈切乎語之餘也小徐本語上有乎者二字从兮象聲上越揚之形也戶吳切文四重一号痛聲也从口在丂上凡号之屬皆从号胡到切號呼也从号从虎小徐本作從号虎聲乎刀切文二亏亐于於也象气之舒亏从丂一小徐本一上有從一者其气平之也凡亏之屬皆从亏羽俱切今變隷作于虧气損也从亏雐聲去爲切𧇾虧或从兮粵粤亏也審愼之詞者小徐本詞作辭从亏从宷小徐本作從宷從亏周書曰粵三日丁亥王伐切𠮱吁驚語也从口从亏亏亦聲臣鉉等案口部有吁字此重出況于切此字亦見口部作吁驚也从口亏聲𠀒平語平舒也从亏从八八分也爰禮說符兵切𠀭古文平如此文五重二旨美也从甘匕聲凡旨之屬皆从旨職雉切古文旨嘗口味之也从旨尚聲市羊切文二重一喜樂也从壴从口凡喜之屬皆从喜虛里切歖古文喜从欠與歡同憙說也从心从喜喜亦聲小徐本喜上無从許記切嚭大也从喜否聲春秋傳吳有太宰嚭匹鄙切文三重一壴陳樂立而上見也从屮从豆小徐本豆上無從凡壴之屬皆从壴中句切尌立也从壴从寸持之也讀若駐常句切𧒕夜戒守鼓也从壴聲禮昬鼓四通爲大鼓夜半三通爲戒晨旦明五通爲發明小徐本昬作昏旦下無明讀若戚倉歷切彭鼓聲也从壴彡聲臣鉉等曰當从形省乃得聲薄庚切嘉美也从壴加聲古牙切文五鼓郭也春分之音萬物郭皮甲而出故謂之鼓从壴支象其手擊之也周禮六鼓靁鼓八面靈鼓六面路鼓四面鼖鼓皋鼓晉鼓皆兩面凡鼓之屬皆从鼓徐鍇曰郭者覆冒之意工戶切𪔐籒文鼓从古聲鼛大鼓也从鼓咎聲詩曰鼛鼓不勝古勞切𪔫鼖𪔵大鼓謂之鼖鼖八尺而兩面以鼓軍事从鼓賁省聲小徐本作從鼓卉聲符分切䩿鼖或从革賁不省小徐本作鼖或从革賁聲鼙騎鼓也从鼓卑聲部迷切𪔳𪔴鼓聲也从鼓隆聲徒冬切鼘𪔱鼓聲也从鼓𣶒聲詩曰鼗鼓鼘鼘烏玄切鼞鼓聲也从鼓堂聲詩曰擊鼓其鼞土郎切䶀鼓聲也从鼓合聲徒合切鞈古文䶀从革𪔪鼓無聲也从鼓咠聲他叶切𪔕鼓鼙聲从鼓缶聲土蓋切文十重三豈還師振旅樂也一曰欲也登也从豆微省聲凡豈之屬皆从豈墟喜切愷康也从心豈豈亦聲苦亥切𧰙㡮也訖事之樂也小徐本㡮作𢇓从豈幾聲臣鉉等曰說文無㡮字从幾从气義無所取當是訖字之誤渠稀切文三豆古食肉器也从口象形凡豆之屬皆从豆徒候切𣅣豆小徐本古文作𣅋豆古文豆梪木豆謂之梪从木豆徒候切𧯷蠡也从豆蒸省聲居隱切𧰌𧯦豆屬从豆𢍏聲居倦切𧯡豆飴也从豆夗聲一丸切𢍪禮器也从𠬞持肉在豆上讀若鐙同都縢切文六重一𧯽豊行禮之器也从豆象形凡豊之屬皆从豊讀與禮同盧啓切豑爵之次弟也从豊从弟小徐本弟上無从虞書曰平豑東作直質切文二豐豆之豐滿者也从豆象形一曰鄕飲酒有豐矦者凡豐之屬皆从豐𢾭戎切𣍈古文豐豔好而長也从豐豐大也盇聲春秋傳曰美而豔以贍切文二重一䖒古陶器也小徐本陶作祠从豆虍聲凡䖒之屬皆从䖒許羈切𧇼𧰑土鍪也从䖒号聲讀若鎬胡到切𧈚器也从䖒㿾㿾亦聲闕直呂切文三虍虎文也象形凡虍之屬皆从虍小徐本下有讀若春秋傳曰虍有餘徐鍇曰象其文章屈曲也荒烏切虞騶虞也白虎黑文尾長於身仁獸食自死之肉从虍吳聲詩曰于嗟乎騶虞五俱切虙虎皃小徐本皃下有也从虍必聲房六切虔虎行皃小徐本皃下有也从虍文聲讀若矜臣鉉等曰文非聲未詳渠焉切虘虎不柔不信也从虍且聲讀若䣜縣小徐本䣜作酇昨何切虖哮虖也小徐本虖作呼从虍乎聲荒烏切𧆩𧆧虐殘也从虍虎足反抓人也小徐本無虍魚約切𧆱古文虐如此虨虎文彪也从虍彬聲布還切𧇽鐘鼓之柎也飾爲猛獸从虍異象其下足小徐本象下有形其呂切鐻𧇽或从金豦聲小徐本無聲𧆾虡篆文𧇽省小徐本無省文九重三虎山獸之君从虍虎足象人足象形凡虎之屬皆从虎呼古切𢋪𠪳古文虎𧇂虝亦古文虎𧈖𧈑虎聲也从虎毄聲小徐本作從虎毄讀若隔古覈切䖑白虎也从虎昔省聲讀若鼏莫狄切䖔䖑屬小徐本屬下有也从虎去聲臣鉉等曰去非聲未詳呼濫切虪黑虎也从虎儵聲式竹切虦虥虎竊毛謂之虦苗小徐本苗作貓从虎戔聲竊淺也昨閑切彪虎文也从虎彡象其文也甫州切䖊虎皃小徐本皃下有也从虎乂聲魚廢切𣱤𧆦𧆫虎皃小徐本皃下有也从虎气聲魚迄切虓𧆟虎鳴也一曰師子从虎九聲許交切䖐虎聲也从虎斤聲語斤切𧈅虩易履虎尾虩虩恐懼一曰蠅虎也从虎𡮂聲許隙切虢虎所攫畫明文也从虎寽聲古伯切虒委虒虎之有角者也从虎聲息移切𧈜黑虎也从虎騰聲徒登切文十五重二𧇒𧇭虐也急也从虎从武見周禮薄報切䖘𧇢楚人謂虎爲䖘从虎兔聲同都切文二新附小徐本無諸新附字虤虎怒也从二虎凡虤之屬皆从虤五閑切䖜兩虎爭聲小徐本聲下有也从虤从曰讀若憖臣鉉等曰曰口气出也語巾切贙𧹂分別也从虤對爭貝讀若迴小徐本迴作回胡畎切文三皿飯食之用器也小徐本飯作飲象形與豆同意小徐本意作形凡皿之屬皆从皿讀若猛武永切𥁄盂飯器也小徐本飯作飲从皿亏聲羽俱切盌小盂也从皿夗聲烏管切盛黍稷在器中以祀者也小徐本無以祀者三字从皿成聲氏征切齍黍稷在器以祀者从皿齊聲卽夷切䀁小甌也从皿有聲讀若灰一曰若賄小徐本一曰作或曰于救切𥁓䀁或从右盧飯器也从皿𧇄聲洛乎切𥃈籒文盧䀇器也从皿从缶古聲小徐本作從缶皿古聲公戶切盄器也从皿弔聲止遙切盎盆也从皿央聲烏浪切㼜盎或从瓦盆盎也从皿分聲步奔切㿾器也从皿宁聲直呂切盨㯯盨負戴器也从皿須聲相庾切䀊器也从皿漻聲古巧切𥁑械器也从皿必聲彌畢切醯酸也作醯以𩱙以酒从𩱙酒竝省从皿皿器也呼雞切盉調味也从皿禾聲戶戈切益饒也从水皿皿益之意也伊昔切盈滿器也从皿夃臣鉉等曰夃古乎切益多之意也古者以買物多得爲夃故从夃以成切䀆盡器中空也从皿㶳聲慈忍切盅器虛也从皿中聲老子曰道盅而用之直弓切盦覆蓋也从皿酓聲臣鉉等曰今俗別作罯非是烏合切𥁕昷仁也从皿以食囚也官溥說烏渾切盥澡手也小徐本無手从𦥑水臨皿春秋傳曰奉匜沃盥古玩切盪滌器也从皿湯聲徒朗切文二十五重三盋盋器盂屬从皿犮聲或从金从本北末切文一新附小徐本無此新附字𠙴𠙴盧飯器以柳爲之小徐本爲作作象形凡𠙴之屬皆从𠙴去魚切𥬔𠙴或从竹去聲文一重一㚎厺去人相違也从大𠙴聲凡去之屬皆从去丘據切朅去也从去曷聲丘竭切𡕮去也从去夌聲讀若陵小徐本作讀若棘力膺切文三血祭所薦牲血也从皿一象血形凡血之屬皆从血呼決切衁血也从血亡聲春秋傳曰士刲羊亦無衁也呼光切衃𧖯凝血也从血不聲芳桮切𧗁𧗃气液也从血𦘔聲小徐本作从血𦘔𦘔亦聲將鄰切𧖨𧖧定息也从血甹省聲讀若亭特丁切衄鼻出血也从血丑聲女六切𧗕腫血也从血農省聲奴冬切膿俗𧗕从肉農聲𧖺𥁺血醢也小徐本無也从血䏙聲禮記有𧖺醢以牛乾脯粱𥶶鹽酒也臣鉉等曰䏙肉汁滓也故从䏙䏙亦聲他感切𧗎醢也从血菹聲側余切𧗘𧗎或从缶𧗓𧗒以血有所刏涂祭也从血幾聲渠稀切卹憂也从血卪聲一曰鮮少也徐鍇曰皿血者言憂之切至也辛聿切衋䀌傷痛也从血聿皕聲周書曰民冈不衋傷心小徐本冈作罔許力切䘓羊凝血也从血臽聲苦紺切𧗛䀍䘓或从𥫔按若依䘓或从𥫔則䘓之重文當作𧗛䀍若依䘓之重文作𧗛則當言䘓或从𥫔省𥁋盇盍覆也从血大臣鉉等曰大象蓋覆之形胡臘切衊污血也从血蔑聲莫結切文十五重三丶有所絕止丶而識之也凡丶之屬皆从丶知庾切主鐙中火主也从象形从丶丶亦聲臣鉉等曰今俗別作炷非是之庾切㕻咅相與語唾而不受也从丶从否否亦聲小徐本作從否從丶否亦聲天口切㰯咅或从豆从欠小徐本欠上無从文三重一說文解字弟五上說文解字弟五丹巴越之赤石也象采丹井一象丹形凡丹之屬皆从丹都寒切𠁿𠮚古文丹㣋亦古文丹雘善丹也从丹蒦聲周書曰惟其𢾅丹雘讀若隺小徐本作讀若隺同烏郭切彤丹飾也从丹从彡彡其畫也小徐本作從丹彡彡其畫彡亦聲徒東切文三重二青東方色也木生火从生丹丹青之信言象然小徐本象然作必然凡青之屬皆从青倉經切𡷉古文青靜静審也从青爭聲徐鍇曰丹青明審也疾郢切文二重一丼井八家一井象構韓形𦉥之象也小徐本無之古者伯益初作井凡井之屬皆从井子郢切𤍧𤌌深池也从井瑩省聲烏迥切阱陷也从𨸏从井井亦聲小徐本井上無从疾正切穽阱或从穴汬古文阱从水小徐本作阱或從水㓝刑罰辠也从井从刀小徐本作從刀井易曰井法也井亦聲戶經切刱造法刱業也从井刅聲讀若創初亮切文五重二皀穀之馨香也小徐本作馨字說文未收亦不見於後世諸字書當是馨字之誤象嘉穀在裹中之形匕所以扱之小徐本作匕所以扱之也或說皀一粒也凡皀之屬皆从皀又讀若香小徐本無又皮及切卽即卽食也小徐本食作湌从皀卪聲徐鍇曰卽就也子力切旣既小食也从皀旡聲論語曰不使勝食旣居未切冟飯剛柔不调相著从皀冖聲讀若適施隻切文四鬯以秬釀鬱艸芬芳攸服以降神也从凵凵器也中象米匕所以扱之易曰不喪匕鬯凡鬯之屬皆从鬯丑諒切鬱芳艸也十葉爲貫百𠬞貫築以煑之爲鬱从𦥑冖缶鬯彡其飾也一曰鬱鬯百艸之華遠方鬱人所貢芳草合釀之以降神鬱今鬱林郡也小徐本無也迂勿切𩰥爵禮器也象爵之形中有鬯酒又持之也所以飲器象爵者取其鳴節節足足也卽畧切𥥼古文爵象形小徐本作爵下有如此二字𩰤黑黍也一稃二米以釀也小徐本釀下無也从鬯矩聲其呂切秬𩰤或从禾𩰢𠛱也从鬯吏聲讀若迅疏吏切文五重二𠊊食一米也从皀亼聲小徐本無聲或說亼皀也凡食之屬皆从食小徐本下有讀若粒乘力切𩞑滫飯也从食𠦪聲臣鉉等曰𠦪音忽非聲疑𢍃字之誤府文切饙𩞑或从賁𩝼餴𩞑或从𢍃𩞷餾飯气蒸也从食畱聲力救切飪大孰也小徐本孰作熟从食壬聲如甚切䏕古文飪恁亦古文飪𩟷饔孰食也小徐本孰作熟从食雝聲於容切飴米糱煎也从食台聲與之切𩛛籒文飴从異省𩛿飴和饊者也从食易聲徐盈切𩟴饊熬稻粻䅣也从食散聲穌旱切餠餅麪餈也从食幷聲小徐本作從食從幷聲必郢切餈稻餠也从食次聲疾資切䭣餈或从齊粢餈或从米饘糜也从食亶聲周謂之饘宋謂之餬諸延切𩝍餱乾食也从食矦聲周書曰峙乃餱粻乎溝切餥餱也从食非聲陳楚之閒相謁食麥飯曰餥小徐本謁下有而非尾切饎酒食也从食喜聲詩曰可以饙饎昌志切𩜮𩟄饎或从巸小徐本作𩛉饎或從𦣞糦饎或从米䉵籑具食也从食算聲士戀切𩜹饌籑或从巺養供養也从食羊聲余兩切𢼝䍩古文養飯食也从食反聲符萬切𩚖雜飯也从食丑聲女久切飤糧也从人食小徐本作从食人祥吏切饡𩟪以羹澆飯也从食贊聲則榦切𩞧晝食也从食象聲書兩切𩞃𩞧或从傷省聲小徐本作𩞧或從𩚏餔也从夕食思䰟切餔日加申時食也从食甫聲博孤切𥂈籒文餔从皿浦聲餐吞也从食𣦻聲七安切湌餐或从水䭑嘰也从食兼聲讀若風溓溓一曰廉潔也力鹽切𩝉饁餉田也从食盇聲詩曰饁彼南畝筠輒切饟周人謂餉曰饟从食襄聲人漾切餉饟也从食向聲式亮切𩟱饋餉也从食貴聲求位切饗鄕人飲酒也从食从鄕小徐本作從鄕從食鄕亦聲許兩切饛盛器滿皃小徐本皃下有也从食蒙聲詩曰有饛簋飧莫紅切飵楚人相謁食麥曰飵从食乍聲在各切䬯相謁食麥也从食占聲奴兼切䭡秦人謂相謁而食麥曰䭡䭓从食㥯聲烏困切䭓䭡䭓也从食豈聲五困切餬寄食也从食胡聲戶吳切飶食之香也从食必聲詩曰有飶其香毗必切𩜈飫燕食也从食芺聲詩曰飲酒之𩜈依據切飽猒也从食包聲博巧切𩜿𩞛古文飽从𤓽小徐本𤓽下有聲𩜕𩛁亦古文飽从卯聲䬼猒也从食肙聲烏幻切饒飽也小徐本飽上有饒从食堯聲如昭切餘饒也从食余聲以諸切餀食臭也从食艾聲爾雅曰餀謂之喙呼艾切餞送去也从食戔聲詩曰顯父餞之才線切餫野饋曰餫从食軍聲王問切館客舍也从食官聲周禮五十里有市市有館館有積以待朝聘之客古玩切饕貪也从食號聲土刀切叨饕或从口刀聲小徐本作叨俗饕从口刀聲在籒文之後𩞂籒文饕从號省飻貪也从食殄省聲春秋傳曰謂之饕飻小徐本謂之作是謂他結切饖飯傷熱也从食歲聲於廢切饐飯傷溼也从食壹聲乙冀切餲飯餲也从食曷聲論語曰食饐而餲乙例切又烏介切饑穀不孰爲饑小徐本孰作熟从食幾聲居衣切饉蔬不孰爲饉小徐本孰作熟从食堇聲渠吝切𩚬𩚚飢也从食戹聲讀若楚人言恚人於革切餧飢也从食委聲一曰魚敗曰餧小徐本餧下有也奴罪切飢餓也从食几聲居夷切餓飢也从食我聲五箇切餽吳人謂祭曰餽从食从鬼鬼亦聲小徐本鬼上無从俱位切又音饋餟祭酹也从食叕聲陟衞切䬽小餟也从食兌聲輸芮切𩜁馬食穀多气流四下也从食夌聲里甑切䬴食馬穀也从食末聲莫撥切文六十二重十八餕食之餘也从食夋聲子陖切餻餌屬从食羔聲古牢切文二新附小徐本無此新附字亼三合也从入一象三合之形凡亼之屬皆从亼讀若集秦入切臣鉉等曰此疑只象形非从入一也合合口也从亼从口候閤切僉皆也从亼从吅从从虞書曰僉曰伯夷七廉切侖思也从亼从冊力屯切𠎚𠌈籒文侖今是時也从亼从乁乁古文及居音切舍市居曰舍从亼屮象屋也囗象築也始夜切文六重一會合也从亼从曾省曾益也凡會之屬皆从會黃外切㣛古文會如此朇益也从會卑聲符支切䢈日月合宿从爲辰小徐本从作爲从會从辰辰亦聲小徐本辰上無从植鄰切文三重一倉穀藏也倉黃取而藏之故謂之倉从食省囗象倉形凡倉之屬皆从倉七岡切仺奇字倉牄鳥獸來食聲也从倉爿聲虞書曰鳥獸牄牄七羊切文二重一入內也象从上俱下也凡入之屬皆从入內入也从冂自外而入也奴對切㞥㞤入山之深也从山从入闕鉏箴切糴市穀也从入从䊮小徐本䊮上無从徒歷切㒰仝完也从入从工小徐本工上無从疾緣切全篆文仝从玉純玉曰全𠓳𠌆古文仝𠓜二入也兩从此闕良奬切文六重二缶瓦器所以盛酒𤖅小徐本𤖅作漿秦人鼓之以節謌象形凡缶之屬皆从缶方九切䍍未燒瓦器也从缶𣪊聲讀若筩莩小徐本作讀若葭莩同又苦候切匋瓦器也从缶包省聲古者昆吾作匋案史篇讀與缶同徒刀切罌缶也从缶賏聲烏莖切𦉈小口罌也从缶𠂹聲池僞切䍌小缶也从缶咅聲蒲候切缾𦉥也从缶幷聲薄經切甁瓶缾或从瓦𦉥罋汲缾也从缶雝聲烏貢切䍇下平缶也从缶乏聲讀若土盍切罃備火長頸缾也从缶熒省聲烏莖切缸瓦也小徐本作瓨也从缶工聲下江切𦈸瓦器也从缶或聲于逼切䍎瓦器也从缶薦聲作甸切䍃䍃瓦器也从缶肉聲臣鉉等曰當从䚻省乃得聲以周切𦉢𦉣瓦器也从缶霝聲郎丁切䍄缺也从缶占聲都念切𦈫缺器破也从缶決省聲傾雪切罅裂也从缶虖聲缶燒善裂也呼迓切罄器中空也从缶殸聲殸古文磬字小徐本無殸古文磬字五字詩云缾之罄矣苦定切罊器中盡也从缶毄聲苦計切缿受錢器也从缶后聲古以瓦今以竹大口切又胡講切文二十一重一罐器也从缶雚聲古玩切文一新附小徐本無此新附字矢弓弩矢也从入象鏑栝羽之形小徐本栝作括古者夷牟初作矢凡矢之屬皆从矢式視切䠶弓弩發於身而中於遠也小徐本無也从矢身食夜切射篆文从寸寸法度也亦手也矯揉箭箝也从矢喬聲居夭切矰隿䠶矢也从矢曾聲作滕切矦侯春饗所䠶矦也从人从厂象張布矢在其下天子䠶熊虎豹服猛也諸矦䠶熊豕虎大夫䠶麋麋惑也士䠶鹿豕爲田除害也其祝曰毋若不寧矦不朝于王所故伉而䠶汝也乎溝切𥎦古文矦𥏫傷也从矢昜聲式陽切短有所長短以矢爲正从矢豆聲都管切矤況也詞也从矢引省聲矢小徐本作從矢取詞之所之如矢也式忍切知詞也从口从矢小徐本矢上無从陟离切矣語巳詞也从矢以㠯聲小徐本以作㠯于巳切文十重二矮短人也从矢委聲烏蟹切文一新附小徐本無此新附字高崇也象臺觀高之形从冂囗與倉舍同意凡高之屬皆从高古牢切䯧小堂也从高省冋聲去潁切廎䯧或从广頃聲亭民所安定也亭有樓从高省丁聲特丁切亳京兆杜陵亭也从高省乇聲㫄各切文四重一冂邑外謂之郊郊外謂之野野外謂之林林外謂之冂象遠界也凡冂之屬皆从冂古熒切冋古文冂从囗象國邑小徐本作古文冂象國邑從囗也坰冋或从土𠆴市買賣所之也市有垣从冂从乁乁古文及象物相及也之省聲小徐本作從冂乁象物相及也之省聲乁古文及也時止切冘淫淫行皃从人出冂余箴切央中央也从大在冂之內大人也央㫄同意一曰久也小徐本無也於良切隺高至也从隹上欲出冂易曰夫乾隺然胡沃切文五重二𩫖𩫏度也民所度居也从回象城𩫖之重兩亭相對也𠅷或但从囗音韋凡𩫖之屬皆从𩫖古博切𩫠缺也古者城闕其南方謂之𩫠从𩫖缺省小徐本作從𩫖夬聲讀若拔物爲決引也小徐本決作夬傾雪切文二𢂋京人所爲絕高丘也从高省丨象高形凡京之屬皆从京舉卿切就就高也从京从尤小徐本作從尤京尤異於凡也疾僦切𡰜籒文就文二重一亯獻也从高省日象進孰物形孝經曰祭則鬼亯之凡亯之屬皆从亯許兩切又普庚切又許庚切𠅠享篆文亯𦎧𦎫孰也从亯从羊小徐本羊上無从讀若純一曰鬻也常倫切𠆆篆文𦎧䈞厚也从亯竹聲讀若篤冬毒切𦤘用也从亯从自自知臭香所食也讀若庸小徐本作讀若庸同余封切文四重
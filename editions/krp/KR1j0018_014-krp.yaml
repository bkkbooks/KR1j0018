body:
  text: 說文解字弟十四上漢太尉祭酒許愼記徐鉉等奉敕校定五十一部文六百三重七十四凡八千七百一十七字文十八新附五色金也黃爲之長乆薶不生衣百鍊不輕从革不違西方之行生於土从土左右注象金在土中形今聲凡金之屬皆从金居音切古文金白金也从金艮聲語巾切白金也从金尞聲洺蕭切白金也从金􅫑省聲烏酷切青金也从金㕣聲與專切銀鉛之間也从金易聲先擊切錫也从金引聲羊晉切赤金也从金同聲徒紅切銅屬从金連聲力延切黒金也从金􅨖聲天結切鐵或省古文鐵从夷九江謂鐵曰鍇从金皆聲苦駭切鐵也一曰轡首銅从金攸聲以周切剛鐵可以刻鏤从金婁聲夏書曰梁州貢鏤一曰鏤釡也盧候切鐵屬从金賁聲讀若熏火運切金之澤者一曰小鑿一曰鐘兩角謂之銑从金先聲穌典切剛也从金臤聲古甸切金屬一曰剥也从金黎聲郎兮切金色也从金录聲力玉切銷金也从金壽聲之戍切鑠金也从金肖聲相邀切銷金也从金樂聲書藥切冶金也从金柬聲部甸切鍊鉼黄金从金丁聲當經切鑄塞也从金固聲古慕切作型中也从金襄聲没羊切冶器法也从金容聲金封切可以持冶器鑄鎔者从金夾聲讀若漁人莢魚之莢一曰若挾持古叶切小冶也从金段聲丁貫切銅鐵樸也从金廷聲徒鼎切鐵文也从金曉聲呼鳥切景也从金竟聲居慶切曲鉹也从金多聲一曰􅑄鼎讀若一曰詩云侈兮哆兮尺氏切似鍾而頸長从金幵聲戸經切酒器也从金重聲職容切大盆也一曰監诸可以取明水於月从金監聲革懺切似鼎而長足从金喬聲巨嬌切陽䥙也从金隊聲徐醉切温器也圜直上从金巠聲户經切瓽也从金巂聲戸圭切鑴也从金蒦聲胡郭切釡大口者从金复聲方副切鍑屬从金敄聲莫浮切朝鮮謂釡曰錪从金典聲他典切鍑也从金坐聲昨禾切銼􅟋也从金􅢓聲魯戈切器也从金㓝聲戸經切温器也从金髙聲武王所都在長安西上林苑中字亦如此乎老切温器也一曰金器从金麀聲於刀切温器也一曰田器从金兆聲以招切酒器也从金象器形大口切或省金鐎斗也从金焦聲即消切小盆也从金肙聲火玄切鼎也从金彗聲讀若彗于歳切鉉也一曰車轄从金建聲渠偃切舉鼎也易謂之鉉禮謂之鼏从金玄聲胡犬切可以句鼎耳及鑪炭从金谷聲一曰銅㞕讀若浴余足切器也从金熒省影讀若銑烏定切鐵器也一曰鑴也从金韱聲臣鉉等曰今俗作尖非是子亷切鐙也从金定聲丁定切錠也从金登聲臣鉉等曰錠中置燭故謂之鐙今俗别作燈非是都滕切鐷也从金集聲奏入切鏶或从咠鏶也从金葉聲齊謂之鍱與涉切鏶也一曰平鐵从金産聲初限切方鑪也从金盧聲臣鉉等曰今俗别作爐非是洛故切圜鑪也然金旋聲辭戀切器也从金虒聲杜兮切煎膠器也从金虜聲部古切金飾器口从金从口口亦聲苦厚切金涂也从金昔聲倉各切鉏䥏也从金御聲魚舉切䥏或从吾鉏䥏也从金竒聲江淮之間謂釜曰錡魚綺切郭衣鍼也从金臿聲楚洽切綦鍼也从金米聲食聿切所以縫也从金咸聲臣鉉等曰今俗作針非是職深切大鍼也一曰劒如刀裝者从金皮聲敷羈切鈹有鐸也从金殺聲所拜切印鼻也从金丑聲女乆切古文鈕从玉斤斧穿也从金巩聲曲恭切鈭錍斧也从金此聲即移切鈭錍也从金卑聲府移切小鑿也从金从斬斬亦聲藏濫切穿木鐫也从金雋聲一曰琢石也讀若瀸子全切穿木也从金糳省聲在各切鍤屬从金舌聲讀若棪桑欽讀若鐮息廉切臿屬从金冘聲直深切臿屬从金危聲一曰瑩鐵也讀若跛行過委切何内謂臿頭金也从金敝聲芳滅切銚也古田器从金戔聲詩曰庤乃錢鎛即淺切又昨先切大鉏也从金矍聲居縳切鈐􅣾大犂也一曰類㭒从金今聲巨淹切鈐􅣾也从金隋聲徒果切兩刃木柄可以刈艸从金發聲讀若撥普活切㭒屬从金蟲省聲讀若同徒冬切立薅所用也从金且聲士魚切㭒屬从金罷聲讀若嬀彼爲切鍥也从金兼聲力鹽切鎌也从金契聲苦結切大鐵也从金召声鎌謂之鉊張徹說止摇切穫禾短鎌也从金至聲陟栗切博壓也从金眞聲方切鐵銸也从金占聲一曰膏車鐵鉆敕淹切鉆也从金耴聲陟葉切以鐵有所劫束也从金甘聲巨淹切鐵鉗也从金大聲特計切槍唐也从金居聲居御切可以綴著物音从金替聲則參切說也从金隹聲藏追切銳也从金免声士衘切芒也从金兊聲以芮切籀文說从厂剡鐘朽也从金曼聲母宫切鍉鼓从木臣鉉等案木部已有此重出所以穿也从金賛聲借官切錯銅鐵也从金慮聲良據切衡也从金金聲此縁切權十分黍之單也从金朱聲市朱切十銖二十五分之十三也从金乎聲周禮曰重三鋝北方以二十兩也鋝力錣切鋝也从金爰聲罰書口列百緩户闕切六銖也从金嵬聲側持切八銖也从金垂聲直垂切三十斤也从金勻聲居勻切古文鈞从旬兵車也一曰鐵也司馬法晨夜内鈀車从金巴聲伯加切鉦也从金蜀声卑法司馬執兩直角切令丁也从令从令令亦聲郎丁切鐃也似鈴柄中上下通从金正聲諸盈切小鉦也軍矢金鏃翦羽謂之鍭从金矦聲乎鉤切矢鏠也从金啻聲都歴切甲也从金豈聲苦亥切臂鎧也从金干聲矦盰切錏鍜頸鎧也从金亞聲烏牙切錏鍜也从金叚聲乎加切車軸鐵也从閒聲古莧切車轂中鐵也从金工聲古雙切車鏜結也一曰銅生五色也从今折聲讀若誓時制切乗輿馬頭上防括以翟尾鐵翮象角所以防網羅去之从金气聲許切人君乗車四馬鑣八鑾鈐象鸞鳥聲和則敬也从金从鸞省洛官切車鑾聲也从金戉聲詩曰鑾聲鉞鉞臣鉉等曰今俗作鐬以鉞作斧戉之戉非是呼㑹切馬頭飾也从金陽聲詩曰鉤鏤鐊一曰鍱車輪鐵臣鉉等曰今經典作鍚與章切馬勒口中从金从行銜行馬者也戸監切馬銜也从金聲補嬌切鑣或从角組帶鐵也从金劫省聲讀若刧居怯切莝斫刀也从金夫聲甫無切鉤魚也从金勺聲多嘯切羊箠耑有鐵从金埶聲讀若至脂利切鋃鐺瑣也从金良聲魯當切鋃鐺也从金當聲都郎切大瑣也一環貫二者从金毎聲詩曰盧重鋂莫桮切鑸不平也从金聲烏賄切鑸也从金壘聲洛猥切怒戰也从金氣聲春秋傳曰諸矦敵王所鎎許旣切箸門鋪首也从金甫聲普胡切所以鉤門戸樞也一曰治門戸器也从金巺聲北縁切又取也从金少聲臣鉉等曰今俗别作抄楚交切以金有所冒也从金沓聲他荅切斷也从金􅡜聲古切􅚎也从金各聲盧各切伐擊也从金亶聲㫖善切利也从金族聲作木切刺也从金夬聲於決切利也从金欶聲所右切殺也徐鍇曰說文無劉字偏㫄有之此字又史傳所不見疑此郎劉字也从金从丣刀字屈曲傳寫誤作田尔力求切業也賈人占錉从金昏聲武巾切大剛也从金巨聲以呂切鎕銻火齊从金唐聲徒郎切鎕銻也从金弟聲杜兮切吪圜也从金化聲五禾切下垂也一曰千斤椎从金敦聲都回切鐵之耎也从金从柔柔亦聲耳由切鈍也从金周聲徒刀切錭也从金屯聲徒因切利也从金朿聲讀若齊徂奚切側意从金委聲女恚切文一百九十七重十三兵器也从金瞿聲其俱切記也从金名聲莫經切鐵鎖門鍵也从金􅩏聲穌果切金華也从金田聲待秊切臂環也从金川聲尺頑切笄屬从金叉聲本只作叉此字後人所加楚佳切裂也从金爪普擊切文七新附平也象二干對構上平也凡幵之屬皆从幵徐鉉曰幵但象物平無音義也古賢切文一挹取也象形中有實與包同意凡之屬皆从之若切賜予也一勺爲与此与與同余吕切文二踞几也象形周禮五几玉几雕几彤几䰍几素几凡几之屬皆从几居履切依几也从几从任周書凭玉几讀若馮臣鉉等曰人之依馮几所勝載故从任皮冰切處也从尸得几而止孝經曰仲尼凥凥謂閒居如此九魚切止也得几而止从几从乆昌與切処或从虍聲文四重二薦也从几足有二横一其下地也凡且之屬皆从且子余切又千也切禮俎也从半肉在且上側吕切且往也从且豦聲昨誤切文三斫木也象形凡斤之屬皆从斤舉欣切斫也从斤父聲方矩切方銎斧也从斤爿聲詩曰又缺我斨七羊切擊也从斤石聲之若切斫也从斤句聲其俱切斫也从斤屬聲陟玉切斫也从斤巨鉉等曰器也斤以斲之竹角切斲或从畫从丮劑斷也从斤金宜引切伐木聲也从斤戸聲詩曰伐木所所䟽舉切析也从斤其聲詩曰斧以斯之息移切斬也从斤昔聲側略切截也从斤从􅓟􅓟古文絶徒玩切古文斷从古文叀字周書曰猗無他技亦古文柯擊也从斤良聲來可切取木也从斤新聲息鄰切二斤也从二斤語斤切文十五重三十升也象形有柄凡斗之屬皆从斗當口切十斗也从斗角聲胡谷切玉爵也夏曰琖殷曰斝周曰爵从吅从斗曰象形與爵同意或說斝受六升古雅切量也从斗米在其中讀若洛蕭切量也从斗臾聲周禮曰求三斞以主切蠡柄也从斗斡聲揚雄杜林說皆以爲軺車輪斡烏括切羹斗也从斗鬼聲苦回切平斗斛也从斗冓聲古岳切勻也从斗甚聲職深切杼也从斗余聲讀若荼似嗟切挹也从斗聲舉朱切量物分半也从斗从半半亦聲博幔切量溢也从斗㫄聲普郎切杼滿也从斗􅒋聲俱願切相易物俱等爲从斗蜀聲易六切斛㫄有􅳍从斗聲一曰突也一曰利也尓疋曰􅳍謂之疀古田器也臣鉉等曰說文無字疑厂象形兆聲今俗别作鍫非是土雕切十龠也从斗亦象形識蒸切文十七酋矛也建於兵車長二丈象形凡矛之屬皆从矛莫浮切古文矛从戈矛屬从矛良聲魯當切矛屬从矛害聲苦蓋切矛屬从矛昔聲讀若笮士革切矛柄也从矛今聲居陵切又巨巾切刺也从矛丑聲女乆切文六重一輿輪之緫名夏后時奚仲所造象形凡車之屬皆車後橫木也从車㐱聲之忍切車伏兔也从車菐聲周禮曰加軫與轐焉博水切車伏兔下革也从車聲古昏字讀若閔眉殞切持輪也从車由聲徐鍇曰當从胄省直六切車輪縛也从車复聲易曰輿脫輹芳六切礙車也从車刃聲而振切車軔也从車柔聲人九切車輮規也一曰一輪車从車熒省聲讀若煢張營切輻所湊也从車殸聲古禄切轂齊等皃从車昆聲周禮曰望其轂欲其輥古本切長轂之軝也以朱約之从車氏聲詩曰約軝錯衡渠支切軝或从革車輪小穿也从車只聲諸氏切車軸耑也从車象形杜林說徐鍇曰指事于濊切叀或从彗輪轑也从車畐聲方六切蓋弓也一曰輻也从車聲盧皓切車輨也从車大聲特計切轂耑沓也从車官聲古緩切輈也从車袁聲雨元切轅也从車舟聲張流切籀文輈直轅車轅也从車且聲居五切車轅耑持衡者从車元聲魚厥切轅前也从車戹聲於革切軶軥也从車軍聲乎昆切軶下曲者从車句聲古侯切車衡載轡者从車義聲魚綺切轙或从金从獻驂馬内轡繫軾前者从車内聲詩曰疾以軜奴答切車摇也从車从行一曰衍省聲古絢切軺車後登也从車丞聲讀若易􆉝馬之抍署陵切乗也从車􅥘聲作代切圜圍也四千人爲軍从車从包省軍兵車也舉云切出將有事於道必先告其神立壇四通樹茅以依神爲軷旣祭軷轢於牲而行爲範軷詩曰取羝以軷从車犮聲蒲撥切範軷也从車笵省聲讀與犯同音犯載髙皃从車獻省聲五葛切車聲也从車害聲一曰轄鏈也胡八切達也从甫尃聲知戀切委輸也从車俞聲式朱切重也从車周聲職流切若軍發車百兩爲輩从車非聲𥙷妹切輟也从車乙聲烏轄切轢也从車㞋聲尼展女車所踐也从車樂聲歴各切車徹也从車九聲居洧切車迹也从車從省聲臣鉉等曰今俗别作蹤非是即容切車相岀也从車失聲夷質切車䡩也从車眞聲讀若論語鏗尓舍瑟而作又讀若掔苦閑切抵也从車埶聲陟利切車戾也从車匡聲巨王切車小鈌復合者从車叕聲臣鉉等按网郡輟雨同此重岀陟劣切礙也从車多聲康禮切車轄相擊也从車从􅌛􅌛亦聲周禮曰舟輿擊互者古歷切治車軸也从車算聲所眷切接軸車也从車可聲康我切車堅也从車殸聲口莖切反推車令有所付也从車从付讀若胥而隴切有輻曰輪無輻曰輇从車侖聲力屯切蕃車下􅋻輪也一曰無輻也从車全聲讀若饌市縁切大車轅耑持衡者从車兒聲五雞切輗或从宐輗又从木大車後也从車氐聲丁礼切大車簀也从車秦聲讀若臻側詵切淮陽名車穹隆轒从車賁聲符分切大車後壓也从車宛聲於云切大車駕馬也从車共聲居玉切連車也一曰却車抵堂爲从車差省聲讀若遟士皆切輓車也从車从㚘在車前引之力展切引之也从車免聲無逺切紡車也一曰一輪車从車聲讀若狂巨王切車裂人也从車瞏聲春秋傳曰轘諸門臣鉉等曰瞏渠營切非聲當从還省胡慣切􅎒也从車从斤斬法車裂也側减切喪車也从車而聲如之切人頰車也从車甫聲扶雨切羣車聲也从三車呼宏切文九十九重八車名从車孱聲士限切車聲从車粦聲力珍切車迹也从車徹省聲本通用徹後人所加直􅍌切文三新附小􅊟也象形凡􅎧之屬皆从􅎧臣鉉等曰今俗作堆都回切危髙也从􅎧屮聲讀若臬魚􅍌切史事君也从宀从􅎧􅎧猶衆也此與師同意古丸切文三說文解字第十四上說文解字第十四下漢太尉祭酒許氏記敕校定大陸山無石者象形凡􅊟之屬皆从􅊟房切古文大􅊟也从􅊟夌聲力膺切大􅊟也从􅊟鯀聲胡本切地理也从􅊟力聲盧則切闇也水之南山之北也从􅊟侌聲於今切髙明也从􅊟昜聲與章切髙平地从􅊟从坴坴亦聲力竹切籀文陸大陵也一曰曲􅊟也从􅊟可聲烏何切阪也一曰沱也从􅊟皮聲彼爲切坡者曰阪一曰澤障一曰山脅也从􅊟反聲府逺切阪隅也从􅊟取聲子侯切陬也从􅊟禹聲虞俱切阻難也从􅊟僉聲虚檢切阻也一曰門从􅊟艮聲平簡切險也从􅊟且聲側呂切陮隗髙也从􅊟隹聲都辠切陮隗也从􅊟鬼聲五辠切髙也一曰石也从􅊟允聲余準切磊也从􅊟􅑰聲洛猥切陖也从􅊟肖聲七笑切陗髙也从􅊟夋聲私閏切仰也从􅊟登聲都鄧切阨陜也从􅊟聲盧候切隘也从􅊟夾聲臣鉉等曰今俗从山非是矦夾切登也从􅊟从歩竹力切古文陟髙下也一曰陊也从􅊟从臽臽亦聲戸􅰉切阪下溼也从􅊟聲似入切也从􅊟區聲臣鉉等曰今俗作嶇非是豈俱切下隊也从􅊟貴聲杜回切從髙隊也从􅊟㒸聲徒對切下也从􅊟夅聲古卷切從髙下也从􅊟貟聲易曰有隕自天子敏切危也从􅊟从毁省徐巡以爲陧凶也賈侍中說隉法度也班固說不安也周書曰邦之阢隉讀若虹蜺之蜺五結切小崩也从􅊟也聲丈尔切敗城􅊟曰隓从􅊟聲臣鉉等曰說文無字蓋二左也衆力左之故从二左今俗作隳非是許規切篆文仄也从􅊟从頃頃亦聲去營切落也从􅊟多聲臣鉉等曰今俗作墮非是徒果切閬也从􅊟元聲客庚切臣鉉等曰今俗作坑非是通溝也从􅊟聲讀若徒谷切古文􅭖从谷隄也从􅊟方聲符方切防或从土唐也从􅊟是聲都兮切基也从􅊟止聲諸而切阯或从土山絶坎也从􅊟巠聲戸經切附婁小土山也从􅊟付聲春秋傳曰附婁無松栢符又切泰謂陵取曰阺从􅊟氐聲丁禮切石山戴土也从􅊟从兀兀亦聲五忽切崖也从􅊟兼聲讀若儼魚檢切塞也从􅊟戹聲於革切障也从􅊟鬲聲古覈切隔也从􅊟章聲之亮切蔽也从􅊟㥯聲於謹切水隈崖也从􅊟奥聲烏到切水曲隩也从􅊟畏聲烏恢切商小塊也从􅊟从㬰臣鉉等曰㬰古文蕢字去衍切水衡官谷也从􅊟解聲一曰小谿胡買切天水大阪也从􅊟龍聲力鍾切酒泉天依阪也从􅊟衣聲於希切弘農陜也古虢國王季之子所封也从􅊟夾聲失冉切弘農陜東陬也从􅊟無聲武扶切河東安邑陬也从􅊟卷聲居逺切上黨陭氏阪也从􅊟竒聲於离切北陵西隃鴈門是也从􅊟俞聲傷遇切代郡五阮關也从􅊟元聲虞逺切大􅊟也一曰右扶風郡有䧊􅊟从􅊟吿聲苦切丘名从􅊟武聲方遇切丘名从􅊟貞聲陟盈切丘名从􅊟丁聲讀若丁當經切鄭地阪从􅊟爲聲春秋傳曰將㑹鄭伯于䧦許爲切如渚者陼丘水中髙者也从􅊟者聲當古切宛丘舜後滿之所封从􅊟从木申聲臣兹等曰陳者大昊之虚畫八卦之所木德之始故从木直珍切古文陳再成丘也在濟隂从􅊟匋聲夏書曰東至于陶丘陶丘有堯城堯甞所居故堯號陶唐氏徒刀切耕以臿浚出下壚土也一曰耕休由也从􅊟从土召聲之少切壁危也从􅊟占聲余廉切殿陞也从􅊟余聲直魚切陛也从􅊟皆聲古諧切主階也从􅊟乍聲昨誤切升髙階也从􅊟坒聲㫄礼切階次也从􅊟亥聲古哀切壁會也从􅊟祭聲子例切壁際孔也从􅊟从􅮼􅮼亦聲綺戟切重土也一曰滿也从􅊟咅聲薄回切道邊􅋻垣也从􅊟彖聲徒玩切築牆聲也从􅊟耎聲詩云捄之陾陾如乗切城土女牆俾倪也从􅊟卑聲符支切籀文陴从􅴹城池也有水曰池無水曰隍从􅊟皇聲易曰城復于隍乎光切依山谷爲牛馬圈也从􅊟去聲去魚切危也从􅊟垂聲是爲切小障也一曰􅋻城也从􅊟鳥聲安古切堅也从􅊟完聲臣鉉等按宀部巳有此重出王眷切山􅊟䧟也从􅊟侖聲盧昆切水􅊟也从􅊟辰聲食倫切水􅊟也从􅊟戔聲慈衍切文九十二重九稜名从􅊟卂聲所臻切路東西爲陌南北爲阡从􅊟千聲倉先切文二新附兩􅊟之閒也从二􅊟凡􅤦之屬皆从􅤦房九切􅊟也从􅤦決省聲於決切陋也从􅤦聲冓籀文嗌字烏懈切籀文从􅊟益塞上亭守逢炎者从􅤦从火遂聲徐醉切篆文省文四重二絫坺土爲牆壁象形凡厽之屬皆从厽力軌切五行也从二陰陽在天地閒交午也凡五之屬皆从五臣鉉等曰二天天地也疑古切古文五省文一重一易之數陰變於六正於八从入从八凡六之屬皆从六力竹切文一陽之正也从一微陰从中衺出也凡七之屬皆从七親吉切文一陽之變也象其屈曲究盡之形凡九之屬皆从九舉有切九達道也似龜背故謂之馗馗高也从九从首渠追切馗或从辵从文二重一獸足蹂地也象形九聲尔疋曰狐貍貛貉醜其足􅫯其迹厹凡厹之屬皆从厹人九切篆文从足柔聲走獸緫名从厹象形今聲禽离兕頭相似巨今切山神獸也从禽頭从厹从屮歐陽喬說离猛獸也臣鉉等曰从屮義無所取疑象形吕支切蟲也从厹象形無販切蟲也从厹象形王矩切古文禹周成王時州歷國獻人身反踵自笑笑即上脣掩其目食人北方謂之土螻尓疋云如人被髮一名䲷陽从厹象形符未切蟲也从厹象形讀與偰同私􅍌切古文􅾽文七重三㹌也象耳頭足厹地之形古文嘼下从厹凡嘼之屬皆从嘼許救切守備者从嘼从犬舒救切文二東方之孟陽气萌動从木戴孚甲之象一曰人頭位西方象秋時萬物庚庚有實也庚承己象人齎凡庚之屬皆从庚古行切文一秋時萬物成而孰金剛味辛辛痛即泣岀从一从辛辛辠也辛承庚象人股凡辛之屬皆从辛息隣切犯法也从辛从自言辠人蹙鼻苦辛之憂秦以􅓧似字改爲罪臣鉉等曰自古者以爲鼻字故从自徂賄切辠也从辛古聲古乎切古文辜从死辠也从辛聲私􅍌切不受也从辛从受受辛宜辤之似兹切籀文古乎切訟也从􅜆􅜆猶理辜也􅜆理也似兹切籀文辭从司文六重三辠人相與訟也从二辛凡辡之屬皆从辡方免切治也从言在辡之閒符蹇切文二位北方也陰極陽生故易曰龍戰于野戰者接也象人褢妊之形承亥壬以子生之叙也與巫同意壬承辛象人脛脛任體也凡壬之屬皆从壬如林切文一冬時水土平可揆度也象水從四方流入地中之形癸承壬象人足凡癸之屬皆从癸居誄切籀文从癶从矢文一重一十一月陽气動萬物滋入以爲偁象形凡子之屬皆从子李陽冰曰子在襁緥中足併也即里切古文子从巛象髪也籀文子囟有髪臂脛在几上也褢子也从子从几徐鍇曰取象於褢妊也以證切生子免身也从子从免徐鍇曰說文無免字疑此字从省以免身之義通爲解免文免晚冕之類皆當从㝃省芳萬切臣鉉等曰今俗作亡辯切乳也从子在宀下子亦聲疾置切乳也从子殸聲一曰㝅瞀也古候切一乳兩子也从子􅒋聲生患切乳子也一曰輸突出不容於内也凡云之屬皆从云他骨切或从到古文子即易突字養子使作善也从云肉聲虞書曰敎育子徐鍇曰云不順子也不順子亦敎之況順者乎余六切育或从每通也从从疋疋亦聲所𦵔切文三重二紐也十二月萬物動用事象手之形時加丑亦舉手時也凡丑之屬皆从丑敕九切食肉也从丑从肉女乆切進獻也从羊羊所進也从丑丑亦聲息旈切文三􅩋也正月陽气動去黃泉欲上出隂尚彊象宀不達􅩋寅於下也凡寅之屬皆从寅徐鍇曰􅩋厈之意人陽气銳而出上閡於宀曰所以擯之也弋眞切古文寅文一重一冒也二月萬物冒地而出象開門之形故二月爲天門凡卯之屬皆从卯莫飽切古文卯文一重一震也三月陽气動靁電振民農時也物皆生从乙匕象芒達厂聲也辰房星天時也从二二古文上字凡辰之屬皆从辰徐鍇曰匙音化乙艸木萌初出曲卷也臣鉉等曰三月陽气成艸木生上於土故从上厂非聲疑亦象物之出植鄰切古文辰恥也从寸在辰下失耕時於封畺上戮之也辰者農之時也故房星爲辰田候也而蜀切文二重一巳也四月陽气巳出陰气巳藏萬物見成文章故巳爲蛇象形凡巳之屬皆从巳詳里切用也从辰巳賈侍中說巳意巳實也象形羊止切文二啎也五月陰气午逆陽冒地而出此予矢同意凡午之屬皆从午疑古切逆也从午吾聲五故切文二味也六月滋味也五行木老於未象木重枝葉也凡未之屬皆从未無沸切文一神也七月陰气成體自申束从曰自持也吏㠯餔時聽事申旦政也凡申之屬皆从申失切古文申籀文申擊小鼓引樂聲也从申柬聲羊晉切束縛捽抴爲㬰从申从乙臣鉉等曰乙屈也羊朱切㬰曵也从申丿聲余制切文四重二就也八月黍成可爲酎酒象古文酉之形凡酉之屬皆从酉與久切古文酉从卯卯爲春門萬物已出酉爲秋門萬物已入一閉門象也就也所以就人性之善惡从水从酉酉亦聲一曰造也吉凶所造也古者儀狄作酒醪禹甞之而羙遂䟽儀狄杜康作秝酒子酉切生衣也从酉冡聲莫紅切孰也从酉甚聲余箴切醖也作酒曰釀从酉襄聲女亮切釀也从酉昷聲於問切酒疾孰也从酉弁聲芳萬切酒母也从酉余聲讀若廬同都切下酒也一曰醇也从酉麗聲所綺切酒也从酉䏍聲古玄切䣺也从酉鬲聲郎擊切酒一宿孰也从酉豊聲盧啓切汁滓酒也从酉翏聲魯力切不澆酒也从酉享聲常倫切厚酒也从酉需聲詩曰酒醴惟醹而主切三重醇酒也从酉从時省明堂月令曰孟秋天子飲除柳切濁酒也从酉盎聲烏浪切淳酒也从酉農聲女容切酒也从酉肯聲而容切一宿酒也一曰買酒也从酉古聲古乎切酒也从酉省涉离切泛齊行酒也从酉濫聲盧瞰切酒味淫也从酉省聲讀若春秋傳曰美而豔古禫切酒厚味也从酉告聲苦切酒味苦也从酉覃聲徒紺切酒色也从酉巿聲普活切酒色也从酉己聲臣鉉等曰己非聲當从妃省滂佩切酒色也从酉弋聲與職切爵也一曰酒濁而微清也从酉戔聲阻限切盛酒行觴也从酉勺聲之若切冠娶禮祭从酉焦聲子肖切醮或从示畝酒也从酉㬱聲子朕切少少㱃也从酉勻聲余刃切主人進客也从酉􅔧聲市流切醻或从州客酌主人也从酉昔聲在各切臣鉉等曰今俗作倉故切㱃酒俱盡也从酉聲迷必切㱃酒盡也从酉嚼省聲子肖切酒樂也从酉从甘甘亦聲胡甘切樂酒也从酉冘聲丁含切私宴㱃也从酉區聲依倨切會㱃酒也从酉豦聲其虐切醵戓从巨王德布大㱃酒也从酉甫聲薄乎切醉飽也从酉咅聲匹回切卒也卒其度量不至於亂也一曰潰也从酉从卒將遂切醉也从酉熏聲詩曰公尸來燕醺醺許云切䣱也从酉熒省聲爲命切醉醟也从酉句聲香遇切病酒也一曰醉而覺也从酉呈聲直貞切治病工也殹惡姿也醫之性然得酒而使从酉王育說一曰殹病聲酒所以治病也周禮有醫酒古者巫彭初作醫於其切禮祭束茅加于裸圭而灌鬯酒是爲莤象神歆之也一曰莤榼上塞也从酉从艸春秋傳曰尓貢包茅不入王祭不供無以莤酒所六切薄酒也从酉离聲讀若離吕支切酢也从酉韱聲初減切酢也从酉夋聲闗東謂酢白酸素官切籀文酸从畯酢也从酉􅥘聲徒奈切酢也从酉僉聲臣鉉等曰今俗作釅非是魚窆切醶也从酉聲倉故切臣鉉等曰今俗作在各切黍酒也从酉也聲一曰甜也賈侍中說酏爲鬻清移尔切盬也从肉从酉酒以和也爿聲即亮切古文籀文肉也从酉臣鉉等曰甌器也所以盛醢呼改切籀文􅛙䤅榆醬也从酉敄聲莫候切􅛙䤅也从酉俞聲田候切餟祭也从酉寽聲郎外切擣榆也从酉畢聲蒲計切醬也从酉矞聲居律切雜味也从酉京聲力讓切闕慈冉切闕而琰切文六十七重八乳也从酉各聲盧各切醍醐酪之精者也从酉胡聲戸吴切酩酊醉也从酉名聲莫迴切酩酊也从酉丁聲都切醉解也从酉星聲按醒字注云一曰醉而覺也則古醒亦音醒也桑經切淸酒也从酉是聲它禮切文六新附繹酒也从酉水半見於上禮有大酋掌酒官也凡說文解字弟十四下

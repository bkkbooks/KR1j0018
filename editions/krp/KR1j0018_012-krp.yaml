body:
  text: 說文解字弟十二上漢太尉祭酒許愼敕校定三十六部七百七十九文重八十四凡九千二百三字文三十新附玄鳥也齊魯謂之乙取其鳴自呼象形凡乙之屬皆从乙徐鍇曰此與甲乙之乙相類其形舉首下曲與甲乙字少異烏轄切乙或从鳥通也从乙从子乙請子之候鳥也乙至而得子嘉羙之也古人名嘉字子孔康蕫切人及鳥生子曰乳獸曰産从孚从乙乙者玄鳥也明堂月令玄鳥至之日祠于髙禖以請子故乳从乙請子必以乙至之日者乙春分來秋分去開生之候鳥帝少昊司分之官也而主切文三重一鳥飛上翔不下來也从二猶天也象形凡不之屬皆从不方乆切不也从口从不不亦聲徐諧曰不可之意見於言故从口方乆切文二鳥飛从髙下至地也从二猶地也象形不上去而至下來也凡至之屬皆从至脂利切古文至至也从至刀聲都悼切至也从至秦聲側詵切忿戾也从至至而復遜遜遁也周書曰有夏氏之民叨讀若丑利切觀四方而髙者从至从之从髙省與室屋同意徒哀切到也从二至人質切文六重一鳥在巢上象形日在西方而鳥棲故因以爲東西之西凡西之屬皆从西先稽切西或从木妻古文西籕文西姓也从西圭聲戸圭切文二重三西方鹹地也从西省象鹽形安定有鹵縣東方謂之㡿西方謂之鹵凡鹵之屬皆从鹵郎古切鹹也从鹵差省聲河内謂之沛人言若虘昨河切銜也北方味也从鹵咸聲胡毚切文三鹹也从鹵監聲古者宿沙初作煑海鹽凡鹽之屬皆从鹽余廉切河東鹽池袤五十一里廣七里周百十六里从鹽省古聲公戸切鹵也从鹽省僉聲魚欠切文三護也半門曰戸象形凡戸之屬皆从戸矦古切古文戸从木戸扇也从戸非聲甫微切扉也从戸从翄聲式戰切室在㫄也从户方聲符方切輜車㫄椎戸也从戸大聲讀與釱同徒蓋切隘也从戸乙聲於革切始開也从戸从聿臣鉉等曰聿者始也治矯切户牖之閒謂之扆从戸衣聲於豈切閉也从戸劫省聲口盍切外閉之関也从戸冋聲古熒切文十重一聞也从二戸象形凡門之屬皆从門莫奔切天門也从門昌聲楚人名門曰閶闔尺量切宫中之門也从門韋聲羽非切䦲謂之樀樀廟門也从門詹聲余廉切䢽門也从門厷聲戸萌切特立之戸上圜下方有似圭从門圭聲古攜切門㫄户也从門合聲古沓切樓上戸也从門莫大羽聲徒盍切門也从門干聲汝南平興里門曰閈侯旰切里門也从門吕聲周禮五家爲比五比爲閭閭侶也二十五家相群侣也力居切里中門也从門臽聲余廉切閻或从土市外門也从門貴聲胡對切城内重門也从門垔聲詩曰出其闉闍於眞切闉闍也从門者聲當孤切門觀也从門欮聲去月切門薄櫨也从門弁聲皮變切門扇也从門介聲胡介切門扇也一曰閉也从門盍聲胡臘切門梱也从門臬聲魚列切門榍也从門或聲論語曰行不履閾于逼切古文閾从洫門髙也从門聲巴郡有閬中縣來宕切開也从門辟聲房益切虞書曰闢四門从門从􅦁闢門也从門爲聲國語曰䦱門而語之言韋委切開也从門單聲易曰闡幽昌善切張也从門从开苦哀切古文開也从門豈聲苦亥切大門也从門可聲大林亦爲閜火下切開閉門也从門甲聲烏甲切閉門也从門必聲春秋傳曰閟門而與之言兵媚切所以止扉也从門各聲古洛切隟也从門从月徐鍇曰夫門夜開閉而見月光是有聞隟也古閑切古文間門傾也从門阿聲烏可切遮也从門於聲烏割切開閉門利也从門聲一曰縷十比也臣鉉等曰非聲未詳旨沇切門聲也从門易声乙割切門嚮也从門邦聲許亮切門越也从門柬聲洛千切闌也从門中有木戸閒切閉門也从門才所以岠門也博計切外閉也从門亥聲五漑切閉門也从門音聲烏與切以木横持門戸也从門􅳑聲古還切闗下牡也从門龠聲以灼切成皃从門眞聲待季切闛聞盛皃从門堂聲徒郎切竪也宫中閹閽閉門者从門奄聲英亷切常以昏閉門隷也从門从昏昏亦聲呼昆切閃也从門規聲去切妄入宫掖也从門䜌聲讀若闌洛干切登也从門古文下字讀若軍敶之敶臣鉉等曰下言有下而登上也故从下商書曰若外髙必自下直刃切闚頭門中也从人在門中失冉切具數於門中也从門説省聲弋垂切事曰閉門也从門癸聲傾雪切望也从門敢聲若濫切䟽也从門声苦括切弔者在門也从門文聲臣鉉等曰今别作體非是眉切古文閔馬出門皃从馬在門中讀若郴丑禁切文五十七重六市垣也从門睘聲戸關切門也从門達聲他達切閌閬髙門也从門亢声苦浪切閥閱自序也从門伐聲義當通用伐房越切静也从門臭聲臣鉉等案易窺其戸闃其無人窺小昆也狊大張目也言始小視之雖大張目亦不見人也義當只用狊字苦狊切文五新附主聽也象形凡耳之屬皆从耳而止切耳垂也从耳下垂象形春秋傳曰秦公子輙者其耳下垂故以為名陟葉切小垂耳也从耳古声丁廉切耳大垂也从耳冘聲詩曰士之耽兮丁含切耳曼也从耳冉聲他甘切聃或从甘垂耳也从耳詹声南方聸耳之國甘切耳箸頰也从耳烓省聲杜林說耿光也从光聖省凡字皆方形右聲杜林非也徐鍇曰凡字多右形左聲此說或後人所加或傳寫之誤古杏切連也从耳耳連於頰也从絲絡連不絶也力延切耳鳴也从耳卯聲洛蕭切通也从耳呈聲式正切察也从耳怱聲倉紅切聆也从耳㥁壬聲他定切聽也从耳令聲郎丁切記微也从耳戠聲之弋切語也从耳􅡜聲古活切張耳有所聞也从耳禹聲王矩切音也从耳殸聲聲籕文聲書盈切知聞也从耳門聲無分切古文从昏訪也从耳甹聲匹正切無聞也从耳龍聲虚紅切生而聾曰聳从耳從省聲息拱切益屎之州謂聾爲䏁乗晉聽而不聞聞而不達謂之䏁从耳宰聲作玄切聾也从耳貴聲五怪切聵或从㕟臣鉉等曰當从􅸬省義見􅸬字注無知意也从耳出聲讀若孽五滑切吴楚之外凡無耳者謂之􅫣言若斷耳爲盟从耳闋聲五滑切軍法以矢貫耳也从耳从矢司馬法曰小罪聅中罪刖大罪恥列切軍職斷耳也春秋傳曰以爲傳聝从耳或聲古獲切聝或从首耳也从耳月聲魚厥切乗輿金馬耳也从耳麻聲讀若渳水一曰若月今靡草之靡亡彼切國語曰回禄信於耹遂闕巨今切安也从二耳丁帖切附耳私小語也从三耳尼輙切文三十二重四不聽也从耳敖聲五交切文一新附也象形凡臣之屬皆从臣與之切篆文臣籀文从首廣臣也从臣巳聲與之切古文戺从戸臣鉉等曰今俗作牀史切以爲階戺之戺文二重三拳也象形凡手之屬皆从手書九切古文手手中也从手尚聲諸兩切將指也从手母聲莫厚切手指也从手旨聲職雉切手也从手类聲巨貟切手􅓲也揚雄曰􅓲握也从手䀑聲烏貫切好手㒵詩曰攕攕女手从手韱聲所咸切人臂皃从手削聲周禮曰輻欲其揱徐鍇曰人臂梢長纖好也所角切繑也一曰摳衣外堂从手區聲口矦切樞衣也从手褰聲去䖍切舉手下手也从手壹聲於計切攘也从手咠聲一曰手箸胷曰揖伊入切推也从手襄聲汝羊切斂手也从手共聲居殊切挑也从手僉聲良冉切首至地也从手音忽徐鍇曰進趨之疾也故拜从之博怪切揚雄説拜从兩手下古文拜搯捾也从手官聲一曰援也烏括切捾也从手舀聲周書曰師乃搯搯者抜兵刃以習撃刺詩曰左旋右搯土刀切􅗙也从手巩聲居竦切臣鉉等案丮部有㧬與巩同此重岀排也从手隹聲他回切推也从手夋聲春秋傳曰捘衛侯之手于寸切擠也从手非聲歩皆切排也从手齊聲子計切擠也从手氐聲丁礼切擠也从手崔聲一曰挏也一曰折也昨回切摧也从手立聲盧合切摧也从手聲則臥切左也从手夫聲防無切古文扶扶也从手爿聲七良切握也从手寺聲直之切縣持也从手㓞聲苦結切脅持也从手甘聲巨淹切閱持也从手枽聲今折切握持也从手从執脂利切把持也从手喿聲七刀切爪持也从手瞿聲臣鉉等曰今俗别作掬非是居玉切急持衣䘳也从手今聲巨今切捦或从禁索持也一曰至也从手尃聲𥙷各切杖持也从手豦聲居御切引持也从手聶聲書涉切并持也从手冄聲他含切捫持也从手布聲普胡切俾持也从手夾聲胡頰切撫持也从手門聲詩曰莫捫朕舌莫奔切撮持也从手監聲盧敢切理持也从手巤聲良渉切搤持出从手屋聲於角切古文握提持也从手單聲讀若行遟驒驒徒旱切握也从手巴聲博了切取曰揜一曰覆也手弇聲衣檢切予也从手从受受亦聲殖酉切奉也受也从手从卪从収臣鉉等曰謹節其事承奉之義也故从卪署陵切給也从手臣聲一曰約也章刃切拭也从手堇聲居焮切朋群也从手黨聲多眀切交也从手妾聲子葉切㨷也从手市聲普活切􅗙引也漢有挏馬官作馬酒从手同聲徒緫切手呼也从手召聲止搖切安也从手無聲一曰循也芳武切古文从辵亡撫也从手昏聲一曰摹也武巾切量也从手耑聲度高曰揣一曰捶之徐鍇曰此字與耑聲不相近如喘遄之類皆當从瑞省𥘉委切開也从手只聲讀若抵掌之抵諸氏切習也从手貫聲春秋傳曰摜瀆鬼神古患切擿也从手从殳度矦切搔也从手適聲一曰投也直隻切括也从手蚤聲穌遭切刮也从手介聲古㸃切撃也从手票聲一曰挈門壯也符少切撓也从手兆聲一曰摷也國語曰郤至挑天土凋切挑也从手决聲於說切擾也从手堯聲一曰抺也奴巧切煩也从手夒聲而沼切持也从手局聲居玉切㦸挶也从手居聲九魚切刮也从手葛聲一曰撻也口八切拓果樹實也从手啻聲一曰指近之也臣鉉等曰當从適省乃得聲他歴切又竹歴切擖也从手害聲胡秸切暫也从手斬聲昨甘切摺也从手劦聲一曰拉也虚業切敗也从手習聲之渉切束也从手秋聲詩曰百禄是揫即由切曵聚也从手婁聲洛侯切有所失也春秋傳曰抎子辱矣从手云聲子敏切从㫄持曰披从手皮聲敷羈切引縱曰􅪴从手瘛省聲尺制切積也詩曰助我舉㧘械類㫄也从手此聲前智切揺也从手卓聲春秋傳曰尾大不掉徒弔切動也以手聲余招切動搈也从手容聲余隴切當也从手貳聲直異切聚也从手酋聲即由切固也从手臤聲讀若詩赤舄掔掔目鉉等曰今别作慳非是苦閑切奉也从手夆聲扶容切對舉也从手輿聲以諸切飛舉也从手昜聲與章切古文對舉也从手與聲居許切舉出也从手欣聲春秋傳曰掀公出於淖虚言切髙舉也从手曷聲去例切又基竭切上舉也从手升聲易曰抍馬壯吉蒸上聲抍或从登臣鉉等曰今俗别作拯非是舉救也从手辰聲一曰奮也章刃切撗関對舉也从手土聲古雙切握也从手分聲讀若粉房吻切舉手也从手喬聲一曰撟擅也居少切自關已西凡取物之上者爲撟捎从手肖聲所交切抱也从手雝聲於隴切染也从手需聲周禮六曰擩祭而主切引也从手俞聲羊朱切搫擭不正也从手般聲薄官切搫擭也一曰布擭也一曰握也从手蒦聲一虢切拊手也从手弁聲皮變切專也折也从手月聲魚厥切縳殺也从手翏聲居求切郷飲酒罰不敬撻其背从手達聲他達切古文撻周書曰以記之止馬也从手夌聲里甑切撣也从手平聲普耕切气勢也从手卷聲國語曰有捲勇一曰捲收也臣鉉等曰今俗作居轉切以爲捲舒之捲巨貟切收也从手及聲楚洽切拘擊也从手巢聲子小切擊也从手矣聲於駥切挨也从手菐聲蒲角切㫄擊也从手敫聲苦弔切疾擊也从手勺聲都了切笞擊也从手失聲勑栗切側擊也从手氏聲諸氏切以車鞅擊也从手央聲於兩切衣上擊也从手􅍖聲方苟切兩手擊也从手卑聲北買切以杖擊也从手垂聲之壘切敲擊也从手崔聲苦角切中擊也从手聲一敬切過擊也从手弗聲徐鉉曰擊而過之也敷物切禱頭也从手堅聲讀若鏗
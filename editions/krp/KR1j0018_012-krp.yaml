郡布名委員切好也从女兊聲杜外切目裏好也从女苗聲莫交切靜好也从女畫聲呼麥切體徳好也从好官聲讀若楚郤宛一完切長好也从女巠聲五莖切白好也从女贊聲則旰切順也从女􅜆聲詩曰婉兮􅸸兮力流切籀文􅸸婉也从女妃聲於阮切順也从女宛聲春秋傳曰太子痤婉於阮切直項皃从女同聲他孔切長皃从女焉聲於建切弱長皃从女冄聲而琰切㚩也从女从弱奴鳥切兊細也从女韱聲息廉切嬰嫇也从女冥聲一曰嫇嫇小人皃莫經切曲肩行皃从女聲余招切材緊也从女睘聲春秋傳曰嬛嬛在疚許縁切閑體行姽姽也从女危聲過委切委隨也从女从禾臣鉉等曰委曲也取其禾糓垂穗委曲之皃故从禾於詭切􅛭也一曰女侍曰婐讀若騧或若委从女果聲孟軻曰舜爲天子二女婐烏果切婐􅛭也一曰弱也从女聲五果切小弱也一曰女輕薄善走也一曰多技藝也从女占聲或讀若占齒懾切妗也从女沾聲丑廉切􅨺妗也一曰善笑皃从女今聲火占切竦身也从女簋聲讀若詩紏紏葛屨居夭切竦立也从女靑聲一曰有才也讀若韭菁七正切靜也从女井聲疾正切婦人皃从女乏聲房法切好也从女旋聲似沿切材也从女齊聲祖雞切面醜也从女􅡜聲古活切直好皃一曰嬈也从女翟聲徒了切媞也从女規聲讀若癸秦晉謂細爲嫢居隨切諦也一曰妍黠也一曰江淮之閒謂母曰媞从女是聲承旨切不繇也从女敄聲亡遇切雅也从女閒聲戸閒切說樂也从女巸聲許其切美也从女臤聲苦閑切樂也从女吴聲􅢕俱切戲也从女矣聲一曰卑賤名也遏在切樂也从女甚聲丁含切順也从女尾聲讀若媚無匪切孎也从女啻聲都歷切謹也从女屬聲讀若人不孫爲孎之欲切宴娩也从女冤聲於願切女有心媕媕也从女弇聲衣檢切諟也从女染聲而琰切壹也从女專聲一曰嫥嫥職縁切从隨也从女从口徐鍇曰女子从父之敎从夫之命故从口會意人諸切齊也从女責聲側革切謹也从女束聲讀若謹敕數數測角切敏疾也一曰莊敬皃从女僉聲息廉切服也从女賔聲符眞切至也从女執聲周書曰大命不􅧈讀若摯同一曰虞書雉􅧈脂利切俛伏也从女沓聲一曰伏意他合切安也从女曰詩曰以妟父母烏諫切緩也从女亶聲一曰傳也時戰切保任也从女辜聲古胡切奢也从女般聲臣鉉等曰今俗作婆非是薄波切舞也从女沙聲詩曰市也媻娑素何切耦也从女有聲讀若祐于救切姷或从人鈞適也男女併也从女旬聲居匀切婦人小物也从女此聲詩曰屢舞姕姕即移切婦人小物也从女支聲讀若跂行渠綺切頸飾也从女賏賏其連也於盈切三女爲美也从女􅯂省聲倉案切美女也人所授也从女从爰爰於也詩曰邦之媛兮玉眷切問也从女甹聲匹正切隨從也从女录聲力玉切飾也从女牀省聲側羊切慕也从女􅒋聲力沇切嬻也从女枼聲私􅍌切媟嬻也从女賣聲徒谷切短面也从女窡聲丁滑切便嬖愛也从女辟聲愽計切難也从女􅌛聲苦賣切如也从女介聲胡蓋切婦妒夫也从女户聲當故切夫妒婦也从女胃聲一曰相視也莫報切巧也一曰女子笑㒵詩曰桃之􅯾􅯾从女芺聲於喬切巧調髙材也从女信省臣鉉等曰女子之信近於佞也乃定切小心態也从女熒省聲烏莖切婟也从女翏聲郎到切嫪也从女固聲胡誤切態也从女次聲即夷切嬌也从女虘聲將預切害也从女方聲敷方切亂也从女亡聲巫放切巧黠也从女俞聲託矦切鹵貪也从女汚聲胡古切小小侵他从女肖聲息約切量也从女朶聲丁果切動也从女由聲徐鍇曰當从胄省待歷切不平於心也一曰疑也从女兼聲戸兼切减也从女省聲所景切不順也从女若聲春秋傳曰叔孫婼丑略切很也从女幸聲楚詞曰鯀婞直胡頂切易使怒也从女敝聲讀若擊撆匹滅切好枝格人語也一曰靳也从女善聲㫖善切疾悍也从女叕聲讀若唾丁滑切含怒也一曰難知也从女酓聲詩曰碩大且㜝五感切陰娿也从女阿聲烏何切技也一曰不省録事一曰難侵也一曰惠也一曰安也从女开聲讀若研五堅切圜深目皃或曰吴楚之閒謂好曰娃从女圭聲於佳切不媚前却娿也从女陜聲失冉切鼻目閒皃讀若煙火炔炔从女決省聲於說切愚戇多態也从女雟聲讀若隓式吹切不說也从女恚聲於避切怒皃从女黑聲呼北切輕也从女戍聲王伐切輕也从女㶾聲匹招切訬疾也从女坐聲昨禾切女人自偁我也从女央聲烏浪切不說皃从女韋聲羽非切姿婎姿也从女隹聲一曰醜也許惟切有守也从女弦聲胡田切輕皃从女扁聲芳連切侮易也从女曼聲謀患切疾言失次也从女臿聲讀若懾丑聶切弱也一曰下妻也从女需聲相俞切不肖也从女否聲讀若竹皮菩匹才切遟鈍也从女臺聲闒嬯亦如之徒哀切下志貪頑也从女覃聲讀若深乃忝切婪也从女參聲七感切貪也从女林聲杜林說卜者黨相詐驗為婪讀若潭盧含切懈也怠也一曰臥也从女賴聲洛旱切空也从母中女空之意也一曰婁務也洛矦切古文娎㛍也从女折聲許􅍌切得志㛍㛍一曰㛍息也一曰少气也从女夾聲呼帖切苛也一曰擾戲弄也一曰嬥也从女堯聲奴鳥切惡也一曰人皃从女毁聲許委切誹也一曰翼便也从女刪省聲所晏切醜也一曰老嫗也从女酋聲讀若蹴十宿切􅙵母都醜也从女莫聲莫胡切往來婓婓也一曰醜皃从女非聲芳非切煩擾也一曰肥大也从女孃聲女良切女黒色也从女㑹聲詩曰嬒兮蔚兮古外切好皃从女耎聲而沇切臣鉉等案切韻又音奴困切今俗作非是誣拏也从女奄聲依剱切過差也从女監聲論語曰小人窮斯㜮矣盧瞰切侮易也从女敖聲五到切私逸也从女巠聲余箴切除也漢律齊人予妻婢姦曰姘从女并聲普耕切犯婬也从女从干干亦聲古寒切婦人汚也从女半聲漢律曰見姅變不得侍祠博慢切女出病也从女廷聲徒鼎切女病也从女車聲奴敎切諉也从女垂聲竹恚切有所恨也从女甾聲今汝南人有所恨曰㛴臣鉉等曰古囟字非聲當从省奴皓切慙也从女鬼聲俱位切媿或从恥省訟也从二女女還切私也从三女古顔切古文姦从心旱聲文二百三十八重十三婦官也从女牆省聲才良切女字姐巳紂妃从女旦聲當割切姿也从女喬聲舉喬切嬋姢態也从女單聲市連切嬋姢也从女䏍聲於縁切無夫也从女􅫕聲里之切偶也从女后聲古候切文七新附橜也象折木鋭著形从􅛣象物挂之也與職切文二也从反􅛣讀若移凡乀之屬皆从乀弋支切女隂也象形羊者切秦刻石也字文二重一巴蜀山名岸脅之㫄箸欲落􅤚者曰氏氏崩聞數百里象形乀聲凡氏之屬皆从氏揚雄賦響若氏隤承旨切木本从氏大於未讀若厥居月切文二至也从氏下箸地也凡氐之屬皆从氐丁礼切臥也从氐垔聲於進切觸也从氐失聲徒結切闕臣鉉等案今篇韻音㬶又音效注云誤也文四平頭也从弋一橫之象形凡戈之屬皆从戈古禾切上諱臣鉉等曰後漢和帝名也案李舟切韻云擊也从戈肁聲直小切兵也从戈从甲如融切周礼侍臣執戣立于東垂兵也从戈癸聲渠追切盾也从戈旱聲矦肝切有枝兵也从戈倝周禮長丈六尺讀若棘臣鉉等曰倝非聲義當从幹省幹枝也訖逆切也从戈从􅔣讀若棘古點切敗也从戈則聲昨則切守邊也从人持戈傷遇切闘也从戈單聲之扇切三軍之偏也一曰兵也从戈䖒聲香義切利也一曰剔也从戈呈聲徒結切非也从口从戈又从地也于逼切臣鉉等曰今俗作胡國切以爲疑或不定之意或又从土臣鉉等曰今蕪復或音斷也从戈雀聲昨結切殺也从戈今聲書曰西伯既􅨹黎口含切槍也他國臣來弑君曰戕从戈爿聲士良切殺也从戈翏聲力六切刺也从戈甚聲竹甚口含二切長槍也从戈寅聲春秋傳有擣戭弋刃以淺二切傷也从戈才聲袒才切滅也从戈晉聲詩曰實始戩商即淺切絶也一曰田器从从持戈古文讀若咸讀若詩云攕攕女手臣鉉等曰㦰銳意也故从从子廉切楚莊王曰夫武定功戢兵故止戈爲武文甫切藏兵也从戈咠聲詩曰載戢于戈阻立切闕从戈从音之弋切賊也从二戈周書曰戔戔巧言徐鍇曰兵多則􅋊也故从二戈昨干切文二十六重一斧也从戈聲司馬法曰夏執玄戉殷執白戚周左杖黃戉右秉白髦凡戉之屬皆从戉臣鉉等曰今俗别作鉞非是王伐切戉也从戉尗聲倉歷切文二施身自謂也或說我頃頓也从戈从手或說古垂字一曰古殺字凡我之屬皆从我徐鍇曰从戈者取戈自持也五可切古文我己之威儀也从我羊臣鉉等曰此與善同意故从羊宜竒切墨翟書義从弗魏郡有羛陽鄉讀若錡今屬鄴本内黄北二十里文二重二鉤逆者謂之亅象形凡亅之屬皆从亅讀若衢月切鉤識也从反丨讀若捕鳥居月切文二禁也神農所作洞越練朱五弦周加二弦象形凡珡之屬皆从珡巨今切古文珡从金庖犧所作弦樂也从琴必聲所櫛切古文瑟文二重二琵琶樂器从珡比聲房脂切琵琶也从珡巴聲義當用枇杷蒲巴切文二新附匿也象􅲖曲隱蔽形凡􅡊之屬皆从􅡊讀若隱於謹切東楚名缶日甾象形凡甾之屬皆从甾側訶切古文魁也古田器也从甾建聲楚洽切屬蒲器也所以盛穜从甾弁聲布忖切㠷也从甾并聲杜旅从爲竹笞揚雄以爲蒲噐讀若軿薄經切也从甾虍聲讀若盧同洛乎切篆文籀文盧文五重三土器已燒之緫名象形凡瓦之屬皆从瓦三寡切周家搏埴之工也从瓦方聲讀若㧚破之㧚臣鉉等曰音非聲未詳分兩切匋也从瓦垔聲居延切屋棟面从瓦夢省聲徐鍇曰所以承瓦故从瓦莫耕切也从瓦曾聲子孕切籀文甑从甑也一曰穿也从反瓦鬳聲讀若言魚蹇切甌瓿謂之从瓦台聲與之切大盆也从瓦尚聲丁浪切小盆也从瓦區聲烏侯切罌也从瓦公聲烏貢切似罌長頸受十外讀若洪从瓦工聲古雙切小盂也从瓦夗聲臣鉉等曰今俗别作非是烏管切兊似瓶也从瓦令聲郎丁切罌謂之㼰从瓦卑聲部迷切似小瓿大口而卑用食从瓦扁聲芳連切甂也从瓦咅聲蒲口切器也从瓦容聲上封切瓴甓也从瓦辟聲詩曰中唐有甓扶歷切井壁也从瓦秋聲側救切康瓠破罌从瓦臬聲魚例切甈或从埶瑳垢瓦石从瓦爽聲𥘉兩切蹈瓦聲从瓦耎聲零帖切治橐榦也从瓦今聲胡男切破也从瓦卒聲穌對切敗也从瓦反聲布綰切文二十五重二瓦器从瓦次聲疾資切酒器从瓦稀省聲丑脂切文二新附以近窮逺象形古者揮作弓周禮六弓王弓孤弓以射甲革甚質夾弓庾弓以射干矦鳥獸唐弓大弓以授學射者凡弓之屬皆从弓居戎切畫弓也从弓享聲都昆切弓無縁可以解轡紛者从弓耳聲緜婢切弭或从兒角弓也洛陽名弩曰弲从弓䏍聲烏玄切木弓也从弓瓜聲一曰往體寡來體多曰弧戸吳切弓反也从弓召聲詩曰彤弓弨兮尺招切弓曲也从弓雚聲九院切弓弩耑弦所居也从弓區聲恪矦切弓便利也从弓聲讀若燒火招切施弓弦也从弓長聲陟良切弓急張也从弓矍聲許縳切弓彊皃从弓朋聲父耕切弓有力也从弓畺聲巨良切持弓關矢也从弓䜌聲烏關切開弓也从弓丨臣鉉等曰象引弓之形余忍切滿弓有所鄉也从弓于聲哀都切弓聲也从弓厶聲厶古文胘字胡肱切弛弓也从弓璽聲斯氏切弓解也从弓从也施氏切弛或从虒弓衣也从弓从􅠭􅠭垂飾與鼓同意土刀切弓有臂者周禮四弩夾弩庾弩唐弩大弩从弓奴聲奴古切張弩也从弓㱿聲古候切弩滿也从弓黃聲讀若郭苦郭切䠶也从弓畢聲楚詞曰焉彈曰卑吉切行丸也从弓單聲徒案切彈或从弓持丸䠶發也从弓癹聲方伐切帝嚳䠶官夏少康滅之从弓开聲論語曰善䠶五計切文二十七重三彊也从二弓凡弜之屬皆从弜其兩切輔也重也从弜㐁聲徐鍇曰㐁舌也非聲舌柔而弜剛以柔从剛輔弻之意房密切弻或如此並古文弻文二重三弓弦也从弓象絲軫之形凡弦之屬皆从弦臣鉉等曰今别作絃非是胡田切􅱶戾也从弦省从盩讀若戾臣鉉等曰盩者擊辠人見血也弻戾之意郎計切急戾也从弦省少聲於霄切不成遂急戾也从弦省曷聲讀若瘞葬於罽切文四繫也从糸丿聲凡系之屬皆从系胡計切系或从􅌛處籀文系从爪絲子之子曰孫从子从系系續也思魂切聮微也从系从帛武延切隨從也从系䚻聲臣鉉等曰今俗从余招切文四重二說文解字第十二下

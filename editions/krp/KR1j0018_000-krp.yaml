body:
  text: 雍熈三年十一月日翰林書學臣王惟恭臣葛湍等狀進奉直郎守祕書省著作郎直史館臣句中正中書門下牒徐鉉等新校定說文解字牒奉敕許愼說文起於東漢歷代傳寫譌謬實多六書之蹤無所取法若不重加刋正漸恐失其原流爰命儒學之臣共詳篆籀之跡右散騎常侍徐鉉等深明舊史多識前言果能商搉是非補正闕漏書成上奏克副朕心宜遣雕鐫用廣流布自我朝之垂範㑭永丗以作程其書宜付史館仍令國子監雕爲印版依九經書例許人納紙墨價錢收贖兼委徐鉉等點撿書寫雕造無令差錯致誤後人牒至準敕故牒雍熈三年十一月日牒給事中㕘知政事辛仲甫給事中㕘知政事呂蒙正中書侍郎兼工部尚書平章事李昉嘉慶二年夏五月阮元用此校汲古閣本于杭州學署毛晉所刻即據此本凡有舛異皆毛扆妄改

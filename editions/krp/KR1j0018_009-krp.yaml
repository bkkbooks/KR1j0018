front:
  text: 說文解字弟九上漢太尉祭酒許愼記
  hash: sha256:b4f169fcaacfa20f8a6a3ec53884934a236950b545169114defad8e7dc728ecc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1j0018_SBCK_009-1a}
body:
  text: 四十六部四百九十六文重六十三凡七千二百四十七字文三十八新附頭也从􅔣从几古文䭫首如此凡頁之屬皆从頁􅔣者䭫首字也胡結切首也从頁豆聲度矦切眉目之閒也从頁彦聲五姦切籕文皃也从頁公聲余封切又似用切籕文顱也从頁乇聲徒谷切頊顱首骨也从頁盧聲洛乎切顚頂也从頁聲魚怨切頂也从頁眞聲都秊切顚也从頁丁聲都挻切或从貫作籕文从鼎頟也从頁桑聲蘇朗切頟也从頁是聲杜兮切顙也从頁各聲臣鉉等曰今俗作額五陌切鼻莖也从頁安聲烏割切或从鼻曷權也从頁􅶐聲渠追切面㫄也从頁夾聲古叶切籕文頰頰後也从頁聲古恨切顄也从頁合聲胡感切頤也从頁圅聲胡男切頭莖也从頁巠聲居郢切項也从頁今聲良郢切頭後也从頁工聲胡講切項枕也从頁冘聲章衽切出頟也从頁隹聲直追切曲頤也从頁不聲薄回切􅬺皃从頁僉聲魚檢切面目不正皃从頁尹聲余準切頭頵頵大也从頁君聲於倫切面色顚皃从頁員聲讀若隕于閔切頭頰長也从頁兼聲五咸切頭大也从頁石聲常隻切大頭也从頁分聲一曰也詩曰有頒其首布還切大頭也从頁禺聲詩曰其大有顒魚容切大頭也从頁羔聲口幺切大頭也从頁骨聲讀若魁苦骨切八頑也从頁原聲魚怨切髙長頭从頁堯聲五弔切贅顤髙也从頁敖聲五到切面前岳岳也从頁岳聲五角切昧前也从頁聲讀若昧莫佩切面瘦淺也从頁霝聲郎丁切頭蔽也从頁㒸聲五怪切㮯頭也从頁元聲五還切小頭也从頁枝聲讀若規文巳恙切小頭也从頁果聲苦惰切短靣也从頁􅡜聲五活切又下活切狹頭頲也从頁廷聲他挺切頭閑習也从頁危聲語委切面黄也从頁舎聲胡感切面不正也从頁爰聲于反切舉頭也从頁支聲詩曰有頍者弁丘弭切内頭水中也从頁亦聲烏没切還視也从頁雇聲古慕切理也从頁从巛食閏切顔色䪾䫰愼事也从頁㐱聲之忍切䪾䫰也从頁粦聲一曰頭少髪良刃切頭顓顓謹皃从頁耑聲職縁切頭頊頊謹皃从頁王聲許王切低頭也从頁金聲春秋傳曰迎于門顉之而已五感切下首也从頁屯聲都困切低頭也从頁逃省太史卜書頫仰字如此揚雄曰人面頫臣鉉等曰頫首者逃亡之皃故从逃省今俗作俯非是方矩切頫或从人免舉目視人皃从頁臣聲式忍切倨視人也从頁善聲旨善切直項也从頁吉聲胡結切頭頡䪼也从頁出聲讀又若骨之岀切白皃从頁从景楚詞曰天白顥顥南山四顥白首人也臣鉉等曰景曰月之光明白也胡老切大醜皃从頁樊聲附袁切好皃从頁爭聲詩所謂首疾正切頭妍也从頁羽省聲讀若翩臣鉉等曰从翩聲又讀若翩則是古今異音也王矩切謹莊㒵从頁豈聲魚豈切頭鬢少髮也从頁肩聲周禮數目顅脰苦間切無髮也一曰耳門也从頁困聲苦昆切秃也从頁气聲苦骨切頭不正也从頁从耒耒頭傾也讀又若春秋陳夏齧之齧盧對切傾首也从頁卑聲匹米切司人也一曰恐也从頁契聲讀若褉胡計切頭不正也从頁鬼聲口張切頭偏也从頁皮聲滂禾切顫也从頁尤聲于救切或从疒頭不正也从頁亶聲之繕切飯不飽面黄起行也从頁感聲讀若戇下感下坎二切面䫲顲皃从頁聲盧感切熱頭痛也从頁从火一曰焚省聲附袁切癡不聦明也从頁聲五怪切難曉也从頁米一曰鮮白克从粉省臣鉉等曰難曉亦不聦之義盧對切顦顇也从頁焦聲昨焦切顦顇也从頁卒聲秦醉切繫頭殟山从頁昏聲莫奔切醜也从頁亥聲戸來切醜也从頁其聲今遂疫有䫏頭去其切呼也从頁籥聲讀與籥同商書曰率籲衆戚羊戍切頭明飾也从頁㬎聲臣鉉等曰㬎古以爲顯字故从㬎聲呼典切選具也从二頁士戀切文九十三重八安也案經典通用豫从頁未詳羊洳切文一新附頭也象形凡􅔣之屬皆从􅔣書九切屬皆从􅹁古堯切繫也从系持県臣鉉等曰此本是縣挂之縣借爲州縣之縣今俗加心别作懸義無所取胡清切文二面毛也从頁从三凡須之屬皆从須臣鉉等曰此本須鬢之須頁首也彡毛飾也借爲所須之須俗書从水非是相俞切口上須也从須此聲臣鉉等曰今俗别作髭非是即移切頰須也从須从冄冄亦聲臣鉉等曰今俗别作髥非是汝鹽切須髮半曰也从須卑聲府移切短須髮皃从須否聲敷悲切文五毛飾畫文也象形凡彡之屬皆从彡所銜切象形也从彡幵聲戸經切稠髮也从彡从人詩曰㐱髪如雲之忍切今或从髟眞聲飾也从彡攸聲鳥流切文彰也从彡从章章亦聲諸良切琢文也从彡周聲都僚切清飾也从彡青聲疾郢切細文也从彡􅮼省聲莫卜切橈也上象橈曲彡象毛氂橈弱也弱物并故从二􅗡而勺切文九重一聲直由切髪皃从髟爾聲讀若江南謂酢母爲奴礼切髮皃从髟咅聲歩矛切髮至眉也从髟敄聲詩曰紞彼兩亡牢切或省漢今有髣長女鬢垂皃从髟前聲作踐切鬋也一曰長皃从髟兼聲讀若慊力鹽切束髮少也从髟截聲子結切髲也从髟易聲先彳切又大計切鬄或从也聲鬄也从髟皮聲平義切用梳比也从髟吹聲七四切潔髮也从髟􅡜聲古切臥結也从髟般聲讀若槃薄官切髻也从髟付聲方遇切帶結飾也从髟莫聲莫駕切屈髪也从髟貴聲丘媿切簮結也从髟介聲古拜切髮鬣鬣也从髟巤聲良渉切鬣或从毛或从豕鬣也从髟盧聲洛乎切髴若似也从髟弗聲敷勿切亂髮也从髟昔省聲而容切髮隋也从髟隋省直追切髮也从髟春聲舒閏切鬢秃也从髟閒聲苦閑切鬀髮也从髟从刀易聲他歷切􅚎髮也从髟不聲苦昆切或从元􅚎髮也从髟弟聲大人曰髠小人曰鬀盡及身毛曰􅚎臣鉉等曰今俗别作剃非是他計切䰁也从髟竝聲蒲浪切監也忽見也从髟录聲录籀文魅亦忽見意芳未切喪結禮女子髽衰弔則不髽魯臧武仲與齊戰于狐始魯人迎喪者始髽从髟坐聲莊華切文三十八重六按也从反印於棘切俗从手文二重一顔气也从人从卪凡色之屬皆从色所力切古文色艴如也从色弗聲論語曰色艴如也蒲没切縹色也从色并聲普丁切文三重二事之制也从卩凡卯之屬皆从卯闕去京切章也六卿天官冢宰地官司徒春官宗伯夏官司馬秋官司㓂冬官司空从卯皀聲去京切文二法也从卩从辛節制其辠也从口用法者也凡辟之屬皆从辟父益切治也从辟从井周書曰我之不必益切治也从辟乂聲虞書曰有能㑭䢃魚廢切文三裹也象人曲形有所包裹凡勹之屬皆从勹布交切曲脊也从勹􅭦省聲巨六切手行也从勹甫聲簿乎切伏地也从勹畐聲蒲北切在手曰匊从勹米臣鉉等曰今俗作掬非是居六切少也从勹二羊倫切聚也从勹九聲讀若鳩居求切徧也十日爲旬从勹日詳遵切古文覆也从勹覆人薄皓切聲也从勹凶聲許容切匈或从肉市徧也从勹舟聲職流切市也从勹从合合亦聲矦閣切飽也从勹􅴸聲民祭祝曰厭匓已又切又乙庶切重也从勹復聲扶富切或省彳髙墳也从勹豖聲知隴切文十五重三象人褢妊巳在中象子未成形也元气起於子子人所生也男左行三十女右行二十俱立於巳爲夫婦褢妊於巳巳爲子十月而生男起巳至寅女起巳至申故男秊始寅女秊始申也凡包之屬皆从包布交切兒生裏也从肉从包匹交切瓠也从包从夸聲包取其可包藏物也交切文三自急敕也从羊省从包省从口口猶愼言也从羊羊與義善美同意凡苟之屬皆从苟已力切古文羊不省肅也从攴苟居慶切文二重一人所歸爲鬼从人象鬼頭鬼陰气賊害从厶凡鬼之屬皆从鬼居偉切古文从示神也从鬼申聲食鄰切陽气也从鬼云聲戸昆切陰神也从鬼白聲普百切厲鬼也从鬼失聲丑利切耗鬼也从鬼虛聲朽居切旱鬼也从鬼犮聲周禮有赤魃氏除牆屋之物也詩曰旱魃爲虐蒲撥切老精物也从鬼彡彡鬼毛密祕切或从未聲古文籕文从彖首从尾省聲鬼服也一曰小兒鬼从鬼支聲韓詩傳曰鄭交甫逢二女鬾服竒寄切鬼皃从鬼虎聲虎烏切鬼俗也从鬼幾聲淮南傳曰吳人鬼越人􆄈居衣切鬼鬽聲䰰䰰不止也从鬼需聲奴豆切鬼變也从鬼化聲呼駕切見鬼驚詞从鬼難省聲讀若詩受福不儺諾何切鬼皃从鬼賔聲符眞切可惡也从鬼酉聲昌九切神獸也从鬼隹聲杜回切文十七重四鬼屬从鬼从离离亦聲丑知切鬼也从鬼􅏘聲莫波切驚也从鬼厭聲於琰切文三新附鬼頭也象形凡甶之屬皆从甶敷勿切惡也从由虎省鬼頭而虎爪可畏也於胃切古文省母猴屬頭似鬼从甶从禸牛具切文二重一姦哀也韓非曰蒼頡作字自營爲厶凡厶之屬皆从厶息夷切屰而奪取曰篡从厶萛聲初宦切相訹呼也从多从羑與久切或从言秀或如此古文臣鉉等案羊部有羑羑進善也此古文重出文三重三髙不平也从山鬼聲凡嵬之屬皆从嵬五灰切髙也从嵬委聲牛威切臣鉉等曰今人省山从爲魏國之魏語韋切文二說文解字弟九上說文解字第九漢太尉祭酒許氏記宣也宣气散生萬物有石而髙象形凡山之屬皆从山所閒切東岱南靃西華北恒中泰室王者之所以廵狩所至从山獄聲五角切古文象髙形大山也从山代聲徒耐切海中往往有山可依止曰㠀从山鳥聲讀若詩曰蔦與女蘿都皓切山在齊地从山杻聲詩曰遭我于之間兮努切葛嶧山在東海下邳从山睪聲夏書曰嶧陽孤桐羊益切封嵎之山在吴楚之閒汪芒之國从山禺聲􅢕俱切九嶷舜所葬在零陵管道从山疑聲語其切山在蜀湔氐西徼外从山聲武巾切山也或曰弱水之所出从山几聲居履切巀嶭山在馮翊他陽从山􅎒聲才葛切巀嶭山也从山薛聲五葛切山在弘農華隂从山華省聲胡化切山在鴈門从山􅴹聲古博切崵山在遼西从山昜聲一曰嵎鐵崵谷也與章切山有草木也从山古聲詩曰陟彼岵兮矦古切山無草木也从山已聲詩曰陟彼屺兮墟里切山多大石也从山學省聲胡角切山多小石也从山敖聲五交切石戴土也从山且聲詩曰陟彼岨矣七余切山骨也从崗聲郎古切山小而髙从山今聲鉏箴切山之岑崟也从山金聲魚音切崒危髙也从山卒聲醉綏切山小而銳从山􅒋聲洛官切山如堂者从山宓聲美畢切山穴也从山由聲似又切籀文从穴髙也从山陖聲私閏切􅳮或省山之嶞嶞者从山从隋省聲讀若相推落之憜徒果切允髙也从山棧聲士限切山短髙也从山屈聲衢勿切巍髙也从山蠆聲讀若厲力制切山耑也从山夆聲敷容切岸也从山嚴聲五緘切山巖也从山品讀若吟臣鉉等曰从品象巖厓連屬之形五咸切也从山絫聲落猥切山皃从山辠聲徂賄切山皃一曰山名从山告聲古到切山皃从山隓聲徒果切臣鉉等案隓與􅤚同􅤚今亦音徒果切則是隓兼有此音山皃从山􅐔聲昨何切嗟峨也从山我聲五何切嶸也从山青聲臣鉉等曰今俗別作崢非是七耕切崝嶸也从山榮聲戸萠切谷也从山巠聲戸經切山壌也从山朋聲女滕切古文从􅊟山脅道也从山弗聲敷勿切山名从山敄聲云遇切焦嶢山髙皃从山堯聲古僚切山􅳮也从山我聲慈良切九嵏山在馮翊谷口从山㚇聲子紅切陬腢髙山之節从山从卪子結切嵬髙也从山宗聲鉏弓切大髙也从山隹胙回切文五十三重四嶙峋深崖皃从山粦聲力珍切嶙峋也从山旬聲相倫切山髙皃从山及聲魚汲切山銳而髙也从山喬聲古通用喬渠廟切山深皃从山欺省聲口衘切㠀也从山與聲徐吕切山道也从山領聲良郢切山名从山萬省聲盧含切中岳嵩髙山也从山从髙亦从松韋昭國語注云古通用崇字息弓切崑崙山名从山昆聲漢書揚雄文通用昆侖古渾切崑崙也从山侖聲盧昆切山名从山稽省聲奚氏避難特造此字非古胡雞切文十二新附二山也凡屾之屬皆从屾所臻切㑹稽山一曰九江當嵞也民以辛壬癸甲之日嫁娶从屾余聲虞書曰予娶嵞山同都切文二岸髙也从山厂厂亦聲凡屵之屬皆从屵五葛切水厓而髙者从屵干聲五旰切髙邉也从屵圭聲五隹切髙也从屵隹聲都回切崩也从屵肥聲符鄙切崩聲从屵配聲讀若費蒲没切文六因广爲屋象對刺高屋之形凡广之屬皆从广讀若儼然之儼魚儉切文書藏也从广付聲臣鉉等曰今藏腑字俗書从肉非是方矩切夭子饗飲辟廱从广雝聲於容切禮官養老夏日枝殷曰庠周曰序从广羊聲似陽切寄也秋冬去春夏居从广盧聲力居切宫中也从广廷聲特丁切中庭也从广留聲力救切樓牆也从广屯聲徒損切廡也从广牙聲周禮曰夏庌馬五下切堂下周屋从广無聲文用切籕文从舞廡也从广虜聲讀若鹵郎古切廚也从广包聲簿交切庖屋也从广尌聲直株切兵庫藏也从車在广下苦故切馬舎也从广聲周禮曰馬有二百十四匹焉廏廏有僕夫居又切古文从九東西牆也从广予聲徐㠯切牆也从广辟聲比激切殿之大屋也从广黄聲古晃切芻藳之藏从广㑹聲古外切水漕倉也从广臾聲一曰倉無屋者以主切蔽也从广并聲必郢切清也从广則聲初吏切一畒半一家之居从广里入士直連切屋牝瓦下一曰維綱也从广省聲讀若環戸關切屋階中㑹也从广怱聲倉紅切廣也从广侈聲春秋國語曰俠溝而㢋我尺氏切仄也从广兼聲力兼切開張屋也从广秅聲濟隂有㢉縣宅加切髙屋也从广龍聲薄江切山居也一曰下也从广氐聲都礼切礙止也从广至聲陟栗切安止也从广嬰聲鉅鹿有廮陶縣於郢切舍也从广犮聲詩曰召伯所废蒲撥切中伏舎从广卑聲一曰屋庳或讀若逋便俾切䕃也从广比聲必至切屋下衆也从广炗炗古文光字臣鉉等曰光亦衆盛也商署切儲置屋下也从广寺聲直里切行屋也从广異聲與職切屋麗廔也从广婁聲一曰穜也洛侯切屋从上傾下也从广隹聲都回切屋頓也从厂發聲方肺切久屋朽木从广酉聲周禮曰牛夜鳴則庮臭如朽木與久切少劣之居从广堇聲巨斤切尊先祖皃也从广朝聲眉召切古文人相依㡹也从广且聲子余切屋迫也从广曷聲於歇切卻屋也从广屰聲昌石切陳輿服於庭也从广欽聲讀若歆許今切空虚也从广膠聲臣鉉等曰今别作寥非是洛蕭切文四十九重三屋也从广夏聲朝雅切東西序也从广郎聲漢書通用郎魯當切廊也从广相聲息良切祭山曰庪縣从广技聲過委切地名从广未詳丑抍切人姓从广未詳當是省廫字尔力救切文六新附山石之厓巖人可居象形凡厂之屬皆从厂呼旱切籀文从干山邊也从厂圭聲五隹切厜㕒山顚也从厂垂聲姉冝切厜㕒也从厂義聲魚爲切崟也一曰地名从厂敢聲魚音切仄出泉也从厂晷聲讀若斬居洧切柔石也从厂氐聲職雉切厎或从石發石也从厂欮聲俱月切旱石也从厂蠆省聲力制切或不省厱諸治玉石也从厂僉聲讀若藍魯甘切治也从厂秝聲郎擊切石利也从厂異聲讀若枲胥里切美石也从厂古聲矦古切唐石也从厂屖省聲杜兮切石聲也从厂立聲盧荅切石地惡也从厂兒聲五歷切石地也从厂金聲讀若紟巨今切石間見从厂甫聲讀若敷芳無切厲石也从厂㫺聲詩曰他山之石可以爲暦倉各切又七玄切石大也从厂尨聲莫江切岸上見也从厂从之省讀若躍以灼切􅷘也从厂夾聲胡甲切側傾也从人在厂下阻力切籀文从夨夨亦聲反也从厂辟聲普繫切隱也从厂非聲扶沸切笮也从厂猒聲一曰合也於輒切又一琰切仰也从人在厂上一曰屋梠也秦謂之桷齊謂之厃魚毁切文二十七重四圜傾側而轉者从反仄凡丸之屬皆从丸胡官切鷙鳥食已吐其皮毛如丸从丸咼聲讀若骫於跪切丸之孰也从丸而聲奴未切闕芳萬切文四在高而懼也从厃自卪止之凡危之屬皆从危魚爲切㩻䧢也从危支聲去其切文二山石也在厂之下口象形凡石之屬皆从石常隻切銅鐵樸石也从石黄聲讀若穬古猛切古文礦周禮有卝人文石也从石昜聲徒浪切石次玉者从石耎聲而沇切石可以爲矢鏃从石奴聲夏書曰梁州貢砮丹春秋國語曰肅愼氏貢棓矢石砮乃都切毒石也出漢中从石與聲羊茹切特立之石東海有碣石山从石曷聲渠􅍌切古文庽石也一曰赤色从石兼聲讀若鎌力鹽切厲石也从石叚聲春秋傳曰鄭公孫碬字子石乎加切小石也从石樂聲郎擊切木邊石从石巩聲春秋傳曰闕䂬之甲居竦切水陼有石者从石責聲七迹切豎石也从石卑聲府眉切陊也从石㒸聲徒對切落也从石員聲春秋傳曰磒石于宋五于敏切碎石隕聲从石炙聲所責切石聲从石告聲若角切石聲从石良聲魯當切石聲从石學省聲胡角切石堅也从石吉聲一曰突也格八切石聲从石盍聲口太切又若盍切餘堅者从石堅省口莖切石聲也从石厤聲郎擊切礹石也从石斬聲鉏衘切石山也从石嚴聲五銜切堅也从石􅌛聲楷革切礊石也从石角聲臣鉉等曰今俗作確非是胡角切确或从㱿磐石也从石堯聲口交切石巖也从石我聲五何切磛喦也从石品周書曰畏于民碞讀與巖同臣鉉等曰从品與喦同意五銜切樂石也从石殸象縣虞之形殳擊之也古者母句氏作磬苦定切籀文省古文从巠止也从石疑聲五溉切上摘山巖空青珊瑚古文長亦古文長極陳也从長隶聲息利切或从髟乆長也从長爾聲武夷切蛇惡毒長也从長失聲徒結切文四重三州里所建旗象其柄有三游雜帛幅半異所以趣民故遽稱勿勿凡勿之屬皆从勿文弗切勿或从㫃開也从日一勿一曰飛揚一曰長也一曰彊者衆皃與章切文二重一毛冄冄也象形凡冄之屬皆从冄而琰切文一頰毛也象毛之形周禮曰作其鱗之而凡而之屬皆从而臣鉉等曰今俗别作髵非是如之切罪不至髡也从而从彡奴代切或从寸諸法度字从寸文二重一彘也竭其尾故謂之豕象毛足而後有尾讀與豨同桉今丗字誤以豕爲彘以彘爲豕何以明之爲啄琢从豕蟸从彘皆取其聲以是明之臣鉉等曰此語未詳或後人所加凡豕之屬皆从豕式視切古文豕而三毛叢居者从豕者聲陟魚切小豚也从豕㱿聲歩角切生三月豚腹豯豯皃也从豕奚聲胡雞切生六月豚从豕從聲一曰一歳豵尚叢聚也子紅切牝豕也从豕巴聲一曰一歳能相把拏也詩曰一發五豝伯加切三歳豕肩相反者从豕幵聲詩曰並驅从兩豜兮古賢切羠豕也从豕賁聲符分切牡豕也从豕叚聲古牙切上谷名豬豭从豕役省聲營隻切豶也从豕隋聲臣鉉等曰當从隨省以水切齧也从豕聲康很切豕息也从豕壹聲春秋傳曰生敖及豷許利切豕息也从豕甫聲芳無切以穀圈養豕也从豕聲胡慣切豕屬从豕且聲疾余切逸也从豕原聲周書曰豲有爪而不敢以䙠讀若桓胡官切豕走豨豨从豕希聲古有封豨脩虵之害虚豈切豕絆足行豖豖从豕繫二足丑六切鬬相丮不解也从豕虍豕虍之鬬不解也讀若蘮蒘草之蘮司馬相如說豦封豕之屬一曰虎兩足舉强魚切豕怒毛豎一曰殘艾也从豕辛臣鉉等曰从辛未詳魚旣切二豕也豳从此闕伯貧切又呼闗切文二十二重一脩豪獸一曰河内名豕也从彑下象毛足凡㣇之屬皆从㣇讀若弟羊至切籀文古文豕屬从㣇聲呼骨切豕鬣如筆管者出南郡从㣇髙聲乎刀切說文从豕臣鉉等曰今俗則作毫非是蟲似豪豬者从㣇省聲于貴切或从虫㣇屬从二㣇息利切古文㣈虞書曰㣈類于上帝文五重五豕之頭象其銳而上見也凡彑之屬皆从彑讀若罽居例切豕也後蹏發謂之彘从彑矢聲从二匕彘足與鹿足同直例切豕也从彑从豕讀若弛式視切豕也从彑下象其足讀若瑕乎加切豕走也从彑从豕省通貫切文五小豕也从彖省象形从又持肉以給祠祀凡豚之屬皆从豚徒魂切篆文从肉豕豚屬从豚䘙聲讀若罽于歳切文二重一獸長脊行豸豸然欲有所司殺形凡豸之屬皆从豸池爾司殺讀若伺候之伺切似虎圜文从豸勺聲北敎切貙獌似貍者从豸區聲敕俱切貙屬也从豸單聲徒干切豹屬出貉國从豸聲詩曰獻其貔皮周書曰如虎如貔貔猛獸房脂切或从比狼屬狗聲从豸才聲士皆切猰貐似貙虎爪食人迅走从豸俞聲以主切似熊而黄黑色岀蜀中从豸莫聲莫白切猛獸也从豸庸聲余封切貜也从豸矍聲王縛切獸無前足从豸出聲漢律能捕豺貀購百錢女滑切似狐善睡獸从豸舟聲論語曰狐貈之厚以居臣鉉等曰舟非聲未詳下各切

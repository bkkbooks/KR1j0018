front:
  text: 說文解字弟十三上漢太尉祭酒許愼
  hash: sha256:464698aac007c664a26e0dfb7e606e8ee2cc63420f5e3fdb263fc8ba177820ae
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1j0018_SBCK_013-1a}
body:
  text: 政校定二十三部文六百九十九重一百二十三凡八千三百九十八字文三十七新附細絲也象束絲之形凡糸之屬皆从糸讀若覛徐鍇曰一蠶所吐爲忽十忽爲絲糸五忽也莫狄切古文糸蠶衣也从糸从虫繭省古典切古文从糸見繹繭爲絲也从糸巢聲穌遭切抽絲也从糸睪聲羊益切絲耑也从糸者聲徐吕切微絲也从糸面聲弭切絲也从糸屯聲論語曰今也純儉常倫切生絲也从糸肖聲相么切大絲也从糸皆聲口皆切絲曼延也从糸聲呼光切絲下也从糸气聲春秋傳有絲下没切絲滓也从糸氐聲都兮切繭滓絓頭也一曰以囊絮練也从糸圭聲胡卦切絲色也从糸樂聲以灼切著絲於筟車也从糸崔聲蘇對切織也从糸巠聲九丁切作布帛之緫名也从糸戠聲之弋切樂泿挈令織从糸从式臣鉉等曰挈令蓋律令之書也機縷也从糸壬聲如甚切紝或从任機縷也从糸宗聲子宋切緯十縷爲絡从糸咎聲讀若柳力乆切織横絲也从糸韋聲云貴切緯也从糸軍聲王問切織餘也从糸貴聲胡對切紀也从糸充聲他緫切絲别也从糸己聲居擬切觕類也从糸强聲居兩切絲節也从糸類聲盧對切絲勞即紿从糸台聲徒亥切絲溼納納也从糸内聲奴荅切網絲也从糸方聲妃兩切斷絲也从糸从刀从卩情雪切古文絶象不違體絶二絲續也从糸㡭一曰反􅓟爲繼古詣切達也从糸賣聲似足切古文續从庚貝臣鉉等曰今俗作古行切繼也从糸贊聲作管切繼也从糸召聲一曰紹緊紏也市沼切古文紹从邵偏緩也从糸羡聲昌善切緩也从糸盈聲讀與聽同他丁切䋼或从呈緩也一曰舎也从糸從聲足用切緩也从糸予聲傷魚切絲勞也从糸然聲如延切詘也从糸于聲曰縈也億俱切直也从糸幸聲讀若陘胡頂切細也从糸韱聲息廉切微也从糸囟聲穌計切旄絲也从糸苗聲周書曰惟緢有稽武儦切參縒也从糸差聲楚宜切冕也从糸番聲附袁切亂也从糸宿聲一曰蹴也所六切亂也从糸文聲商書曰有條而不紊亡運切絲次弟也从糸及聲居立切聚束也从糸怱聲臣鉉等曰今俗作捴非是作孔切約也从糸具聲居玉切纏束也从糸勺聲於略切纏也从糸聲盧鳥切繞也从糸廛聲直連切纏也从糸堯聲而沼切轉也从糸㐱聲之忍切落也从糸瞏聲胡畎切交也从糸辡聲頻犬切締也从糸吉聲古屑切結也从糸骨聲古忽切結不解也从糸帝聲特計切束也从糸􅌹聲符钁切束也从糸崩聲墨子曰禹葬會稽桐棺三寸葛以繃之𥙷盲切意也从糸求聲詩曰不競不絿巨鳩切急引也从糸冋聲古切散絲也从糸聲匹卦切不均也从糸羸聲力卧切相足也从糸合聲居立切止也从糸林聲讀若郴丑林切止也从糸畢聲卑吉切素也从糸九聲胡官切絿絲也从糸冬聲職戎切古文終合也从糸从集讀若撻姉入切帛也从糸曾聲疾陵切籀文繒从宰省揚雄以爲漢律祠宗廟丹書告繒也从糸胃聲云貴切綺絲之數也漢律曰綺絲數謂之絩布謂之緫綬組謂之首从糸兆聲治小切文繒也从糸竒聲祛被切細縳也从糸聲胡谷切白鮮色也从糸專聲持沇切并絲繒也从糸兼聲古甛切厚繒也从糸弟聲杜兮切湅繒也从糸柬聲郎甸切鮮色也从糸髙聲古老切粗緒也从糸壐聲臣鉉等曰今俗別作絁非是式支切大絲繒也从糸由聲直由切緻繒也一曰幑幟信也有齒从糸􅽠聲康礼切東齊謂布帛之細曰綾从糸夌聲力膺切繒無文也从糸曼聲漢律曰賜衣者縵表白裏莫半切五采備也从糸肅聲息救切詩云素以爲絢兮从糸旬聲臣鉉等案論語注絢文貌許掾切會五采繡也虞書曰山龍華蟲作繪論語曰繪事後素从糸會聲黃外切白文皃詩曰緀兮斐兮成是具錦从糸妻聲七稽切繡文如聚細米也从糸从米米亦聲莫礼切繒如麥䅌从糸肙聲吉掾切帛靑黃色也从糸录聲力玉切帛青白色也从糸㶾聲敷沼切帛靑經縹緯一曰育陽染也从糸育聲余六切純赤也虞書丹朱如此从糸朱聲章俱切淺絳也从糸熏聲許云切絳也从糸出聲丑律切大赤也从糸夅聲吉巷切惡也絳也从糸官聲百綃也讀若雞卵烏版切帛赤色也春秋傳縉雲氏禮有縉縁从糸晉聲即刃切赤繒也从茜染故謂之綪从糸青聲倉絢切帛丹黃色从糸是聲他礼切緹或从氐帛赤黃色一染謂之縓再染謂之䞓三染謂之纁从糸原聲七絹切帛青赤色从糸此聲將此切帛赤白色从糸工聲戸公切帛靑色从糸葱聲倉紅切帛深靑楊赤色从糸其聲古暗切帛蒼艾色从糸卑聲詩縞衣䌆巾未嫁女所服一曰不借綥渠之切綥或从其帛如紺色或曰深繒从糸喿聲讀若喿親小切帛黑色也从糸甾聲側持切帛雀頭色一曰微黑色如紺纔淺也讀若讒从糸毚聲咸切帛騅色也从糸剡聲詩曰毳衣如􅣞臣鉉等曰今俗别作毯非是土敢切帛戻艸染色从糸戾聲郎計切白鮮衣皃从糸不聲詩曰素衣其紑匹丘切白觧衣皃从糸炎聲謂衣采色鮮也充三切繒采色从糸需聲讀若易繻有衣臣鉉等曰漢書傳符帛也相俞切繁采色也从糸辱聲而蜀切冠織也从糸麗聲所綺切冠卷也从糸厷聲戸萌切紘或从弘冕冠塞耳者从糸火聲臣鉉等曰今俗别作非是都感切冠系也从糸嬰聲於盈切纓卷也从糸央聲於兩切系冠纓也从糸委聲儒隹切織帶也从糸昆聲古本切大帶也从糸申聲失人切帶緩也从糸單聲昌善切韍維也从糸受聲殖酉切綬屬其小者以爲冕纓从糸且聲則古切綬紫靑也从糸咼聲古蛙切綬維也从糸逆聲宜乾切似而赤从絲聲作管切系也一曰結而可解从糸戋聲女久切靑絲綬也从糸侖聲古還切系綬也从糸延聲他丁切緩也从糸亘聲胡官切細䟽布也从糸惠聲私銳切頸連也从糸暴省聲補各切衣系也从糸今聲居音切籀文从金衣純也从糸彖聲以絹切裳削幅謂之从糸僕聲博大切脛衣也从糸夸聲苦故切絝紐也从糸喬聲牽搖切小兒衣也从糸保聲臣鉉等曰今俗作褓非是博抱切薉貉中女子無絝以帛爲脛空用絮補核名曰繜衣狀如襜褕从糸尊聲子昆切絛屬从糸皮聲讀若被或讀若水波之波博禾切扁緒也从糸攸聲土刀切采彰也一曰車馬飾从糸戊聲王伐切絨屬从糸从從省聲足容切圜采也从糸川聲詳遵切增益也从糸重聲直容切援臂也从糸襄聲汝羊切維綱中繩从糸巂聲讀若晝或讀若維戸圭切維紘繩也从糸岡聲古郎切古文綱持綱紐也从糸員聲周禮曰縜寸臣鉉等曰縜長寸也爲贇切絳綫也从糸侵省聲詩曰貝胄朱侵子林切綫也从糸婁聲力主切縷也从糸戔聲私箭切古文綫縷一枚也从糸穴聲乎決切以鍼紩衣也从糸逢聲符容切緶衣也从糸疌聲七接切或从習縫也从糸失聲直質切衣戚也从糸耎聲而沇切補縫也从糸旦聲丈莧切補也从糸善聲時戰切論語曰絬衣長短右袂从糸舌聲私􅍌切綴得理也一曰大索也从糸畾聲力追切以絲介履也从糸离聲力知切刀劒緱也从糸矦聲古矦切衣也从糸殹聲一曰赤黑色繒烏雞切旌旗之游也从糸參聲所銜切衺幅也一曰三糾繩也从糸微省聲許歸切扁緒也一曰弩腰鉤帶从糸折聲并􅍌切繟繩也从糸刃聲女鄰切索也从糸蠅省聲食陖切䊸未縈繩一曰急弦之聲从糸爭聲讀若旌側莖切收韏也从糸熒省聲於營切纑繩絇也从糸句聲讀若鳩其俱切以繩有所縣也春秋傳曰夜縋納師从糸追聲持僞切攘臂繩也从糸聲居願切東篋也从糸咸聲古咸切緘也从糸聲徒登切次簡也从糸扁聲布玄切車蓋維也从糸隹聲以追切車絥也从糸伏聲平祕切絥或从艸絥或从革􅴻聲乗輿馬飾也从糸正聲諸盈切䋊綊也从系夾聲胡頰切馬髦飾也从糸每聲春秋傳曰可以稱旌緐乎附袁切繁或从籀文弁馬紲也从系畺聲居良切馬尾韜也从糸分聲撫文切馬緧也从糸肘省聲除栁切馬紂也从糸酋聲七由切馬縶也从糸半聲博慢切絆前兩足也从糸須聲漢令蠻夷卒有相主切牛系也从糸引聲讀若矤直引切从長䌤繫牛也从糸旋聲辭戀切牛轡也从糸麻聲靡爲切縻或从多系也从糸丗聲春秋傳曰臣負羈紲私􅍌切紲或从枼索也从糸黒聲莫北切大索也一曰急也从糸恒聲古恒切綆也从糸矞聲余聿切古文从絲籕文繘汲井綆也从糸更聲古杏切彈彄也从糸有聲弋宰切又古亥切生絲縷也从糸敫聲之若切繴謂之罿罿謂之罬罬謂之罦捕鳥覆車也从糸辟聲博戹切釣魚繳也从糸昏聲吳人解衣相被謂之緍或口切敝緜也从糸如聲息據切絮也一曰麻未漚也从糸各聲盧各切絮也从糸廣聲春秋傳曰皆如狹纊苦謗切纊或从光絮一苫也从糸氏聲諸氏切治敝絮也从糸咅聲芳武切絜緼也一曰敝䋈从糸奴聲易曰需有衣䋈女余切繫􅮗也一曰惡絮从糸􅌛聲古詣切繫􅮗也一曰維也从糸虒聲郎今切纊也从糸咠聲七入切績所緝也从糸次聲七四切緝也从糸責聲則歷切布縷也从糸盧聲洛乎切布也一曰粗紬从糸付聲防無切蜀細布也从糸彗聲祥歳切細葛也从糸希聲丑脂切粗葛也从糸谷聲綺切綌或从巾絺之細也詩曰蒙彼縐絺一曰蹴也从糸芻聲側救切細布也从糸全聲此縁切檾屬細者爲絟粗者爲紵从糸宁聲直吕切紵或从緒省十五升布也一曰兩麻一絲布也从糸思聲息兹切古文緦从糸省細布也从糸易聲先繫切緆或从麻緰貢布也从糸俞聲度矦切服衣長六寸博四寸直心从糸表聲倉曰切喪首戴也从糸至聲臣鉉等曰當从姪省乃得聲徒結切交枲也一曰緁衣也从糸便聲房連切履也一曰青絲頭履也讀若阡陌之陌从糸戸聲亡百切枲履也从糸封聲博蠓切履兩枚也一曰絞也从糸从兩兩亦聲力讓切麻一耑也从糸㓞聲古屑切枲之十絜也一曰綢繆从糸翏聲武彪切繆也从糸周聲直由切紼也从糸昷聲於去切亂糸也从糸弗聲分勿切氐人殊縷布也从糸并聲北萌切氐人􅖯也讀若禹貢玭珠从糸比聲卑履切西胡毳布也从糸罽聲居例切經也从糸益聲春秋傳曰夷姜縊於賜切車中把也从糸从妥徐鍇曰礼升車必正立執綏所以安也當从瓜从安省說文無妥字息遺切宗廟常器也从糸糸繤也廾持永器中寳也互聲此與爵相似周禮六彞雞彞鳥彞黄彞虎彞蟲彞斝彞以待祼將之禮以脂切皆古文彞密也从糸致聲直利切文二百四十八重三十一帛淺黄色也从糸相聲息良切帛赤色也从糸非聲甫微切帛靑赤色也从糸取聲子矦切蓋也从糸散聲穌旱切布屬从糸束聲所菹切事也从糸宰聲子代切繾綣不相離也从糸遣聲去演切繾綣也从糸卷聲去阮切文九新附白緻繒也从糸􅑰取其澤也凡素之屬皆从素桑故切素屬从素奴聲居玉切白䋤縞也从素勺聲以灼切素屬从素率聲所律切也从素卓聲昌約切繛或省繛也从素爰聲胡玩切緩或省文六重二𧖟所吐也从二糸凡絲之屬皆从絲息兹切馬也从絲从與連同意詩曰六轡如絲兵媚切織絹从糸貫杼也从絲省卝聲古還切臣鉉等曰卝古字文二捕鳥畢也象絲罔上下其竿柄也凡率之屬皆从率所律切文一一名蝮博三寸首大如擘指象其臥形物之微細或行或毛或蠃或介或鱗以虫爲象凡虫之屬皆从虫許偉切虫也从虫复聲芳目切神蛇也从虫聲徒登切大蛇可食从虫井聲人占切螾也从虫堇聲弃忍切側行者从虫寅聲余忍切螾或从引蟲在牛馬皮者从虫􅡇聲烏紅切螉䗥也从虫從聲子紅切知聲蟲也从虫郷聲許兩切司馬相如蠁从向蟲也从虫召聲都僚切蟲也从虫聲祖外切繭蟲也从虫甬聲余隴切蛹也从虫鬼聲讀若潰胡罪切腹中長蟲也从虫有聲戸恢切腹中短蟲也从虫堯聲如招切似蜥蜴而大从虫唯聲息遺切虺以注鳴詩曰胡爲虺蜥从虫兀聲臣鉉等曰兀非聲未詳許偉切蜥易也从虫析聲先擊切在壁曰蝘蜓在艸曰蜥易从虫匽聲於殄切蝘或从䖵蝘蜓也从虫廷聲一曰螾蜓徒典切榮蚖蛇醫以注鳴者从虫元聲愚袁切蟲也一曰大螫也讀若蜀都布名从虫雚聲巨貟切蟲食穀葉者吏冥冥犯法即生螟从虫从冥冥亦聲莫經切蟲食苗葉者吏乞貸則生蟘从虫从貸貸亦聲詩曰去其螟蟘臣鉉等曰今俗作􅠀非是徒得切蝨子也一曰齊謂蛭曰蟣从虫幾聲居稀切蟣也从虫至聲之日切蛭蝚至掌也从虫柔聲耳由切蛣䖦蝎也从虫吉聲去吉切蛣䖦也从虫出聲區勿切白魚也从虫覃聲余箴切丁蛵負勞也从虫巠聲戸經切毛蠹也从虫臽聲乎感切蟲也从虫喬聲居夭切毛蟲也从虫􅥘聲千志切蠆也从虫圭聲烏蝸切䖯也从虫氐聲巨支切毒蟲也象形丑芥切蠆或从䖵蝤也从虫酋聲字秋切也从虫齊聲徂兮切蝤蠐也从虫曷聲胡葛切蚚也从虫弘聲徐鍇曰弘與强聲不相近秦刻石文从口疑从籀文省巨良切籀文强从䖵从彊强也从虫斤聲巨衣切葵中𧖟也从虫上目象蜀頭形中象其身蜎蜎詩曰蜎蜎者蜀市玉切馬蠲也从虫目益聲了象形明堂月令曰腐艸爲蠲古玄切齧牛蟲也从虫聲邊兮切尺蠖屈申蟲从虫蒦聲烏郭切復陶也劉歆說蝝蚍蜉子董仲舒說蝗子也从虫彖聲與專切螻蛄也从虫婁聲一曰天螻洛矦切螻蛄也从虫古聲古乎切丁螘也从虫龍聲盧紅切羅也从虫我聲臣鉉等案爾雅蛾羅𧖟我也䖵部已有或作䖸此重出五何切蚍蜉也从虫豈聲魚綺切螘子也从虫氐聲周禮有蚳醢讀若祁直尼切籀文蚳从䖵古文蚳从辰上􅊟蠜也从虫樊聲附袁切悉􅢊也从虫帥聲臣鉉等曰今俗作蟀非是所律切馬蜩也从虫面聲武延切蠰不過也从虫當聲都郎切黨蠰也从虫聲汝羊切堂蜋也从虫良聲一名蚚父魯當切蟲蛸堂蜋子从虫肖聲相邀切􅛔蟥以翼鳴者从虫并聲薄經切􅛔蟥也从虫矞聲余律切􅛔蟥也从虫黄聲乎光切蛅䗐强芈也从虫施聲式支切蛅斯墨也从虫占聲職廉切縊女也从虫見聲胡典切盧蜰也从虫肥聲符非切渠䖼一曰天社从虫却聲其切螎蠃蒲盧細要去蠭也天地之性細要純雄無子詩曰螟􅘾有子􅝻蠃貧之从虫􅸮聲古火切􅝻或从果蜾蠃也从虫􅢓聲一曰􅫧蝓郎果切螟􅘾桑蟲也从虫霝聲即丁切蛺蜨也从虫夾聲兼吽切蛺蜨也从虫疌聲臣鉉等曰今俗作非是徒吽切蟲也从虫之聲赤之切螌蝥毒蟲也从虫般聲布還切螌蝥也从虫敄聲臣鉉等曰今俗作蟊非是蟊即蟊蜁蛛之别名也莫交切䑕婦也从虫番聲附袁切蛜威委黍委黍䑕婦也从虫伊省聲於脂切蜙蝑以股鳴者从虫松聲息恭切蜙或省臣鉉等曰今俗作古紅切以爲蜈蚣蟲名蜙蝑也从虫胥聲相居切蟲也从虫庶聲之夜切螽也从虫皇聲乎光切蟬也从虫周聲詩曰五月鳴蠋徒聊切蜩或从舟以㫄鳴者从虫單聲市連切寒蜩也从虫兒聲五雞切螇鹿蛁蟟也从虫奚聲胡雞切􅢤蚗蛁蟟也从虫夬聲於恱切􅢤蚗蟬屬讀若周天子赧从虫丐聲武延切蜻蛚也从虫列聲良切蜻蛚也从也靑聲子盈切蜻蛉也从虫令聲一名桑桹郎丁切蠛蠓也从虫蒙聲莫孔切螶􅨑也一曰蜉游朝生莫死者从虫􅮼聲离灼切秦晉謂之蜹楚謂之蚑从虫芮聲而銳切蟰蛸長股者从虫肅聲穌彫切蟲也从虫省聲息正切商何也从虫乎聲力輟切蠅䏣也周禮蜡氏掌除􅟆从虫昔聲鉏駕切動也从虫耎聲而沇切行也从虫支聲巨支切蟲行也从虫睘聲香沇切蟲曳行也从虫中聲讀若騁丑善切螽螸垂腴也从虫欲聲余足切蠅醜摇翼也从虫扇聲式戰切蛇蟬所解皮也从虫蛻省輸芮切螫也从虫若省聲呼各切蟲行毒也从虫赦聲施隻切也从虫亞聲烏各切蛘也从虫羊聲余兩切敗創也从虫人食食亦聲乗力切龍之屬也池魚满三千六百蛟來爲之長能率魚飛置笱水中即蛟去从虫交聲古肴切若龍而黃北方謂之地螻从虫离聲或云無角曰螭丑知切龍子有角者从虫斗聲渠幽切蛇屬黑色潜于神淵能興風雨从虫侖聲讀若戾艸力屯切蜦或从戾海蟲也長寸而白可食从虫兼聲讀若嗛力鹽切雉入化爲蜃从虫辰聲時忍切蜃屬有三皆生於海千歳化爲􅧳秦謂之牡厲又云百歳燕所化魁􅧳一名復累老服翼所化从虫合聲古沓切階也脩爲螷圜爲蠇从虫庳臣鉉等蝙蝠也从虫扁聲布玄切蝙蝠服翼也从虫畐聲方六切南蠻蛇穜从虫􅒋聲莫還切東南越蛇穜从虫門聲武巾切螮蝀也狀似蟲从虫工聲明堂月令曰虹始見戸工切籀文虹从申申電也螮蝀虹也从虫帶聲都計切螮蝀也从虫東聲多貢切衣服歌謠艸木之怪謂之禽獸蟲蝗之怪謂之从虫嶭聲魚􅍌切文一百五十三重十五南方夷也从虫延聲徒旱切蟪蛄蟬也从虫惠聲曰棫切蠛蠓細蟲也从虫蔑聲亡結切虴蜢艸上蟲也从虫乇聲陟格切虴蜢也从虫孟聲莫杏切蟋􅢊也从虫悉聲息七切螳蜋也从虫良聲徒郎切文七新附說文解字弟十三上說文解字弟十三下漢太尉祭酒許慎記敕校定蟲之緫名也从二虫凡䖵之屬皆从䖵讀若昆古魂切任絲也从䖵㬱聲昨含切𧖟化飛蟲从䖵我聲五何切或从虫齧人䖴蟲从䖵叉聲又古瓜字子皓切蟲或從虫齧人蟲从䖵卂聲所櫛切蝗也从䖵夂聲夂古文終字職戍切螽或从虫衆聲蟲也从䖵展省聲知衍切小蟬蜩也从䖵􅎒聲子刿切蠿蟊作罔蛛蟊也从䖵􅓟聲􅓟古絶字側八切蠿蟊也从䖵矛聲莫交切蟲也从䖵寜聲奴丁切也从䖵曹聲財牢切蝼蛄也从䖵舝聲胡葛切蛸也从䖵卑聲匹摽切或从虫飛蟲螫人者从䖵逢聲敷容切古文省蠭甘飴也一曰螟子从䖵鼏聲必切或从宓螶􅨑也从䖵巨聲強魚切齧人飛蟲从䖵民聲無分切蟁或从昬以昬時出也俗蟁从虫从文齧人飛蟲从䖵亡聲武庚切木中蟲从䖵橐聲當故切蠹或从木象蟲在木中形譚長說蟲齧木中也从䖵彖聲盧啓切士文多足蟲也从䖵求聲巨鳩切或从虫􅲗也从䖵㯱聲縳牟切蠧或从虫从孚蟲食也从䖵雋聲子兖切蟲動也从䖵春聲尺尹切古文蠢从􅥘周書曰我有干四文二十五重十三有足謂之蟲無足謂之豸从三虫凡蟲之屬皆从蟲直弓切蟲食艸根者从蟲象其形吏抵冒取民財則生徐鍇曰唯此一字象蟲形不从矛書者多誤莫浮切蟊或从敄臣鉉等按虫部已有莫交切作螌蝥蟲此重出古文蟊从虫从牟蚍蜉大螘也从蟲􅴡聲房脂切毗蟲或从虫比聲蟁也从蟲一門聲武巾切臭蟲負蠜也从蟲非聲房未切或从虫腹中蟲也春秋傳曰血蟲爲蠱晦淫之所生也臬死之鬼亦爲蠱从蟲从皿皿物之用也公戸切文六重四八風也東方曰明庶風東南曰淸明風南方曰景風西南曰涼風西方曰閶闔風西北曰不周風北方曰廣莫風東北曰融風風動蟲生故蟲八日而化从虫凡聲凡風之屬皆从風方戎切古文風北風謂之諷从風涼省聲吕張切小風也从風术聲翾聿切扶揺風也从風猋聲甫遥切飆或从包回風也从風㶾聲撫招切翔風也从風立聲穌合切髙風也从風翏聲力求切疾風也从風从忽忽亦聲呼骨切大風也从風胃聲王勿切大風也从風日聲干筆切風所飛揚也从風昜聲與章切風雨暴疾也从風利聲讀若栗力質切烈風也从風􅍌聲讀若􅍌良切文十三重二涼風也从風思聲息兹切飈飂也从風麥聲所鳩切風吹浪動也从風占聲隻冉切文三新附虫也从虫而長象冤曲垂尾形上古艸居患它故相問無它乎凡它之屬皆从它記何切它或从虫臣鉉等曰今俗作食遮切文一重一舊也外骨内肉者也从它龜頭與它頭同天地之性廣肩無雄龜鼈之類以它爲雄象足甲尾之形凡龜之屬皆从龜居追切古文龜龜名从龜乆聲乆古文終字徒冬切龜甲邊也从龜聲天子巨尺有二寸諸矦尺大夫八寸士六寸沒閻切文三重一鼃黽也从它象形黽頭與它頭同臣鉉等曰色其腹也凡黽之屬皆从黽莫杏切籀文黽甲蟲也从黽敝聲并􅍌切大鼈也从黽元聲愚袁切蝦蟇也从黽圭聲烏媧切圥鼀詹諸也其鳴詹諸其皮鼀鼀其行圥圥从黽从圥圥亦聲七宿切鼀或从酋􅖚􅠴詹諸也詩曰得此􅖚􅠴言其行􅠴􅠴从黽爾聲式支切水蟲似蜥易長大从黽單聲徒何切水蟲也薉貉之民食之从黽奚聲胡雞切雞屬頭有兩角出遼東从黽句聲其俱切營營青蠅蟲之大腹者从黽从虫余陵切䵹鼄蟊也从黽省聲陟离切或从虫䵹鼄也从黽朱聲陟輸切鼄或从虫匽鼂也讀若朝揚雄說匽鼂蟲名杜林以爲朝旦非是从黽从旦臣鉉等曰今俗作晁直遥切篆文然皀文十三重五海大鼈也从黽敖聲五牢切文一新附凡物無乳者卵生象形凡卵之屬皆从卵盧管切卵不孚也从弗段聲徒玩切文二二地之數也从偶凡二之屬皆从二而至切古文敏疾也从人从口从又从二二天地也徐鍇曰承天之時因地之利口謀之手執之時不可失疾也紀力切又去吏切當也从心从舟在二之間上下必以舟施恒也胡登切古文恒从月詩曰如月之恒求也从二从古文回象回形上下所求物也徐鍇曰回風回轉所以宣隂陽也須縁切厚也从二竹聲冬毒切最括也从二二偶也从了了古文及浮芝切文六重二土地之吐生物者也二象地之下地之中物出形也凡土之屬皆从土它魯切元气初分輕清陽爲天重濁隂爲地萬物所陳􅍌也从土也聲徒内切籀文地从隊地也易之卦也从土从申土位在申苦昆切兼垓八極地也國語曰天子居九垓之田从土亥聲古哀切四方土可居也从土奥聲於六切古文墺堣夷在冀州陽谷立春日日值之而出从土禺聲尚書曰宅堣夷􅢕俱切朝歌南七十里地周書武王與紂戰于坶野从土母聲莫六切阪也从土皮聲滂禾切地平也从土从平平亦聲皮命切平徧也从土从勻勻亦聲居勻切柔土也从土襄瓴也一曰未燒也从土􅌛聲古歷切埽除也从土弁聲讀若糞方問切棄也从土从帚穌老切存也从土才聲昨代切止也从土从留省土所止也此與留同意但卧切古文坐箸也从土氏聲諸氏切塞也从土眞聲陟鄰切今待季切安也从土旦聲他但切地相次此也衛大夫貞子名坒从土比聲毗至切滯也从土是聲丁礼切樂器也以土爲之六孔从土熏聲况袁切爵諸矦之土也从之从土从寸守其制度也公侯百里伯七十里子男五十里徐鍇曰各之其土也㑹意府容切古文封省籀文从半王者印也所以主土从土爾聲斯氏切籀文从玉書墨也从土从黒黒亦聲莫北切以桼和灰而䰍也从土完聲一曰胡寛胡玩切鑄器之法也从二刑聲戸經切射臬也从土􅙯聲讀若準之允切雞捷垣爲塒从土時聲市之切以盛民也从土从成成亦聲氏征切籀文城从城垣也从土庸聲余封切古文墉城上女垣也从土葉聲徒叶切䧟也从土欠聲苦感切下也春秋傳曰墊隘从土執聲都念切小渚也詩曰宛在水中坻从土氐聲直尼切坻或从水从夂坻或从水从耆下入也从土㬎聲敕立切水乾也一曰堅也从土各聲胡格切以土增大道上从土次聲疾資切古文从土即虞書曰龍朕堲讒說殄行堲疾惡也益也从土曽聲作滕切增也从土卑聲符支切益也从土付聲符一从土分聲一曰大防也房吻切塵也从土非聲房未切塵也从土矣聲烏開切塵埃也从土㙠聲烏雞切澱也从土沂聲魚切濁也从土后聲古厚切天隂塵也詩曰㙪其隂从土壹聲於計切丘再成者也一曰女牢燒从土不聲芳桮切螘封也詩曰鸛鳴于垤从土至聲徒結切益州部謂螾場曰坥从土且聲七余切徒隷所居也一曰女牢一曰亭部从土肙聲古泫切囚出也从土㕢聲胡八切幽薶也从土㾜聲於罽切喪葬下上也从土朋聲春秋傳曰朝而堋禮曰之卦周官謂之窆虞書曰堋淫于家方鄧切畔也爲四畤界祭其中周禮曰垗五帝於四郊从土兆聲治小切墓也从土熒省聲余傾切丘也从土莫聲莫故切墓也从土賁聲符勿切丘壠也从土龍聲力堹切祭場也从土亶聲徒干切祭神道也一曰田不耕一曰治穀田也从土昜聲直良切瑞王也上圜下方公執桓圭九寸矦執信圭伯執躬圭皆七寸子執榖璧男執蒲璧皆五寸以封諸矦从重土楚爵有執圭古畦切古文圭从玉東楚謂橋爲圯从土巳聲與之切逺邊也从土􅑰聲是為切兔堀也从土屈聲苦骨切文一百三十一重二十六泥也从土涂聲同都切塗也从土冥聲莫狄切八方之地也从土延聲以然切疆也从土易聲羊益切筋也象人筋之形治功曰力能圉大災凡力之屬皆从力林直切能成王功也从力熏聲許云切古文勲从員以勞定國也从力从工工亦聲古紅切左也从力且聲狀倨切助也从力从非慮聲良倨切勞也从力來聲洛代切愼也从力吉聲周書曰汝劼毖殷獻臣巨乙切趣也从力敄聲亡遇切迫也从力强聲巨良切古文从彊勉力也周書曰用勱相我邦家讀若萬从力萬聲莫話切勥也从力聲瞿月切彊也春秋傳曰勍敵之人从力京聲渠京切彊也从力巠聲吉正切彊也从力免聲亡辨切勉也从力召聲讀若舜樂韶寔照切勉也周書曰勖哉夫子从力冒聲許玉切勉也从力雚聲去願切任也从力聲識蒸切發也从力从徹徹亦聲臣鉉等曰今俗作撤非是丑列切并力也从力翏聲力竹切繇緩也从力象聲余兩切作也从力重聲徒緫切古文動从辵推也从力畾聲盧對切弱也从力少力輟切劇也从力熒省熒火燒冂用力者勞魯刀切古文勞从悉務也从力豦聲其據切尤極也从力充聲苦得切勞也詩云莫知我勩从力貰聲余制切勞也春秋傳曰安用勦民从力巢聲子小切又楚交切勞也从力卷聲聲臣鉉等曰今俗作倦義同渠卷切勞也从力聲巨巾切語相增加也从力从口舌牙切健也从力敖聲讀若豪五牢切气也从力甬聲余隴切勇或从戈用古文勇从心排也从力孛聲蒲没切劫也从力㶾聲匹眇切人欲去以力脅止曰劫或曰以力止去曰劫居怯切致堅也从人从力食聲讀若敕恥力切法有辠也从力亥聲胡槩切廣求也从力莫聲莫故切文四十重六勞也从力句聲其俱切盛力權也从力埶聲經典通用埶舒制切校也从力甚聲苦紺切致力也从力辡聲蒲莧切文四新附同力也从三力山海經曰惟號之山其風若劦凡劦之屬皆从劦胡頰切同心之和从劦从心胡頰切同思之和从劦从思胡頰切衆之同和也从劦从十臣鉉等曰十衆也胡頰切古文協从曰十或从口文一重五說文解字弟十三下

seq: 3
front:
  text: 所傳是前言也公戸切古文古大逺也从古叚叚聲古雅切文二重一十數之具也一爲東西丨爲南北則四方中央備
  hash: sha256:c60f16a91870239290e363826b77561cfc6e94721d3c5853d12ad5526274491a
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1j0018_SBCK_003-1a}
body:
  text: 矣凡十之屬皆从十是執切十尺也从又持十直兩切十百也从十从人此先切響布也从十从䏌臣鉉等曰䏌振䏌也義乙切卙卙盛也从十从甚汝南名𧖟盛曰卙子入切大通也从十从尃尃布也𥙷各切材十人也从十力聲盧則切二十并也古文省人汁切詞之矣从十咠聲秦入切文九三十并也古文省凡卉之屬皆从卉蘇沓切三十年爲一丗从卉而曳長之亦取其聲也舒制切文二直言曰言論難曰語从口䇂聲凡言之屬皆从言語軒切聲也从言賏聲烏莖切欬也从言殸聲殸籀文磬字去挺切論也从言吾聲魚舉切語也从言炎聲徒甘切報也从言胃聲于貴切信也从言京聲力讓切致言也从言从先先亦聲詩曰螽斯羽詵詵兮所臻切謁也从言青聲七井切白也从言曷聲於歇切聽也从言午聲虚吕切譍也从言若聲奴各切以言對也从言聲於證切猶譍也从言雔聲市流切辯也从言者聲章魚切志也从言寺聲書之切古文詩省驗也从言韱聲楚䕃切誦也从言風聲芳奉切諷也从言甬聲似用切誦書也从言賣聲徒谷切快也从言从中於力切說敎也从言川聲許運切䁱教也从言每聲荒内切專敎也从言巽聲此縁切諭也从言辟聲匹至切徐語也从言原罄孟子曰故謜謜而來魚怨切早知也从言央聲於亮切告也从言俞聲羊戍切辯論也古文从爲頗字从言皮聲彼義切吿曉之孰也从言􅙯聲讀若庉章倫切語諄䜄也从言犀聲直离切論訟也傳曰諮詻孔子容从言各聲五陌切和說而諍也从言門聲語巾切慮難曰謀从言某聲莫浮切古文謀亦古文議謀也从言莫深諫也从言念聲春秋傳曰辛伯諗周桓公式荏切試也从言果聲苦卧切用也从言式聲虞書曰明試以功式吏切和也从言咸聲周書曰不能諴于小民胡毚切徒歌从言肉余招切具也从言全聲此縁切喜也从言斤聲許斤切說釋也从言兌一曰談說失爇切又弋雪切㑹也筭也从言从十古詣切詥也从言皆聲戸皆切諧也从言合聲候閤切和也从言周聲徒遼切合㑹善言也从言􅡜聲傳曰告之話言胡快切籀文䛡从㑹諈諉纍也从言垂聲竹寘切纍也从言委聲女恚切戒也从言从敬敬亦聲居影切静語也从言聲一曰無聲也彌必切敬也从言兼聲苦兼切人所宜也从言从宜宜亦聲儀寄切大言也从言羽聲況羽切善言也从言戔聲一曰謔也慈衍切嘉善也从言我聲詩曰誐以溢我五何切共也一曰譀也从言同聲周書曰在夏后之詷徒紅切施陳也从言从殳殳使人也識列切救視也从言蒦聲胡故切譞慧也从言圜省聲許縁切大也一曰人相助也从言甫聲讀若逋博孤切思之意从言从思胥里切寄也从言乇聲他各切䟽也从言己聲居吏切稱也从言與聲羊茹切敷也从言番聲商書曰王譒告之補過切辤去也从言䠶聲辤夜切齊歌也从言區聲烏侯切歌也从言永聲爲命切詠或从口止也从言爭聲側迸切召也从言乎聲荒烏切評謼也从言虖聲荒故切止也从言气聲居迄切傳言也从言彦聲魚變切相迎也从言牙聲周禮曰諸侯有卿訝發吾駕切訐或从辵候至也从言旨聲五計切和解也从言冓聲古項切迻書也从言朕聲徒登切頓也从言刃聲論語曰其言也訒而振切言難也从言从内内骨切謯娽也从言虘聲側加切待也从言伿聲讀若䭆胡禮切痛呼也从言敫聲古弔切恚呼也从言堯聲女交切小聲也从言熒省聲詩曰謍謍靑蠅余傾切大聲也从言昔聲讀若笮壯革切諧或从口諂也从言臾聲羊朱切䛕也从言閻聲丑琰切譋或省詐也从言爰聲況袁切不肖人也从言敖聲一曰哭不止悲聲謷謷五牢切誘也从言术聲思律切沇州謂欺曰詑从言它聲託何切欺也从言曼聲母官切譇拏羞窮也从言奢聲陟加切慙語也从言作聲鉏駕切謺讘也从言執聲之涉切謰謱也从言連聲力延切謰謱也从言婁聲陟侯切相欺詒也一曰遺也从言台聲與之切相怒使也从言參聲倉南切欺也从言狂聲居況切騃也从言疑聲五介切相誤也从言哭聲古罵切謗也从言山聲所晏切誹也从言幾聲居衣切加也从言巫聲武扶切謗也从言非聲敷尾切毁也从言㫄聲補浪切詶也从言壽聲讀若醻周書曰無或譸張爲幻張流切譸也从言州聲市流切詶也从言且聲莊助切詶也从言由聲直又切離别也从言多聲讀若論語跢予之足周景王作洛陽誃臺尺氏切亂也从言孛聲蒲没切誖或从心籀文誖从二或亂也一曰治也一曰不絶也从言絲吕眞切古文􅒋謬也从言吴聲五故切誤也从言圭聲古賣切可惡之辭从言矣聲一曰誒然春秋傳曰誒誒出出許其切痛也从言喜聲火衣切膽气滿聲在人上从言自聲讀若反目相睞荒内切謧泄多言也从言离聲呂之切多言也从言世聲詩曰無然詘詘余制切不思稱意也从言此聲詩曰翕翕䚹䚹將此切往來言也一曰小兒未能正言也一曰祝也从言匋聲大牢切䛬或从包䛁䛁多語也从言冄聲樂浪有䛁邯縣汝間切語相反䜚也从言遝聲他合切䜚諮也从言㳫聲徒合切諍語訮訮也从言开聲呼堅切言壯㒵一曰數相怒也从言巂聲讀若畫呼麥切騃言聲从言勻省聲漢中西城有訇郷又讀若玄虎横切籀文不省便巧言也从言扁聲用書曰􅎒􅎒善諞言論語曰友諞倿部田切四也从言頻聲符眞切扣也如求婦先言叕之从言从口口亦聲苦后切言相誽司也从言兒聲女家切相呼誘也从言兆聲徒了切加也从言从曽聲作滕切忘也从言失聲徒結切忌也从言其聲周書曰上不諅于凶德渠記切誕也从言敢聲下闕切俗譀从忘譀也从言夸聲苦瓜切詞誕也从言延聲徒旱切籀文誕省正譀也从言萬聲莫話切戯也从言䖒聲詩曰善戲謔兮虚納切眼戾也从言聲乎􅝴切䜋也从言工聲詩曰蟊賊内訌戸工切中止也从言貴聲司馬法曰師多則人䜋䜋止也胡對切聲也从言歳聲詩曰有其聲呼會切疾言也从言咼聲呼卦切譟也从言魋聲杜回切擾也从言喿聲蘇到切大呼也从言丩聲春秋傳曰或訆于宋大廟古弔切號也从言从虎乎刀切譁也从言雚聲呼官切讙也从言華聲呼瓜切妄言也从言雩聲羽俱切謣或从荂譌言也从言爲聲詩曰民之譌言五禾切誤也从言隹省聲古賣切謬也从言呉聲五故切狂者之妄言也从言翏聲靡㓜切夢言也从言巟聲呼光切大呼自勉也从言暴省聲蒲角切訬擾也二曰訬獪从言少聲讀若毚楚交切欺也从言其聲去其切權詐也益梁曰謬欺天下曰譎从言矞聲古穴切欺也从言乍聲側駕切詭譌也从言于聲一曰訏齊楚謂信曰訏況于切咨也一曰痛惜也从言差聲子邪失气言一曰不止也从言龖省聲傅毅讀若慴之涉切籀文讋不省言謂讋也从言習聲秦入切相毁也从言亞聲一曰畏亞宛古切相毁也从言隨省聲雖遂切嗑也从言闒聲徒盍切說也从言匈聲許容切或省詾或从兇爭也从言公聲曰謌訟似用切古支訟恚也从言眞聲賈侍中說謓笑一曰讀若振昌眞切多言也从言聶聲河東有狐讘縣之涉切大言而恕也从言可聲虎何切訐也从言臣聲讀若指職雉切面相厈罪相告訐也从言干聲居謁切告也从言厈省聲論語曰訴子路於季孫臣鉉等曰厈非聲蓋古之字音多与今異如皀亦音香釁亦音門乃亦音仍他皆放此古今失傳不可詳究桑故切訴或从言朔訴或从朔心愬也从言㬱聲荘䕃切譛也从言毚聲士咸切謫問也从言遣聲去戰切罰也从言啇聲陟革切數也一曰相讓也从言耑聲讀若專尺絹切相責讓从言襄聲人漾切嬈譊也从言焦聲讀若噍才肖切古文譙从肖周書曰亦未敢誚公數諫也从言朿聲七賜切讓也从言卒聲國語曰誶申胥雖遂切問也从言吉聲去吉切責望也从言望聲巫放切貴也从言危聲過委切告也从言登聲諸應切詰詘也一曰屈襞从言出聲區勿切詘或从屈尉也从言夗聲於願切知處告言之从言向聲朽正切㳘言也从言敻聲夾縣切苛也一曰訶也从言氏聲都禮切何也从言隹聲示隹切飾也一曰更也从言革聲讀若戒古覈切怟讕也从言闌聲洛干切讕或从閒視也从言㐱聲直刃切又之忍切悲聲也从言斯省聲先稽切罪也从言尤聲周書曰報以庶訧羽求切計也从言朱聲陟輸切冶也从言从寸他皓切悉也从言音聲烏含切禱也累功德以求福論語云讄曰禱尔于上下神祇从言纍省聲力軌切或不省行之迹也从言兮皿闕徐鍇曰兮聲也神至切謚也从言耒聲力軌切恥也从言奚聲胡禮切謑或从奊謑詬恥也从言后聲呼冦切詬或从句軍中反閒也从言枼聲徒叶切軍中約也从言亥聲讀若心中滿該古哀切傳譯四夷之言者从言睪聲羊昔切迫也从言九聲讀若求巨鳩切笑㒵从言益聲伊昔切又呼狄切疾言也从三言讀若沓徒合切文二百四十五重三十三謀也从言旬聲相倫切直言也从言黨聲多朖切籍錄也从言普聲史記从並博古切詎猶豈也从言巨聲其㠯切小也誘也从言麥聲禮記曰足以聞先鳥切隱語也从言迷迷亦聲莫計切記誌也从言志聲職吏切訣别也一曰法也从言決省聲古穴切文八新附競言也从二言凡誩之屬皆从誩讀若競渠慶切吉也从誩从羊此與義美同意常衍切篆文􅵗从言彊語也一曰逐也从誩从二人渠慶切痛怨也从誩賣聲春秋傳曰民無怨讟徒谷切文四重一聲也生於心有節於外謂之音宫商角徴羽聲絲竹金石匏土革木音也从言含一凡音大版也所以飾縣鐘鼓捷業如鋸齒以白畫之象其鉏鋙相承也从丵从巾巾象版詩曰巨業維樅魚怯切古文業聚也从丵取聲徂紅切譍無方也从丵从口从寸都隊切對或从士漢文帝以爲責對而爲言多非誠對故去其口以从士也文四重二瀆菐也从丵从廾廾亦聲凡菐之屬皆从菐臣鉉等曰瀆讀爲煩瀆之瀆一本注云丵衆多也兩手奉之是煩瀆也蒲沃切給事者从人从菐菐亦聲滿沃切古文从臣賦事也从菐从八八分之也八亦聲讀若頒一曰讀若非布還切文三重一竦手也从从又凡廾之屬皆从廾居竦切今變隸作廾揚雄說廾从兩手承也从手从廾半聲扶隴切翊也从廾从卩从山山髙奉承之義署陵切取奐也一曰大也从廾夐省臣鉉等曰夐營求也取之義也呼貫切蓋也从廾从合古南切又一儉切古文弇引給也从廾睪聲羊益切舉也从廾甶聲春秋傳曰晉人或以廣墜楚人􅹈之黄顥說廣車陷楚人爲舉之杜林以爲騏麟字渠記切舉也从廾㠯聲虞書曰岳曰异哉羊吏切玩也从廾持玉盧貢切兩手盛也从廾聲余六切摶飯也从廾釆聲釆古文辦字讀若書卷居劵切持弩拊从廾肉讀若逵臣鉉等曰从肉未詳渠追切警也从廾持戈以戒不虞居拜切械也从廾持斤并力之皃補明切古文兵从人廾干籀文慤也从廾龍聲紀庸切圍棊也从廾亦聲論語曰不有愽弈者乎羊益切共置也从廾从貝省古以貝爲貨其遇切文十七重四引也从反廾凡􅦁之屬皆从􅦁普班切今變隷作大􅦁或从手从癸鷙不行也从􅦁从棥棥亦聲附袁切樊也从􅦁􅒋聲吕員切文三重一同也从廿廾凡共之屬皆从共渠用切古文共給也从共龍聲俱容切文二重一分也从廾从卑卑予也凡異之屬皆从異徐鍇曰將欲與物先分異之也禮曰賜君子小人不同日羊吏切分物得增益曰戴从異􅥘聲都代切籀文戴文二重一共也从臼从廾凡舁之屬皆从舁讀若余以諸切升髙也从㫒囟聲七然切或从卩古文黨與也从舁从与余㠯切古文與起也从舁从同同力也虚陵切文四重三叉手也从彐凡􅍫之屬皆从􅍫居玉切身中也象人要自􅍫之形从臼交省聲於消切又於笑切古文要文二重一早昧爽也从􅍫从辰辰時也辰亦聲丮夕爲䢅爲䢅皆同意凡䢅之屬皆从䢅衾鄰切母官切小兒履也从革及聲讀若沓穌合切靴角鞮屬从革卬聲五岡切革履也从革是聲都兮切鞮沙也从革从來夾亦聲古洽切鞮屬从革徙聲所綺切革生鞮也从革奚聲戸佳切補履下也从革丁聲當經切蹋鞠也从革匊聲居六切鞠或从䉅鞀遼也从革召聲徙刀切鞀或从兆鞀或从鼓从兆籀文鞀从殸召量物之一曰杍井古以革从革冤聲於袁切或从宛刀室也从革卑聲并頂切車革前曰鞎从革良聲户恩切車軾也从革弘聲詩曰鞹鞃淺幭讀若穹丘弘切車軸束也从革敄聲莫卜切車束也从革必聲毗必切車衡三東也曲轅縳直轅縳从革爨聲讀若論語鑚燧之鑚借官切或从革贊蓋杠絲也从革旨聲徐錯曰絲其繫系也脂利切車駕具也从革皮聲乎祕切轡鞥从革弇聲讀若譍一曰龍頭繞者烏合切轡革也从革巴聲必駕切著掖鞥也从革顯聲呼典切當膺也从革斤聲居近切驂具也从革蚩聲讀若騁蜃丑郢切引軸也从革引聲余忍切籀文靷車鞁具也从革官聲古滿切車鞁具也从革豆聲田俟切輨内環靻也从革于聲羽俱切車下索也从革尃聲補各切車具也从革奄聲烏合切車具也从革叕聲陟劣切馬鞁具也从革从安烏寒切鞌毳飾也从革茸聲而隴切鞌飾从革古聲他叶切防汗也从革合聲古洽切馬頭絡銜也从革力聲盧則切大車縛軛靻从革月聲狂沇切勒靻也从革面聲弥沇切鞮也从革今聲巨今切所以戢弓矢从革建聲居言切弓欠韇也从革賣聲徒谷切緌也从革巂聲山垂切急也从革亟聲紀力切驅也从革聲卑連切古文頸靻也从革央聲於兩切佩刀絲也从革蒦聲乙白切馬尾也从革它聲今之般緧徒何切繫牛脛也从革見聲已彳切文五十七重十一刀室也从革肖聲私妙切馬鞁具也从革薦聲則前切鞮屬从革華聲許切馬羈也从革勺聲都歷切文四新附鼎屬實五觳斗二升曰觳象腹交文三足凡鬲之屬皆从鬲郎激切鬲或从瓦漢令鬲从瓦厤聲三足鍑也一曰滫米器也从鬲支聲魚綺切三足釡也有柄喙讀若嬀从鬲規聲居隨切釡屬从鬲㚇聲子紅切秦名土釡曰􅰍从鬲㐄聲讀若過古禾切大釡也一曰鼎大上小下若甑曰鬵从鬲兓聲讀若岑才林切籀文鬵鬵屬从鬲曽聲子孕切鍑屬从鬲甫聲扶雨切鬴或从釡金聲鬲屬从鬲虍聲牛建切炊气上出也从鬲蟲省聲以戎切籀文融不省炊气㒵从鬲嚻聲許嬌切煑也从鬲羊聲式羊切涫也从鬲沸聲芳未切文十三重五㽁也古文亦鬲字象孰飪五味气上出也凡䰜之屬皆从􅦧郎激切鬻也从􅦧侃聲諸延切鬻或从食衍聲或从干聲或从建聲䭈也从􅦧米聲武悲切臣鉉等曰今俗粥作粥音之六切䭈也从􅦧吉聲戸吴切五味盉羹也从􅦧从羔詩曰亦有和古行切讀若戟凡辟切種也从坴丮持亟種之書曰我埶黍稷徐鍇曰坴土也育祭切食飪也从丮重聲易曰孰飪殊六切設食也从丮从食才聲讀若載作代切袌也从丮工聲居悚切巩或加手相踦之也从丮谷聲其虐切擊踝也从丮从戈讀若踝胡瓦切拖持也从反就闕居王切文八重一兩士相對兵杖在後象鬥之形凡鬥之屬皆从鬥都豆切遇也从鬥斵聲都豆切鬭也从鬥共聲孟子曰鄒與魯閧下降切經繆殺也从鬥翏聲力求切鬪取也从鬥龜聲讀若三合繩糾古矦切智少力劣也从鬥爾聲奴礼切鬭連結紛相牽也从鬥燹聲臣鉉等案燹今先典切从豩聲豩呼還切蓋燹亦有豩音故得爲聲一本从說文無字撫文切鬭也从鬥賔省聲讀若賔匹賔切恒訟也詩云兄弟鬩于牆从鬥从兒兒善訟者也許激切試力士錘也从鬥从戈或从戰省讀若縣胡畎切文十不静也从市鬥奴敎切文一新附手也象形三指者手之􅍌多略不過三也凡又之屬皆从又于救切手口相助也从又从口臣鉉等曰今俗别作佑于救切臂上也从又从古文古薨切古文厷象形厷或从肉手指相錯也从又象又之形初牙切手足甲也从又象又形側狡切矩也家長率敎者从又舉杖扶雨切老也从又从灾闕穌后切籀文从寸叜或从人和也从言从又炎籀文夑从􅥷􅥷音飪讀若涇臣鉉等案燮字義大孰也从炎从又即孰物可持也此燮蓋从燮省言語以和之也二字義相出入故也穌叶切引也从又冐聲無販切抻也从又聲古文申失人切分决也从又中象決形徐鍇曰物也丨所以快之古賣切治也从又丿握事者也余準切古文尹又卑也从又虚聲側如切引也从又􅫕聲里之切拭也从又持巾在尸下所劣切逮也从又从人徐鍇曰及前人也巨立切古文及秦刻后及如此亦古文及亦古文及禾束也从又持禾兵永切覆也从又厂反形府逺切古文治也从又从卪卪事之節也房六切滑也詩云􅠭兮達兮从又屮一曰取也土刀切楚人謂卜問吉凶曰从又持祟祟亦聲讀若贅之芮切拾也从又尗聲汝南名收芌爲叔式竹切叔或从寸入水有所取也从又在回下回古文回回淵水也讀若沬莫勃切捕取也从又从耳周禮獲者取左耳司馬法曰載獻聝聝者耳也七庾切掃竹也从又持祥歳切彗或从竹古文彗从竹从習借也闕古雅切古文段譚長說段如此同志爲友从二又相交友也云久切古文友亦古文友法制也从又庶省聲徒故切文二十八重十六􅚀手也象形凡􅚀之屬皆从􅚀臧可切賤也執事也从􅚀甲徐鍇曰右重面左卑故在甲下補移切文二記事者也从又持中中正也凡史之屬皆从史䟽士切職也从史之省聲鉏史切古文事文二重一去竹之枝也从手持半竹凡支之屬皆从支章移切古文支持去也从支竒聲去竒切文二重一手之疌巧也从又持巾凡聿之屬皆从聿尼輒切習也从聿聲羊至切籀文篆文持事振敬也从聿在􅘢上戰戰兢兢也息逐切古文肅从心从卪文三重三所以書也楚謂之聿呉謂之不律燕謂之弗从聿一聲凡聿之屬皆从聿余律切秦謂之筆从聿从竹徐鍇曰筆尚便疌故从聿鄙密切聿飾也从聿从彡俗語以書好爲􅩎讀若將鄰切箸也从聿者聲商魚切文四界也象田四界聿所以畫之凡畫之屬皆从畫胡麥切古文畫省亦古文畫日之出入與夜爲界从畫省从日陟救切籀文晝文二重三及也从又从㞑省又持㞑者从後及之也凡隶之屬皆从隶徒耐切反也从隶枲聲詩曰天之未隂雨臣鉉等曰枲非聲未詳徒耐切附箸也从隶柰聲郎計切篆文隷从古文之體臣鉉等未詳古文所出文三重一堅也从又臣聲凡臤之屬皆从臤讀若鏗鏘殳也从殳示聲或說城郭市里高縣羊皮有不當入而欲入者暫下以驚牛馬曰祋故从示殳詩曰何戈與祋丁外切軍中士所持殳也从木从殳司馬法曰執羽从杸市朱切相擊中也如車相擊故从殳从軎古歷切从上擊下也一曰素也从殳青聲苦角切􅿢苦江切下擊上也从殳冘聲知朕切繇擊也从殳豆聲古文投如此度矦切縣物擊从殳聲巿流切推毄物也从殳豖聲冬毒切捶毄物也从殳區聲烏后切擊頭也从殳高聲口卓切擊聲也从殳聲堂諫切擊中聲也从殳医聲於計切推物也从殳耑省聲徒玩切擊空聲也从殳宫聲徒冬切又火宫切相雜錯也从殳肴聲胡茅切妄怒也一曰有決也从殳豙聲魚旣切揉屈也从殳从古文叀字廏字从此臣鉉等曰叀小謹也亦屈服之意居又切戍邊也从殳从彳臣鉉等曰彳歩也彳亦聲營隻切古文役从人㱾改大剛夘也以逐精鬼从殳亥聲古哀切文二十重一戮也从殳杀聲凡殺之屬皆从殺臣鉉等曰說文無杀字相傳云音察未知所出所八切古文殺古文殺古文殺臣殺君也易曰臣弑其君从殺省式聲式吏切文二重四鳥之短羽飛几几也象形凡几之屬皆从几讀若殊市朱切新生羽而飛也从几从彡之忍切舒鳧鶩也从鳥几聲房無切文三十分也人手卻一寸動衇謂之寸口从又从一凡寸之屬皆从寸倉困切廷也有法度者也从寸之聲祥吏切帥也从寸省聲即諒切繹理也从工从口从又从寸工口亂也又十分理之彡聲此與同意度人之兩臂爲尋八尺也徐林切六寸簿也从寸叀聲一曰專紡專職縁切布也从寸甫聲芳無切導引也从寸道聲徒皓切文七剥取獸革者謂之皮从又爲省聲凡皮之屬皆从皮符羈切古文皮籀文皮面生气也从皮包聲㫄敎切面黑气也从皮干聲古旱切文三重二足坼也从皮軍聲矩云切皮細起也从皮夋聲七倫切文二新附柔韋也从北从皮省从敻省凡㼱之屬皆从㼱讀若耎一曰若儁臣鉉等曰北者反覆柔治之也夐營也而兖切古文㼱籀文㼱从夐省羽獵韋絝从㼱灷聲而隴切或从衣从虞書曰鳥獸毛文三重二小擊也从又卜聲凡攴之屬皆从攴普木切教也从支启聲論語日不憤不啓康禮切通也从彳从攴从育聲丑列切古文徹擊也从攴肇省聲治小切疾也从攴每聲眉殞切彊也从攴民聲眉殞切彊也从攴矛聲亡遇切迮也从攴白聲周書曰敀常任博陌切齊也从攴从束从正正亦聲之郢切象也从攴交聲胡教切使爲之也从攴古聲古慕切正也从攴从正正亦聲之盛切軟也从攴也聲讀與施同式攴切􅴬也从攴専聲周書曰用遺後人芳无切主也从攴典聲多殄切數也从攴麗聲力米切計也从攴婁聲所矩切辟潄鐵也从攴从涑郎電切汲汲也从攴子聲周書曰孜孜無怠子之切分也从攴分聲周書曰乃惟孺子攽亦讀與彬同布還切止也从攴旱聲周書曰㪋我干艱矦旰切有所治也从攴豈聲讀若豤五來切平治髙土可以逺望也从攴尚聲昌两切理也从攴伸聲直刃切更也从攴已李陽氷曰己有過攴之即改古亥切更也从攴􅒋聲祕戀切改也从攴丙聲古孟切又古行切誠也臿地曰敕从攴束聲耻力切使也从攴耴省聲而涉切牧也从攴僉聲良冉切擇也从攴聲周書曰􅰴乃甲冑洛擊也从攴句聲讀若扣苦候切擊也从攴聲古洪切横㰅也从攴高聲口交切擊也从攴豕聲竹角切放也从攴聲迀往切坼也从支从厂厂之性坼果孰有味亦坼故謂之􅫕从未聲徐鍇曰厂厓也許其切去隂之刑也从攴蜀聲周書曰則劓􅢴黥竹角切貟也从攴昬聲周書曰􅹠不畏死眉殞切禁也一曰樂器椌楬也形如木虎从攴吾聲魚舉切研治也从攴果聲舜女弟名㪙首苦果切持也从攴金聲讀若琴巨今切棄也从攴􅔧聲周書以爲討詩云無我兮市流切平田也从攴田周書曰畋尒田待年切㱾改大剛夘以逐鬼鬼也从攴巳聲讀若巳古亥切次弟也从攴余聲徐㠯切毁也从攴卑聲辟米切㪏也从攴兒聲五計切養牛人也从攴从牛詩曰牧人乃夢莫卜切擊馬也从攴束聲楚革切小春也从攴算聲初絭切䚫田也从攴堯聲牽遥切文七十七重六上所施下所効也从攴从孝凡敎之屬皆从教古孝切古文敎亦古文敎覺悟也从敎从冂冂尚矇也􅍫聲胡覺切篆文斆省文二重二灼剥龜也象炙龜之形一曰象龜兆之從横也凡卜之屬皆从卜博木切古文卜筮也从卜圭聲臣鉉等曰圭字聲不相近當从挂省聲古壞切卜以問疑也从口卜讀與稽同書云叶疑古兮切卜問也从卜貝以爲贄一曰鼎省聲京房所說陟盈切易卦之上體也商書曰貞曰􅒪从卜每聲荒内切視兆問也从卜从口職廉切卜問也从卜召聲市沼切灼龜坼也从卜􅶏象形治小切古文兆省文八重二可施行也从卜从中䘙宏說凡用之屬皆从用臣鉉等曰卜中乃可用也余訟切

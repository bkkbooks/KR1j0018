  text: 說文解字弟六上漢太尉祭酒許氏記
  hash: sha256:27bf8c005e85e3ceb097d1edb53c19acca4b8567b8f1b655e1e9631ef37be0c7
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1j0018_SBCK_006-1a}
body:
  text: 二十五部文七百五十三重六十一凡九千四百四十三字文二十新附冒也冒地而生東方之行从屮下象其根凡木之屬皆从木徐鍇曰屮者木始甲拆萬物皆始於微故木从屮莫卜切果出江南从木矞聲居聿切橘屬从木登聲丈庚切條也似橙而酢从木由聲夏書曰厥包橘柚余救切果似棃而酢从木䖒聲側加切果名从木聲古文利力脂切棗也似柹从木甹聲以整切赤實果从木􅙻聲鉏里切梅也从木冄聲汝閻切枏也可食从木每聲莫桮切或从某果也从木可省聲何梗切果也从木示聲奴帶切果也从木子聲良止切古文果也从木兆聲徒刀切冬桃从木敄聲讀若髦莫候切果實如小栗从木辛聲春秋傳曰女摯不過栗側詵切木也孔子冢蓋樹之者从木皆聲苦駮切桂也从木㑴省聲七荏切江南木百藥之長从木圭聲古惠切牡曰棠牝曰杜从木尚聲徒郎切甘棠也从木土聲徒古切木也从木習聲似入切木也可以爲櫛从木單聲旨善切木也可屈爲杆者从木韋聲于鬼切柔木也工官以爲耎輪从木酋聲讀若糗以周切椶椐木也从木邛聲渠容切母杶也从木侖聲讀若易卦屯陟倫切木也从木胥聲讀若芟刈之芟私閭切梅也从木央聲一曰江南橦材其實謂之柍於京切木也从木癸聲又度也求癸切木也从木咎聲讀若皓古老切木也从木周聲讀若丩職留切樸樕木从木欶聲桑屋切木也从木彞聲羊皮切青皮木从木岺聲子林切或从省籀文􅤑木也从木叕聲益州有棳縣職說切木也从木號省聲乎人切遬其也从木炎聲讀若三年導服之導以冉切木也从木遄聲市縁切即來也从木京聲吕張切一曰直大古屑切木也从木乍聲在各切木出橐山从木乎聲他乎切木也从木晉聲書曰竹箭如榗子善切羅也从木㒸聲詩曰隰有樹徐醉切木可作牀凢从木叚聲讀若賈古雅切木也从木惠聲胡計切木也从木苦聲詩曰榛楛濟濟侯古切木也可以爲大車軸从木齊聲祖雞切木也从木乃聲讀若仍如乗切木也从木聲符眞切酸棗也从木貳聲而至切棗也从木僕聲博木切酸小棗从木然聲一曰染也人善切木也實如棃从木尼聲女履切木也从木肖聲所交切木也从木隷聲郎計切木也从木寽聲力輟切木也从木夋聲臣鉉等曰今人别音穌禾切以爲機杼之屬私閏切木也从木畢聲卑吉切木也从木剌聲盧達切木也可爲醬出蜀从木句聲俱羽切木出發鳩山从木庶聲之夜切木可作車从木方聲府良切枋也从木畺聲一曰鉏柄名居良切木也以其皮裹松脂从木雩聲讀若華乎化切或从蒦黄木也从木辟聲博戹切香木也从木㞣聲撫文切似茱萸出淮南从木殺聲所八切木可作大車輮从木戚聲子六切木也从木昜聲与章切河柳也从木聖聲敕貞切小楊也从木丣聲丣古文酉力户切大木可爲鉏柄从木􆁎聲詳遵切木似欄从木􅒋聲禮天子樹松諸矦柏大夫欒士楊洛官切棠棣也从木多聲弋支切白棣也从木隶聲特計切木似橘从木只聲諸氏切木也厚葉弱枝善搖一名从木風聲方戎切黄華木从木雚聲一曰反常巨員切木也从木巨聲其吕切木也从木鬼聲戸恢切楮也从木㱿聲古禄切榖也从木者聲丑呂切楮或从宁枸杞也从木繼省聲一曰監木也古詣切枸杞也从木己聲墟里切木也从木牙聲一曰車軜㑹也五加切木也从木亶聲徒乾切木也从木樂聲郎擊切櫟實一曰鑿首从木求聲巨鳩切木也从木柬聲郎電切山桑也从木厭聲詩曰其檿其柘於琰切桑也从木石聲之夜切木可爲杖从木䣛聲親吉切味稔棗从木還聲似㳂切梧桐木从木吾聲一名觀五胡切桐木也从木熒省聲一曰屋梠之兩頭起者爲榮永兵切榮也从木同聲徒紅切木也从木畨聲讀若樊附轅切榆白枌从木俞聲羊朱切榆也从木分聲枎分切山初榆有束莢可爲蕪萊者从木更聲古杏切散也从木焦聲昨焦切木也从木公聲祥容切松或从容松心木从木䓣聲莫奔切柏葉松身从木㑹聲古外切松葉柏身从木從聲七㳟切鞠也从木白聲博陌切木也从木几聲居履切木也从木占聲息廉切木也从木弄聲益州有梇楝縣盧貢切鼠梓木从木㬰聲詩曰北山有楰羊朱切黄木可染者从木危聲過委切桎杒也从木刃聲而震切榙􅳏木也从木遝聲徒合切榙􅳏果似李从木荅聲讀若嚃土合切酸果也从木从甘闕莫厚切古文某从口崐崘河隅之長木也从木繇聲以周切生植之緫名从木尌聲常句切籀文木下曰本从木一在其下徐鍇曰一記其處也本末朱皆同義布忖切古文木根也从木氐聲都礼切赤心木松栢屬从木一在其中章俱切木株也从木艮聲占㾗切木根也从木朱聲陟輸切木上曰末从木一在其上莫撥切細理木也从木畟聲子力切木實也从木象果形在木之上古火切木實也从才絫聲力追切枝也从木又聲𥘉牙切木别生條也从木支聲章移切木皮也从木卜聲匹角切小枝也从木攸聲徒遼切榦也可爲杖从木从攴詩曰施于條枚莫桮切槎識也从木闕夏書曰隨山木讀若刋苦寒切篆文从幵木葉搖白也从木聶聲之涉切弱皃从木任聲如甚切木少盛皃从木夭聲詩曰桃之枖枖於喬切木頂也从木眞聲一曰仆木也都秊切一枚也从木廷聲徒頂切衆盛也从木驫聲逸用書曰疑沮事闕所臻切木杪末也从木爂聲敷沼切木標末也从木少聲亡沼切樹木垂朶朶也从木象形此與采同意丁果切高木也从木良聲魯當切大木皃从木間聲古限切木根也从木号聲春秋傳曰歳在玄枵女枵虚也許矯切樹摇皃从木召聲止搖切樹動也从木䍃聲余昭切下句曰樛从木翏聲吉虯切高木也从木丩聲吉蚪切衺曲也从木聲迂往切曲木从木堯聲女敎切扶䟽四布也从木夫聲防無切木檹椸从木旖聲賈待中說檹即椅木可作琴於离切相高也从木小聲私兆切高皃从木㫚聲呼骨切木長皃从木參聲詩曰槮差荇菜所今切長木也从木延聲詩曰松桷有梴丑連切長木皃从木肅聲山巧切樹皃从木大聲詩曰有杕之杜特計切木葉陊也从木㲋聲讀若薄他各切木長皃从木各聲古百切木相摩也从木埶聲魚祭切或从艸槀也从木古聲夏書曰唯箘輅枯木名也苦孤切木枯也从木高聲苦浩切木素也从木菐聲匹角切剛木也从木貞聲上郡有楨林縣陟盈切木曲直也从木矛聲耳由切判也从木㡿聲易曰重門擊􅢎他各切木之理也从木力聲平原有朸縣盧則切木梃也从木才聲昨哉切小木散材从木此聲臣鉉等曰師行野次堅散木爲區落名曰柴籬後人語譌轉入去聲又別作寨字非是士隹切榑桑神木曰所岀也从木尃聲防無切明也从日在木上古老切冥也从日在木下烏皎切角械也从木郤聲一曰木下白也其逆切築牆長版也从木􅥘聲春秋傳曰楚圍蔡里而栽昨代切檮也从木筑聲陟玉切古文築牆耑木也从木榦聲臣鉉等曰今別作幹非是矢榦亦同古案切榦也从木義聲魚羈切蓋也从木冓聲杜林以爲椽桷字古后切法也从木莫聲讀若嫫母之嫫莫胡切棟名从木孚聲附柔切極也从木東聲多貢切棟也从木亟聲渠力切楹也从木主聲直主切柱也从木盈聲春秋傳曰丹桓宫楹以成切衺柱也从木堂聲臣鉉等曰今俗别作橕非是丑庚切柱砥古用木今以石从木耆聲易榰桓凶章移切欂櫨也从木咨聲子結切壁柱从木薄省聲弼較切柱上柎也从木盧聲伊尹曰果之美者箕山之東青鳧之所有櫨橘焉夏孰也一曰宅櫨木出弘農山也落胡切屋櫨也从木幵聲古兮切栭也从木􅍌聲詩曰其灌其良薛切屋枅上標从木而聲爾雅曰栭謂之㮞如之切棼也从木㥯聲於靳切椽也从木聲盧浩切榱也椽方曰桷从木角聲春秋傳曰刻桓宫之桷古岳切榱也从木彖聲直專切秦名爲屋椽周謂之榱齊魯謂之桷从木衰聲所追切秦名屋櫋聮也齊謂之檐楚謂之梠从木眉聲莫悲切楣也从木吕聲力舉切㭒也从木聲讀若枇杷之枇房脂切屋櫋聯也从木邊省聲武延切㮰也从木詹聲臣鉉等曰今俗作簷非是余廉切屋㭒前也从木聲一曰𧖟搥徒舍切户樀也从木啻聲爾雅曰檐謂之樀讀若滴都歷切戸植也从木直聲常職切或从置戸樞也从木區聲昌朱切戸也从木兼聲苦減切重屋也从木婁聲洛矦切房室之䟽也从木龍聲盧紅切闌檻也从木盾聲食允切楯閒子也从木霝聲郎丁切楝也从木亡聲爾雅曰杗廇謂之梁武方切短椽也从木束聲丑録切所以涂也秦謂之杇關東謂之槾从木亐聲哀都切杇也从木曼聲母宫切門樞謂之椳从木畏聲烏恢切門樞之横梁从木冒聲莫報切門橛也从木困聲苦本切限也从木㞕聲先結切木閑从木且聲側加切歫也从木倉聲一曰槍欀也七羊切限門也从木建聲其獻切楔也从木韱聲子廉切櫼也从木契聲先結切編樹木也从木从冊冊亦聲楚革切落也从木也聲讀若他池尒切夜行所擊者从木橐聲易曰重門擊柝他各切亭郵表也从木亘聲胡官切木帳也从木屋聲於角切帳柱也从木童聲宅江切牀前横木也从木工聲古雙切牀前几从木呈聲他丁切桱桯也東方謂之蕩从木巠聲古零切安身之坐者从木爿聲徐鍇曰左傳薳子馮詐病掘地下冰而牀焉至於恭坐則席也故从爿爿則之省象人衺身有所倚箸至於牆壯戕狀之屬竝當从牀省聲李陽冰言木右爲片左爲爿音牆且說文無爿字其書亦異故知其妄仕莊切臥所薦首者从木冘聲章祍切楲窬䙝器也从木威聲於非切匱也从木聲一曰木名又曰大梡也徒谷切梳比之緫名也从木節聲阻瑟切理髮也从木䟽省聲所菹切劒柙也从木合聲胡甲切薅器也从木辱聲奴豆切或从金㭉臿也从木入象形䀠聲舉朱切兩刃臿也从木􅘲象形宋魏曰㭉也互瓜切或从金从于臿也从木㠯聲一曰徒土輂齊人語也臣鉉等曰今俗作耜詳里切或从里黍耑也从木台聲弋之切或从金籀文从辝大又犂一􅕶犂上曲木犂轅从木軍聲讀若渾天之渾戸昆切摩田器从木憂聲論語曰櫌而不輟於求切斫也齊謂之鎡錤一曰斤柄性自曲者从木屬聲陟玉切斫謂之櫡从木箸聲張略切收麥器从木巴聲蒲巴切穜樓也一曰燒麥柃􅽍从木役聲与辟切木也从木令聲郎丁切擊禾連枷也从木弗聲敷勿切柫也从木加聲淮南謂之柍古牙切舂杵也从木午聲昌與切杚斗斛从木旣聲工代切平也从木气聲古没切木參交以枝炊䉛者也从木省聲讀若驪駕臣鉉等曰驪駕未詳所綆切禮有柶柶匕也从木四聲息利切㔶也从木否聲布回切籀文桮承槃也从木般聲薄官切古文从金籀文从皿槃也从木虒聲息移切几屬从木安聲烏旰切圜案也从木瞏聲似㳂切篋也从木咸聲古咸切勺也从木从斗之庾切枓柄也从从木从勺臣鉉等曰今俗作巿若切以爲桮杓之杓甫摇切龜目酒尊刻木作雲雷象象施不窮也从木畾聲魯回切櫑或从缶櫑或从皿籀文櫑圜榼也从木卑聲部迷切酒器也从木盍聲枯蹋切車笭中橢橢器也从木隋聲徒果切關東謂之槌關西謂之㭙从木追聲直類切槌也从木特省聲陟革切槌之横者也關西謂之㯢从木灷聲臣鉉等曰當从朕省直枉切瑚槤也从木連聲臣鉉等曰今俗作璉非是里典切所以几器从木廣聲一曰帷屏風之屬臣鉉等曰今别作幌非是胡廣切舉食者从木具聲俱燭切繘耑木也从木􅌛聲古詣切絡絲檷从木爾聲讀若柅奴礼切主發謂之機从木幾聲居衣切機持經者从木朕聲詩證切機之持緯者从木予聲直呂切機持繒者从木夏聲扶富切履法也从木爰聲讀若指撝吁劵切蠻夷以木皮爲篋狀如籨尊从木亥聲古哀切棧也从木朋聲薄衡切棚也竹木之車曰棧从木戔聲士限切以柴木壅也从木存聲徂門切筐當也从木國聲古悔切木階也从木弟聲土雞切杖也从木長聲一曰法也宅耕切牛鼻中環也从木聲居倦切箠也从木耑聲一曰揣度也一曰剟也兠果切弋也从木厥聲木黄聲戶盲切檢柙也从木夾聲古洽切充也从木光聲古曠切以木有所擣也从木雋聲春秋傳曰越敗吴於檇李連爲切擊也从木豖聲竹角切橦也从木丁聲宅耕切棱也从木瓜聲又柧棱殿堂上最高之處也古胡切柧也从木夌聲魯登切伐木餘也从木獻聲商書曰若顚木之有皀􅤁五葛切􅤁或从木辥聲古文􅤁从木無頭亦古文􅤁平也从木从平平亦聲滿兵切抑木也从木立聲盧合切哀斫也从木差聲春秋傳曰山不槎側下切斷也从木岀聲讀若爾雅貀無前足之貀女滑切斷木也从木􅴣聲春秋傳曰柮徒刀切破木也一曰折也从木从斤先激切木薪也从木取聲側鳩切㮯木薪也从木完聲胡本切梡木未析也从木圂聲胡昆切楄部方木也从木扁聲春秋傳曰楄部薦榦部田切以木有所逼束也从木畐聲詩曰夏而楅衡彼即切楄也枼薄也从木丗聲臣鉉等曰當从卉乃得聲卉穌合切与涉切積火燎之也从木从火酉聲詩曰薪之槱之周禮以槱燎祠司中司命余救切柴祭天神或从示息止也从人依木許尤切休或从广竟也从木恒聲古鄧切古文桎梏也从木戒聲一曰器之緫名動也从木官溥說从日在木中凡東之屬皆从東得紅切二東曹从此闕文二平土有叢木曰林从二木凡林之屬皆从林力尋切豐也从林或說䂓模字从大􅕊數之積也林者木之多也􅕊與庶同意商書曰庶草繁無徐鍇曰或說大􅕊爲䂓模之模諸部無者不審信也文甫切木叢生者从林鬱省聲迂弗切叢木一名荆也从林疋聲創舉切木枝條棽儷皃从林今聲丑林切木盛也从林矛聲莫侯切守山林吏也从林鹿聲一曰林屬於山爲麓春秋傳曰沙麓崩盧谷切古文从录椱屋棟也从林分聲符分切木多皃从林从木讀若曾參之參所今切文九重一也从子論語曰色孛如也蒲姝切止也从􅜨盛而一横止之也即里切艸木至南方有枝任也从􅜨􅥷聲那含切古文文六重一進也象艸木生出土上凡生之屬皆从生所庚切艸或也从生上下逵也敷容切生也从生彦省聲所簡切豐大也从生降聲徐鍇曰生而不已益高大也力中切艸木實甤甤也从生豨省聲讀若綏儒隹切衆生並立之皃从二生詩曰甡甡其鹿所臻切文六艸葉也从垂穗上貫一下有根象形凡乇之屬皆从乇陟格切文一艸木華葉􅑰象形凡􅑰之屬皆从􅑰是爲切古文文一重一艸木華也从􅑰亏聲凡􅒧之屬皆从􅒧況于切􅒧或从艸从夸盛也从􅒧韋聲詩曰萼不于鬼切文二重一榮也从艸从􅒧凡華之屬皆从華戸瓜切艸木白華也从華从白筠輒切文二木之曲頭止不能上也凡禾之屬皆从禾古兮切多小意而止也从禾从只聲一曰木也職雉切䅩䅓也从禾从又句聲又者从丑省一曰木名徐鍇曰丑者束縛也䅩䅓不伸之意俱羽切文三留止也从禾从尤旨聲凡稽之屬皆从稽古兮切特止也从稽省卓聲徐鍇曰特止卓立也竹角切䅓而止也从稽省咎聲讀若皓賈侍中說稽禮三字皆木名古老切文三剌乖違也束而乖違者莫若刀也盧逹切文四橐也从束圂聲凡㯻之屬皆从㯻胡本切囊也从㯻省石聲他各切橐也从㯻省襄省聲奴當切車上大槖从㯻省咎聲詩曰載櫜弓矢古勞切囊張大皃从㯻省匋省聲符宵切文五回也象回帀之形凡口之屬皆从口羽非切天體也从口瞏聲王權切圜也从口專聲度官切䂓也从口員聲似㳂切回也从口云聲羽巾切圜全也从口貟聲讀若員王問切轉也从口中象回轉形戸恢切古文畫計難也从口从啚啚難意也徐鍇曰䂓畫之也故从口同都切回行也从口睪聲尚書曰圛圛升雲半有半無讀若驛羊益切邦也从口从或古惑切宫中道从口象宫垣道上之形詩曰室家之壼苦本切廩之圜者从禾在口中圜謂之囷方謂之京去皆从貝博蓋切貝聲也从小貝酥果切財也从貝有聲呼罪切人所寶也从貝才聲昨哉切財也从貝化聲呼臥切資也从貝爲聲或曰此古貨字讀若實詭僞切貨也从貝次聲即夷切貨也从貝萬聲無販切宫也从貝辰聲之忍切多才也从貝臤聲胡田切飾也从貝卋聲彼義切从禮相奉慶也从貝加聲胡箇切獻功也从貝工聲古送切見也从貝从兟臣鉉等曰兟音詵進也執贄而進有司贊相之則旰切會禮也从貝㶳聲徐刃切持遺也从貝齊聲祖雞切施也从貝代聲他代切从人求物也从貝弋聲他得切遺也从貝各聲臣鉉等曰當从路省乃得聲洛故切物相増加也从貝朕聲一曰送也副也以證切玩好相送也从貝曾聲昨鄧切迻子也从貝皮聲彼義切賜也从貝竷省聲臣鉉等曰竷非聲未詳古送切籀文贛賜也从貝來聲周書曰賚尒秬鬯洛帶切賜有功也从貝尚聲書兩切予也从貝易聲斯義切重次弟物也从貝也聲从豉切有餘賈利也从貝嬴聲臣鉉等曰當从嬴省乃得聲以成切贏也从貝剌聲洛帶切恃也从人守貝有所恃也一曰受貸不償房九切積也从貝宁聲直㠯切副益也从貝弍聲弍古文二而至切所敬也从貝􅳃聲必鄰切古文貰買也从貝余聲式車切貸也从貝丗聲神夜切以物質錢从敖貝敖者猶放貝當復取之也之芮切以物相贅从貝从斦闕之曰切易財也从貝丣聲莫候切貿也从貝聲殊六切散財用也从貝弗聲房未切求也从貝束聲側革切賈市也从貝西聲曰坐賣售也公戸切行賈也从貝商省聲式陽切買賤賣貴者从貝反聲方願切市也从网貝孟子曰登壟斷而网市利莫蟹切賈少也从貝戔聲才線切歛也从貝武聲方遇切欲物也从貝今聲他含切損也从貝从乏方歛切財分少也从貝从分分亦聲符巾切古文从宀分庸也从貝任聲尼禁切以財物枉法相謝也从貝求聲一曰戴質也巨留切以財有所求也从貝冓聲古候切齎財卜問爲䝪从貝疋聲讀若所䟽舉切小罰以財自贖也从貝此聲漢律民不繇貲餞二十二即夷切南蠻賦也从貝宗聲徂紅切衒也从貝聲古文睦讀若育余六切物不賤也从貝㬰聲㬰古文蕢居胃切頸飾也从二貝烏莖切文五十九重三賜也从貝兄聲許訪切贈死者从貝从冒冒者衣衾覆冒之意撫鳳切傳簺也从貝者聲當古切以物爲質也从貝占聲他叶切贈遺也从貝台聲經典通用詒与之切重買也錯也从貝廉聲佇陷切報也从貝塞省聲先代切助也从貝尃聲符遇切給也从貝詹聲時豔切文九新附國也从口先王之制尊卑有大小从卪凡邑之屬皆从邑於汲切國也从邑丰聲博江切古文周制天子地方千里分爲百縣縣有四郡故春秋傳曰上大夫受郡是也至秦初置三十六郡以監其縣从邑君聲渠運切有先君之舊宗廟曰都从邑者聲周禮距國五百里爲都當孤切五家爲鄰从邑聲力珍切百家爲酇酇聚也从邑酇聲南陽有酇縣作管切又作旦切五酇爲鄙从邑啚聲兵美切距國百里爲郊从邑交聲古肴切屬國舎从邑氐聲都禮切郭也从邑孚聲甫無切境上行書舍从邑垂垂邊也羽求切國甸大夫稍稍所食邑从邑肖聲周禮曰任地在天子三百里之内所敎切鄯善西胡國也从邑从善善亦聲時戰切夏后時諸矦夷羿國也从邑窮省聲渠弓切周封黄帝之後於􅠥也从邑契聲讀若薊上谷有􅠥縣古詣切炎帝之後姜姓所封周棄外家國从邑台聲右扶風斄縣是也詩曰有邰家室土來切周文王所封在右扶風美陽中水郷从邑支聲巨支切􅑢或从山支聲因岐山以名之也古文􅑢从枝从山周太王國在右扶風美陽从邑分聲𥙷巾切美陽亭即豳也民俗以夜市有豳山从山从豩闕右扶風縣从邑眉聲武悲切右扶風郁夷也从邑有聲於六切右扶風縣名从邑雩聲胡古切夏后同姓所封戰於甘者在鄠有扈谷甘亭从邑戸聲胡古切古文扈从山􅝟右扶風鄠郷从邑崩聲沛城父有䣙郷讀若陪薄回切右扶風鄠郷从邑且聲子余切右扶風鄠盩厔郷从邑赤聲呼各切周文王所都在京兆杜陵西南从邑豐聲敷戎切京兆縣周厲王于友所封从邑奠聲宗周之滅鄭徙潧洧之上今新鄭是也直正切左馮翊郃陽縣从邑合聲詩曰在郃之陽候閤切京兆藍田郷从邑口聲苦后切京兆杜陵郷从邑樊聲附袁切左馮翊縣从邑麃聲甫無切左馮翊䣝陽亭从邑屠聲同都切左馮翊高陵从邑由聲徒歷切左馮翊谷口郷从邑秊聲讀若寧奴顚切隴西上邽也从邑圭聲古畦切天水狄部从邑咅聲蒲口切弘農縣庾地从邑豆聲當侯切河南縣直城門官陌地也从邑辱聲春秋傳曰成王定鼎于郟鄏而蜀切周邑也从邑輦聲力展切周邑也从邑祭聲側介切河南洛陽北亡山上邑从邑亡聲莫郎切周邑也从邑尋聲徐林切周邑也在河内从邑希聲丑脂切河内沁水郷从邑軍聲魯有鄆地王問切故商邑自河内朝歌以北是也从邑北聲補妹切周武王子所封在河内野王是也从邑于聲又讀若區況于切殷諸侯國在上黨東北从邑聲古文利商書西伯戡􅧰郎奚切晉邑也从邑召聲寔照切晉邑也从邑冥聲春秋傳曰我鄍三門莫經切晉邢矦邑从邑畜聲丑六切晉之温地从邑侯聲春秋傳曰爭田胡遘切晉邑也从邑必聲春秋傳曰晉楚戰于邲毗必切晉大夫叔虎邑也从邑谷聲綺戟切河東聞喜縣从邑非聲薄回切河東聞喜聚从邑䖍聲渠焉切河東聞喜郷从邑匡聲去王切河東臨汾地即漢之所祭后土處从邑癸聲揆唯切周公子所封地近河内懷从邑开聲戸經切太原縣从邑烏聲安古切太原縣从邑示聲巨支切魏郡縣从邑業聲魚怯切鄭地亭从邑井聲戸經切趙邯鄲縣从邑甘聲胡安切邯鄲縣从邑單聲都寒切周武王子所封國在晉地从邑旬聲讀若泓相倫切清河縣从邑俞聲式朱切常山縣出祖所即位今爲高邑从邑高聲呼各切鉅鹿縣从邑梟聲牽遥切涿郡縣从邑莫聲慕各切北地郁郅縣从邑至聲之日切北方長狄國也在夏爲防風氏在殷爲汪茫氏从邑聲春秋傳曰瞞侵齊所鳩切炎帝太嶽之胤甫矦所封在潁川从邑無聲讀若許虚吕切潁川縣从邑亢聲苦浪切潁川縣从邑匽聲於建切頴川縣从邑夾聲工洽切新郪汝南縣从邑妻聲七稽切姬姓之國在淮北从邑息聲今汝南新鄎相即切汝南邵陵里从邑自聲讀若奚胡雞切汝南鮦陽亭从邑㫄聲歩光切蔡邑也从邑臭聲春秋傳曰郹陽封人之女奔之古闃切曼姓之國今屬南陽从邑登聲徒亘切鄧國地也从邑憂聲春秋傳曰鄧南鄙鄾人攻之於求切南陽淯陽郷从邑号聲乎刀切南陽棗陽郷从邑巢聲鉏交切今南陽穰縣是从邑襄聲汝羊切南陽穰郷从邑婁聲力宋切南陽西鄂亭从邑里聲良止切南陽舞陰亭从邑羽聲王榘切故楚都在南郡江陵北十里从邑呈聲以整切郢或省南郡縣孝惠三年改名宜城从邑焉聲於乾切江夏縣从邑黽聲莫杏切南陽隂郷从邑葛聲古達切江夏縣从邑㖾聲五各切南陽縣从邑己聲居擬切江夏縣从邑朱聲陵輸切漢南之國从邑員聲漢中有鄖關羽文切南夷國从邑庸聲余封切蜀縣也从邑卑聲符支切蜀江原地从邑壽聲市流切蜀地也从邑耤聲秦昔切蜀廣漢郷也从邑蔓聲讀若蔓無販切什邡廣漢縣邑方聲府良切存䣕犍爲縣从邑馬聲莫駕切䍧牱縣从邑敝聲讀若鷩雉之鷩必𬒮切地名从邑包聲布交切西夷國从邑冄聲安定有朝那縣諾何切鄱陽豫章縣从邑番聲薄波切長沙縣从邑霝聲郎丁切桂陽縣从邑林聲丑林切今桂陽䣂陽縣从邑耒聲盧對切㑹稽縣从邑貿聲莫候切㑹稽縣从邑堇聲語斤切沛郡从邑巿聲博蓋切宋下邑从邑丙聲兵永切沛國縣从邑虘聲昨何切地名从邑少聲書沼切地名从邑臣聲植鄰切宋地也从邑毚聲讀若讒士咸切宋魯間地从邑晉聲即移切周文王子所封國从邑告聲古到切䘙地今濟隂鄄城从邑垔聲吉掾切邗地在濟隂縣从邑工聲渠容切祝融之後妘姓所封潧洧之間鄭滅之从邑會聲古外切鄭邑也从邑元聲虞逺切鄭地从邑延聲以然切琅邪莒邑从邑更聲春秋傳曰取郠古杏切妘姓之國从邑禹聲春秋傳曰鄅人籍稻讀若䂓榘之榘王榘切魯縣古邾國帝顓頊之後所封从邑芻聲側鳩切邾下邑地从邑余聲魯東有䣄城讀若塗同都切附庸國在東平亢父邿亭从邑寺聲春秋傳曰取邿書之切魯下邑孔子之郡从邑取聲側鳩切魯孟氏邑从邑成聲氏征切周公所誅䣍國在魯从邑奄聲依檢切魯下邑从邑雚聲春秋傳曰齊人來㱕酄呼官切魯亭也从邑良聲魯當切奚仲之後湯左相仲虺所封國在魯嶭縣从邑丕聲敷悲切紀邑也从邑章聲諸良切國也今屬臨淮从邑干聲一曰䢴本屬呉胡安切臨淮徐地从邑義聲春秋傳曰徐䣡楚魚羈切東平無鹽郷从邑后聲胡口切東海縣帝少昊之後所封从邑炎聲徒甘切東海縣故紀矦之邑也从邑吾聲五乎切東海之邑从邑巂聲戸圭切姒姓國在東海从邑曾聲疾陵切琅邪郡从邑牙聲以遮切琅邪縣一名純德从邑夫聲甫無切齊地也从邑桼聲親吉切齊之郭氏虚善善不能進惡惡不能退是以亡國也从邑􅾱聲古博切齊地从邑兒聲春秋傳曰齊高厚定郳田五雞切郣海地从邑孛聲一曰地之起者曰郣臣鉉等曰今俗作渤非是蒲没切國也齊桓公之所滅从邑覃聲臣鉉等曰今作譚非是說文注義有譚長疑後人傳寫之誤徒含切地名从邑句聲其俱切陳留郷从邑亥聲古哀切故國在陳留从邑􅥘聲作代切地名从邑燕聲烏前切地名从邑丘聲去鳩切地名从邑如聲人諸切地名从邑尹聲女九切地名从邑几聲居履切地名从邑翕聲希立切地名从邑求聲巨鳩切地名从邑嬰聲於郢切地名从邑尚聲多朗切地名从邑并聲薄經切地名从邑虖聲呼古切地名从邑火聲呼果切地名从邑翏聲盧鳥切地名从邑爲聲居爲切地名从邑屯聲臣鉉等田今俗作村非是此尊切地名从邑舍聲式車切地名从邑盍聲胡蠟切地名从邑乾聲古寒切地名从邑聲讀若淫力荏切地名从邑山聲所閒切地名从邑㙶聲㙶古堂字徒郎切姬姓之國从邑馮聲房戎切汝南安陽郷从邑敲省聲苦怪切汝南上蔡亭从邑甫聲方矩切南陽縣从邑麗聲郎擊切地名从邑聲七然切从反邑􅣑字从此闕文一百八十四重六鄰道也从邑从凡􅣑之屬皆从􅣑闕胡綘切今變隷作􆀬

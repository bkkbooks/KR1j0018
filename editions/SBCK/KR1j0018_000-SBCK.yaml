front:
  text: 止諸市切揆北末切歩薄故切此雌氏切正之盛切是承㫖切辵丑略切彳丑亦切廴余忍切延丑連切行戸庚切齒昌里切牙五加切足即玉切疋所菹切品丕飲切􅕛以約切􅁽楚革切􅀃文解字弟三㗊阻立切舌食列切干古寒切谷其虐切㕯女滑切只諸氏切句古侯切丩居虯切古公戸切十是執切卉蘇沓切言語軒切誩渠慶切音於今切䇂去虔切丵土角切菐蒲沃切廾居竦切􅦁暜班切共渠用切異羊吏切􅞿以諸切􅍫居玉切䢅食鄰切爨七亂切革古覈切鬲郎激切􅦧郎激切爪側狡切丮几劇切鬥都聿余律切畫胡麥切隶徒耐切臤苦閑切臣植鄰切殳市朱切殺所八切几市朱切寸倉困切皮符羈切㼱而兖切攴普木切敎古孝切􅁲博木切用余訟切爻胡茅切㸚力几切􅀃文解字弟四􅴗火劣切目莫六切䀠九遇切眉武悲切盾食閏切自疾二切白疾一切鼻父二切百博陌切習似入切羽王矩切隹職追切奞息遺切萑胡官切􅘲工瓦切苜徒結切羊與章切羴式連切瞿九遇切雔市流切雥徂合切鳥都了切鳥哀都切華北潘切冓古􅃸切幺於堯切􅖨於虯切叀職緑切玄胡㳙切予余㠯切放甫妄切􅗸平蟲直弓切風方戎切它託何切􅀛居追切黽莫杏切夘盧管切二而至切土它魯切壵吾聊切堇巨斤切里良止切田符秊切畕居良切黄乎光切男那含切力林直切劦胡頰切􅀃文解字弟十四金居音切幵古賢切勺之若切几居履切且千也切斤舉欣切斗當口切矛莫浮切車尺􅃒切􅎧都回切􅊟房九切􅤦房九切厽力􅁤切四息利切宁直吕切叕陟劣切亞衣駕切五疑古切六力竹切七親吉切九舉有切厹人九切嘼許救切甲古狎切乙於筆切丙兵永切丁當􅀴切戊莫􅃸切己居擬切巴伯加切庚古行切辛息鮮切辡方免切壬如林切癸居誄切子即里切銀靑光禄大夫守右􅊌􅀐常侍上柱國東海縣開國子食邑五百戶臣徐鉉等伏奉聖旨校定許愼說文解字一部伏以振發人文興崇古道考遺編於魯壁緝蠹􅂤於羽陵載穆皇風允符昌運伏惟􅀿運統天睿文英武大聖至明廣孝皇帝陛下凝神繫表降鑒機先聖靡不通思無不及以爲經籍旣正憲章具明非文字無以見聖人之心非􅂐籀無以究文字之義眷玆譌俗深惻皇慈爰命討論以垂程式將懲㝛弊宜屬通儒臣等寔媿謏聞猥承乏使徒窮懵學豈副宸謨塵瀆冕旒冰炭交集其書十五卷以編袟繁重每卷各分上下共三十卷謹詣東上閤門進上謹進

front:
  text: 矢徒朗切竹也从竹微聲無非切籕文从微省竹胎也从竹旬聲思允切竹􅎯也从竹怠聲徒哀切竹箬也从竹咅聲薄侯切楚謂竹皮曰箬从竹若聲而勺切竹約也从竹即聲子結切折竹笢也从竹余聲讀若絮同都切筡也从竹臱聲武移切竹膚也从竹民聲武盡切竹裏也从竹本聲布忖切竹皃从竹翁聲烏紅切差也从竹參聲所今切引書也从竹􅂏聲持兖切讀書也从竹㨨聲春秋傳曰􅁲籀云直又切書也一曰關西謂㮄曰篇从竹扁聲芳連切簿書也从竹聲秦昔切竹田也从竹皇聲戸光切剖竹未去節謂之䉃从竹將聲即兩切籥也从竹枼聲与接切書僮竹笘也从竹龠聲以灼切竹聲也从竹劉聲力求切牒也从竹間聲古限切竹列也从竹亢聲古郎切㒼爰也从竹部聲薄口切齊簡也从竹从寺寺宫曹之等平也多肯切法也从竹竹簡書也汜聲古法有竹刑防􅶦切表識書也从竹戔聲則前切信也漢制以竹長六寸分而相合从竹付聲防無切易卦用蓍也从竹从占文巫字時制切簮也从竹幵聲古兮切取蟣比也从竹􅒳聲居之切收絲者也从竹蒦聲王縛切篗或从竹从閒繀絲筦也从竹廷聲特丁切筟也从竹完聲古滿切从竹贏聲以成切竹器也从竹删聲蘇旰切黍稷方器也从竹从皿从皀居洧切古文簋从匚飢古文簋或从􅁤亦古文簋黍稷圜器也从竹从皿甫聲方矩切古文簠从匕从夫竹豆也从竹邊聲布玄切籀文籩篅也从竹屯聲徒損切以判竹圜以盛穀也从竹耑聲市縁切竹高篋也从竹鹿聲盧谷切簏或从录大竹筩也从竹昜聲徒朗切斷竹也从竹甬聲徒紅切竹輿也从竹便聲旁連切鳥籠也从竹奴聲乃故切竹梃也从竹干聲古寒切罩魚者也从竹靃聲竹角切􅓂或省竹枚也从竹固聲古賀切竹索也从竹交聲胡茅切筊也从竹作聲在各切蔽絮簀也从竹沾聲讀若錢昨鹽切扇也从竹疌聲山洽切箑或从妾舉七器也一曰笭也从竹龍聲盧紅切袌也从竹襄聲如雨切可以収繩也从竹象形中象人手所推握也胡誤切䇘或省宗廟盛肉竹器也从竹尞聲周禮供盆簝以待事洛蕭切飲牛筐也从竹豦聲方曰筐圜曰􅞠居許切飲馬器也从竹兠聲當侯切積竹矛㦸矜也从竹盧聲春秋國語曰朱儒扶籚洛乎切籋也从竹拑聲巨淹切箝也从竹爾聲臣鉉等曰爾非聲未詳尼􅂺切笠蓋也从竹登聲都滕切簦無柄也从竹立聲刀入切大車牝服也从竹相聲息良切車笭也从竹匪聲敷尾切車笭也从竹令聲一曰笭籯也郎丁切㮻馬也从竹剡聲丑廉切馬箠也从竹朿聲楚革切擊馬也从竹聲之壘切箠也从竹杂聲陟􅀲切羊車騶箠也箸箴其耑長半分从竹内聲陟衛切所以盛弩矢人所負也从竹闌聲洛干切弩矢箙也从竹服聲周禮仲秋獻失箙房六切栙􅀟也从竹朱聲陟輸切折竹箠也从竹占聲穎川人名小兒所書寫爲笘失廉切笞也从竹旦聲當割切擊也从竹台聲丑之切驗也一曰銳也貫也从竹韱聲七廉切㮄也从竹殿聲臣鉉等曰當从省聲徒䰟切綴衣箴也从竹咸聲職深切以竿擊人也从竹削聲虞舜樂曰箾韶所角切又音簫管三十六簧也从竹亏聲羽俱切十三簧象􅃫之身也笙正月之音物生故謂之笙大者謂之巢小者謂之和从竹生聲占者隨作笙所庚切笙中簧也从竹黄聲古者女媧作簧戸光切簧屬从竹是聲是攴切參差管樂象􅃫之翼从竹肅聲穌彫切通簫也从竹同聲徒弄切三孔龠也大者謂之笙其中謂之􅄜小者謂之箹从竹賴聲洛􅅁切小􅄜也从竹約聲於角切如箎六孔十二月之音物開地牙故謂之管从竹官聲古滿切古者玉琯以玉舜之時西王母來獻其白琯前零陵文學姓奚於伶道舜祠下得笙玉琯夫以玉作音故神人以和鳯皇來儀也从玉官聲小管謂之篎从竹眇聲亡沼切七孔筩也从竹由聲羌笛三孔徐鍇曰當从冑省乃得聲徒歷切以竹曲五弦之樂也从竹从巩巩持之也竹亦聲張六切鼓弦竹身樂也从竹爭聲側莖切吹鞭也从竹孤聲古乎切吹筩也从竹秋聲七肖切壷矢也从竹壽聲直由切行棊相塞謂之簺从竹从塞塞亦聲先代切局戲也六箸十二棊也从竹博聲古者烏胄作簙補各切藩落也从竹畢聲春秋傳曰篳門圭窬卑吉切蔽不見也从竹愛聲烏代切隿射所蔽者也从竹嚴聲語杴切禁􅁐也从竹御聲春秋傳曰澤之目篽魚舉切篽或从又魚聲長六寸計歷數者从竹从弄言常弄乃不誤也蘇貫切數也从竹从具讀若筭蘇管切此字本闕臣鉉等案孫愐唐韻引􅀃文云喜也从竹从夭而不述其義今俗皆从犬又案李陽冰刋定􅀃文从竹从夭義云竹得風其體夭屈如人之􅀏未知其審私妙切

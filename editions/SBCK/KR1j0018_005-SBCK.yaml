body:
  text: 文百四十四重十五閣邊小屋也从竹移聲􅀃文通用誃弋支切竹皮也从竹均聲王春切公及士所搢也从竹勿聲案籀文作象形義云佩也古笏佩之此字後人所加呼骨切導也今俗謂之篦从竹聲邊兮切所以進􅂳也从竹髙聲古牢切文五新附簸也从竹象形下其丌也凡箕之屬皆从箕居之切古文箕省亦古文箕亦古文箕籀文箕籀文箕揚米去糠也切箕皮聲布火切文二重五下基也薦物之丌象形凡丌之屬皆从丌讀若箕同居之切古之遒人以不鐸記詩言从辵从丌丌亦聲讀與記同徐鍇日遒人行而求之故从辵丌薦而進之於上也居吏切五帝之書也从冊在丌上尊閣之也莊都說典大册也多殄切古文典从竹巽也从丌从此易顨卦爲長女爲風者臣鉉等曰之義亦選具也蘇困切相付與之約在閣上也从丌田聲必至切具也从丌聲臣鉉等曰庶物皆具丌以薦之蘇困切古文巽􅂐文巽置祭也从酋酋酒也下其丌也禮有奠祭者堂練切文七重三皆从巫武扶切古文巫能齋肅事神明也在男曰覡在女曰巫从巫从見徐鍇曰能見神也胡狄切文二重一美也从口含一一道也凡甘之屬皆从甘古三切美也从甘从舌舌知甘者徒兼切和也从甘从麻麻調也甘亦聲讀若函古三切飽也从甘从肰於鹽切猒或从㠯尤安樂也从甘甘匹耦也常􅚴切古文甚文五重二詞也从口乙聲亦象口气出也凡曰之屬皆从曰王代切告也从曰从冊冊亦聲楚革切何也从曰匃聲胡葛切出气詞也从曰象气岀形春秋傳曰鄭太子曶呼骨切籀文曶一曰佩也象形曽也从曰兟聲詩曰㬱不畏明臣鉉等曰今俗有昝字蓋朁之譌七感切語多沓沓也从水从曰遼東有沓縣臣鉉等曰語多沓沓若水之流故从水㑹意徒合切獄之兩曹也在廷東从㯥治事者从曰徐鍇曰以言詞治獄也故从曰昨牢切文七重一曵詞之難也象气之出難凡弓之屬皆从乃奴亥切臣鉉等曰今􅀠書作乃古文乃籀文乃驚聲也从乃省西聲籀文不省或曰徃也讀若仍臣鉉等曰西非聲未詳如乘切古文气行皃从乃􅓒聲讀若攸以周切文三重三气欲舒出勹上礙於一也丂古文以爲亐字又以爲巧字凡丂之屬皆从丂苦浩切亟詞也从丂从由或曰甹俠也三輔謂輕財者爲甹臣鉉等曰由用也任俠用乞也普丁切願詞也从丂寧聲奴丁切反丂也讀若呵虎何切文四肎也从口亦聲凡可之屬皆从可肯我切气損也从亏雐聲去爲切虧或从兮亏也審傎之詞者从亏从来周書曰粤三日丁亥王伐切驚語也从口从亏亏亦聲臣鉉等案口部有此重出況于切語平舒也从亏从八八分也爰礼􅀃符兵切古文平如此文五重二美也从甘匕聲凡旨之屬皆从旨職稚切古文旨口味之也从旨尚聲市羊切文二重一樂也从壴从口凡喜之屬皆从喜虚里切古文喜从欠與􅂬同說也从心从喜喜亦聲許記切大也从喜否聲春秋傳吴有太宰嚭匹鄙切文三重一陳樂立而上見也从屮从豆凡壴之屬皆从壴中句切還師振旅樂也一曰欲也登也从豆微省聲凡豈之屬皆从豈墟喜切康也从心豈豈亦聲苦亥切㡮也訖事之樂也从豈幾聲臣鉉等曰說文無㡮字从幾从气義無所取當是訖字之誤尔渠稀切文三古食肉器也从口象形凡豆之屬皆从豆徒候切古文豆木豆謂之梪从木豆徒􅀱切蠡也从豆蒸省聲居隱切豆屬从豆聲居倦切豆飴也从豆夗聲一丸切禮器也从廾持肉在豆上讀若鐙同都縢切文六重一行禮之器也从豆象形凡豊之屬皆从豊讀與禮同盧啓切爵之次弟也从豊从弟虞書曰平豑東作直質切文二豆之豐滿者也从豆象形一曰鄉飮酒有豐侯者凡豐之屬皆从豐敷戈切古文豐好而長也从豐豐大也盇聲春秋傳曰美而豔以贍切文二重一古陶器也从豆虍聲凡䖒之屬皆从䖒許羈切土鍪也从䖒号聲讀若鎬胡到切器也从䖒寕寕亦聲闕直吕切文三虎文也象形凡虍之屬皆从虍徐鍇曰象其文章屈曲也荒烏切騶虞也白虎黑文尾長於身仁獸食自死之肉从虍吴聲詩曰于嗟乎騶虞五俱切虎皃从虍必聲房六切虎行皃从虍文聲讀若矜臣鉉等曰文非聲未詳渠焉切虎不柔不信也从虍且聲讀若䣜縣昨何切哮虖也从虍兮聲荒烏切殘也从虍虎足反爪人也魚約切古文虐如此虎文彪也从虍彬聲布還切鐘鼓之柎也飾為猛獸从虍異象其下足其吕切一虞或从金豦聲􅂐文虞省文九重三飯食之用器也象形與豆同意凡皿之屬皆从皿讀若猛武永切飯器也从皿亐聲羽俱切小盂也从皿夗聲烏管切黍稷在器中以祀者也从皿成聲氏征切黍稷在器以祀者从皿成齊聲即夷切小甌也从皿有聲讀若灰一曰若賄于救切䀁或从右飯器也从皿聲洛乎切籀文盧器也从皿从缶古聲公戸切器也从皿弔聲止遥切盆也从皿央聲烏浪切盎或从瓦盎也从皿分聲歩奔切器也从皿宁聲直吕切盨負戴器也从皿須聲相庾切器也从皿漻聲古巧切械器也从皿必聲彌畢切酸也作醯以以酒从酒並省从皿皿器也呼雞切調味也从皿禾聲戸戈切饒也从水皿皿益之意也伊昔切滿器也从皿夃臣鉉等曰夃古乎切益多之義也古者以買物多得爲夃故从夃以成切器中空也从皿聲慈刃切器虚也从皿中聲老子曰道盅而用之直弓切覆蓋也从皿酓聲臣鉉等曰今俗别作罯非是烏合切仁也从皿以食囚也官薄說烏渾切澡手也从曰水臨皿春秋傳曰奉􅓢沃盥古玩切條器也从皿湯聲徒朗切文二十五重三盋器盂屬从皿犮聲或从金从本北未切文一新附凵盧飯器以柳爲之象形凡凵之屬皆从凵去魚切凵或从竹去聲文一重一人相違也从大凵聲凡去之屬皆从去丘據切去也从去曷聲丘竭切去也从去夌聲讀若陵力膺切文三祭所薦牲血也从皿一象血形凡血之屬皆从血呼決切血也从血亡聲春秋傳曰士封羊亦無􅎺也呼光切凝血也从血不聲芳桮切气液也从血􅩎聲將鄰切定息也从血甹省聲讀若亭特丁切鼻岀血也从血丑聲女六切腫血也从血䢉省聲奴冬切俗从肉農聲血醢也从血䏙聲禮記有醢以牛乾脯梁􅯅鹽酒也臣鉉等曰䏙􅁏汁滓也故从䏙䏙亦聲他感切醢也从血菹聲側余切蕰或从缶以血有所刏涂祭也从血幾聲渠稀切憂也从血卩聲一曰鮮少也徐鍇曰皿者言憂之切至也辛聿切傷痛也从血聿皕聲周書曰民冈不衋傷心許力切羊疑血也从血色聲苦紺切䘓或从贛覆也从血大臣鉉等曰大象蓋覆之形胡臘切汚血也从血蔑聲莫結切文十五重三有所絶上而識之也凡之屬皆从却􅁃切鑑中火主也从象形从亦聲臣鉉等曰今俗别作炷非是之􅁃切相與語唾而不受也从从否否亦聲天口切咅或从豆从欠文三重一􅀃文解字第五上凡鬯之屬皆从鬯丑諒切芳艸也十葉爲貫百廾貫築以煑之爲鬰从曰冂缶鬯彡其飾也一曰鬰鬯百艸之華逺方鬰人所貢芳艸合釀之以降神鬰今鬰林郡也迂勿切禮器也象爵之形中有鬯酒又持之也所以飲器象爵者取其鳴節節足足也即略切古文爵象形黑黍也一稃二米以釀也从鬯矩聲其呂切或从禾列也从鬯吏聲讀若迅䟽吏切文五重二一米也从皀亼聲或􅀃亼皀也凡食之屬皆从食乘力切滫飯也从食聲臣鉉等曰音忽非聲疑奔字之誤府文切或从賁或从奔飯气蒸也从食留聲力救切大孰也从食壬聲如甚切古文飪亦古文飪孰食也从食雝聲於容切米糵煎也从食台聲與之切籀文飴从異省飴和饊者也从食易聲徐盈切熬稻粳䅣也从食􅊌聲穌旱切麪餈也从食井聲必郢切稻餅也从食次聲疾資切餈或从齊餈或从米糜也从食亶聲周謂之饘宋謂之烏玄切飽也从食堯聲如昭切饒丗从食余聲以諸切食臭也从食艾聲爾雅曰餀謂之喙呼艾切送去也从食戔聲詩曰顯父餞之才線切野饋曰餫从食軍聲王問切客舎也从食官聲周禮五十里有市市有館館有積以待朝聘之客古玩切貪也从食號聲土刀切饕或从口刀聲籀文饕从號省貪也从食殄省聲春秋傳曰謂之饕飻他結切飯傷熱也从食歳聲於廢切飯傷溼也从食壹聲乙冀切飯餲也从食曷聲論語曰食饐而餲乙例切又鳥介切穀不孰爲饑从食幾聲居衣切􅂼不孰爲饉从食堇聲渠吝切飢也从食戹聲讀若楚人言恚人於革切飢也从食委聲一曰魚敗曰餧奴罪切餓也从食几聲居夷切飢也从食我聲五箇切呉人謂祭曰餽从食从􅀑􅀑亦聲俱位切又音饋祭酹也从食叕聲陟䘙切小餟也从食兌聲輪芮切馬食穀多气流四下也从食夌聲里切食馬穀也从食未聲莫撥切文六十二重十八食之餘也从食夋聲子陖切餌屬从食羔聲古牢切文二新附三合也从入一象三合之形凡亼之屬皆从亼讀若集秦入切臣鉉等曰此疑只象形非从入一也合口也从亼从口候閤切皆也从亼从吅从从虞書曰僉曰伯夷七廉切思也从亼从冊力屯切籀文侖是時也从亼从古文及居音切市居曰舍从亼屮象屋也口象築也始夜切文六重一合也从亼从曾省曾益也凡會之屬皆从會黄外切古文㑹如此益也从㑹卑聲符支切日月合宿爲辰从㑹从辰辰亦聲植鄰切文三重一穀藏也倉黃取而藏之故謂之倉从食省口象倉形凡倉之屬皆从倉七岡切竒字倉鳥獸來食聲也从倉爿聲虞書曰鳥獸牄牄七羊切文二重一内也象从上俱下也凡入之屬皆从入人汁切入也从冂自外而入也奴對切入山之􅀷也从山从入闕鉏箴切市穀也从入从䊮徒歷切完也从入从工疾緑切􅂐文仝从玉純玉曰全古文仝二入也兩从此闕良奬切文六重二瓦器所以盛酒漿秦人鼓之以節謌象形凡缶之屬皆从缶方丸切未燒瓦器也从缶㱿聲讀若筩莩又苦􅇋切瓦器也从缶包省聲古者昆吾作匋案史篇讀與缶同徒刀切缶也从缶賏聲烏莖切小口罌也从缶􅑰聲池僞切小缶也从缶咅聲蒲􅃸切􅜍也从缶幷聲薄經切缾或从瓦汲缾也从缶雝聲烏貢切下平缶也从缶乏聲讀若􅛑土盍切備火長頸缾也从缶熒省聲烏莖切瓨也从缶工聲下江切瓦器也从缶或聲于逼切瓦器也从􅇲薦聲作甸切瓦器也从缶肉聲臣鉉等曰當从䚻省乃得聲以周切瓦器也从缶霝聲郎丁切缺也从缶占聲都念切器破也从缶決省聲傾雪切裂也从缶虖聲缶燒善裂也呼迓切器中空也从缶殸聲殸古文磬字詩云缾之罄矣苦定切器中盡也从缶􅌛聲苦計切受錢器也从缶后聲古以瓦今以竹大口切又胡講切文二十一重一凡髙之屬皆从髙古牢切小堂也从髙省冋聲去潁切高或从广頃聲民所安定也亭有樓从高省丁聲特丁切京兆杜陵亭也从高省乇聲㫄各切文四重一邑外謂之郊郊外謂之野野外謂之林林外謂之冂象逺界也凡冂之屬皆从冂古熒切古文冂从口象國邑冋或从土買賣所之也市有垣从冂从了了古文及象物相及也之省聲時止切淫淫行皃从人岀冂余箴切中央也从大在冂之内大人也央㫄同意一曰乆也於良切髙至也从隹上欲出冂易曰夫乾隺然胡沃切文五重二度也民所度居也从回象城之重兩亭相對也或但从口音韋凡之屬皆从古傳切缺也古者城闕其南方謂之从缺省讀若拔物爲決引也傾雪切文二人所爲絶高丘也从高省丨象高形凡京之屬皆从京舉卿切就高也从京从尤尤異於凡也疾僦切籀文就文二重一獻也从高省曰象進孰物形孝經曰祭則􅀑亯之凡亯之屬皆从亯許兩切又暜庚切又許庚切􅂐文亯孰也从亯从芉讀若純一曰鬻也常倫切􅂐文􅙯厚也从亯竹聲讀若篤冬毒切用也从亯从自自知臭香所食也讀若庸余封切文四重二厚也从反亯凡􅫇之屬皆从􅫇徐鍇曰亯者進上也以進上之具反之於下則厚也胡口切長味也从􅫇鹹省聲詩曰實覃實吁徒含切古文覃􅂐文覃省山陵之厚也从􅫇从厂胡口切古文厚从后土文三重三滿也从高省象高厚之形凡畗之屬皆从畗讀若伏芳逼切善也从畗省􅎅聲徐鍇曰良甚也故从畐吕張切古文良亦古文良亦古文良文二重三穀所振入宗廟粢盛倉黃㐭而取之故謂之㐭从入回象屋形中有戸牖凡㐭之屬皆从㐭力甚切㐭或从广从禾賜穀也从㐭从禾筆錦切多穀也从日聲多旱切嗇也从口㐭㐭受也方美切古文啚如此文四重二愛濇也从來从㐭來者㐭而藏之故田夫謂之􅞋夫凡􅞋之屬皆从􅞋所力切古文􅞋从田垣蔽也从􅞋爿聲才良切籀文从二禾籀文亦从二來文二重三周所受瑞麥來麰一來二縫象芒朿之形天所來也故爲行來之來詩曰詒我來麰凡來之屬皆从來洛哀切詩曰不不來从來矣聲􅇃史切或从彳文二重一芒穀秋穜厚薶故謂之麥麥金也金王而生火王而死从來有穗者从夂凡麥之屬皆从麥臣鉉等曰夂足也禺受瑞麥來麰如行來故从夂莫獲切來麰麥也从麥牟聲莫浮切麰或从艸堅麥也从麥气聲平􅃿切小麥屑之覈从麥􅩏聲穌果切䃺麥也从麥􅐔聲一曰擣也昨何切小麥屑皮也从麥夫聲甫無切麩或从甫麥未也从麥丏聲弥箭切麥覈屑也卜斤爲三斗从麥啻聲直隻切煑麥也从麥豐聲讀若馮敷戎切麥甘鬻也从麥去聲丘據切餅􅯅也从麥㱿聲讀若庫空谷切餅􅯅也从麥穴聲戸八切餅􅯅也从麥才聲昨哉切文十三重二行遲曵夊夊象人兩脛有所躧也凡夂之屬皆从夂楚危切行夋夋也一曰倨也从夂允聲七倫切行故道也从夂畐省聲房六切越也从夂从髙也一曰夌􅯎也力膺切送詣也从夂从至陟利切和之行也从夂聲詩曰布政憂憂於求切行皃从夂㤅聲烏代切行也从夂闕讀若僕又􅁲切繇也舞也樂有章从章从夅从夂詩曰竷竷舞我苦感切堖藎也象皮包覆堖下有兩臂而夂在下讀若范亡范切中國之人也从夂从頁从曰曰兩手夂兩足也胡雅切古文治稼畟畟進也从田人从夂詩曰畟畟良耜初力切歛足也鵲鶪醜其飛也㚇从夂兇聲子紅切貪獸也一曰母猴似人从頁巳止夂其手足臣鉉等曰巳止皆象形也奴刀切神魖也如龍一足从夂象有角手人面之形渠追切文十五重一拜失容也从攵坐聲則卧切文一新附對卧也从夊㐄相背凡舛之屬皆从舛昌兖切揚雄說舛从足春樂也用足相背从舛無聲文撫切古文舞从羽亡車輪耑鍵也兩穿相背从舛􅍛省聲􅍛古文偰字胡戛切文三重二艸也楚謂之葍秦謂之藑蔓地連華象形从舛舛亦聲凡䑞之屬皆从䑞舒閏切今隸變作舜古文䑞華榮也从舜生聲讀若皇爾雅曰華也戸光切或从艸皇文二重二相背也从舛口聲獸皮之韋可以束枉戾相韋背故借以爲皮韋凡韋之屬皆从韋字非切古文韋韍也所以蔽前以韋下廣二尺上廣一尺其頸五寸一命緼韠再命赤韠从韋畢聲卑吉切茅蒐染韋也一入曰韎从韋末聲莫佩切櫜紐也从韋惠聲一曰盛虜頭橐也徐鍇曰謂戰伐以盛首級胡計切劒衣也从韋舀聲土刀切射臂決也从韋冓聲古矦切射決也所以拘弦以象骨韋系著右巨指从韋枼聲詩曰童子佩韘失陟切韘或从弓弓衣也从韋蜀聲之欲切弓衣也从韋長聲詩曰交韔二弓丑亮切履也从韋叚聲乎加切履後帖也从韋段聲徒玩切􆇽或从系足衣也从韋蔑聲臣鉉等曰今俗作韈非是望發切軶裹也从韋專聲匹各切革中辨謂之韏从韋聲九萬切收束也从韋􅧤聲讀若酋臣鉉等曰􅧤側角切聲不相近未詳即由切􅒫或从要􅒫或从秋手井垣也从韋取其帀也倝聲胡安切文十六重五柔而國也从韋刀聲而進切文一新附韋束之次弟也从古字之象凡弟之屬皆从弟特計切古文弟从古文韋省丿聲周人謂兄曰从弟从眔臣鉉等曰眔自相及也兄弟親比之義古䰟切文二重一从後至也象人兩脛後有致之者凡夂之屬皆从夂讀若黹陟侈切相遮要害也从夂丰聲南陽新野有夆亭乎蓋切啎也从夂半聲讀若縫敷容切服也从夂㐄相承不敢竝也下江切秦以市買多得爲夃从了从夂益至也从乃詩曰我夃酌彼金罍臣鉉等曰乃難意也古乎切跨歩也从反夂􅰍从此苦瓦切文六

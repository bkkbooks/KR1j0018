  text: 􅀃文解字弟四上漢太尉祭酒許愼記
  hash: sha256:c330d0fd0cda24dd84900b2760dfa4fa6f68f3e5b330c467b2d133919e2397d0
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1j0018_SBCK_004-1a}
body:
  text: 四十五部文七百四十八重百一十二凡七千六百三十八字文二十四新附舉目使人也从攴从目凡􅴗之屬皆从􅴗讀若火劣切營求也从􅴗从人在穴上商書曰高宗夢得說使百工夐求得之傅巖巖穴也徐鍇曰人與目隔穴經營而見之然後指使以求之支所指畫也朽正切低目也从􅴗門聲弘農湖縣有䦩郷汝南西平有䦩亭無分切大視也从大􅴗讀若齤況晚切文四人眼象形重童子也凡目之屬皆从目莫六切古文目目也从目聲五限切兒􅀄生瞥者从目瞏聲􅀖免切目無常主也从目玄聲黄絢切目匡也从目此聲在詣切目㫄毛也从目夾聲子葉切盧童子也从目縣聲胡畎切目童子精也从目喜聲讀若禧許其切目㫄薄緻宀宀也从目臱聲武延切大目也从目非聲芳微切大目也从目臤聲矦簡切大目也从目旱聲戸版切睅或从完大目也从目爰聲汎晚切平目也从目䓣聲母官切大目出也从目軍聲古鈍切目矕矕也从目􅒋聲武版切目大也从目侖春秋傳有鄭伯睔古本切詩曰美目盼􅀆从目分聲匹莧切目多白也一曰張目也从目干聲古旱切多白眼也从目反聲春秋傳曰鄭游眅字子明暜班切出目也从目見聲胡興切目多精也从目雚聲益州謂瞋目日矔古玩切目精也从目粦聲力珍切深目也从穴中目烏皎切目少精也从目毛聲虞書耄字从此二報切目無精直視也从目黨聲他朗切暫視皃从目炎聲讀若白蓋謂之苫相以失冉切吴楚謂瞋目顧視曰眮从目同聲徙弄切直視也从目必聲讀若詩云泌彼泉水兵媚切瞴婁微視也从目無聲莫浮切蔽人視也从目开聲讀若攜手一曰直視也又苦兮切䀘目或在下睌腎目視皃从目免聲武限切眂皃从目氏聲承旨切衺視也从目兒聲研計切低目視也从目冒聲周書曰武王惟􅰮亡保切視髙皃从目戉聲讀若詩曰施罛濊濊呼哲切視近而忘逺从目穴聲易曰虎視眈眈丁含切相顧視而行也从目从㢟㢟亦聲于線切張目也从目于聲一曰朝鮮謂盧童子曰盱況于切目騖視也从目􅀽聲詩曰獨行瞏瞏渠營切視而止也从目亶聲旨善切目􅁳逺視也从目勿聲一曰乆也一曰旦明也莫佩切目有所恨而止也从目㐱聲之忍切􅕉也从目􅰈聲敷沼切察也从目祭聲戚細切見也从目者聲當古切古文从見目相及九从目从聿省徒合切目不相聽也从目癸聲苦圭切目不明也从目末聲莫撥切轉目梘也从目般聲薄官切小兒白眼也从目辡聲蒲莧切目財視也从目􅆶聲莫獲切失意視也从目脩聲他歷切謹鈍目也从目􅙯聲之閏切目動也从目閏聲如勻切恨張目也从目賔聲詩曰國步斯矉符眞切目無明也从目夗聲一九切仰目也从目隹聲許惟切目搖也从目勻省聲黄絢切旬或从旬大視也从目蒦聲許縛切目順也从目坴聲一曰敬和也莫􅁲切古文睦臨視也从目詹聲職廉切氐目謹視也从目敄聲莫矦切小視也从目買聲莫佳切視也从目監聲古銜切省視也从目啓省聲苦系切省視也从目从木易曰地可觀者莫可觀於木詩曰相鼠有皮息良切張目也从目眞聲昌眞切祕書瞋从戍目孰視也从目鳥聲讀若雕都僚切目疾視也从目易聲施􅃗切視皃从目肙聲於絢切目深皃从目窅讀若易曰勿䘏之䘏於悅切迎視也从目是聲讀若珥瑱之瑱也計切目相戲也从目晏聲詩曰䁙婉之求於殄切短深目皃从目䀑聲鳥括切顧也从目􅫦聲詩曰乃眷西顧居倦切察也一曰目痛也从目叔聲冬毒切望也从目稀省聲海岱之間謂眄曰睎香衣切睎之从乎下目苦寒切看或从倝深視也一曰下視也又竊見也从目覃聲式荏切坐寐也从目垂是僞切翕自也从目冥冥亦聲臣鉉等曰今俗别作眠非是武延切目病生翳也从目生聲所景切過目也又目翳也从目敝聲一曰財見也暜滅切目傷眥也从目多聲一曰瞢兠叱支切目眵也从目蔑省聲莫結切涓目也从目夬聲臣鉉等曰當从決省古穴切目病也从目良聲力讓切目不明也从目未聲莫佩切戴目也从目閒聲江淮之間謂眄曰瞯戸閒切艸入目中也从目米聲莫禮切目不正也从目兆聲他弔切目童子不正也从目來聲洛代切目睞謹也从目录聲讀若鹿盧谷切眣也从目攸聲敕鳩切脩或从丩目不正也从目失聲丑栗切童矇也一曰不明也从目蒙聲莫中切一目小也从目从少少亦聲亡沼切目偏合也一曰衺視也秦語从目丏聲莫甸切眄也从目各聲盧各切目無牟子从目亡聲或庚切目陷也从目咸聲苦夾切目但有也从目鼓聲公戸切無目也从目叜聲穌后切惑也从目榮省聲戸扃切目小也从目坐聲臣鉉等曰案尚書元首叢睉哉叢睉猶細碎也今从肉非是昨禾切捾目也从目又烏括切目小視也从目弟聲南楚謂眄曰睇特計切開闔目數搖也从目寅聲臣鉉等曰今俗别作瞬非是舒問切直視也从目台聲丑吏切長眙也一曰張目也从目宁聲陟吕切恨視也从目􅀆聲胡計切目不明也从目弗聲普末切文百十三重八目上下瞼也从目僉聲居奄切動目也从目乏聲側洽切􅀷目也亦人姓从目圭聲許規切目精也从目灷聲案勝字賸皆从朕聲疑古以朕爲朕直引切目童子也从目牟聲􅀃文直作牟莫浮切目際也从目厓五隘切文六新附左右視也从二目巳䀠之屬皆从䀠讀若拘又若良士瞿瞿九遇切目圍也从䀠讀若書卷之卷古文以爲醜字居倦切目衰也从䀠从大大人也舉朱切文三目上毛也从目象眉之形上象頟理也凡眉之屬皆从眉武悲切視也从眉省从屮臣鉉等曰屮通識也所景切古文从少从囧文二重一瞂也所以扞身蔽目象形凡盾之屬皆从盾食閏切盾也从盾犮聲扶發切盾握也从盾圭聲苦圭切文三鼻也象鼻形凡自之屬皆从自疾二切古文自不見也闕武延切文二重一此亦自字也省自者詞言之气从鼻出與口相助也凡白之屬皆从白疾二切俱詞也从比从白古諧切鈍詞也从白鮺省聲論語曰參也魯郎古切別事詞也从白聲古文旅字之也切詞也从白􅴣聲􅴣与疇同虞書帝曰咨直由切識詞也从白从亐从知知義切古文十十也从一白數十百爲一貫相章也博陌切古文百从自文七重二引气自􅂌也从自􅂌凡鼻之屬皆从鼻入二切以鼻就􅆨也从鼻从􅆨􅆨亦聲讀若畜牲之畜許救切臥息也从鼻五聲讀若汗矦幹切病寒鼻室也从鼻九聲巨鳩切臥息也从鼻隶聲讀若虺許介切文五二百也凡皕之屬皆从皕讀若袐彼刀切盛也从大从皕皕亦聲此燕召公名讀若郝史篇名醜徐鍇曰史篇謂所作蒼頡十五篇也詩亦切古文奭文二重一數飛也从羽从曰凡習之屬皆从習似入切習猒也从習元聲春秋傳曰翫歳而􅄄日五換切文二鳥長毛也象形凡羽之屬皆从羽王矩切鳥之彊羽猛者从羽是聲俱豉切天雞赤羽也从羽幹聲逸周書曰大翰􅀂翬雉一名鷐風周成王時蜀人献之矦幹切山雉尾長者从羽从隹徒歷切赤羽雀也出鬱林从羽非聲房味切青羽雀也出鬱林从羽卒聲􅍰醉切羽生也一曰羽从羽前聲即淺切頸毛也从羽公聲烏紅切翼也从羽支聲施智切翄或从氏翅也从羽革聲古翮切尾長毛也从羽堯聲渠遥切羽本也一曰羽初三皃从羽矦聲平溝切羽莖也从羽鬲聲下革切羽曲也从羽句聲其俱切羽之風亦古諸侯也一曰射師从羽开聲五計切飛舉也从羽者聲章庶切起也从羽合聲許及切小飛也从羽瞏聲許縁切大飛也从羽軍聲一曰伊雒而南雉五采皆備曰翬詩曰如翬斯飛臣鉉等曰當从揮省許歸切髙飛也从羽从㐱力救切疾飛也从羽扁聲芳連切捷也飛之疾也从羽夾聲讀若濇一曰俠也山洽切飛㒵从羽立聲與職切飛盛皃从羽从冃臣鉉等曰犯冒而飛是盛也土盍切飛盛㒵从羽之聲侍之切翔翔也从羽􅓧聲五牢切回飛也从羽羊聲似羊切飛聲也从羽歳聲詩曰鳳皇于飛翽翽其羽呼㑹切鳥白肥澤皃从羽髙聲詩云白鳥翯翯胡角切樂舞以羽翳自翳其首以祀星辰也从羽王聲讀若皇胡光切樂舞執全羽以祀社禝也从羽犮聲讀若紱分勿切翳也所以舞也从羽聲詩曰左執翿徒到切華蓋也从羽殹聲於計切棺羽飾也天子八諸侯六大夫四士二下垂从羽妾聲山洽切文三十四重一飛也从羽番聲或从飛孚􅀽切羽也从羽令聲郎丁切飛聲从羽工聲戸公切文三新附鳥之短尾緫名也象形凡隹之屬皆从隹職追切楚烏也一名鸒一名卑居秦謂之雅从隹牙聲臣鉉等曰今俗别作鴉非是五下切又烏加切鳥一枚也从又持隹持一隹曰􅃗二隹曰􅃗之石切鵋䳢也从隹各聲盧各切今閵似鴝鶴而黄从隹省聲良刃切籀文不省周燕也从隹屮象其冠也㕯聲一曰蜀王望帝媱其相妻慙亡去爲子巂鳥故蜀人聞子巂鳴皆起云望帝戸圭切鳥也从隹方聲讀若方府良切依人小鳥也从小隹讀與爵同即略切鳥也从隹犬聲睢陽有水五加切雗鷽也从隹倝聲侯幹切有十四種盧諸雉喬雉鳲雉鷩雉秩秩海雉翟山雉翰雉卓雉伊洛而南曰翬江淮而南曰揺南方曰􅴣東方曰甾北方曰稀西方曰蹲从隹矢聲直几切古文雉从弟雄雌鳴也雷始動雉鳴而雊其頸从隹从句句亦聲古侯切知時畜也从隹奚聲古兮切籀文雞从鳥雞子也从隹芻聲士于切籀文雛从鳥鳥大舞也从隹翏聲一曰雉之莫子爲雡力救切黄倉庚也鳴則􅁞生从隹离聲㠯支切也从隹周聲都僚切籀文雕从鳥鳥也从隹瘖省聲或从人人亦聲徐鍇曰鷹隨人所指䡮故从人於凌切籀文从鳥也从隹氐聲處脂切籀文从鳥也从隹垂聲是僞切石鳥一名雝􅼵一曰精􅍌从隹开聲春秋傳秦有士雃苦堅切雝􅼵也从隹邕聲於容切鳥也从隹今聲春秋傳有公子苦雂巨淹切鳥也从隹从人厂聲讀若鴈臣鉉等曰雁知時鳥大夫以爲摯昬禮用之故从人五晏切黄也从隹黎聲一曰楚雀也其色黎黑而黄郎兮切鳥也从隹虍聲荒烏切牟母也从隹奴聲人諸切翟或从鳥九雇農桑候鳥扈民不婬者也从隹户聲春雇鳻盾夏雇竊玄秋雇竊藍冬雇竊黄􅁄雇竊丹行雇唶唶宵雇嘖嘖桑雇竊脂老雇鷃也侯古切雇或从雩籀文雇从鳥䨄屬从隹􅙯聲常倫切屬从隹酓聲恩含切籀文籬从鳥鳥也从隹支聲一曰䧴度章移切鳥肥大􅭐􅭐也从隹工聲戸工切􅭐或从鳥繳也从隹􅤖聲一曰飛也臣鉉等曰繳之若切罾繳以取鳥也穌旰切繳射飛鳥也从隹弋聲與職切鳥父也从隹厷聲羽弓切鳥母也从隹此聲此移切覆鳥令不飛走也从网隹讀若到都校切肥肉也从弓所以射隹長沙有下雋縣祖沇切飛也从隹隓聲山垂切文三十九重十二鳥張毛羽自􅁬也从大从隹凡奞之屬皆从奞讀若睢息遺切手持隹失之也从又从奞徒活切翬也从奞在田上詩曰不能奮飛方問切文三鴟屬从隹从􅯉有毛角所鳴其民有旤凡萑之屬皆从萑讀若和胡官切規蒦商也从又持萑一曰視遽皃一曰蒦度也徐鍇曰商度也萑善度人禍福也乙虢切蒦或从尋尋亦度也楚詞曰求矩彠之所同小爵也从萑吅聲詩曰雚鳴于垤工奂切􅵁舊舊留也从萑􅍫聲巨救切舊或从鳥休聲文四重二羊角也象形凡􅘲之屬皆从􅘲讀若䓙工瓦切戾也从􅘲而兆兆古文别臣鉉等曰兆兵列切篆文分别字也古懷切相當也闕讀若宀母官切文三目不正也从􅯉从目凡苜之屬皆从苜莧从此讀若末徐鍇曰􅯉角戾也徒結切目不眀也从首从䀏䀏目數摇也木空切火不明也从苜从大苜亦聲周書曰布重席織蒻席也讀與蔑同莫結切勞目無精也从苜人勞則蔑然从戍莫結切文四祥也从􅯉象頭角足尾之形孔子曰牛羊之字以形舉也凡羊之屬皆从羊與章切羊鳴也从羊象聲气上出與牟同意緜婢切羊子也从羊照省聲古牢切五月生羔也从羊宁聲讀若煑直呂切六月生羔也从羊敄聲讀若霧巳遇切又亡遇切小羊也从羊大聲讀若達他末切羍或省羊未卒歳也从羊兆聲或曰夷羊百斤左右爲䍮讀若春秋盟于洮治小切牡羊也从羊氐聲都兮切牂羊也从羊分聲符分切牡羊也从羊片聲則郎切夏羊牡曰羭从羊俞聲羊朱切夏羊牡曰羖从羊殳聲公户切羊羖犗也从羊曷聲居謁切騬羊也从羊夷聲徐姊切黄腹羊从羊番聲附􅀽切羊名从羊巠聲口莖切羊名从羊執聲汝南乎輿有亭讀若晉臣鉉曰執非聲未詳即刃切痩也从羊􅢓聲臣鉉等曰羊主給膳以痩爲病故从羊力爲切羊相也从羊委聲於僞切䍴羵也从羊責聲子賜切輩也从羊君聲臣鉉等曰羊性好羣故从羊渠云切羣羊相也一白黑羊从羊垔聲鳥閑切羊名蹏皮可以割桼从羊此聲此思切甘也从羊从大羊在六畜主給膳也美與善同意臣鉉等曰羊大則美故从大無鄙切西戎牧羊人也从人从羊羊亦聲南方蠻閩从虫北方狄从犬東方貉从豸西方羌从羊此六種也西南􅈎人僬僥从人蓋在坤地頗有順理之性唯東夷从大大人也夷俗仁仁者壽有君子不死之國孔子曰道不行欲之九夷乘桴浮於海有以也去羊切古文羌如此進善也从羊乆聲文王拘羑里在湯隂與乆切文二十六重二長尾禽緫名也象形鳥之足似匕从􅎅凡鳥之屬皆从鳥都了切神鳥也天老曰鳳之象也鴻前麐後蛇頸魚尾鸛鵽鴛思龍文虎背燕頷雞喙五色備舉出於東方君子之國翺翔四海之外過崐崘飲砥柱濯羽弱水莫宿風穴見則天下大安寧从鳥凡聲馮貢切古文鳳象形鳳飛羣鳥從以萬數故以爲朋黨字亦古文鳳亦神靈之精也赤色五采雞形鳴中五音頌聲作則至从鳥􅒋聲周成王時氏羌獻鸞鳥洛官切鸑鷟鳯屬神鳥也从鳥獄聲春秋國語曰周之興也鸑鷟鳴於岐山江中有鸑鷟似鳧而大赤目五角切鸑鷟也从鳥族聲士角切鷫鷞也五方神鳥也東方發明南方焦明西方鷫鷞北方幽昌中央鳯皇从鳥肅聲息逐切司馬相如說从叜聲鷫鷞也从鳥爽聲所莊切鶻鵃也从鳥九聲居求切鶋鳩也从鳥屈聲九勿切祝鳩也从鳥隹聲思允切鵻或从隹一曰鶉字鶻鵃也从鳥骨聲古忽切鶻鵃也从鳥舟聲張流切秸尸鳩从鳥聲臣鉉等曰居六切與同居六切聲古从鳥合鳩屬沓切渇鴠也从鳥旦聲得案切伯勞也从鳥狊聲古閴切鵙或从隹天龠也从鳥翏聲力救切卑居也从鳥與聲羊茹切雗鷽山鵲知來事鳥也从鳥學省聲胡角切鷽或从隹鳥黑色多子師曠曰南方有鳥名曰羌鷲黄頭赤目五色皆備从鳥鷲聲疾僦切鴟號寧鴂也从鳥号聲于嬌切寧鴂也从鳥夬聲古穴切鳥也从鳥祟聲辛聿切澤虞也从鳥方聲分兩切鳥也从鳥􅎒聲子結切鳥也从鳥泰聲親吉切鋪豉也从鳥失聲臣鉉等曰鋪豉鳥名徒結切鶤雞也从鳥軍聲讀若運古渾切鳥也从鳥芺聲烏浩切鳥也从鳥臼聲居王切鵻桃蟲也从鳥焦聲即消切也从鳥眇聲亡沼切鳥少美長醜爲鶹離从鳥留聲力求切鳥也从鳥堇聲那于切或从隹古文􅴥古文􅴥古文􅴥欺老也从鳥􅂏聲丑絹切鳥也从鳥說省聲弋雪切鳥也从鳥主聲夭口切鳥也从鳥昏聲武巾切刀鷯剖葦食其中蟲从鳥尞聲洛簫切鳥也其雌皇从鳥匽聲一曰鳯皇也於㦥切瞑鴲也从鳥旨聲旨夷切烏鸔也从鳥各聲盧各切鳥鸔也从鳥暴聲蒲木切鳴九臯聲聞子天从鳥隺聲下各切白鷺也从鳥路聲洛故切鴻鶴也从鳥告聲胡沃切鴻鵠也从鳥江聲戸工切秃也从鳥尗聲臣鉉等曰尗非聲未詳七由切或从秋鴛鴦也从鳥夗聲於􅀽切鴛鴦也从鳥央聲於良切鵽鳩也从鳥叕聲丁刮切疑从雀省今俗别作鳶非是與專切鴟也从鳥間聲戸閒切鷙鳥也从鳥䍃聲弋笑切白鷢王鴡也从鳥厥聲居月切王鴡也从鳥且聲七余切專畐蹂如䧿短尾射之銜矢射人从鳥雚聲呼官切鷐風也从鳥亶聲諸延切籀文鸇从廛鷐風也从鳥晨聲植鄰切擊殺鳥也从鳥執聲脂利切鸇飛皃从鳥穴聲詩曰鴥彼晨風余律切鳥也从鳥榮省聲詩曰有鶯其羽烏莖切鴝鵒也从鳥句聲其俱切鴝鵒也从鳥谷聲古者鴝鵒不踰泲余蜀切鵒或从隹从􅁷赤雉也从鳥敝聲周禮曰孤服鷩冕井􅍌切鵔鸃鷩也从鳥夋聲私閠切鵔鸃也从鳥義聲秦漢之初侍中冠鵔鸃冠魚覊切雉屬戇鳥也从鳥省聲都歷切似雉出上黨从鳥匃聲胡割切鳥似鶡而青出羌中从鳥介聲古拜切鸚䳇能言爲也从鳥嬰聲烏莖切鸚䳇也从鳥母聲文甫切走鳴長尾雉也乗輿以爲防釳若馬頭上从鳥喬聲巨嬌切雌雉鳴也从鳥唯聲詩曰有鷕雉鳴以沼切鼠形飛走且乳之鳥也从鳥畾聲力軌切籀文䴎雉􅏂鶾音者也从鳥倝聲魯郊以丹雞祝曰以斯鶾音赤羽去魯侯之咎矦幹切雇也从鳥安聲烏諫切毒鳥也从鳥冘聲一名運日直禁切鳥子生哺者从鳥㱿聲口豆切鳥聲也从鳥从口武兵切飛㒵从鳥寒省聲虚言切鳥聚皃一曰飛皃从鳥分小也象子初生之形凡幺之屬皆从幺於堯切少也从幺从力伊謬切文二細也从幺麻聲亡果切文一新附微也从二幺凡􅖨之屬皆从􅖨於虯切隱也从山中􅖨􅖨亦聲於虯切微也殆也从􅖨从戍戍兵守也􅖨而兵守者危也居衣切文三專小謹也从幺省屮財見也屮亦聲凡叀之屬皆从叀職縁切古文叀亦古文叀仁也从心从叀徐鍇曰爲惠者心專也胡桂切古文惠从艸礙不行也从叀引而止之也叀者如叀馬之鼻从此與牽同意陟利切文三重三幽逺也黒而有赤色者爲玄象幽而入覆之古文􅜆相付也从􅗸舟省聲殖酉切撮也从􅗸从巳臣鉉等曰巳者物也又􅀲掫取之指事力輟切引也从􅗸􅛣臣鉉等曰􅛣音曵􅗸二手也而曵之爭之道也側莖切所依據也从􅗸工讀與隱同於謹切五指持也从􅗸一聲讀若律吕戍切進取也从􅗸古聲古覽切籀文古文文九重三􅋊穿也从又从歺凡􅯂之屬皆从􅯂讀若􅋊昨干切溝也从􅯂从谷讀若郝呼各切㕡或从土􅯂探堅意也从􅯂从貝貝堅寶也讀若概古代切坑也从􅯂从井井亦聲疾正切深明也通也从􅯂从目从谷省以芮切古文叡籀文叡从土文五重三􅍌骨之􅋊也从半冎凡歺之屬皆从歺讀若櫱岸之櫱徐鍇曰冎則肉置骨也歺􅋊骨也故从半冎臣鉉等曰義不應有中一秦刻石文有之五割切古文歺病也从歺委聲於爲切瞀也从歺昬聲呼昆切胎敗也从歺賣聲徒谷切終也从歺勿聲莫勃切或从旻大夫死曰从歺卒聲子聿切死也从歺朱聲漢令曰蠻夷長有罪當􅊋之市朱切胎敗也从歺聲烏􅃿切不成人也人年十九至十六死爲長殤十五至十二死爲中殤十一至八歳死爲下殤从歺傷省聲式陽切往死也从歺且聲虞書曰勛乃殂昨胡切古文殂从歺从作殊也从歺亟聲虞書曰殛鯀于羽山巳力切死也从歺壹聲於計切古文殪从死死􅓦㱳也从歺莫聲莫各切死在棺將遷葬柩賔遇之从歺从賔賔亦聲夏后殯於阼階殷人嬪於兩楹之閒周人殯於賔階必刃切􅄟也从歺隶聲羊至切道中死人人所覆也从歺堇聲詩曰行有死人尚或殣之渠吝切腐气也从歺臭聲尺救切爛也从歺貴聲胡對切腐也从歺丂聲許久切㱙或从木危也从歺台聲徒亥切咎也从歺央聲於良切賊也从歺戔聲昨干切盡也从歺㐱聲徒典切古文殄如此微盡也从歺韱聲春秋傳曰齊人殱于遂子廉切殛盡也从歺單聲都寒切敗也从歺睪聲商書曰彞倫攸殬當故切畜産疫病也从歺从羸郎果切殺羊岀其胎也从歺豈聲五來切禽獸所食餘也从歺从肉昨于切脂膏乆殖也从歺直聲常職切枯也从歺古聲若孤切棄也从歺竒聲俗語謂死曰大渏去其切文三十二重六澌也人所離也从歺从人凡死之屬皆从死息姊切古文死如此公矦也从死瞢省聲呼眩切死人里也从死蒿省聲呼毛切戰見血曰傷乱或爲惽死而復生爲从死佽聲咨四切文四重一剔人肉置其骨也象形頭隆骨也凡冎之屬皆从冎古瓦切分解也从冎从刀慿列切别也从冎卑聲讀若罷府移切文三肉之覈也从冎有内凡骨之屬皆从骨古忽切髑髏頂也从骨蜀聲徒谷切髑髏也从骨婁聲洛侯切肩甲也从骨專聲補各切肩前也从骨禺聲午吕切并脅也从骨并聲晉文公骿脅臣鉉等曰骿眡字同今别作胼非部田切股也从骨卑聲并弭切古文髀髀骨也从骨果聲苦臥切臀骨也从骨厥聲居月切髀上也从骨寛聲苦官切䣛耑也从骨賓聲毗忍切骨耑也从骨􅡜聲古活切䣛脛間骨也从骨䝿聲丘媿切脛也从骨交聲口交切骹也从骨干聲古案切脛骨也从骨亥聲户皆切骨中脂也从骨隓聲息委切骨間黄汁也从骨易聲讀若易曰夕惕若厲他歷切緫十二屬也从骨豊聲他禮切㾫病也从骨麻聲莫鄱切食骨留咽中也从骨㪅聲古杏切禽獸之骨曰骼从骨各聲古覈切鳥獸殘骨曰骴􅟆可惡也从骨此聲明堂月令曰掩骼薶􅟆􅟆或从肉資四切骨耑骩奊也从骨丸聲於詭切骨擿之可㑹髪者从骨㑹聲詩曰䯤弁如星古外切文二十五重一胾肉象形凡肉之屬皆从肉如六切婦始孕腜兆也从肉某聲莫桮切婦孕一月也从肉不聲匹桮切婦孕三月也从肉台聲土來切肉也从肉几聲居夷切皮也从肉盧聲力居切籀文臚靣頯也从肉也聲章倫切頰肉也从肉幾聲讀若畿居衣切凵耑也从肉辰聲食倫切古文脣从頁項也从肉豆聲徒􅃸切心上鬲下也从肉亡聲春秋傳曰病在肓之下呼光切水藏也从肉臤聲時忍切金藏也从肉市聲芳吠切土藏也从肉卑聲符支切木藏也从肉干聲古寒切連肝之府从肉詹聲都敢切榖府也从肉象形云貴切膀光也从肉孚聲匹交切大小腸也从肉昜聲直良切肥也从肉高聲古勞切􅏂也从肉方聲甫良切胷也从肉䧹聲於陵切胷骨也从肉乙聲於力切肊或从意脊也从肉北聲補妹切兩􅝈也从肉劦聲虚業切脅也从肉㫄聲歩光切􅝈或从骨脅肉也从肉寽聲一曰脟腸間􅏂也一曰膫也力較切脅骨也从肉力聲盧則切夾脊肉也从肉申聲矢人切背肉也从肉每聲易曰咸其脢莫桮切髆也从肉象形古賢切俗肩从戸亦下也从肉各聲古各切亦下也从肉去聲去劫切手上也从肉辟聲卑義切臂羊矢也从肉需聲讀若􅃭那到切臂節也从肉从寸寸手寸口也陟柳切肶齊也从肉齊聲徂􅀆切厚也从肉聲方六切腹下肥也从肉㬰聲羊朱切也从肉隹聲示隹切孔也从肉決省聲讀若決水之决古穴切股也从肉夸聲苦故切髀也从肉殳聲公戸切脛也从肉郤聲居勺切胻也从肉巠聲胡定切脛耑也从肉行聲戸更切脛腨也从肉悲聲符飛切腓腸也从肉耑聲市沇切體四胑也从肉只聲章移切胑或从支足大指毛也从肉亥聲古哀切骨肉相似也从肉小聲不似其先故曰不肖也私妙切子孫相承續也从肉从八象其長也从幺象重累也羊晉切古文胤􅅌也从肉由聲直又切扳䏌也从肉八聲許訖切肉膻也从肉亶聲詩曰膻裼暴虎徒旱切益州鄙言人盛諱其􅏂謂之䑋从肉襄聲如兩切臞也从肉皆聲古諎切少肉也从肉瞿聲其俱切消肉臞也从肉兌聲徒活切齊人謂􅋯脙也从肉求聲讀若休止巨鳩切臞也从肉􅒋聲一曰切肉臠也詩曰􅁄人臠臠􅀆力沇切渡也从肉聲資昔切古文从疒从朿朿亦聲騃也从肉丞聲讀若丞署陵切脣瘍也从肉㐱聲之忍切籀文胗从疒瘢胝也从肉垂聲竹垂切睡也从肉氐聲从尼切贅也从肉尤聲羽求切籀文肬从黑搔生創也从肉丸聲胡岸切廱也从肉重聲之隴切骨差也从肉失聲讀與跌同徒結切創肉反出也从肉希聲香近切瘢也从肉引聲一曰遽也羊晉切冬至後三戍臘祭百神从肉巤聲盧盍切楚俗以二月祭飲食也从肉婁聲一曰祈榖食新曰離膢力俱切祭也从肉兆聲士了切祭福肉也从肉乍聲臣鉉等曰今俗别作祚非是昨誤切裂肉也从肉从隓省徒果切具食也从肉善聲常行切嘉善肉也从肉柔聲耳由切啖也从肉爻聲徐鍇曰謂巳修庖之可食也胡茅切設膳腆腆多也从肉典聲他典切古文腆牛羊曰肥豕曰腫从肉盾聲他骨切肥肉也从肉必聲蒲結切牛頜垂也从肉古聲戶孤切牛百葉也从肉弦省聲胡田切牛百葉也从肉聲一曰烏膍胵房脂切膍或从此鳥胃也从肉至聲一曰胵五藏緫名也處脂切牛脅後髀前合革肉也从肉􅰈聲讀若繇敷紹切血祭肉也从肉帥聲吕戍切或从率牛腸脂也从肉尞聲詩曰取其血膫洛蕭切膫或从勞省聲乾肉也从肉甫聲方武切脯也从肉攸聲息流切脯也从肉奚聲戸皆切膎肉也从肉兩聲良奬切薄脯膊之屋上从肉尃聲匹各切胃府也从肉完聲讀若患舊云脯古􅆑切脯挻也从肉句聲其俱切無骨腊也揚雄說鳥腊也从肉無聲周禮有膴判讀若謨荒烏切蟹醢也从肉疋聲相居切北方謂鳥腊曰腒从肉居聲傳曰堯如腊舜如腒九魚切孰肉醬也从肉九聲讀若舊臣鳩切乾魚尾䐹䐹也从肉肅聲周禮有腒䐹所鳩切有骨醢也从肉耎聲人移切腝或从難生肉醬也从肉延聲丑連切豕肉醬也从肉否聲薄口切爛也从肉而聲如之切切孰肉内於血中和也从肉員聲讀若遜穌本切犬膏臭也从肉生聲一曰不孰也桑經切豕膏臭也从肉喿聲穌遭切豕肉羹也从肉堯聲許幺切星見食豕令肉中生小息肉也从肉从星星亦聲穌佞切戴角者脂無角者膏从肉旨聲旨夷切觷也从肉􅩏聲穌果切上記也从肉貮聲女利切肉間胲膜也从肉莫聲慕各切肉表革裏也从肉弱聲而勺切肉羹也从肉隺聲呼各切􅌜也从肉賁聲房吻切􅌜也从肉雋聲讀若纂子沇切臇或从火巽大臠也从肉聲側吏切薄切肉也从肉枼聲直葉切細切肉也从肉㑹聲占外切漬肉也从肉奄聲於業切小耎易斷也从肉从絶省此芮切耎易破也从肉毳聲七絶切雜肉也从肉􅤖聲穌旰切切肉也从肉專聲市沇切挑取骨閒肉也从肉叕聲讀若詩曰啜其位矣陟劣切食所遺也从肉仕聲易曰噬乾阻史切揚雄􅀃从􅙻食肉不猒也从肉臽聲讀若陷户􅰉切犬肉也从犬􅁏讀若然如延切古文然亦古文然起也从肉眞聲昌眞切肉汁滓也从肉冘聲他感切眤也作之以皮从肉翏聲古肴切或曰嘼名象形闕郎果切蠅乳肉中也从肉且聲七余切小蟲也从肉口聲一曰空也烏玄切臣鉉等曰口音韋爛也从肉府聲扶兩切骨閒肉肎肎箸也从肉从冎省一曰骨無肉也苦等切古文肎多肉也从肉从卪臣鉉等曰肉不可過多故从卪符非切文一百四十重二十肥省腸也从肉啓聲康禮切赤子隂也从肉夋聲或从血子回切内空也从肉从空空亦聲苦江切􅓃䏰蟲名漢中有􅓃䏰縣地下多此蟲因以爲名从肉旬聲考其義當作潤蠢如順切􅓃䏰也从肉忍聲尺尹切文五新附肉之力也从力从肉从竹竹物之多筋者凡筋之屬皆从筋居銀切筋之本也从筋从夗省聲渠建切筋或从建手足指節鳴也从筋省勺聲北角切筋或省竹文三重三兵也象形凡刀之屬皆从刀都牢切刀握也从刀缶聲力九切刀劒刃也从刀㖾聲臣鉉等曰今俗作非是五各切籀文从从各鞞也一曰析也从刀肖聲息約切鎌也从刀句聲古矦切大鎌也一曰摩也从刀豈聲五來切􅙑􅕻曲刃也从刀奇聲居綺切􅙑􅕻也从刀屈聲九勿切銛也从刀和然後利从和省易曰利者義之和也刀至切古文利銳利也从刀炎聲以冉切始也从刀从衣裁衣之始也楚居切齊斷也从刀歬聲子善切等畫物也从刀从貝貝古之物貨也子徳切古文則亦古文則籀文則从鼎彊斷也从刀岡聲古郎切古文剛如此斷齊也从刀耑聲旨兖切斷也从刀會聲古外切刌也从刀七聲千結切切也从刀寸聲倉本切斷也从刀嶭聲私􅍌切劃傷也从刀乞聲一曰斷也又讀若㱯一曰刀不利於瓦石上刏之古外切利傷也从刀歳聲居衞切鏤也从刀亥聲苦得切判也从刀畐聲周禮曰副辜祭芳逼切籀文副判也从刀咅聲浦后切判也从刀辡聲蒲莧切分也从刀半聲普半切判也从刀度聲徒洛切判也从刀夸聲苦􅀌切分解也从刀聲良薛切剟也从刀干聲苦寒切刋也从刀叕聲陟劣切剟也从刀􅁽􅁽書也所姦切破也从刀辟聲普擊切裂也从刀从录录刻割也录亦聲北角切剥或从卜剥也从刀害聲古逹切剥也劃也从刀􅫕聲里之切錐刀曰劃从刀从畫畫亦聲呼麥切挑取也从刀肙聲一曰窐也烏玄切刮去惡創肉也从刀矞聲周禮曰劀殺之齊古鎋切齊也从刀从齊齊亦聲在詣切刮也从刀㕞省聲禮布刷巾所劣切棓把也从刀􅡜聲古八切砭刺也从刀爂聲一曰剽劫人也匹妙切刺也从刀傷也从刃从一楚良切或从刀倉聲臣鉉等曰今俗别作瘡非是也人所帶兵也从刀僉聲居欠切籀文劒从刀文三重二巧㓞也从刀丰聲凡㓞之屬皆从㓞恪八切齘刮也从㓞夫聲一曰畫堅也古􅀧切刻也从㓞从木苦計切文三艸蔡也象艸生之􅊌亂也凡丰之屬皆从丰讀若介古拜切技也从丰各聲古百切文二手耕曲木也从木推丰古者垂作耒㭒以振民也凡耒之屬皆从耒盧對切犂也从耒井聲一曰古者井田古莖切耒廣五寸爲伐二伐爲耦从耒禺聲五口切帝耤于畒也古者使民如借故謂之耤从耒昔聲秦昔切册又可以劃麥河内用之从耒圭聲古􅂝切除苗間穢也从耒員聲羽文切􅜶或从芸商人七十而耡耡耤稅也从耒助聲周禮曰以興耡利萌牀倨切文七重一獸角也象形角與刀魚相似凡角之屬皆从古岳切揮角皃从角雚聲梁􅋣縣有䚭亭又讀若况􅀽切角也从角樂聲張掖有觻得縣盧谷切角中骨也从角思聲穌來切曲角也从角􅫦聲巨員切角觬曲也从角兒聲西河有觬氏縣斫啓切一角仰也从角㓞聲易曰其牛觢臣鉉等當从契省乃得聲尺制切角傾也从角虒聲敕豕切角一俛一仰也从角竒聲去竒切角皃从角丩聲詩曰兕觵其斛渠幽切角曲中也从角畏聲烏賄切角長皃从角爿聲土角切角有所觸發也从角厥聲居月切抵也从角蜀聲尺玉切用角低仰便也从羊牛角詩曰觲觲角弓息營切舉角也从角公聲古􅀟切治角也从角學省聲胡角切牛觸横大本其角从角从大行聲詩曰設其福衡戸庚切古文衡如此角􅗧獸也狀似豕角善爲弓出胡休多國从角耑聲多官切觰孥獸也从角者聲一曰下大者也陟加切羊角不齊也从角危聲過委切牝羘羊生角者也从角圭聲下瓦切骨角之名也从角各聲古百切鴟舊頭上角觜也一曰觜觽也从角此聲遵爲切判也从刀判牛角一曰解􅞧獸也佳買切又戸賣切佩角銳耑可以斛結从角巂聲詩曰童子佩觿户圭切兕牛角可以飲者也从角黄聲其狀觵觵故謂之觵古横切俗觵从光饗飲酒角也禮曰一人洗舉觶觶受四􅂛从角單聲臣鉉等曰當从戰省乃得聲之義切觶或从辰禮經觶小觶也从角旦聲徒旱切觶實曰觴虚日觶从角省聲式陽切籀文觴从爵省鄉飲酒之爵也一曰觴受三外者謂之觚从角􅀲聲古乎切角上也从角亘聲讀若讙臣鉉等曰亘音宣俗作古鄧切􅂐文有異沉􅀽切杖耑角也从角敫聲胡狄切環之有舌者从角夐聲古穴切觼或从金矞調弓也从角弱省聲於角切隿射收繳具也从角發聲方肺切隿射收繳具从角酋聲讀􅀂鰌字秋切盛觵巵也一曰射具从角㱿聲讀若斛切谷切羌人所吹角屠觱以驚馬也从角聲盛古文誖字卑吉切文三十九重六􅀃文解字第四下

front:
  text: 􅀃文解字弟十上漢太尉祭酒許愼記
  hash: sha256:940eaa652237152bb2d50998f4d25ae65c9633266e5e22f8348b5cb323baa81f
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1j0018_SBCK_010-1a}
body:
  text: 四十部八百一十文重八十七凡萬四字文三十一新附怒也武也象馬頭髦尾四足之形凡馬之屬皆从馬莫下切古文籀文馬與同有髦牡馬也从馬陟聲讀若郅之日切馬一歳也从馬一絆其足讀若弦一曰若環戸􅀜切馬二歳曰駒三歳曰駜从馬句聲舉朱切馬八歳也从馬从八博拔切焉一目白曰二目白曰魚从馬間聲戸閒切馬靑驪文如博棊也从馬其聲渠之切馬深黑色从馬麗聲吕支切靑驪馬从馬肙聲詩曰駜彼乗駽火玄切馬淺黑色从馬􅀑聲俱位切赤馬黑毛尾也从馬留聲力求切馬赤白雜毛从馬叚聲謂色似鰕魚也乎加切馬蒼黑雜毛从馬隹聲職追切馬白色黒鬣尾也从馬各聲盧各切馬隂白雜毛黒从馬因聲詩曰有駰有騢於眞切馬有白雜毛也从馬悤聲倉紅切驪馬白胯也从馬矞聲詩曰有驈有騜食聿切馬面顙皆白也从馬尨聲莫江切黄馬黑喙从馬咼聲古華切籀文騧黄馬發白色一曰白髦尾也从馬􅰈聲毗召切黄馬白毛也从馬丕聲敷悲切馬赤黑色从馬􅪝聲詩曰四驖孔阜他結切馬頭有發赤色者从馬岸聲五旰切馬白頟也从馬的省聲一曰駿也易曰爲的顙都歷切馬色不純从馬爻聲臣鉉等曰爻非聲疑象駁文北角切馬後左足白也从馬二其足讀若注之戍切驪馬黄脊从馬覃聲讀若簟徒玷切馬白州也从馬燕聲於甸切馬豪骭也从馬習聲似入切馬毛長也从馬幹聲矦旰切馬逸足也从馬从飛司馬法曰飛䘙斯輿甫微切駿馬以壬申日死乗馬忌之从馬敖聲五到切千里馬也孫陽所相者从馬冀聲天水有驥縣几利切馬之良材者从馬夋聲子峻切良馬也从馬堯聲古堯切馬小皃从馬垂聲讀若箠之壘切籀文从􅑰馬高六尺爲驕从馬喬聲詩曰我馬唯驕一曰野馬舉喬切馬七尺爲騋八尺爲龍从馬來聲詩曰騋牝驪牡洛哀切馬名从馬雚聲呼官切馬名从馬僉聲魚􅉎切馬名从馬此聲雌氏切馬名从馬休聲許尤切馬赤鬣縞身目若黄金名曰吉皇之乗周文王時犬戎獻之从馬从文文亦聲春秋傳曰馬百駟畫馬也西伯獻紂以全其身無分切馬彊也从馬支聲章移切馬飽也从馬必聲詩云有駜有駜毗必切馬盛肥也从馬光聲詩曰四牡駫駫古熒切馬盛也从馬㫄聲詩曰四牡騯騯薄庚切䭹䭹馬怒皃从馬卬聲吾浪切馬之低仰也从馬襄聲息良切上馬也从馬莫聲莫白切跨馬也从馬竒聲渠羈切馬在軛中从馬加聲古訝切籀文駕驂㫄馬从馬非聲甫微切駕二馬也从馬并聲部田切駕三馬也从馬參聲倉含切一乗也从馬四聲息利切副馬也从馬付聲一曰近也一曰疾也符遇切馬和也从馬皆聲戸皆切馬摇頭也从馬我聲五可切駊騀也从馬皮聲普火切馬行皃从馬舀聲土刀切馬行頓遟从馬竹聲冬毒切馬行威儀也从馬癸聲詩曰四牡騤騤渠追切馬行徐而疾也从馬學省聲於角切馬行疾也从馬㑴省聲詩曰載驟駸駸子林切馬行相及也从馬从及讀若爾雅小山馺大山峘穌荅切馬行疾也从馬久聲臣鉉等曰本音皮冰切經典通用爲依馮之馮今别作憑非是房戎切馬步疾也从馬耴聲尼輒切馬行㐹㐹也从馬矣聲五駭切馬疾歩也从馬聚聲鉏又切馬疾走也从馬匃聲古達切馬疾步也从馬風聲臣鉉等曰舟船之颿本用此字今别作帆非是符嚴切馬馳也从馬區聲豈俱切古文驅从攴大驅也从馬也聲直离切亂馳也从馬敄聲亡遇切次弟馳也从馬􅍌聲力制切直馳也从馬甹聲丑郢切馬行疾來皃从馬兌聲詩曰昆夷駾矣他外切馬有疾足从馬失聲大結切馬突也从馬旱聲矦旰切馳馬洞去也从馬同聲徒弄切馬駭也从馬敬聲舉卿切驚也从馬亥聲矦楷切馬奔也从馬㐬聲呼光切馬腹縶也从馬寒省聲去䖍切馬立也从馬主聲中句切馬順也从馬川聲詳遵切馬載重難也从馬㐱聲張人切駗驙也从馬亶聲易曰乗馬驙如張連切馬重皃从馬執聲陟利切馬曲脊也从馬鞠聲巨六切犗馬也从馬乗聲食陵切系馬尾也从馬介聲古拜切擾也一曰摩馬从馬蚤聲穌遭切絆馬也从馬口其足春秋傳曰韓厥執􅎗前讀若輒陟立切􅎗或从糸執聲馬衘脫也从馬台聲徒哀切牡馬也从馬且聲一曰馬蹲駔也子朗切解􅞧屬从􅞧􅥽聲闕古孝切獸之所食艸从􅞧从艸古者神人以􅞧遺黄帝帝曰何食何處曰食薦夏處水澤冬處松栢作旬切刑也平之如水从水􅞧所以觸不直者去之从去方乏切今文省古文文四重二獸也象頭角四足之形鳥鹿足相似从􅎅尺鹿之屬皆从鹿盧谷切牡鹿从鹿叚聲以夏至解角角古牙切大牝鹿也从鹿粦聲力珍切鹿麛也从鹿耎聲讀若偄弱之偄奴亂切鹿迹也从鹿速聲桑谷切鹿子也从鹿弭聲莫􅀆切鹿之絶有力者从鹿幵聲古賢切仁獸也麋身牛尾一角从鹿其聲渠之切牝麒也从鹿吝聲力珍切鹿屬从鹿米聲麋冬至解其角武悲切牝麋也从鹿辰聲植鄰切大麋也狗足从鹿旨聲居履切或从几麞也从鹿囷省聲居筠切籀文不省麋屬从鹿章聲諸良切麋牡者从鹿咎聲其久切大鹿也牛尾一角从鹿畺聲舉卿切或从京麠屬从鹿㶾省聲薄交切麋屬从鹿生聲之􅁃切狻麑獸也从鹿兒聲五雞切山羊而大者細角从鹿咸聲胡毚切大羊而細角从鹿霝聲郎丁切鹿屬从鹿圭聲古攜切如小麋臍有香从鹿䠶聲神夜切似鹿而大也从鹿與聲羊茹切旅行也鹿之性見食急則必旅行从鹿丽聲禮麗皮納聘蓋鹿皮也郎計切古文篆文麗字牝鹿也从鹿从牝省於虯切或从幽聲文二十六重六行超逺也从三鹿凡麤之屬皆从麤倉胡切鹿行揚土也从麤从土直珍切籀文文二重一獸也似兔靑色而大象形頭與兔同足與鹿同凡㲋之屬皆从㲋丑略切􅂐文狡兔也兔之駿者从㲋兔士咸切獸名从㲋吾聲讀若寫司夜切獸也似牲牲从㲋夬聲古穴切孔子曰狗叩也叩气吠以守从犬句聲古厚切南趙名犬獶獀从犬叜聲所鳩切犬之多毛者从犬从彡詩曰無使尨也吠莫江切少狗也从犬交聲匈奴地有狡犬巨口而黑身古巧切狡獪也从犬㑹聲古外切犬惡毛也从犬農聲奴刀切短喙犬也从犬曷聲詩曰載獫猲獢爾雅曰短喙犬謂之猲獢許謁切猲獢也从犬喬聲許嬌切長豕犬一曰黑犬黄頭从犬僉聲虚檢切黄犬黑頭从犬主聲讀若注之戍切短脛狗从犬卑聲薄蟹切犗犬也从犬音聲於萬切犬視皃从犬目古闃切竇中犬聲从犬从音音亦聲乙咸切犬暫逐人也从犬黑聲讀􅀂墨莫北功犬从艸暴岀逐人也从犬卒聲麤没切猩猩犬吠聲从犬星聲桑經切犬吠不止也从兼聲讀若檻一曰兩犬爭也胡黯切小犬吠从犬敢聲南陽新亭有㺖郷荒檻切犬吠聲从犬畏聲烏賄切獶㺒也从犬憂女交切犬獶獶咳吠也从犬翏聲火包切犬容頭進也从犬參聲一曰賊疾也山檻切嗾犬厲之也从犬將省聲即兩切齧也从犬戔聲􅀄版切惡健犬也从犬刪省聲所晏切吠􅃲聲从犬艮聲五還切犬􅃲聲从犬番聲附􅀽切犬怒皃从犬示聲一曰犬難得代郡有狝氏縣讀又若銀語其切犬吠聲从犬斤聲語斤切犬獡獡不附人知其迹者犬也从犬从自臣鉉等曰古鼻字犬走以鼻知臭故从自尺救切獵所獲也从犬蒦聲胡伯切頓仆也从犬敝聲春秋傳曰與犬犬獘毗祭切獘或从死宗廟犬名羮獻犬肥者以獻之从犬鬳聲許建切獟犬也从犬幵聲一曰逐虎犬也五甸切犬也从犬堯聲五弔切狂犬也从犬折聲春秋傳曰狾犬入華臣氏之門征例切狾犬也从犬聲巨王切古文从心種􅀋相似惟犬爲甚从犬頪聲力遂切赤狄本犬種狄之爲言涇辟也从犬赤省聲徒歷切狻麑如號貓食虎豹者从犬夋聲見爾雅素官切母㺅也从犬矍聲爾雅云矍父善顧玃持人也俱縳切玃屬从犬酋聲一曰隴西謂犬子爲猷以周切玃屬从犬且聲一曰狙犬也暫齧人者一曰犬不齧人也親去也夒也从米矦聲乎溝切犬屬􅆎已上黄􅆎已下黒食母猴从犬㱿聲讀若構或曰㺉似牂羊出蜀比嚻山中犬首而馬尾火屋切似犬銳頭白頰髙前廣後从犬良聲魯當切如狼善驅羊从犬白聲讀若蘖寗嚴讀之若淺泊匹各切狼屬从犬曼聲爾雅曰貙獌似貍舞販切䄏獸也􅀑所乗之有三德其色中和小前犬後死則丘首从犬􅀲聲戸吳切如小狗也水居食魚从犬賴聲他達切􅆩屬从犬扁聲布兹切或从賔犬走皃从三犬甫遥切文八十三重五獸走皃从犬戊聲許月切獸名从犬軍聲許韋切􅄶急也从犬䏍聲古縣切猰㺄獸名从犬契聲烏􅃛切文四新附兩犬相齧也从二犬凡㹜之屬皆从㹜語斤切司空也从㹜􅒳聲復說獄司空息玆切确也从㹜从言二犬所以守也魚欲切文三穴蟲之緫名也象形凡䑕之屬皆从䑕書呂切鼠也从鼠番聲讀若樊或曰鼠婦附􅀽切䑕出胡地皮可作裘从鼠各聲下各切也行鼠伯勞所作也一曰偃鼠从鼠分聲芳吻切或从虫分令鼠从䑕平聲薄經切䑕也从鼠虒聲息移切竹鼠也如犬从䑕麗省聲力求切五技鼠也能飛不能過屋能縁不能窮不能游不能渡谷能穴不能掩身能走不能先人从鼠石聲常隻切豹文鼠也从鼠冬聲職戎切籀文省鼠屬从鼠益聲於革切或从豸小鼠也从鼠奚聲胡雞切精鼩鼠也从鼠句聲其俱切䶃也从鼠兼聲丘檢切鼠屬从鼠今聲讀若含胡累切如鼠赤黄而大食鼠者从鼠由聲余救切胡地風鼠从鼠勺聲之若切鼠屬从䑕穴聲而隴切鼠从雞鼠尾从鼠此聲即移切鼠出丁零胡皮可作从鼠軍聲乎昆切斬鼠黑身白􅆎若帶手有長白毛似握版之狀類蝯蜼之屬从鼠胡聲戸吴切文二十重三熊屬足似鹿从肉㠯聲能獸堅中故稱賢能而彊壯稱能傑也凡能之屬皆从能臣鉉等曰㠯非聲疑昔象形奴登切文一獸似豕山居冬蟄从能炎省聲凡熊之屬皆从熊羽弓切如熊黄白文从熊罷省聲彼爲切古文从皮文二重一燬也南方之行炎而上象形凡火之屬皆从火呼果切上諱臣鉉等曰漢章帝名也唐韻曰火起也从火且聲當割切火也从火尾聲詩曰王室如􅛚許偉切火也从火毁聲春秋傳曰衞矦燬許偉切火也从火豩聲穌典切然火也从火夋聲周禮曰遂籥其焌焌火在前以焞焯􅀛子寸切又倉聿切柴祭天也从火从眘眘古文愼字祭天所以愼也力照切燒也从火肰聲臣鉉等曰今俗别作燃蓋後人增加如延切或从艸難臣鉉等案艸部有䕼注云艸也此重出燒也从火蓺聲春秋傳曰􅋹僖負覉臣鉉等曰說文無蓺字當从火从艸熱省聲如劣切􅋹也从火番聲附􅀽切􅋹也从火堯聲式昭切火猛也从火􅍌聲良薛切火光也从火出聲商書曰予亦炪謀讀若巧拙之拙職悅切熚火皃从火畢聲卑吉切熚也从火聲盛籕文􅀶字􅞉勿切火气上行也从火丞聲煑仍切烝也从火孚聲詩曰烝之烰烰縳牟切烝也一曰赤皃一曰温􅃳也从火昫聲香句切乾皃从火漢省聲詩曰我孔熯矣人善切火皃从火弗聲暜活切火皃从火翏聲逸周書曰味辛而不熮洛蕭切火皃从火門省聲讀若粦良刃切火色也从火雁聲讀若鴈五妟切火光也从火頃聲古迥切火飛也从火龠聲百􅋹也以灼切火飛也从火票聲讀若摽甫遥切火熱也从火高聲詩曰多將熇熇臣鉉等曰髙非聲當从嗃省火屋切交木然也从火交聲古巧切小熱也从火干聲詩曰憂心㶣㶣臣鉉等曰干非聲未詳直廉切所以然持火也从火焦聲周禮曰以明火爇燋也即消切燒木餘也从火岸省聲他案切束炭也从火差省聲讀若齹楚宜切交灼木也从火敎省聲讀若狡古巧切火气也从火犮聲蒲撥切死火餘㶳也从火从又又手也火旣滅可以執持呼恢切灰炱煤也从火台聲徒哀切盆中火从火畏聲烏􅁅切畜火也从火息聲亦曰滅火相即切行竈也从火圭聲讀若阿口迥切烓也从火甚聲氏任切炊也从火單聲春秋傳曰燀之以薪充善切爨也从火吹省聲昌垂切尞也从火共聲詩曰卭烘干煁呼東切炊餔疾也从火齊聲在諸切炙也从火喜聲許其切熬也从火前聲子仙切乾煎也从火敖聲五牢切敖或从麥毛炙肉也从火包聲薄交切炮肉以微火温肉也从火衣聲烏痕切置魚筩中炙也从火曾聲作􅅬切以火乾肉从火稫聲臣鉉等案說文無稫字當从䵗省疑傳寫之誤符逼切籕文不省灼也从火暴聲蒲木切臣鉉等曰今俗音豹火裂也炙燥也从火昜聲余亮切灼也从火崔聲胡沃切孰也从火蘭聲郎旰切或从簡爛也从火靡聲靡爲切从上案下也从􅊂又持火以尉申繒也臣鉉等曰今俗别作熨非是於胃切灼􅀛不兆也从火从􅀛春秋傳曰􅀛􅀛不兆讀若焦即消切灼也从火乆聲舉友切炙也从火勺聲之若切鑠治金也从火柬聲郎電切庭燎火燭也从火蜀聲之欲切然麻蒸也从火怱聲作孔切燭㶳也从火也聲徐野切火餘也从火聿聲一曰薪也臣鉉等曰聿非聲疑从聿省今俗别作燼非是徐刃切堅刀刃也从火卒聲七内切屈申木也从火柔柔赤聲人又切燒田也从火棥棥亦聲附􅀽切火煣車網絶也从火兼聲周禮曰煣牙外不熑刀鹽切放火也从火尞聲力小切火飛也从火與同意方昭切焦也从火曹聲作曹切火所傷也从火雥聲即消切或省天火曰烖从火􅥘聲祖才切或从宀火古文从才籀文从巛火气也从火垔聲烏前切或从因古文籀文从宀焆焆煙皃从火䏍聲因悅切鬱煙也从火昷聲於云切望火皃从火皀聲讀若馰顙之馰都歷切火熱也从火覃聲火甘切又徐鹽切明也从火􅙯聲春秋傳曰焞燿天地他昆切明也从火丙聲兵永切明也从火卓聲周書曰焯見三有俊心之若切明也从火昭聲之少切盛赤也从火韋聲詩曰彤管有煒于􅀑切盛火也从火从多昌氏切盛光也从火習聲詩曰熠熠宵行羊入切熠也从火昱聲余六切照也从火翟聲弋笑切光也从火車聲況韋切煌煇也从火皇聲胡光切煌也从火昆聲孤本切光也从火冋聲古逈切盛也从火畢聲詩曰熚熚震電筠輒切火門也从火閻聲余廉切燿燿也从火􅀇聲胡畎切明也从火在人上光明意也古皇切古文古文温也从火埶聲如列切盛也从火戠聲昌志切古文熾熱在中也从火奥聲烏到切温也从火爰聲況􅀽切温也从火耎聲乃管切見也从火日古迴切乾也从火亢聲苦浪切乾也从火喿聲穌到切滅也从火戌火死於戌陽氣至戍而盡詩曰赫赫宗周褒似滅之許劣切旱气也从火告聲若沃切溥覆照也从火夀聲徒到切取火於日官名舉火曰爟問禮曰司爟掌行火之政令从火雚聲古玩切或从亘􅃸表也邊有警則舉火从火逢聲敷容切苣火祓也从火爵聲吕不韋曰湯得伊尹爝以爟火釁以犧豭子肖切暴乾火也从火彗聲于􅀊切燥也从火熈聲許其切文一百一十二重十五旱乞也从火蟲聲直弓切熾盛也从火扇聲式戰切灼也从火各聲盧各切灼爍光也从火樂聲書藥切燦爤明瀞皃从粲聲倉案切火光也从火奐聲呼貫切文六新附火光上也从重火凡炎之屬皆从炎于廉切火行微燄燄也从炎臽聲以冉切火光也从炎舌聲臣鉉詩曰舌非聲當从甛省以冉切㑴火也从度㐭聲讀若桑葚之葚力荏切火行也从炎占聲舒贍切於湯中爚肉从炎从􅀬省徐塩切或从炙大熟也从又特炎辛辛者物熟味也蘇俠切兵死及牛馬之血爲粦粦􅀑火也从炎舛良刃切徐鍇曰案博物志戰鬬死亡之處有人馬血積中爲粦著地入艸木如霜露不可見有觸者著人體後有光拂拭即散無數又有吒聲如鬻豆舛者人足也言光行著人文八重一火所熏之色也从炎上出古䆫字凡黑之屬皆从黒呼北切齊謂黒爲黸从黒盧聲洛平切沃黑色从黒㑹聲惡外切深黑也从黒音聲乙減切申黑也从黑厭聲於琰切小黒子从黑殹聲烏雞切白而有黒也从黒旦聲五原有莫䵣縣當割切雖晳而黑也从黑箴聲古人名字晳古咸切赤黑也从黑昜聲讀若煬餘亮切淺清黑也从黑參聲七感切青黒也从黑奄聲於檻切微青黑色从黒㓜聲爾雅曰地謂之黝於糾切黄濁黑从黑屯聲他來切小黑也从黑占聲多忝切淺黄黑也从黑甘聲讀若染繒中束緅黚巨淹切黄黑也从黑金聲古咸切黑有文也从黑􅁈聲讀若飴登字於月切黄黑而白也从黑算聲一曰短黑讀若以芥爲齏名曰芥荃也初刮切黑皴也从黑幵聲古典切堅黑也从黑吉聲切八切黎也从黑今聲秦謂民爲黔首謂黑色也周謂之黎民易曰爲黔喙巨淹切滓垢也从黑穴聲都感切不鮮也从黑尚聲多朗切握持垢也从黑賣聲易曰再三黷徙谷切天汚也从黑詹聲當敢切中乆雨青黑从黑微省聲武悉切貶下也从黑出聲丑律切姍下哂从黑般聲薄盛切畫眉也从黑朕聲徒耐切青黑繒縫白色也从黑攸聲式者切羔文之縫从黑戓聲于逼切謂之垽垽滓也从黑殿名聲堂縳切桑葚之黑也从黑甚聲他感切果實黭黯黑也从黒弇聲烏感切􅇘刑在面也从黒京聲渠京切或从刀􅗼者忘而息也从黑敢聲於㩜切黒木也从黒多聲丹陽有黟縣烏鷄切文三十七重一􅀃文解字第十上􅀃文解字弟十下漢太尉祭酒許愼記在牆曰牖在屋曰囱象形凡囱之屬皆从囱楚江切或从穴古文多遽悤悤也从心悤囱亦聲倉紅切文二重二火華也从三火凡焱之屬皆从焱以冉切屋下燈燭之光从焱冂戸局切盛皃从焱在水上讀若詩曰莘莘征夫一曰役也所臻切文三炮肉也从肉在火上凡炙之屬皆从炙之石切籀文宗廟火孰􅁏从炙番聲春秋傳曰天子有事㸋焉以饋同姓諸侯附􅀽切炙也从炙寮聲讀若燎力照切文三重一南方色也从大从火凡赤之屬皆从赤昌石切古文从炎土赤色也从赤蟲省聲徒冬切日出之赤从赤􅂖省聲火沃切面慙赤也从赤㞋聲周失天下於赧王女版切赤色也从赤巠聲詩曰魴魚䞓尾敕貞切䞓或从貞或从丁䞓裳􅀥之汁或从水浾或从正赤土也从赤者聲之也切赤色也从赤倝聲讀若浣胡玩切火赤皃从二赤聲呼格切文八重五大赤也从赤色色赤聲許力切赤色也从赤叚聲乎加切文二新附天大地大人亦大故大象人形古文大他達切也凡大之屬皆从大徒蓋切两髀之間从大圭聲苦圭切持也从大俠二人古狎切覆也大有餘也又欠也从大从展也依檢切奢也从大于聲苦􅀲切奢也从大聲胡官切大也从大􅀲聲鳥􅀲切空大也从大歳聲讀若詩施罟呼括切大也从大聲讀若詩􅨖􅨖大猷直質切大也从大卯聲匹貌切大也从大云聲魚吻切大也从大氐聲讀若氐都兮切大也从大弗聲讀若蓋古拜切瞋大也从大此聲火戒切大也从大弗聲讀若予違汝弼房宻切大也从大屯聲讀若鶉常倫切大約也从大从㓞易曰後代聖人易之以書契苦計切平也从大从弓東方之人也聲以脂切文十八人之臂亦也从大象兩亦之形凡亦之屬皆从亦臣鉉等曰今别作腋非是羊益切盗􅀼褱物也从亦有所持俗謂蔽人俾夾是也弘農陜字从此失拜切文二傾頭也从大象形凡夨之屬皆从夨阻力切頭傾也从夨吉聲讀若孑古屑切頭衺骫奊態也从夨圭聲胡結切姓也亦郡也一曰吳大言也从夨口五乎切徐鍇曰大言故夨口以岀聲詩曰不呉不楊今寫詩曰改吳作㕦又音乎化切其謬甚矣古文如此文四重一屈也从大象形凡夭之屬皆从夭於兆切髙而曲也从夭从高省詩曰南有喬木聲巨嬌切吉而免凶也从屰从夭夭死之事故死謂之不胡耿切走也从夭賁省聲與走同意俱从夭博昆切文四交脛也从大象交形凡交之屬皆从交古爻切衺也从交韋聲羽非切縊也从交从糸古巧切文三曲脛也从大象偏曲之形凡尣之屬皆从尣烏光切古文从䣛病也从尣从骨􅇧亦聲戸骨切蹇也从尣皮聲布火切行不正从缶左聲則箇切行不正也从尣聲讀若燿弋笑切不正也从尣兼聲古咸切􅾎􅴃也从尣介聲公八切又古拜切行脛相交也从尣勺聲牛行脚相交爲尦力弔切不能行爲人所引曰从尣从􅀲是聲都兮切也从尣从爪嶲聲戸圭切股也从尣于聲乙于切䣛中病也从尣从羸􅀰果切文十二重一切窮理罪人也从㚔从人从言竹聲居六切或省言文七重一張也从大者聲凡奢之屬皆从奢式車切籀文臣鉉等曰今俗作陟加切以爲㗬厚之㗬非是富奲奲皃从奢單聲丁可切文二重一人頸也从大省象頸脈形凡亢之屬皆从亢古郎切亢或从頁直項莽皃从亢从夋夋倨也亢亦聲岡朗切又胡朗切文二重一進趣也从大从十大十猶兼十人也凡夲之屬皆从夲讀若滔土刀切疾也从夲卉聲拜从此呼骨切疾有所趣也从日出夲廾之薄報切進也从夲从屮允聲易曰􅣡升大吉余準切奏進也从夲从从屮屮上進之義則候切古文亦古文气皐白之進也从夲从白禮祖曰臯登謌曰奏故皋奏㫮从夲周禮曰詔來鼓皐舞皐吿之也古勞切文六重二放也从大而八分也凡夰之屬皆从夰古老切舉目驚然也从夰从䀠䀠亦聲九過切嫚也从􅔣从夰夰亦聲虞書曰若丹朱奡讀若傲論語奡湯舟五到切春爲昦天元气昦昦从曰夰夰亦聲胡老切驚走也一曰往來也从夰臦周書曰伯臩古文臦古文問字臣鉉等臦居沉切臦猶乖也臦亦聲言古囧字未詳具往切文五籕文大改古文亦象人形凡大之屬皆从大他盖切大也从大亦聲詩曰奕奕梁山羊益切駔大也从大从壯壯亦聲徂朗切大白澤也从大从曰古文以爲澤字古老切大腹也从大省聲籀文系字胡雞切稍前大也从火而聲讀若畏偄而沇切大皃从大聲或曰拳勇字一曰讀若傿乙獻切壯大也从三大三目二目爲三目爲益大也一曰迫也讀若易虙羲氏詩曰不醉而怒謂之平祕切文八丈夫也从大一以象􅆪也周制以八寸爲尺十尺爲丈人長八尺故曰丈夫凡夫之屬皆从夫甫無切有法度也从夫从見居隨切竝行也从二夫輦字从此讀若伴侣之伴薄旱切文三住也从大立一之上臣鉉等曰大人也一地也㑹意凡立之屬皆从立力入切臨也从立从隶力至切磊䇏重聚也从立聲丁罪切直也从立耑聲多宫切等也从立専聲春秋傳曰竱本肇末旨兖切敬也从立从束束曰申束也息批切亭安也从立爭聲疾郢切立竫也从立青聲一曰細皃疾郢切待也从立矣聲牀史切或从巳健也一曰匠也从立旬聲讀若齲逸周書有竘匠丘羽切不正也从立􅸮聲火鼃切負舉也从立􅂚聲渠列切待也从立須聲相俞切或从芻聲痿也从立􅢓聲力卧切偓竣也从立夋聲國語曰有司巳事而竣七倫切見􅀑鬽皃从立从录录籀文鬽字讀若虙羲氏之虙房六切驚皃从立昔聲七雀切短人立䇑䇑皃从立卑聲􅅖下切北地髙樓無屋者从立曾聲七耕切文十九重二意也从心之聲職吏切志也从心察言而知意也从心从音於記切意也从心旨聲職雉切外得於人内得於己也从直从心多則切古文當也从心聲於陵切謹也从心眞聲時刃切古文敬也从心中聲陟弓切謹也从心㱿聲苦角切美也从心䫉聲莫角切喜也从心叏聲苦夬切樂也从心豈聲臣鉉等曰豈部已有此重出苦亥切快心从心匧聲苦叶切常思也从心今聲奴店切思也从心付聲甫無切敏也从心从目害省聲許建切平也从心登聲直陵切敬也从心難聲女版切闓也从心斤聲司馬法曰善者忻民之善閉民之惡許斤切遟也从心重聲直隴切重厚也从心軍聲於粉切厚也从心享聲都昆切旣也从心亢聲一曰易忼龍有悔臣鉉等曰今俗别作慷非是苦浪切又口朗切忼􅁣壯士不得志也从心旣聲古漑切愊也从心困聲苦本切誠志也从心畐聲芳逼切謹也从心原聲魚怨切儇也从心彗聲胡挂切慧也从心尞聲力小切憭也从心交聲下交切又古了切静也从心㾜聲臣鉉等曰㾜非聲未詳於計切敬也从心折聲陟列切樂也从心宗聲藏宗切安也从心宗省聲徒兼切大也从心􅁅聲苦回切肅也从心共聲俱容切敬也从心从敬敬亦聲居影切仁也从心如聲商署切古文省和也从心台聲與之切愛也从心兹聲疾之切愛也从心氏聲巨支切忯㥴不憂事也从心虒聲讀若移移尔切謹也从心全聲此縁切惠也从心因聲烏痕切髙也一曰極也一曰困劣也从心帶聲特計切問也謹敬也从心猌聲一曰􅀃也一曰甘也春秋傳曰昊天不憖又曰兩君之士皆未憖魚覲切闊也一曰廣也大也一曰寛也从心从廣廣亦聲苦􅉪切飾也从心戒聲司馬法曰有虞氏悈於中國古拜切謹也从心㥯聲於靳切行賀人也从心从夂吉禮以鹿皮爲贄故从鹿省丘竟切寛嫺心腹皃从心宣聲詩曰赫兮愃兮況晚切順也从心孫聲唐書曰五品不愻蘇困切實也从心塞省聲虞書曰剛而㥶先則切信心也从心旬聲相倫切誠也从心穴聲詩曰天命匪忱氏任切凡思也从心隹聲以追切念思也从心褱聲戸乖切欲知之皃从心侖聲盧昆切冀思也从心相聲息兩切深也从心㒸聲徐醉切起也从心畜聲詩曰能不我慉許六切滿也从心聲一曰十萬曰於力切籀文省憂也从心官聲古玩切憀然也从心翏聲洛蕭切敬也从心客聲春秋傳曰以陳備三愙臣鉉等曰今俗作恪苦各切懼也从心􅀟省聲春秋傳曰駟氏愯息拱切恐也从心瞿聲其遇切古文恃也从心古聲矦古切賴也从心寺聲時止切慮也从心曹聲藏宗切覺也从心吾聲五故切古文悟愛也韓鄭曰憮一曰不動从心無聲文甫切惠也从心先聲烏代切古文知也从心胥聲私吕切安也从心尉聲一曰恚怒也於胃切讙也从心聲讀若毳此芮切箸也从心聲直由切朗也从心由聲詩曰憂心且怞直又切􅤷橅也从心某聲讀若侮亡甫切彊也从心文聲周書曰在受德忞讀若旻武巾切勉也从心莫聲莫故切勉也从心面聲弥殄切習也从心曵聲余制切勉也从心楙聲虞書曰時惟懋哉莫候切或省習也从心莫聲莫故切止也从心夋聲此縁切􅲁也从心隶聲他骨切趣歩㦛㦛也从心與聲余吕切說也从心舀聲土刀切安也从心厭聲詩曰懕懕夜飲於鹽切安也从心詹聲徒敢切無爲也从心白聲匹白切又葩亞切憂也收也从心血聲辛聿切極也从心干聲古寒切喜㱁也从心雚聲爾雅曰懽懽愮愮憂無告也古玩切懽也琅邪朱虚有㥥亭从心禺聲􅢕俱切異也从心圣聲古壊切放也从心象聲徒朗切惰也从心曼聲一曰慢不畏也謀晏切慢也从心台聲徒亥切怠也从心解聲古隘切不敬也从心􅤚省春秋傳曰執王憜徒果切憜或省􅊟古文驚也从心從聲讀若悚息拱切鬱也从心弗聲符弗切忽也从心介聲孟子曰孝子之心不若是􅢚呼介切忘也从心勿聲呼骨切不識也从从亡亡亦聲武方切忘也慲兠也从心䓣聲母官切縱也从心次聲資四切放也从心昜聲曰乎也徒朗切意不定也从心童聲尺容切啁也从一里聲春秋傳有孔悝一曰病也苦回切權詐也从心矞聲古穴切誤也从心狂聲居況切狂之皃从心況省聲許往切變也从心危聲過委切有二心也从心巂聲戸圭切心動也从心季聲其季切幸也从心敫聲古堯切善自用之意也从心銛聲商書曰今汝懖懖古活切古文从耳貪也从心元聲春秋傳曰怃嵗而㵣曰五換切河内之北謂貪曰惏从心林聲盧含切不明也从心夢聲武亘切過也从心衍聲去䖍切或从寒省籀文疑也从心兼聲戸兼切亂也从心或聲胡國切怓也从心民聲呼昆切亂也从心奴聲詩曰以謹惽怓女交切亂也从心春聲春秋傳曰王室曰惷惷焉一曰厚也尺允切不憭也从心昬聲呼昆切癡皃从心气聲許旣切㝱言不慧也从心衞聲千歳切亂也从心貴聲胡對切憎惡也从心巳聲渠記切悁也从心分聲敷粉切忿也从心䏍聲一曰憂也於縁切籀文恨也从心聲一曰怠也郎尸切恨也从心圭聲於避切恚也从心夗聲於顥切古文恚也从心奴聲乃故切怨也从心敦聲周書曰凡民罔不憝徒對切怒也从心昷聲於問切過也从心亞聲烏各切惡也从心曽聲作滕切恨怒也从心巿聲詩曰視我㤄㤄蒲昧切怒也从心刀聲讀若李陽冰曰刀非聲當从刈省魚旣切怨恨也从心􅂏聲讀若膎臣鉉等曰􅂏非聲未詳戸佳切怨也从心艮聲胡艮切怨也从心對聲文淚切悔恨也从心每聲荒内切小怒也从心壴聲充丗切不服懟也从心央聲於亮切煩也从心从滿莫困切懣也从心賁聲房吻切懣也从心門聲莫困切失意也从心周聲敕鳩切望恨也从心長聲丑亮切大息也从心从氣氣亦聲詩曰愾我寤歎許旣切愁不安也从心喿聲詩曰念子懆懆七早切傷也从心倉聲初亮切􅉃也从心旦聲得案切又當割切或从心在旦下詩曰信誓􅘔􅘔痛也从心㬱聲七感切毒也从心參聲七感切痛也从心妻聲七瘖切痛也一曰呻吟也从心同聲他紅切痛也从心非聲府眉切痛也从心則聲初力切痛也从心㫺聲思積切痛也从心敃聲眉殞切痛也从心殷聲於巾切痛聲也从心依聲孝經曰哭不㥋於豈切蕄存也从心簡省聲讀若􅂤古限切動也从心蚤聲一曰起也穌遭切動人心也从心咸聲古橝切不動也从心尤聲讀若祐于救切怨仇也从心名聲其从切憂皃从心貟聲王分切憂皃从心幼聲於虯切憂也从心介聲五介切憂也从心羊聲余亮切憂懼也从心耑聲詩曰惴惴其慓之瑞切憂也从心鈞聲常倫切憂也从心丙聲詩曰憂心怲怲兵永切憂也从心炎聲詩曰憂心如惔徒甘切憂也从心叕聲詩曰憂心惙惙一曰意不定也陟劣切憂也从心殤省聲式亮切憂也从心秋聲士尤切憂皃从心弱聲讀與惄同奴歷切憂困也从心臽聲苦感切憂也从心攸聲以周切憂也从心卒聲讀與易萃卦同泰醉切憂也从心圂聲一曰擾也胡困切楚潁之閒謂憂曰从心􅫕聲力至切憂也从心于聲讀若吁況于切憂也从心中聲詩曰憂心忡忡敕中切憂也从心肖聲詩曰憂心悄悑親小切憂也从心戚聲倉歷切愁也从心从頁徐鍇臼􅡣形於顔面故从頁於求切憂也从心上貫吅吅亦聲胡丱切古文从闗省亦古文患怯也从心匡匡亦聲去王切思皃从心夾聲若叶切失气也从心聶聲一曰服也之涉切忌難也从心單聲一曰難也徒索切懼也陳楚謂懼曰悼从心卓聲臣鉉等曰卓非聲當从罩省徒到切懼也从心巩聲丘隴切古文懼也从心習聲讀若疊之涉切恐也从心术聲丑律切敬也从心易聲他歷切或从狄戰慄也从心共聲戸工切又工恐切苦也从心亥聲胡㮣切恐也从心皇聲胡光切惶也从心甫聲普故切或从布聲悑也从心執聲之入切也从心􅌛聲苦計切􅱂也从心葡聲蒲拜切或从疒毒也从心其聲周書曰來就惎惎渠記切辱也从心耳聲敕里切青徐謂慙曰㥏从心典聲他典切辱也从天心聲他􅀧切媿也从心斬聲昨甘切慙也从心而聲女六切慙也从心作省聲在各切哀也从心㷠聲落賢切泣下也从心連聲易曰泣涕㦁如力延切能也从心刃聲而軫切厲也一曰止也从心弭聲讀若沔彌兖切懲也从心乂聲魚肺切㣻也从心徴聲直陵切覺寤也从心景聲詩曰憬彼淮夷俱永切文二百六十三重二十二嬾也从心庸聲蜀容切口悱悱也从心非聲敷尾切衂怩慙也从心尼聲女夷切惉懘煩聲也从心沾聲尺􅉟切惉懘也从心滯聲尺制切悃也从心豤聲康很切度也从心寸聲倉本切悲也从心召聲敕宵切大哭也从心動聲徒弄切亂也从心若聲人者切用心也从心合聲苦狹切善兄弟也从心弟聲經典通用弟特計切說也从心睪聲經典通用釋羊益切文十三新附心疑也从三心凡惢之屬皆从惢讀若易旅瑣瑣又才規才累二切垂也从惢系聲如壘切文二􅀃文解字第十下

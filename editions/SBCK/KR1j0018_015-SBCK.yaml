見陛下神明盛德承遵聖業上考度於天下流化於民先天而天不違後天而奉天時萬國咸寜神人以和猶復深惟五經之妙皆爲漢制愽采幽逺窮理盡性以至於命先帝詔侍中􅀐都尉賈逵修理舊文殊藝異術王敎一耑苟有可以加於國者靡不悉集易曰窮神知化德之盛也書曰人之有能有爲使羞其行而國其昌臣父故太尉南閣祭酒愼本從逵受古學蓋聖人不空作皆有依據今五經之道昭炳光明而文字者其本所由生自周禮漢律皆當學六書貫通其意恐巧說衺辭使學者疑愼愽問通人考之於逵作說文解字六藝羣書之詁皆訓其意而天地􅀑神山川艸木鳥獸䖵蟲雜物竒怪王制禮儀丗閒人事莫不畢載凡十五卷十三萬三千四百四十一字愼前以詔書校東觀敎小黃門孟生李喜等以文字未定未奏上今愼已病遣臣齎詣闕愼又學孝經孔氏古文說文古孝經者孝昭帝時魯國三老所獻建武時給事中議郎䘙宏所校皆口傳官無其說謹撰具一篇并上臣沖誠惶誠恐頓首頓首死辠死辠臣䭬􅈡再拜以聞皇帝陛下建光元年九月己亥朔二十日戊午上徐鍇曰䢖光元年漢安帝之十五年歳在辛酉召上書者汝南許沖詣左掖門會令并齎所上書十月十九日中黃門饒喜已詔書賜召陵公乗許沖布四十匹即日受詔朱雀掖門敕勿謝銀青光祿大夫守右散􅀐常侍上柱國東海縣開國子食邑五百戸臣徐鉉奉􅀡郎守祕書省著作郎􅀡史館臣句中正翰林書學臣葛湍臣王惟恭等奉詔校定許愼說文十四篇并序目一篇凡萬六百餘字聖人之旨蓋云備矣稽夫八卦旣畫萬象旣分則文字爲之大輅載籍爲之六轡先王敎化所以行於百代及物之功與造化均不可忽也雖復五帝之後改易殊體六國之丗文字異形然猶存􅂐籀之迹不失形􅀋之本及暴秦苛政􅊌隷聿興便於末俗人競師法古文旣絶譌僞日滋至漢宣帝時始命諸儒修倉頡之法亦不能復故光武時馬援上䟽論文字之譌謬其言詳矣及和帝時申命賈逵修理舊文於是許愼采史籀李斯揚雄之書􅀶訪通人考之於逵作說文解字至安帝十五年始奏上之而隸書行之已乆習之益工加以行草八分紛然閒出返以􅂐籀爲竒怪之迹不復經心至於六籍舊文相承傳寫多求便俗漸失本原爾雅所載艸木魚鳥之名肆意增益不可觀矣諸儒傳釋亦非精究小學之徒莫能矯正唐大曆中李陽冰篆迹殊絕獨冠古今自云斯翁之後􅀡至小生此言爲不妄矣於是刋定說文修正筆法學者師慕􅂐籀中興然頗排厈許氏自爲臆說夫以師心之見破先儒之祖述豈聖人之意乎今之爲字學者亦多從陽冰之新義所謂貴耳賤目也自唐末喪亂經籍道息皇宋膺運二聖繼明人文國典粲然光􅀍興崇學校登進羣才以爲文字者六藝之本固當率由古法乃詔取許愼說文解字精加詳校垂憲百代臣等愚􅋘敢竭所聞蓋􅂐書堙替爲曰已乆凡傳寫說文者皆非其人故錯亂遺脫不可盡究今以集書正副本及羣臣家藏者備加詳考有許愼注義序例中所載而諸部不見者審知漏落悉從補録復有經典相承傳寫及時俗要用而說文不載者承詔皆附益之以廣􅂐籀之路亦皆形聲相從不違六書之義者其閒說文具有正體而時俗譌變者則具於注中其有義理乖舛違戾六書者竝序列於後俾夫學者無或致疑大抵此書務援古以正今不徇今而違古若乃高文大􅁽則宜以􅂐籀著之金石至於常行􅂤牘則艸隸足矣又許愼注解詞􅂤義奥不可周知陽冰之後諸儒箋述有可取者亦從附益猶有未盡則臣等粗爲訓釋以成一家之書說文之時未有反切後人附益互有異同孫愐唐韻行之已乆今竝以孫愐音切爲定庶夫學者有所適從食時而成旣異淮南之敏縣金於市曾非呂氏之精塵瀆聖明若臨冰谷謹上新修字義左文一十九說文闕載注義及序例偏㫄有之今竝録於諸部詔志件借魋綦剔觷醆趄顦璵檆緻笑迓脘峯左文二十八俗書譌謬不合六書之體斖字書所無不知所从無以下筆易云定天下之斖斖當作娓个亦不見義無以下筆明堂左右个者明堂􅅖室也當作介暮本作莫日在茻下也熟本作孰享芽以手進之捧本作奉从廾从手丰聲經興皆如此遨本作敖从出从放徘徊本作回寛衣也取其裵回之狀迴本作回象回轉之形腰本只作要說文象形借爲玄要之要後人加内嗚本只作烏烏旴呼也以其名自呼故曰烏呼後人加口慾說文欲字注云貪欲也此後人加心揀本只作柬􅀃文从柬八八柬之也後人加手俸本只作奉古爲之奉禄後人加人自暮已下一十二字後人妄加偏􅅖失六書之義鞦韆案詞人高無際作鞦韆賦字云漢武帝後庭之戲也本云千秋祝壽之詞也語譌轉爲秋千後人不本其意乃造此字非皮革所爲非車馬之用不合从革影案影者光景之􅀋也今通用景非毛髪藻節之事不當从彡斌本作彬或份文質備也从文配武過爲鄙淺復有从斌从貝者音頵亦於義無取恱經典只作說藝本只作埶後人加艸云義無所取著本作箸說文陟慮切注云飯攲也借爲任箸之箸後人从艸墅經典只用野野亦音常句切字本作蘇禾切从衣象形借爲朽之賾周易䟽義云深也案此亦假借之字當通用嘖黌學堂也从學省黃聲說文無學部黈充耳也从纊省主聲說文無纊部矗􅀡皃經史所無說文無􅀡部此三字皆無部􅀋可附麌說文􅢕字注云麋鹿羣臣相聚也詩麌鹿麌麌當用虞字池池沼之池當用沱沱江之别流也􅂐文筆迹相承小異本作本从二从古文及左㫄不當引筆下垂蓋前作筆勢如此後代因而不改說文不从人􅀡作左㫄从辛从木說文不省此二字李斯刻石文如此後人因之从辛从六中畫不當上曲亦李斯刻石如此上曲則字形茂美人皆効之說文作象二屬之形李斯筆迹小變不言爲異說文作亦李斯小變其勢李陽冰乃云从開口形亦爲臆說說文从􅋄而垂下於相出入也从入此字从􅋄下垂當只作屮蓋相承多一畫如六切說文本作肉後人相承作月字相􅀋說文作上史籀筆迹小異非别體此本蕃廡之廡李斯借爲有無之無後人尚其簡便故皆从之有無字本从亡李陽氷乃云不當加亡且蕃廡字从大从卌數之積也从林亦蕃多之義若不加口何以得爲有無之無或作亦止於筆迹小異說文作李斯筆迹小異說文解字弟十五下

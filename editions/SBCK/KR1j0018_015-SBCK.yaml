front:
  text: 說文解字第十五上漢太尉祭酒許愼記
  hash: sha256:54763dcec7c1b71bcb5197eeaea68c95a926f770263adf90bc97c680ab0192bc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1j0018_SBCK_015-1a}
body:
  text: 敕校定古者庖犧氏之王天下也仰則觀象於天俯則觀法於地視鳥獸之文與地之宜近取諸身逺取諸物於是始作易八卦以垂憲象及神農氏結繩爲治而統其事庶業其繁飾僞萌生黃帝之史倉頡見鳥獸蹏迒之迹知分理之可相别異也初造書契百工以乂萬品以察蓋取諸叏夬揚于王庭言文者宣敎明化於王者朝廷君子所以施禄及下居德則忌也倉頡之初作書蓋依􅀋象形故謂之文其後形聲相益即謂之字字者言孳乳而浸多也箸於竹帛謂之書書者如也以五帝三王之丗改易殊體封于泰山者七十有二代靡有同焉周禮八歲入小學􅍖氏敎國子先以六書一曰指事指事者視而可識察而可見上下是也二曰象形象形者畫成其物隨體詰詘日月是也三曰形聲形聲者以事爲名取譬相成江河是也四曰會意會意者比􅀋合誼以見指撝武信是也五曰轉注轉注者建􅀋一首同意相受􅊲老是也六曰假借假借者本無其字依聲託事令長是也及宣王太史籀箸大􅂐十五篇與古文或異至孔子書六經左丘明述春秋傳皆以古文厥意可得而說其後諸矦力政不統於王惡禮樂之害已而皆去其典籍分爲七國田疇異畮車涂異􅁤律令異法衣冠異制言語異聲文字異形秦始皇帝初兼天下丞相李斯乃奏同之罷其不與秦文合者斯作倉頡篇中車府令趙高作爰歷篇太史令胡毋敬作博學篇皆取史籀大􅂐或頗省改所謂小􅂐者也是時秦燒滅經書滌除舊典大發隸卒興役戍官獄職務繁初有隷書以趣約易而古文由此絕矣徐鍇曰王僧䖍云秦獄吏程邈善大􅂐得辠繫雲陽獄增絕大􅂐去其繁複始皇善之出爲御史名其書曰隷書班固云謂施之於徒隷也即今之隷書而無􅀧畫俯仰之􅀔自爾秦書有八體一曰大􅂐二曰小􅂐三曰刻符四曰蟲書徐鍇曰案漢書注蟲書即鳥書以書幡信首象鳥形即下云鳥蟲是也五曰摹印蕭子良以刻符摹印合爲一體徐鍇以爲符者竹而中剖之字形半分理應别爲一體摹印屈曲塡密則秦璽文也子良誤合之六曰署書蕭子良云署書漢高六年蕭何所定以題蒼龍白虎二闕羊欣云何覃思累月然後題之七曰殳書徐鍇曰書於殳也殳體八觚隨其􅀔而書之八曰隷書漢興有艸書徐鍇曰案書傳多云張竝作艸又云齊相杜探作據說文則張竝之前已有矣蕭子良云藁書者董仲舒欲言災異藁艸未上即爲藁書藁者艸之初也史記上官奪屈原藁艸今云漢典有艸知所言藁艸是創艸非艸書也尉律徐鍇曰尉律漢律篇名學僮十七已上始試諷籀書九千字乃得爲吏又以八體試之郡移太史并課最者以爲尚書史書或不正輒舉劾之今雖有尉律不課小學不修莫達其說乆矣孝宣時召通倉頡讀者張敞從受之涼州刺史杜業沛人爰禮講學大夫秦近亦能言之孝平時徵禮等百餘人令說文字未央廷中以禮爲小學元士黃門侍郎揚雄釆以作訓纂篇凡倉頡已下十四篇凡五千三百四十字羣書所載略存之矣及亡新居攝使大司空甄豐等校文書之部自以爲應制作頗改定古文時有六書一曰古文孔子壁中書也二曰竒字即古文而異者也三曰􅂐書即小􅂐秦始皇帝使下杜人程之所作也徐鍇曰李斯雖改史篇爲秦􅂐而程邈復同作也四曰佐書即秦隷書五曰繆􅂐所以摹印也六曰鳥蟲書所以書幡信也壁中書者魯恭王壞孔子宅而得禮記尚書春秋論語孝經又北平矦張倉獻春秋左氏傳郡國亦徃往於山川得鼎彞其銘即前代之古文皆自相似雖叵復見逺流其詳可得略說也而丗人大共非訾以爲好竒者也故詭更正文鄉壁虚造不可知之書變亂常行以燿於丗諸生競說字解經諠稱秦之隷書爲倉頡時書云父子相傳何得改易乃猥曰馬頭人爲長人時十爲斗虫者屈中也廷尉說律至以字斷法苛人受錢苛之字止句也若此者甚衆皆不合孔氏古文謬於史籀俗儒啚夫翫其所習蔽所希聞不見通學未甞覩字例之條怪􅁬埶而善野言以其所知爲袐妙究洞聖人之微恉又見倉頡篇中幼子承詔因號古帝之所作也其辭有神僊之術焉其迷誤不諭豈不悖哉書曰予欲觀古人之象言必遵修􅁬文而不穿鑿孔子曰吾猶及史之闕文今亡也夫蓋非其不知而不問人用巳私是非無正巧說衺辭使天下學者疑蓋文字者經藝之本王政之始前人所以垂後後人所以識古故曰本立而道生知天下之至嘖而不可亂也今敘􅂐文合以古籀博采通人至于小大信而有證稽譔其說將以理羣類解謬誤曉學者達神恉徐鍇曰恉即意旨字旨者也多通用分別部居不相雜廁徐鍇曰分部相從自許始也萬物咸覩靡不兼載厥誼不昭爰明以諭其偁易孟氏書孔氏詩毛氏禮周官春秋左氏論語孝經皆古文也其於所不知蓋闕如也􅀃文解字弟一部一部二部三部四部五部六部七部八部九部十部十一部十二部十三部十四􅀃文解字弟二部十五部十六部十七部十八部十九部二十部二十一部三十二部三十三部三十四部三十五部二十六部二十七部二十八部二十九部三十部三十一部三十二部三十三部三十四部三十五部三十六部三十七部三十八部三十九部四十部四十一部四十二部四十三部四十四說文解字弟三部四十五部四十六部四十七部四十八部四十九部五十部五十一部五十二部五十三部五十四部五十五部五十六部五十七部五十八部五十九部六十部六十一部六十二部六十三部六十四部六十五部六十六部六十七部六十八部六十九部七十部七十一部七十二部七十三部七十四部七十五部七十六部七十七部七十八部七十九部八十部八十一部八十二部八十三部八十四部八十五部八十六部八十七部八十八部八十九部九十部九十一部九十二部九十三部九十四部九十五